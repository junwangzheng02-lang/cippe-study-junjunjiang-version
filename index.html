  var VERDICT_LABEL = {accurate:'准确', corrected:'已修正', qualified:'保留·已限定', other:'其他'};

  window.cippeBankSearch = function(v){ bankSearch = v; bankShown = bankPageSize; renderContent(); };
  window.cippeBankVerdict = function(v){ bankVerdict = v; bankShown = bankPageSize; renderContent(); };
  window.cippeBankTopic = function(v){ bankTopic = v; bankShown = bankPageSize; renderContent(); };
  window.cippeBankStatusFilter = function(v){ bankStatusFilter = v; bankShown = bankPageSize; renderContent(); };
  window.cippeBankLoadMore = function(){ bankShown += bankPageSize; renderContent(); };

  function getBankStatus(n){
    return bankStatus[n] || {done:false, hard:false};
  }
  window.cippeToggleDone = async function(n){
    var s = getBankStatus(n);
    bankStatus[n] = {done: !s.done, hard: s.hard};
    await saveBankStatus();
    render();
  };
  window.cippeToggleHard = async function(n){
    var s = getBankStatus(n);
    bankStatus[n] = {done: s.done, hard: !s.hard};
    await saveBankStatus();
    render();
  };

  function isInMistakes(n){
    return mistakes.some(function(m){ return m.fromBank === n; });
  }
  window.cippeBankToggle = async function(n){
    var existing = mistakes.find(function(m){ return m.fromBank === n; });
    if(existing){
      mistakes = mistakes.filter(function(m){ return m.fromBank !== n; });
    } else {
      var q = QUESTION_BANK.find(function(x){ return x.n === n; });
      if(!q) return;
      mistakes.unshift({
        id: uid(),
        question: '【第'+q.n+'题】'+q.q,
        options: q.o,
        correct: q.a,
        mine: '',
        explain: q.e,
        topic: q.t,
        mastered: false,
        fromBank: n,
        createdAt: Date.now()
      });
    }
    await saveMistakes();
    render();
  };

  function renderBank(){
    var doneCount = 0, hardCount = 0, mistakeCount = 0;
    QUESTION_BANK.forEach(function(q){
      var s = getBankStatus(q.n);
      if(s.done) doneCount++;
      if(s.hard) hardCount++;
      if(isInMistakes(q.n)) mistakeCount++;
    });

    var html = '<div class="stats-row">'
      + '<div class="stat-box"><div class="stat-num">'+QUESTION_BANK.length+'</div><div class="stat-lbl">题库总量</div></div>'
      + '<div class="stat-box"><div class="stat-num">'+doneCount+'</div><div class="stat-lbl">已做过</div></div>'
      + '<div class="stat-box"><div class="stat-num">'+hardCount+'</div><div class="stat-lbl">难题待加强</div></div>'
      + '<div class="stat-box"><div class="stat-num">'+mistakeCount+'</div><div class="stat-lbl">已入错题本</div></div>'
      + '</div>';

    html += '<div class="bank-toolbar">';
    html += '<input class="search" type="text" style="margin-bottom:0;flex:1;min-width:200px;" placeholder="搜索题干/选项/解析…" value="'+escapeHtml(bankSearch)+'" oninput="cippeBankSearch(this.value)">';
    html += '</div>';
    html += '<div class="bank-toolbar">'
      + bankBtn('verdict','all','全部结论') + bankBtn('verdict','corrected','已修正(20)')
      + bankBtn('verdict','qualified','保留·已限定(36)') + bankBtn('verdict','accurate','准确(263)')
      + '</div>';
    var topics = ['all','GDPR','ePrivacy指令','LED执法指令','EUDPR','AI Act','Data Act','历史沿革/95-46-EC','Convention 108/108+','判例法','监管机构'];
    html += '<div class="bank-toolbar">' + topics.map(function(tp){
      return bankBtn('topic', tp, tp==='all'?'全部知识点':tp);
    }).join('') + '</div>';
    html += '<div class="bank-toolbar">'
      + statusBtn('undone','未做过 ('+(QUESTION_BANK.length-doneCount)+')')
      + statusBtn('done','已做过 ('+doneCount+')')
      + statusBtn('hard','难题待加强 ('+hardCount+')')
      + statusBtn('mistakes','已加入错题本 ('+mistakeCount+')')
      + statusBtn('all','全部 ('+QUESTION_BANK.length+')')
      + '</div>';

    var list = QUESTION_BANK.filter(function(q){
      if(bankVerdict!=='all' && q.v!==bankVerdict) return false;
      if(bankTopic!=='all' && q.t!==bankTopic) return false;
      var st = getBankStatus(q.n);
      if(bankStatusFilter==='done' && !st.done) return false;
      if(bankStatusFilter==='undone' && st.done) return false;
      if(bankStatusFilter==='hard' && !st.hard) return false;
      if(bankStatusFilter==='mistakes' && !isInMistakes(q.n)) return false;
      var s = bankSearch.trim().toLowerCase();
      if(s && (q.q+q.o+q.e).toLowerCase().indexOf(s)===-1) return false;
      return true;
    });

    html += '<div class="bank-count">共 '+list.length+' 题（题库总计319题，来自逐题复核修订版）</div>';

    if(list.length===0){
      html += '<div class="empty"><div class="big">·</div>未找到匹配题目</div>';
      return html;
    }

    var slice = list.slice(0, bankShown);
    slice.forEach(function(q){
      var inM = isInMistakes(q.n);
      var st = getBankStatus(q.n);
      var cardCls = 'bank-card' + (inM?' in-mistakes':'') + (st.hard?' is-hard':'') + (st.done?' is-done':'');
      html += '<div class="'+cardCls+'">'
        + '<div class="bank-meta">'
        + '<span class="bank-num">第 '+q.n+' 题</span>'
        + '<span class="tag">'+escapeHtml(q.t)+'</span>'
        + '<span class="tag v-'+q.v+'">'+VERDICT_LABEL[q.v]+'</span>'
        + (st.done ? '<span class="tag t-done">已做过</span>' : '')
        + (st.hard ? '<span class="tag t-hard">难题待加强</span>' : '')
        + '</div>'
        + '<div class="bank-q">'+escapeHtml(q.q)+'</div>'
        + '<div class="bank-o">'+escapeHtml(q.o)+'</div>'
        + '<details><summary>展示答案和解析</summary><div class="bank-explain">'
        + '<div class="bank-a">正确答案：<b>'+escapeHtml(q.a)+'</b></div>'
        + '<div class="bank-vd">复核结论：'+escapeHtml(q.vd)+'</div>'
        + escapeHtml(q.e)
        + '</div></details>'
        + '<details><summary>🔗 打开相关法条（'+escapeHtml(q.t)+'）</summary><div class="bank-explain">'
        + refMiniList(q.t)
        + '</div></details>'
        + '<div class="bank-actions" style="display:flex;flex-wrap:wrap;gap:8px;">'
        + '<button class="btn small '+(inM?'toggle-remove':'toggle-add')+'" onclick="cippeBankToggle('+q.n+')">'
        + (inM ? '✓ 已在错题本（点击移出）' : '+ 加入错题本') + '</button>'

  var storageMode = 'unknown';

  async function storageGet(key){
    if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.get === 'function'){
      storageMode = 'cloud';
      try{
        var r = await window.storage.get(key, false);
        return r ? r.value : null;
      }catch(e){
        return null; // key not yet created — normal, not a failure
      }
    }
    storageMode = 'local';
    try{ return localStorage.getItem('cippe:'+key); }
    catch(e){ storageMode = 'memory'; return null; }
  }
  async function storageSet(key, valueStr){
    if(typeof window.storage !== 'undefined' && window.storage && typeof window.storage.set === 'function'){
      storageMode = 'cloud';
      try{ await window.storage.set(key, valueStr, false); }
      catch(e){ console.error('云端保存失败', e); }
      return;
    }
    storageMode = 'local';
    try{ localStorage.setItem('cippe:'+key, valueStr); }
    catch(e){ storageMode = 'memory'; console.error('本地保存失败', e); }
  }
  function updateBackupStatus(){

      local: '数据自动保存中（本机浏览器 localStorage，不跨设备）',
      memory: '⚠ 无法持久化，数据仅存于本次会话',
      unknown: '数据自动保存中…'
    }[storageMode];
    el.textContent = label;
  }

      customRef = r3b ? JSON.parse(r3b) : [];
    }catch(e){ customRef = []; }

  async function jsonbinCreateBin(payload){
    var res = await fetch('https://api.jsonbin.io/v3/b', {
      method:'POST',
      headers:{'Content-Type':'application/json','X-Master-Key':syncConfig.apiKey,'X-Bin-Name':'cippe-review-backup'},
      body: JSON.stringify(payload)
    });
    var data = await res.json().catch(function(){ return {}; });
    if(!res.ok) throw new Error((data && data.message) || ('创建失败 HTTP '+res.status));
    return data.metadata.id;
  }
  async function jsonbinPush(){
    if(!syncConfig.apiKey) return;
    var payload = {notes:notes, mistakes:mistakes, bankStatus:bankStatus, customRef:customRef, updatedAt:new Date().toISOString()};
    try{
      setSyncStatus('☁ 同步中…');
      if(!syncConfig.binId){
        var id = await jsonbinCreateBin(payload);
        syncConfig.binId = id;
        await saveSyncConfig();
        var binInput = document.getElementById('sync-binid');
        if(binInput) binInput.value = id;
      } else {
        var res = await fetch('https://api.jsonbin.io/v3/b/'+syncConfig.binId, {
          method:'PUT',
          headers:{'Content-Type':'application/json','X-Master-Key':syncConfig.apiKey},
          body: JSON.stringify(payload)
        });
        var data = await res.json().catch(function(){ return {}; });
        if(!res.ok) throw new Error((data && data.message) || ('同步失败 HTTP '+res.status));
      }
      setSyncStatus('☁ 已同步 '+new Date().toLocaleTimeString());
    }catch(e){
      console.error(e);
      setSyncStatus('☁ 同步失败：'+e.message);
    }
  }
  async function jsonbinPull(silent){
    if(!syncConfig.apiKey || !syncConfig.binId) return null;
    try{
      if(!silent) setSyncStatus('☁ 拉取中…');
      var res = await fetch('https://api.jsonbin.io/v3/b/'+syncConfig.binId+'/latest', {
        headers:{'X-Master-Key':syncConfig.apiKey}
      });
      var data = await res.json().catch(function(){ return {}; });
      if(!res.ok) throw new Error((data && data.message) || ('拉取失败 HTTP '+res.status));
      setSyncStatus('☁ 已同步 '+new Date().toLocaleTimeString());
      return data.record;
    }catch(e){
      console.error(e);
      setSyncStatus('☁ 拉取失败：'+e.message);
      return null;
    }
  }

  window.cippeImportBackup = async function(file){
    if(!file) return;
    try{
      var text = await file.text();
      var data = JSON.parse(text);
      if(!data || (!Array.isArray(data.notes) && !Array.isArray(data.mistakes) && !data.bankStatus && !Array.isArray(data.customRef))){
        alert('文件格式不正确，无法识别为本应用的备份文件');
        return;
      }
      var mode = confirm('选择"确定"= 合并到现有数据（保留当前记录，追加备份中没有的条目）\n选择"取消"= 用备份完全覆盖当前数据');
      if(mode){
        var existIds = {};
        notes.forEach(function(n){ existIds[n.id]=1; });
        (data.notes||[]).forEach(function(n){ if(!existIds[n.id]) notes.push(n); });
        var existMIds = {};
        mistakes.forEach(function(m){ existMIds[m.id]=1; });
        (data.mistakes||[]).forEach(function(m){ if(!existMIds[m.id]) mistakes.push(m); });
        Object.keys(data.bankStatus||{}).forEach(function(k){
          var incoming = data.bankStatus[k];
          var cur = bankStatus[k] || {done:false,hard:false};
          bankStatus[k] = {done: cur.done || incoming.done, hard: cur.hard || incoming.hard};
        });
        var existRIds = {};
        customRef.forEach(function(r){ existRIds[r.id]=1; });
        (data.customRef||[]).forEach(function(r){ if(!existRIds[r.id]) customRef.push(r); });
      } else {
        notes = data.notes || [];
        mistakes = data.mistakes || [];
        bankStatus = data.bankStatus || {};
        customRef = data.customRef || [];
      }
      await saveNotes();
      await saveMistakes();
      await saveBankStatus();
      await saveCustomRef();
      document.getElementById('import-file').value = '';
      alert('导入完成');
      render();
    }catch(e){
      console.error(e);
      alert('导入失败：文件无法解析');
    }
  };

    var groups = {};
    var order = [];
    mergedReference().forEach(function(r){
      var q = refSearch.trim().toLowerCase();
      if(q && (r.title+r.note+r.code).toLowerCase().indexOf(q) === -1) return;
      if(!groups[r.group]){ groups[r.group] = []; order.push(r.group); }
      groups[r.group].push(r);
    });
    var html = '<div id="ref-form-toggle"><button class="btn" onclick="cippeShowRefForm()">+ 新增法条</button></div>';
    html += '<div id="ref-form-wrap" class="card" style="display:none;">';
    html += '<label>法律/条文名称</label><input type="text" id="rf-title" placeholder="例如：某成员国实施细则">';
    html += '<div class="row2"><div><label>编号/引用</label><input type="text" id="rf-code" placeholder="例如：国内法编号"></div>'
      + '<div><label>状态</label><select id="rf-status"><option value="live">现行有效</option><option value="repealed">已失效</option></select></div></div>';
    html += '<label>知识点分类（用于题库联动）</label><select id="rf-topic">' + TOPIC_OPTIONS.map(function(t){return '<option>'+t+'</option>';}).join('') + '</select>';
    html += '<label>说明/摘要</label><textarea id="rf-note" rows="3" placeholder="简要说明这条法律/条文的内容"></textarea>';
    html += '<label>官方链接（可选）</label><input type="text" id="rf-link" placeholder="https://…">';
    html += '<div class="form-actions"><button class="btn" onclick="cippeAddCustomRef()">保存</button>'
      + '<button class="btn secondary" onclick="cippeHideRefForm()">取消</button></div>';
    html += '</div>';

    html += '<input class="search" type="text" placeholder="搜索法律名称、条文关键词…" value="'+escapeHtml(refSearch)+'" oninput="cippeRefSearch(this.value)" style="margin-top:14px;">';
    if(order.length===0){
      html += '<div class="empty"><div class="big">·</div>未找到匹配结果</div>';
    }
    order.forEach(function(g){
      html += '<div class="group-title">'+escapeHtml(g)+'</div>';
      groups[g].forEach(function(r){
        html += '<div class="card">'
          + '<span class="tag '+(r.status==='live'?'status-live':'status-repealed')+'">'+(r.status==='live'?'现行有效':'已失效')+'</span>'
          + (r.t ? '<span class="tag">'+escapeHtml(r.t)+'</span>' : '')
          + '<div class="ref-title">'+escapeHtml(r.title)+'</div>'
          + (r.code ? '<div class="ref-code">'+escapeHtml(r.code)+'</div>' : '')
          + '<div class="ref-note">'+escapeHtml(r.note)+'</div>'
          + (r.link ? '<a class="ref-link" href="'+escapeHtml(r.link)+'" target="_blank" rel="noopener">官方链接 →</a>' : '')
          + (r.isCustom ? ' <span class="btn ghost" style="cursor:pointer;margin-left:8px;" onclick="cippeDeleteCustomRef(\''+r.id+'\')">删除</span>' : '')
          + '</div>';
      });
    });
    return html;
  }

  // ---------- 错题本 ----------
  var mistakeFilter = 'all';
  var mistakeSearch = '';
  window.cippeMistakeFilter = function(v){ mistakeFilter = v; renderContent(); };
  window.cippeMistakeSearch = function(v){ mistakeSearch = v; renderContent(); };
  window.cippeShowMistakeForm = function(){
    document.getElementById('mistake-form-wrap').style.display = 'block';
    document.getElementById('mistake-form-toggle').style.display = 'none';
  };
  window.cippeHideMistakeForm = function(){
    document.getElementById('mistake-form-wrap').style.display = 'none';
    document.getElementById('mistake-form-toggle').style.display = 'block';
    clearMistakeForm();
  };
  function clearMistakeForm(){
    ['mf-question','mf-options','mf-correct','mf-mine','mf-explain'].forEach(function(id){
      var el = document.getElementById(id);
      if(el) el.value = '';
    });
    document.getElementById('mf-topic').value = TOPIC_OPTIONS[0];
  }
  window.cippeAddMistake = async function(){
    var q = document.getElementById('mf-question').value.trim();
    if(!q){ alert('请填写题目内容'); return; }
    var item = {
      id: uid(),
      question: q,
      options: document.getElementById('mf-options').value.trim(),
      correct: document.getElementById('mf-correct').value.trim(),
      mine: document.getElementById('mf-mine').value.trim(),
      explain: document.getElementById('mf-explain').value.trim(),
      topic: document.getElementById('mf-topic').value,
      mastered: false,
      createdAt: Date.now()
    };
    mistakes.unshift(item);
    await saveMistakes();
    cippeHideMistakeForm();
    render();
  };
  window.cippeToggleMastered = async function(id){
    var m = mistakes.find(function(x){ return x.id===id; });
    if(m){ m.mastered = !m.mastered; await saveMistakes(); render(); }
  };
  window.cippeDeleteMistake = async function(id){
    if(!confirm('确定删除这条错题记录吗？')) return;
    mistakes = mistakes.filter(function(x){ return x.id!==id; });
    await saveMistakes(); render();
  };

  function renderMistakes(){
    var stats = {
      total: mistakes.length,
      mastered: mistakes.filter(function(m){ return m.mastered; }).length
    };
    var html = '<div class="stats-row">'
      + '<div class="stat-box"><div class="stat-num">'+stats.total+'</div><div class="stat-lbl">累计错题</div></div>'
      + '<div class="stat-box"><div class="stat-num">'+stats.mastered+'</div><div class="stat-lbl">已掌握</div></div>'
      + '<div class="stat-box"><div class="stat-num">'+(stats.total-stats.mastered)+'</div><div class="stat-lbl">待复习</div></div>'
      + '</div>';

    html += '<div id="mistake-form-toggle"><button class="btn" onclick="cippeShowMistakeForm()">+ 记录一道新错题</button></div>';
    html += '<div id="mistake-form-wrap" class="card" style="display:none;">';
    html += '<label>题目内容</label><textarea id="mf-question" rows="3" placeholder="粘贴或输入题目原文"></textarea>';
    html += '<label>选项（可选，随意格式）</label><textarea id="mf-options" rows="3" placeholder="A. ...&#10;B. ...&#10;C. ...&#10;D. ..."></textarea>';
    html += '<div class="row2"><div><label>正确答案</label><input type="text" id="mf-correct" placeholder="例如：A"></div>'
      + '<div><label>我的答案</label><input type="text" id="mf-mine" placeholder="例如：C"></div></div>';
    html += '<label>知识点标签</label><select id="mf-topic">' + TOPIC_OPTIONS.map(function(t){return '<option>'+t+'</option>';}).join('') + '</select>';
    html += '<label>解析 / 错因笔记</label><textarea id="mf-explain" rows="3" placeholder="为什么错了？正确的法条依据是什么？"></textarea>';
    html += '<div class="form-actions"><button class="btn" onclick="cippeAddMistake()">保存</button>'
      + '<button class="btn secondary" onclick="cippeHideMistakeForm()">取消</button></div>';
    html += '</div>';

    html += '<input class="search" type="text" placeholder="搜索错题内容…" value="'+escapeHtml(mistakeSearch)+'" oninput="cippeMistakeSearch(this.value)" style="margin-top:16px;">';

    html += '<div style="display:flex;gap:8px;margin-bottom:14px;">'
      + tabFilterBtn('all','全部') + tabFilterBtn('pending','待复习') + tabFilterBtn('mastered','已掌握')
      + '</div>';

    var list = mistakes.filter(function(m){
      if(mistakeFilter==='pending' && m.mastered) return false;
      if(mistakeFilter==='mastered' && !m.mastered) return false;
      var q = mistakeSearch.trim().toLowerCase();
      if(q && (m.question+m.explain+m.topic).toLowerCase().indexOf(q)===-1) return false;
      return true;
    });

    if(list.length===0){
      html += '<div class="empty"><div class="big">·</div>暂无记录，做题时随手记一笔吧</div>';
    }
    list.forEach(function(m){
      html += '<div class="card">'
        + '<div class="m-meta"><span class="tag">'+escapeHtml(m.topic)+'</span>'
        + (m.mastered ? '<span class="tag mastered-badge">已掌握</span>' : '')
        + '<span style="font-size:11px;color:var(--muted);margin-left:auto;">'+fmtDate(m.createdAt)+'</span></div>'
        + '<div class="m-q">'+escapeHtml(m.question)+'</div>'
        + (m.options ? '<div class="m-answers" style="white-space:pre-wrap;">'+escapeHtml(m.options)+'</div>' : '')
        + '<div class="m-answers">正确答案：<b>'+escapeHtml(m.correct||'—')+'</b> ｜ 我的答案：'+escapeHtml(m.mine||'—')+'</div>'
        + (m.explain ? '<div class="m-explain">'+escapeHtml(m.explain)+'</div>' : '')
        + '<div class="m-actions">'
        + '<button class="btn small secondary" onclick="cippeToggleMastered(\''+m.id+'\')">'+(m.mastered?'标为待复习':'标为已掌握')+'</button>'
        + '<button class="btn small ghost" onclick="cippeDeleteMistake(\''+m.id+'\')">删除</button>'
        + '</div></div>';
    });
    return html;
  }
  function tabFilterBtn(val,label){
    var active = mistakeFilter===val;
    return '<button class="btn small '+(active?'':'secondary')+'" onclick="cippeMistakeFilter(\''+val+'\')">'+label+'</button>';
  }

  // ---------- 错题闪卡复习 ----------
  window.cippeReveal = function(){ reviewRevealed = true; render(); };
  window.cippeReviewNext = function(mark){
    var pending = mistakes.filter(function(m){ return !m.mastered; });
    if(mark==='mastered' && pending[reviewIndex]){
      cippeToggleMastered(pending[reviewIndex].id).then(function(){
        reviewRevealed = false;
        render();
      });
      return;
    }
    reviewIndex++;
    reviewRevealed = false;
    render();
  };
  function renderReview(){
    var pending = mistakes.filter(function(m){ return !m.mastered; });
    if(pending.length===0){
      return '<div class="empty"><div class="big">✓</div>暂无待复习错题<br>先去"错题本"里记录几道，再回来闪卡复习吧</div>';
    }
    if(reviewIndex >= pending.length) reviewIndex = 0;
    var m = pending[reviewIndex];
    var html = '<div class="flash-progress">第 '+(reviewIndex+1)+' / '+pending.length+' 题（待复习）</div>';
    html += '<div class="flash-card" onclick="'+(reviewRevealed?'':'cippeReveal()')+'">';
    html += '<span class="tag" style="align-self:flex-start;margin-bottom:10px;">'+escapeHtml(m.topic)+'</span>';
    html += '<div class="flash-q">'+escapeHtml(m.question)+'</div>';
    if(m.options){ html += '<div class="m-answers" style="white-space:pre-wrap;margin-top:10px;">'+escapeHtml(m.options)+'</div>'; }
    if(!reviewRevealed){
      html += '<div class="flash-hint">点击卡片查看正确答案与解析</div>';
    } else {
      html += '<div class="flash-reveal">'
        + '<div class="m-answers">正确答案：<b>'+escapeHtml(m.correct||'—')+'</b> ｜ 我的答案：'+escapeHtml(m.mine||'—')+'</div>'
        + (m.explain ? '<div class="m-explain">'+escapeHtml(m.explain)+'</div>' : '')
        + '</div>';
    }
    html += '</div>';
    if(reviewRevealed){
      html += '<div class="flash-nav">'
        + '<button class="btn secondary" onclick="cippeReviewNext(\'again\')">仍需复习</button>'
        + '<button class="btn" onclick="cippeReviewNext(\'mastered\')">已掌握</button>'
        + '</div>';
    }
    return html;
  }

  // ---------- 我的笔记 ----------
  window.cippeShowNoteForm = function(){
    document.getElementById('note-form-wrap').style.display = 'block';
    document.getElementById('note-form-toggle').style.display = 'none';
  };
  window.cippeHideNoteForm = function(){
    document.getElementById('note-form-wrap').style.display = 'none';
    document.getElementById('note-form-toggle').style.display = 'block';
    document.getElementById('nf-content').value = '';
  };
  window.cippeAddNote = async function(){
    var content = document.getElementById('nf-content').value.trim();
    if(!content){ alert('请输入笔记内容'); return; }
    notes.unshift({
      id: uid(),
      topic: document.getElementById('nf-topic').value,
      content: content,
      createdAt: Date.now()
    });
    await saveNotes();
    cippeHideNoteForm();
    render();
  };
  window.cippeDeleteNote = async function(id){
    if(!confirm('确定删除这条笔记吗？')) return;
    notes = notes.filter(function(n){ return n.id!==id; });
    await saveNotes(); render();
  };
  var editingNoteId = null;
  window.cippeEditNote = function(id){ editingNoteId = id; renderContent(); };
  window.cippeCancelEditNote = function(){ editingNoteId = null; renderContent(); };
  window.cippeSaveNoteEdit = async function(id){
    var content = document.getElementById('ne-content-'+id).value.trim();
    if(!content){ alert('笔记内容不能为空'); return; }
    var n = notes.find(function(x){ return x.id===id; });
    if(n){
      n.topic = document.getElementById('ne-topic-'+id).value;
      n.content = content;
      n.updatedAt = Date.now();
    }
    await saveNotes();
    editingNoteId = null;
    render();
  };
  var noteSearch = '';
  window.cippeNoteSearch = function(v){ noteSearch = v; renderContent(); };
  function renderNotes(){
    var html = '<div id="note-form-toggle"><button class="btn" onclick="cippeShowNoteForm()">+ 新建笔记</button></div>';
    html += '<div id="note-form-wrap" class="card" style="display:none;">';
    html += '<label>知识点标签</label><select id="nf-topic">' + TOPIC_OPTIONS.map(function(t){return '<option>'+t+'</option>';}).join('') + '</select>';
    html += '<label>笔记内容</label><textarea id="nf-content" rows="4" placeholder="记下你的理解、易混点、口诀…"></textarea>';
    html += '<div class="form-actions"><button class="btn" onclick="cippeAddNote()">保存</button>'
      + '<button class="btn secondary" onclick="cippeHideNoteForm()">取消</button></div>';
    html += '</div>';
    html += '<input class="search" type="text" placeholder="搜索笔记…" value="'+escapeHtml(noteSearch)+'" oninput="cippeNoteSearch(this.value)" style="margin-top:16px;">';

    var q = noteSearch.trim().toLowerCase();
    var filtered = notes.filter(function(n){ return !q || (n.content+n.topic).toLowerCase().indexOf(q)!==-1; });

    if(filtered.length===0){
      html += '<div class="empty"><div class="big">·</div>还没有笔记，学到知识点随手记下来</div>';
      return html;
    }

    var groups = {};
    filtered.forEach(function(n){
      var key = n.topic || '其他';
      if(!groups[key]) groups[key] = [];
      groups[key].push(n);
    });
    var order = TOPIC_OPTIONS.filter(function(t){ return groups[t] && groups[t].length; });
    Object.keys(groups).forEach(function(k){ if(order.indexOf(k)===-1) order.push(k); });

    order.forEach(function(g){
      html += '<div class="group-title">'+escapeHtml(g)+' ('+groups[g].length+')</div>';
      html += '<div class="card">';
      groups[g].forEach(function(n){
        if(editingNoteId === n.id){
          html += '<div class="note-item">'
            + '<label>知识点标签</label><select id="ne-topic-'+n.id+'">' + TOPIC_OPTIONS.map(function(t){return '<option'+(t===n.topic?' selected':'')+'>'+t+'</option>';}).join('') + '</select>'
            + '<label>笔记内容</label><textarea id="ne-content-'+n.id+'" rows="4">'+escapeHtml(n.content)+'</textarea>'
            + '<div class="form-actions"><button class="btn small" onclick="cippeSaveNoteEdit(\''+n.id+'\')">保存</button>'
            + '<button class="btn small secondary" onclick="cippeCancelEditNote()">取消</button></div>'
            + '</div>';
        } else {
          html += '<div class="note-item">'
            + '<div class="note-content">'+escapeHtml(n.content)+'</div>'
            + '<div class="note-date">'+fmtDate(n.updatedAt||n.createdAt)+(n.updatedAt?' (已编辑)':'')+' · '
            + '<span class="btn ghost" style="cursor:pointer;" onclick="cippeEditNote(\''+n.id+'\')">编辑</span> · '
            + '<span class="btn ghost" style="cursor:pointer;" onclick="cippeDeleteNote(\''+n.id+'\')">删除</span></div>'
            + '</div>';
        }
      });
      html += '</div>';
    });
    return html;
  }

  function renderContent(){
    var html = '';
    if(!loaded){ html = '<div class="empty">正在加载数据…</div>'; }
    else if(activeTab==='ref') html = renderRef();
    else if(activeTab==='graph') html = renderGraph();
    else if(activeTab==='bank') html = renderBank();
    else if(activeTab==='mistakes') html = renderMistakes();
    else if(activeTab==='review') html = renderReview();
    else if(activeTab==='notes') html = renderNotes();
    document.getElementById('content').innerHTML = html;
  }

  function render(){
    renderTabs();
    renderContent();
    document.getElementById('seal-num').textContent = mistakes.filter(function(m){return !m.mastered;}).length;
  }

  loadData();
})();
</script>
