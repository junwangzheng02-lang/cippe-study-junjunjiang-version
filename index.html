oposes to use push notifications and text messages to encourage existing customers to\npre-register for an EU version of the service. Bob calls this work plan, We-Text-U. Once the company has\ngathered enough pre-registrations, it will develop EU-specific content and services.\n\nAnother plan is called Customer for Life. The idea is to offer additional services through the company’s\napp, like storage and sharing of DNA information with other applications and medical providers. The\ncompany’s contract says that it can keep customer DNA indefinitely, and use it to offer new services and\nmarket them to customers. It also says that customers agree not to withdraw direct marketing consent.\nPaul, the marketing director, suggests that the company should fully exploit these provisions, and that it\ncan work around customers’ attempts to withdraw consent because the contract invalidates them.\n\nThe final plan is to develop a brand presence in the EU. The company has already begun this process. It is\nin the process of purchasing the naming rights for a building in Germany, which would come with a few\noffices that Who-R-U executives can use while traveling internationally. The office doesn’t include any\ntechnology or infrastructure; rather, it’s simply a room with a desk and some chairs.\n\nOn a recent trip concerning the naming-rights deal, Bob’s laptop is stolen. The laptop held unencrypted\nDNA reports on 5,000 Who-R-U customers, all of whom are residents of Canada. The reports include\ncustomer name, birthdate, ethnicity, racial background, names of relatives, gender, and occasionally\nhealth information.\n\nThe Customer for Life plan may conflict with which GDPR provision?","o":"A. Article 6, which requires processing to be lawful.\nB. Article 7, which requires consent to be as easy to withdraw as it is to give.\nC. Article 16, which provides data subjects with a rights to rectification.\nD. Article 20, which gives data subjects a right to data portability.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 7(3)条明确要求撤回同意应与给予同意“同样简单”（as easy to withdraw as to give），而\nWho-R-U 合同条款约定客户“同意不得撤回直接营销同意”，这直接违反了该条款关于同意可撤回性及撤\n回便利性的强制性要求，此类合同约定本身无效。A、C、D 虽然也可能涉及其他条款问题，但与本情节\n（限制撤回权）直接对应的是第 7 条而非泛泛的合法性（A）、更正权（C）或可携权（D）条款。知识\n点：第 7(3)条同意可撤回性要求及“撤回须与给予同样简便”的强制标准，此类限制撤回条款的无效性。","t":"GDPR"},{"n":153,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe is the new privacy manager for Who-R-U, a Canadian business that provides DNA analysis. The\ncompany is headquartered in Montreal, and all of its employees are located there. The company offers its\nservices to Canadians only: Its website is in English and French, it accepts only Canadian currency, and it\nblocks internet traffic from outside of Canada (although this solution doesn’t prevent all non-Canadian\ntraffic). It also declines to process orders that request the DNA report to be sent outside of Canada, and\nreturns orders that show a non-Canadian return address.\n\nBob, the President of Who-R-U, thinks there is a lot of interest for the product in the EU, and the company\nis exploring a number of plans to expand its customer base.\n\nThe first plan, collegially called We-Track-U, will use an app to collect information about its current\nCanadian customer base. The expansion will allow its Canadian customers to use the app while traveling\n\nabroad. He suggests that the company use this app to gather location information. If the plan shows\n\npromise, Bob proposes to use push notifications and text messages to encourage existing customers to\npre-register for an EU version of the service. Bob calls this work plan, We-Text-U. Once the company has\n\ngathered enough pre-registrations, it will develop EU-specific content and services.\n\nAnother plan is called Customer for Life. The idea is to offer additional services through the company’s\napp, like storage and sharing of DNA information with other applications and medical providers. The\ncompany’s contract says that it can keep customer DNA indefinitely, and use it to offer new services and\nmarket them to customers. It also says that customers agree not to withdraw direct marketing consent.\nPaul, the marketing director, suggests that the company should fully exploit these provisions, and that it\ncan work around customers’ attempts to withdraw consent because the contract invalidates them.\n\nThe final plan is to develop a brand presence in the EU. The company has already begun this process. It is\nin the process of purchasing the naming rights for a building in Germany, which would come with a few\noffices that Who-R-U executives can use while traveling internationally. The office doesn’t include any\ntechnology or infrastructure; rather, it’s simply a room with a desk and some chairs.\n\nOn a recent trip concerning the naming-rights deal, Bob’s laptop is stolen. The laptop held unencrypted\nDNA reports on 5,000 Who-R-U customers, all of whom are residents of Canada. The reports include\ncustomer name, birthdate, ethnicity, racial background, names of relatives, gender, and occasionally\nhealth information.\n\nIf Who-R-U adopts the We-Track-U pilot plan, why is it likely to be subject to the territorial scope of the\nGDPR?","o":"A. Its plan would be in the context of the establishment of a controller in the Union.\nB. It would be offering goods or services to data subjects in the Union.\nC. It is engaging in commercial activities conducted in the Union.\nD. It is monitoring the behavior of data subjects in the Union.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。We-Track-U 计划通过 App 追踪身处欧盟境内（旅行中）的加拿大客户的位置行为，这构成\n第 3(2)(b)条“监测欧盟境内数据主体行为”的域外适用情形，而非该公司在欧盟设立机构（A，公司总部及\n全部员工均在加拿大，无欧盟设立机构）、向欧盟数据主体提供商品服务（B，该阶段仅为加拿大现有客\n户提供境外使用功能，尚未正式面向欧盟新客户提供服务）或在欧盟从事一般商业活动（C，表述过于宽\n泛不准确）。知识点：第 3(2)(b)条“监测行为”作为域外适用触发情形——追踪位于欧盟境内个人的行踪\n构成典型监测行为。","t":"GDPR"},{"n":154,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe is the new privacy manager for Who-R-U, a Canadian business that provides DNA analysis. The\ncompany is headquartered in Montreal, and all of its employees are located there. The company offers its\nservices to Canadians only: Its website is in English and French, it accepts only Canadian currency, and it\nblocks internet traffic from outside of Canada (although this solution doesn’t prevent all non-Canadian\ntraffic). It also declines to process orders that request the DNA report to be sent outside of Canada, and\n\nreturns orders that show a non-Canadian return address.\n\nBob, the President of Who-R-U, thinks there is a lot of interest for the product in the EU, and the company\nis exploring a number of plans to expand its customer base.\n\nThe first plan, collegially called We-Track-U, will use an app to collect information about its current\nCanadian customer base. The expansion will allow its Canadian customers to use the app while traveling\nabroad. He suggests that the company use this app to gather location information. If the plan shows\npromise, Bob proposes to use push notifications and text messages to encourage existing customers to\npre-register for an EU version of the service. Bob calls this work plan, We-Text-U. Once the company has\ngathered enough pre-registrations, it will develop EU-specific content and services.\n\nAnother plan is called Customer for Life. The idea is to offer additional services through the company’s\napp, like storage and sharing of DNA information with other applications and medical providers. The\ncompany’s contract says that it can keep customer DNA indefinitely, and use it to offer new services and\n\nmarket them to customers. It also says that customers agree not to withdraw direct marketing consent.\n\nPaul, the marketing director, suggests that the company should fully exploit these provisions, and that it\ncan work around customers’ attempts to withdraw consent because the contract invalidates them.\n\nThe final plan is to develop a brand presence in the EU. The company has already begun this process. It is\nin the process of purchasing the naming rights for a building in Germany, which would come with a few\n\noffices that Who-R-U executives can use while traveling internationally. The office doesn’t include any\ntechnology or infrastructure; rather, it’s simply a room with a desk and some chairs.\n\nOn a recent trip concerning the naming-rights deal, Bob’s laptop is stolen. The laptop held unencrypted\nDNA reports on 5,000 Who-R-U customers, all of whom are residents of Canada. The reports include\ncustomer name, birthdate, ethnicity, racial background, names of relatives, gender, and occasionally\nhealth information.\n\nWho-R-U is NOT required to notify the local German DPA about the laptop theft because?","o":"A. The company isn’t a controller established in the Union.\nB. The laptop belonged to a company located in Canada.\nC. The data isn’t considered personally identifiable financial information.\nD. There is no evidence that the thieves have accessed the data on the laptop.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Who-R-U 在德国购买的“冠名权”办公室未配备任何技术设施或员工实质性运营活动，仅是\n临时借用的会议空间，并不构成第 3(1)条意义上“稳定安排的设立机构”（establishment），因此该处理活\n动（笔记本电脑被盗事件）与欧盟设立机构无关，德国 DPA 对该起数据泄露事件不具有基于“设立地”标\n准的管辖权（该事件涉及的又是加拿大居民数据，进一步说明与欧盟数据主体、欧盟设立机构均无实质\n关联）。知识点：第 3(1)条“设立机构”认定标准——须具备稳定安排下的实际经营活动，单纯挂名/临时\n空间不构成设立。","t":"GDPR"},{"n":155,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nWonderkKids provides an online booking service for childcare. WonderKids is based in France, but hosts\n\nits website through a company in Switzerland. As part of their service, WonderKids will pass all personal\ndata provided to them to the childcare provider booked through their system. The type of personal data\ncollected on the website includes the name of the person booking the childcare, address and contact\ndetails, as well as information about the children to be cared for including name, age, gender and health\ninformation. The privacy statement on WonderKids’ website states the following:\n\n“WonderkKids provides the information you disclose to us through this website to your childcare provider\nfor scheduling and health and safety reasons. We may also use your and your child’s personal information\nfor our own legitimate business purposes and we employ a third-party website hosting company located in\nSwitzerland to store the data. Any data stored on equipment located in Switzerland meets the European\nCommission provisions for guaranteeing adequate safeguards for you and your child’s personal\ninformation. We will only share you and your child’s personal information with businesses that we see as\nadding real value to you. By providing us with any personal data, you consent to its transfer to affiliated\nbusinesses and to send you promotional offers.”\n\n“We may retain you and your child’s personal information for no more than 28 days, at which point the data\nwill be depersonalized, unless your personal information is being used for a legitimate business purpose\nbeyond 28 days where it may be retained for up to 2 years.”\n\n“We are processing you and your child’s personal information with your consent. If you choose not to\nprovide certain information to us, you may not be able to use our services. You have the right to: request\naccess to you and your child’s personal information; rectify or erase you or your child’s personal\ninformation; the right to correction or erasure of you and/or your child’s personal information; object to any\nprocessing of you and your child’s personal information. You also have the right to complain to the\nsupervisory authority about our data processing activities.”\n\nWhat additional information must Wonderkids provide in their Privacy Statement?","o":"A. How often promotional emails will be sent.\n\nB. Contact information of the hosting company.\n\nC. Technical and organizational measures to protect data.\nD. The categories of recipients with whom data will be shared.","a":"D","v":"accurate","vd":"准确","e":"正 确 答 案 D 。 第 13/14 条 要 求 控 制 者 告 知 的 信 息 中 ， 明 确 包 括 “ 接 收 方 或 接 收 方 类 别 ”这 一 项 ， 而\nWonderKids 隐私声明中虽提及会与“认为能为客户增加价值的企业”共享数据，但并未具体说明这些接收\n方的类别（如 childcare providers、关联企业、营销合作伙伴等），信息披露不够具体，违反透明度原\n则。A、B、C 均非第 13/14 条明确要求告知的强制性内容。知识点：第 13/14 条中“接收方类别”告知义务\n的具体性要求。","t":"GDPR"},{"n":156,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nWonderkKids provides an online booking service for childcare. WonderKids is based in France, but hosts\nits website through a company in Switzerland. As part of their service, WonderKids will pass all personal\ndata provided to them to the childcare provider booked through their system. The type of personal data\ncollected on the website includes the name of the person booking the childcare, address and contact\ndetails, as well as information about the children to be cared for including name, age, gender and health\ninformation. The privacy statement on WonderKids’ website states the following:\n\n“WonderkKids provides the information you disclose to us through this website to your childcare provider\nfor scheduling and health and safety reasons. We may also use your and your child’s personal information\nfor our own legitimate business purposes and we employ a third-party website hosting company located in\nSwitzerland to store the data. Any data stored on equipment located in Switzerland meets the European\nCommission provisions for guaranteeing adequate safeguards for you and your child’s personal\ninformation. We will only share you and your child’s personal information with businesses that we see as\nadding real value to you. By providing us with any personal data, you consent to its transfer to affiliated\nbusinesses and to send you promotional offers.”\n\n“We may retain you and your child’s personal information for no more than 28 days, at which point the data\nwill be depersonalized, unless your personal information is being used for a legitimate business purpose\n\nbeyond 28 days where it may be retained for up to 2 years.”\n\n“We are processing you and your child’s personal information with your consent. If you choose not to\nprovide certain information to us, you may not be able to use our services. You have the right to: request\naccess to you and your child’s personal information; rectify or erase you or your child’s personal\ninformation; the right to correction or erasure of you and/or your child’s personal information; object to any\nprocessing of you and your child’s personal information. You also have the right to complain to the\nsupervisory authority about our data processing activities.”\n\nWhat must the contract between WonderKids and the hosting service provider contain?","o":"A. The requirement to implement technical and organizational measures to protect the data.\nB. Controller-to-controller model contract clauses.\nC. Audit rights for the data subjects.\nD. A non-disclosure agreement.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。依据第 28(3)(c)条，控制者与处理者（此处为负责网站托管的瑞士公司）之间的书面协议须\n包含处理者应实施适当技术和组织安全措施保护数据的条款，这是处理者协议的强制核心内容之一，与\n是否涉及跨境传输保障机制（B，本题问的是委托处理协议的一般强制内容，而非跨境传输专属条款——\n虽然瑞士已获充分性认定，理论上跨境传输本身无需 SCC，但处理者协议本身仍须包含安全措施条\n款）、审计权归属数据主体（C，审计权通常赋予控制者而非数据主体本人）、保密协议（D，保密义务\n通常已包含在第 28 条处理者协议的整体要求中，但并非题目问的“必须包含”的具体核心条款）均不如 A\n准确对应第 28 条要求。知识点：第 28(3)(c)条处理者协议中安全措施条款的强制性要求。","t":"GDPR"},{"n":157,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nWonderkKids provides an online booking service for childcare. WonderKids is based in France, but hosts\n\nits website through a company in Switzerland. As part of their service, WonderKids will pass all personal\ndata provided to them to the childcare provider booked through their system. The type of personal data\n\ncollected on the website includes the name of the person booking the childcare, address and contact\n\ndetails, as well as information about the children to be cared for including name, age, gender and health\n\ninformation. The privacy statement on WonderKids’ website states the following: 6\n“WonderkKids provides the information you disclose to us through this website to your childcare provider\nfor scheduling and health and safety reasons. We may also use your and your child’s personal information\nfor our own legitimate business purposes and we employ a third-party website hosting company located in\nSwitzerland to store the data. Any data stored on equipment located in Switzerland meets the European\nCommission provisions for guaranteeing adequate safeguards for you and your child’s personal\ninformation. We will only share you and your child’s personal information with businesses that we see as\nadding real value to you. By providing us with any personal data, you consent to its transfer to affiliated\nbusinesses and to send you promotional offers.”\n\n“We may retain you and your child’s personal information for no more than 28 days, at which point the data\nwill be depersonalized, unless your personal information is being used for a legitimate business purpose\nbeyond 28 days where it may be retained for up to 2 years.”\n\n“We are processing you and your child’s personal information with your consent. If you choose not to\nprovide certain information to us, you may not be able to use our services. You have the right to: request\naccess to you and your child’s personal information; rectify or erase you or your child’s personal\ninformation; the right to correction or erasure of you and/or your child’s personal information; object to any\nprocessing of you and your child’s personal information. You also have the right to complain to the\nsupervisory authority about our data processing activities.”\n\nWhat direct marketing information can WonderKids send by email without prior consent of the person\nbooking the childcare?","o":"A. No marketing information at all.\nB. Any marketing information at all.\nC. Marketing information related to other business operations of WonderKids.\n\nD. Marketing information for products or services similar to those purchased from WonderKids.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。ePrivacy 规则下的“软退出”（soft opt-in）例外允许企业在客户购买过程中获得联系方式的情\n况下，无需重新征求同意即可向该客户推送与其已购买产品或服务“类似”的营销信息，但仅限于类似产品\n/服务范畴，不能扩展到公司其他业务（C，超出类似范围）或所有营销信息（A、B）。知识点：软退出\n规则中“类似产品或服务”这一限定范围的严格解释。","t":"ePrivacy指令"},{"n":158,"q":"An organization conducts body temperature checks as a part of COVID-19 monitoring. Body temperature\nis measured manually and is not followed by registration, documentation or other processing of an\nindividual’s personal data.\n\nWhich of the following best explain why this practice would NOT be subject to the GDPR?","o":"A. Body temperature is not considered personal data.\nB. The practice does not involve completion by automated means.\nC. Body temperature is considered pseudonymous data.\nD. The practice is for the purpose of alleviating extreme risks to public health.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 的关键不在于“人工处理当然不受 GDPR”，而在于该体温测量未自动化、未记录，也未形成或拟形成结构化\n档案系统。人工纸质或其他非自动化数据只要构成档案系统，仍可能受 GDPR 约束。","t":"GDPR"},{"n":159,"q":"When assessing the level of risk created by a data breach, which of the following would NOT have to be\ntaken into consideration?","o":"A. The ease of identification of individuals.\nB. The size of any data processor involved.\n\nC. The special characteristics of the data controller. 6\nD. The nature, sensitivity and volume of personal data.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。WP29《数据泄露通知指南》列举的风险评估考量因素包括：数据类型、敏感性和数量\n（D）、个人被识别的难易程度（A）、控制者的特殊性质（如是否为医疗机构等，C）、泄露的性质和\n严重程度、受影响个人数量、泄露后果的严重性等，但并未将“涉案数据处理者的规模大小”列为评估泄露\n风险的考量因素——处理者规模与泄露对数据主体造成的实际风险并无直接关联。知识点：WP29 数据泄\n露风险评估的考量因素清单。","t":"GDPR"},{"n":160,"q":"Under Article 80(1) of the GDPR, individuals can elect to be represented by not-for-profit organizations in a\nprivacy group litigation or class action. These organizations are commonly known as?","o":"A. Law firm organizations.\nB. Civil society organizations.\nC. Human rights organizations.\nD. Constitutional rights organizations.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 80(1)条允许数据主体委托非营利性的“民间社会组织”（civil society body/organisation，即\n致力于公共利益、数据保护等领域的非营利民间团体）代表其提起投诉或诉讼，这类组织通常被称为“公\n民社会组织”（civil society organizations），而非特指律师事务所（A）、人权组织（C）或宪法权利组织\n（D）这类更狭窄或不准确的表述。知识点：第 80 条集体诉讼代表机制中“民间社会组织”的范围界定。","t":"GDPR"},{"n":161,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nBHealthy, a company based in Italy, is ready to launch a new line of natural products, with a focus on\nsunscreen. The last step prior to product launch is for BHealthy to conduct research to decide how\nextensively to market its new line of sunscreens across Europe. To do so, BHealthy teamed up with\nNatural Insight, a company specializing in determining pricing for natural products. BHealthy decided to\nshare its existing customer information – name, location, and prior purchase history – with Natural Insight.\nNatural Insight intends to use this information to train its algorithm to help determine the price point at\nwhich BHealthy can sell its new sunscreens.\n\nPrior to sharing its customer list, BHealthy conducted a review of Natural Insight’s security practices and\nconcluded that the company has sufficient security measures to protect the contact information.\nAdditionally, BHealthy’s data processing contractual terms with Natural Insight require continued\nimplementation of technical and organization measures. Also indicated in the contract are restrictions on\nuse of the data provided by BHealthy for any purpose beyond provision of the services, which include use\nof the data for continued improvement of Natural Insight’s machine learning algorithms.\n\nWhat is the nature of BHealthy and Natural Insight’s relationship?","o":"A. Natural Insight is BHealthy’s processor because the companies entered into data processing terms.\nB. Natural Insight is BHealthy’s processor because BHealthy is sharing its customer information with\nNatural Insight.\nC. Natural Insight is the controller because it determines the security measures to implement to protect\ndata it processes; BHealthy is a co-controller because it engaged Natural Insight to determine pricing\nfor the new sunscreens.\nD. Natural Insight is a controller because it is separately determining the purpose of processing when it\nuses BHealthy’s customer information to improve its machine learning algorithms.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。Natural Insight 虽以处理者身份接受 BHealthy 委托进行定价分析，但合同明确限制其不得将\n数据用于改进自身机器学习算法这一目的之外的用途，若 Natural Insight 仍将数据用于自身算法改进（服\n务于其全部客户群体的商业利益），这属于其为自身目的独立决定处理方式，已超出处理者角色，构成\n（针对该部分处理的）控制者。A（仅因签订处理协议就认定为处理者，忽略了实际处理行为是否超出协\n议授权）、B（仅因数据被共享就认定为处理者，共享本身不决定角色）、C（颠倒了双方角色定性逻\n辑 ） 均 不 准 确 。 知 识 点 ： 处 理 者 超 越 委 托 范 围 自 行 决 定 处 理 目 的 即 转 变 为 控 制 者 （ “controller in\ndisguise”）。","t":"GDPR"},{"n":162,"q":"SCENARIO 6\nPlease use the following to answer the next question:\n\nBHealthy, a company based in Italy, is ready to launch a new line of natural products, with a focus on\nsunscreen. The last step prior to product launch is for BHealthy to conduct research to decide how\nextensively to market its new line of sunscreens across Europe. To do so, BHealthy teamed up with\nNatural Insight, a company specializing in determining pricing for natural products. BHealthy decided to\nshare its existing customer information – name, location, and prior purchase history – with Natural Insight.\nNatural Insight intends to use this information to train its algorithm to help determine the price point at\nwhich BHealthy can sell its new sunscreens.\n\nPrior to sharing its customer list, BHealthy conducted a review of Natural Insight’s security practices and\nconcluded that the company has sufficient security measures to protect the contact information.\nAdditionally, BHealthy’s data processing contractual terms with Natural Insight require continued\nimplementation of technical and organization measures. Also indicated in the contract are restrictions on\nuse of the data provided by BHealthy for any purpose beyond provision of the services, which include use\nof the data for continued improvement of Natural Insight’s machine learning algorithms.\n\nUnder the GDPR, what are Natural Insight’s security obligations with respect to the customer information it\nreceived from BHealthy?","o":"A. Appropriate security that takes into account the industry practices for protecting customer contact\ninformation and purchase history.\nB. Only the security measures assessed by BHealthy prior to entering into the data processing contract.\nC. Absolute security since BHealthy is sharing personal data, including purchase history, with Natural\nInsight.\nD. The level of security that a reasonable data subject whose data is processed would expect in relation\nto the data subject’s purchase history.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 32 条要求处理者采取的安全措施须与处理活动的性质、范围、背景目的及风险相适应，\n通常参照行业惯例、公认的技术标准来确定“适当”的安全水平，而非仅依赖控制者事先审查的措施（B，\n安全义务是处理者持续性的独立法定义务，不能因控制者事先审查过就固化标准）、也非要求“绝对安全”\n（C，法律从未要求绝对无风险的安全标准，而是“适当”标准）或以“合理数据主体的主观期待”作为客观\n法律标准（D，不是法定判断依据）。知识点：第 32 条“适当技术组织措施”标准——与风险相适应、参\n照行业惯例，而非绝对安全或主观期待标准。","t":"GDPR"},{"n":163,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nBHealthy, a company based in Italy, is ready to launch a new line of natural products, with a focus on\nsunscreen. The last step prior to product launch is for BHealthy to conduct research to decide how\nextensively to market its new line of sunscreens across Europe. To do so, BHealthy teamed up with\nNatural Insight, a company specializing in determining pricing for natural products. BHealthy decided to\nshare its existing customer information – name, location, and prior purchase history – with Natural Insight.\nNatural Insight intends to use this information to train its algorithm to help determine the price point at\nwhich BHealthy can sell its new sunscreens.\n\nPrior to sharing its customer list, BHealthy conducted a review of Natural Insight’s security practices and\nconcluded that the company has sufficient security measures to protect the contact information.\nAdditionally, BHealthy’s data processing contractual terms with Natural Insight require continued\nimplementation of technical and organization measures. Also indicated in the contract are restrictions on\nuse of the data provided by BHealthy for any purpose beyond provision of the services, which include use\nof the data for continued improvement of Natural Insight’s machine learning algorithms.\n\nIn which case would Natural Insight’s use of BHealthy’s data for improvement of its algorithms be\nconsidered data processor activity?","o":"A. If Natural Insight uses BHealthy’s data for improving price point predictions only for BHealthy.\n\nB. If Natural Insight receives express contractual instructions from BHealthy to use its data for improving\nits algorithms.\n\nC. If Natural Insight agrees to be fully liable for its use of BHealthy’s customer information in its product\nimprovement activities.\n\nD. If Natural Insight satisfies the transparency requirement by notifying BHealthy’s customers of its plans\nto use their information for its product improvement activities.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。只有当 BHealthy 以书面合同明确指示 Natural Insight 将数据用于改进算法这一具体用途时，\n该用途才被纳入委托处理的授权范围内，属于处理者活动；若无此类明确指示，Natural Insight 擅自将数\n据用于自身算法改进则构成控制者行为（如 Q161 解析）。A（仅服务于 BHealthy 自身定价预测，仍需以\n合同明确授权为前提，本身不足以单独构成处理者行为的判断标准）、C（同意承担全部责任不能改变其\n“为自身目的独立决定处理方式”的控制者本质）、D（透明度告知客户，同样不能改变角色定性）均不如\nB 准确。知识点：处理者活动的合法性边界——须限于控制者书面指示范围内。","t":"GDPR"},{"n":164,"q":"Which of the following is NOT an explicit right granted to data subjects under the GDPR?","o":"A. The right to request access to the personal data a controller holds about them.\nB. The right to request the deletion of data a controller holds about them.\nC. The right to opt-out of the sale of their personal data to third parties.\nD. The right to request restriction of processing of personal data, under certain scenarios.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。GDPR 明确赋予数据主体访问权（A，第 15 条）、删除权（B，第 17 条）、限制处理权\n（D，第 18 条）等一系列权利，但并未专门规定“拒绝个人数据被出售给第三方”这一表述形式的权利\n（这更接近美国加州 CCPA 等法律中的特有概念）；在 GDPR 框架下，若数据“出售”本质上构成一般处\n理或披露，数据主体可通过反对权（第 21 条）或撤回同意等途径实现类似效果，但 GDPR 本身并未以\n“opt-out of sale”这一术语明文规定。知识点：GDPR 数据主体权利体系与美国 CCPA 等法律“拒绝出售”权\n利表述方式的差异比较。","t":"GDPR"},{"n":165,"q":"As per the GDPR, which legal basis would be the most appropriate for an online shop that wishes to\nprocess personal data for the purpose of fraud prevention?","o":"A. Protection of the interests of the data subjects.\nB. Performance of a contact\nC. Legitimate interest\nD. Consent","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。防范欺诈通常被认为是控制者（在线商店）保护自身及客户免受欺诈损失的合法利益，属\n于典型的第 6(1)(f)条“合法利益”应用场景（同时也在前言第 47 条中被明确列为合法利益的示例）。A\n（保护数据主体利益，第 6(1)(d)条通常指生命攸关情形，与防欺诈不完全对应）、B（履行合同，防欺诈\n本身并非合同履行的直接必要内容）、D（同意，防欺诈处理往往需要在客户不知情或不便逐一同意的情\n况下进行，合法利益更契合此类场景）均不如 C 准确。知识点：第 6(1)(f)条合法利益在欺诈防范场景下\n的典型应用（前言第 47 条）。","t":"GDPR"},{"n":166,"q":"The Planet 49 CJEU Judgement applies to?","o":"A. Cookies used only by third parties.\nB. Cookies that are deemed technically necessary.\nC. Cookies regardless of whether the data accessed is personal or not.\nD. Cookies where the data accessed is considered as personal data only.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。欧洲法院在 Planet49 案（2019）中明确，无论 cookie 读取或存储的信息是否构成“个人数\n据”，只要涉及在用户终端设备上存储或读取信息，均须依据 ePrivacy 指令取得用户的有效同意（该判决\n的核心意义正在于将同意要求的适用范围扩展至不限于个人数据本身）。A（仅限第三方 cookie）、B\n（技术必要 cookie，恰恰是同意例外而非该判决适用对象）、D（仅限涉及个人数据的 cookie，恰与判决\n要旨相反）均不准确。知识点：Planet49 案确立的 cookie 同意规则不以数据是否构成“个人数据”为前提。","t":"ePrivacy指令"},{"n":167,"q":"Bioface is a company based in the United States. It has no servers, personnel or assets in the European\n\nUnion. By collecting photographs from social media and other web-based services, such as newspapers\n\nand blogs, it uses machine learning to develop a facial recognition algorithm. The algorithm identifies\nindividuals in photographs who are not in its data set based the algorithm and its existing data. The service\n\ncollects photographs of data subjects in the European Union and will identify them if presented with their\n\nphotographs. Bioface offers its service to government agencies and companies in the United States and\n\nCanada, but not to those in the European Union. Bioface does not offer the service to individuals. 6\nWhy is Bioface subject to the territorial scope of the General Data Protection Regulation?","o":"A. It collects data from European Union websites, which constitutes an establishment in the European\nUnion.\nB. It offers services in the European Union by identifying data subjects in the European Union.\nC. It collects data from subjects and uses it for automated processing.\nD. It monitors the behavior of data subjects in the European Union.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。Bioface 虽未在欧盟设立机构、也不直接向欧盟客户或个人提供服务（排除 A、B——A 错误\n地将境外收集数据行为等同于“设立”，设立须有稳定经营安排；B 错误，其服务对象是美加政府机构和企\n业而非直接面向欧盟数据主体或个人），但其从欧盟数据主体的照片中提取并处理生物识别信息、通过\n面部识别技术持续识别欧盟境内个人，这构成第 3(2)(b)条“监测欧盟境内数据主体行为”，从而触发 GDPR\n域外适用。C（笼统的“收集数据并自动化处理”表述，未能准确抓住“监测行为”这一关键触发要素）不如\nD 准确。知识点：第 3(2)(b)条“监测行为”标准——面部识别等生物特征识别技术构成对欧盟个人的行为监\n测。","t":"GDPR"},{"n":168,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\nonline dating website company called Ben Knows Best.\n\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\n\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\nonline web portal and requires customers in the European Union and elsewhere to provide additional\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\ninformation. As Project Big is an important project, the company also hires a first year college student\nnamed Sam, who is studying computer science to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nWhen Ben had the company collect additional data from its customers, the most serious violation of the\n\nGDPR occurred because the processing of the data created what?","o":"A. An information security risk by copying the data into a new database.\n\nB. A potential legal liability and financial exposure from its customers.\n\nC. A significant risk to the customers’ fundamental rights and freedoms.\n\nD. A significant risk due to the lack of an informed consent mechanism. 6","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。Ben 在未取得合法依据的情况下收集客户的哲学信仰、政治观点等第 9 条特殊类别数据，并\n将单身客户数据挪用至秘密运营的交友网站数据库，这种未经充分知情同意、涉及高度敏感数据类别且\n用途严重偏离原始目的的处理，对客户的基本权利和自由（尤其隐私权、个人数据保护权及可能的人身\n安全风险）构成重大且实质性的风险，是本情节中最严重的 GDPR 违规后果。A（信息安全风险，虽然存\n在但并非“最严重”违规的核心）、B（潜在法律责任和财务风险，属于处理结果而非处理行为本身的性\n质）、D（笼统指同意机制缺陷，未能概括本案更深层的权利风险）均不如 C 准确抓住违规的实质与严重\n性。知识点：第 5(1)(a)条及第 9 条框架下，处理特殊类别数据且严重偏离原始目的对数据主体基本权利\n自由造成的重大风险。","t":"GDPR"},{"n":169,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\nonline dating website company called Ben Knows Best.\n\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\nonline web portal and requires customers in the European Union and elsewhere to provide additional\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\ninformation. As Project Big is an important project, the company also hires a first year college student\n\nnamed Sam, who is studying computer science to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nIn preparing the company for its impending lawsuit, Alice’s instruction to the company’s IT Department\n\nviolated Article 5 of the GDPR because the company failed to first do what?","o":"A. Send out consent forms to all of its employees.\nB. Minimize the amount of data collected for the lawsuit.\nC. Inform all of its employees about the lawsuit.\nD. Encrypt the data from all of its employees.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。Alice 在准备诉讼时指示 IT 部门复制全体全球销售团队（包含欧盟员工）的整个硬盘内容，\n而非仅提取与诉讼实际相关的必要信息，这明显违反第 5(1)(c)条数据最小化原则——收集的数据应限于\n实现处理目的所必需的范围，而非不加区分地全量复制。A（发同意表，本案合法依据应考虑合法利益或\n法律义务而非需逐一取得员工同意）、C（告知员工诉讼情况，属程序性事项非本题核心违规点）、D\n（加密数据，属安全措施而非目的限制/数据最小化问题）均不是本题聚焦的违规点。知识点：第 5(1)(c)\n条数据最小化原则在电子取证（e-discovery）场景中的应用。","t":"GDPR"},{"n":170,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\nonline dating website company called Ben Knows Best.\n\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\nonline web portal and requires customers in the European Union and elsewhere to provide additional\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\ninformation. As Project Big is an important project, the company also hires a first year college student\nnamed Sam, who is studying computer science to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\n\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nAs a result of Sam’s actions, the Gummy Bear Company potentially violated Articles 33 and 34 of the\nGDPR and will be required to do what?","o":"A. Notify its Data Protection Authority about the data breach.\nB. Analyze and evaluate the liability for customers in Ireland.\nC. Analyze and evaluate all of its breach notification obligations.\nD. Notify all of its customers that reside in the European Union.","a":"C","v":"corrected","vd":"已修正（原答案：A；修订：C）","e":"正确答案 C。Sam 的未授权复制至少构成需要记录和评估的安全事件。控制者应先分析数据类别、影响人数、可识\n别性、可能后果及现有保护措施，分别判断第 33 条监管机构通知（可能造成风险）和第 34 条数据主体通知（可能\n造成高风险）是否触发。仅凭题干不能直接断定必须通知监管机构或所有客户，故 C 最准确。","t":"GDPR"},{"n":171,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\n\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\n\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\n\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\n\nonline dating website company called Ben Knows Best. 6\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\nonline web portal and requires customers in the European Union and elsewhere to provide additional\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\n\ninformation. As Project Big is an important project, the company also hires a first year college student\nnamed Sam, who is studying computer science to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nThe data transfer mechanism that Alice drafted violates the GDPR because the company did not first get\napproval from?","o":"A. The Court of Justice of the European Union.\nB. The European Data Protection Board.\nC. The Data Protection Authority.\nD. The European Commission.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。Alice 起草的 BCRs 作为跨境传输机制，依据第 47 条须经有管辖权的数据保护监管机构\n（DPA）审批通过（并经一致性机制确认）后方可生效使用，公司未经此审批程序即在内部推行使用，\n构成违反跨境传输合法性要求。A、B、D 并非 BCRs 生效所需的直接审批主体（CJEU 负责司法裁决而非\n行政审批，EDPB 主要参与一致性意见形成而非直接“批准”单个企业的 BCRs，欧盟委员会负责的是标准\n合同条款和充分性认定而非 BCRs 审批）。知识点：第 47 条约束性企业规则（BCRs）须经监管机构批准\n方可生效的强制性程序。","t":"监管机构"},{"n":172,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\nonline dating website company called Ben Knows Best.\n\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\n\nonline web portal and requires customers in the European Union and elsewhere to provide additional\n\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\n\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\n\ninformation. As Project Big is an important project, the company also hires a first year college student\nnamed Sam, who is studying computer science to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nBen’s collection of additional data from customers created several potential issues for the company, which\nwould most likely require what?","o":"A. New corporate governance and code of conduct.\nB. A data protection impact assessment.\nC. A comprehensive data inventory.\n\nD. Hiring a data protection officer.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。Ben 新增收集客户的哲学信仰、政治观点等敏感个人数据，并结合其他数据进行匹配用于交\n友撮合等新用途，这类涉及特殊类别数据、大规模处理且很可能对数据主体权利自由带来高风险的活\n动，依第 35 条须开展 DPIA 予以评估。A（笼统的公司治理与行为守则调整，属于组织层面的宏观合规\n建议，并非法定强制的直接应对措施）、C（数据盘点，是 DPIA 的基础工作之一但本身并非充分的合规\n回应）、D（雇佣 DPO，是否强制取决于第 37 条触发条件是否满足，并非本情节问题的直接、必然解决\n方案）均不如 B 准确对应“新增高风险处理”这一核心问题。知识点：第 35 条 DPIA 触发情形——新增涉\n及特殊类别数据的大规模、高风险处理活动。","t":"GDPR"},{"n":173,"q":"Which of the following was the first legally binding international instrument in the area of data protection?","o":"A. Convention 108.\nB. General Data Protection Regulation.\nC. Universal Declaration of Human Rights.\nD. EU Directive on Privacy and Electronic Communications.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。欧洲理事会 108 号公约（1981 年开放签署）是全球首个具有法律约束力的国际数据保护条\n约，早于 GDPR（2016 年通过）及 ePrivacy 指令。世界人权宣言（C，1948 年）虽包含隐私权的原则性\n宣示，但并非专门针对数据保护、且不具备条约意义上的直接法律约束力（属宣言性质而非条约）。知\n识点：108 号公约作为首个具有法律约束力的国际数据保护条约的历史地位。","t":"ePrivacy指令"},{"n":174,"q":"A multinational company is appointing a mandatory data protection officer. In addition to considering the\nrules set out in Article 37 (1) of the GDPR, which of the following actions must the company also undertake\nto ensure compliance in all EU jurisdictions in which it operates?","o":"A. Consult national derogations to evaluate if there are additional cases to be considered in relation to the\nmatter.\n\nB. Conduct a Data Protection Privacy Assessment on the processing operations of the company in all the\n\ncountries it operates.\n\nC. Assess whether the company has more than 250 employees in each of the EU member-states in which\nit is established.\nD. Revise the data processing activities of the company that affect more than one jurisdiction to evaluate\nwhether they comply with the principles of privacy by design and by default.","a":"A","v":"corrected","vd":"已修正（原答案：D；修订：A）","e":"正确答案 A。GDPR 第 37(4) 条允许欧盟法或成员国法在第 37(1) 条之外规定追加必须指定 DPO 的情形。跨国公司因\n此应逐一检查其经营所在成员国的补充规则或开放条款。B、C、D 均不是确保各司法辖区 DPO 指定合规的直接步\n骤。","t":"GDPR"},{"n":175,"q":"The European Parliament jointly exercises legislative and budgetary functions with which of the following?","o":"A. The European Commission.\n\nB. The Article 29 Working Party.\nC. The Council of the European Union.\nD. The European Data Protection Board.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。根据欧盟条约框架下的普通立法程序，欧洲议会与欧盟理事会共同行使立法权和预算权，\n两机构须共同通过法案方可生效（共同决定程序）。欧盟委员会（A）负责提案和执行，而非与议会共享\n立法/预算职权本身；第 29 条工作组（B）和 EDPB（D）均为数据保护领域的咨询/协调机构，与欧盟整\n体立法预算程序无关。知识点：欧洲议会与欧盟理事会共同行使立法与预算职权（共同决定程序）。","t":"监管机构"},{"n":176,"q":"A U.S. company’s website sells widgets. Which of the following factors would NOT in itself subject the\ncompany to the GDPR?","o":"A. The widgets are offered in EU and priced in euro.\nB. The website is in English and French, and is accessible in France.\nC. An affiliate office is located in France but the processing is in the U.S.\nD. The website places cookies to monitor the EU website user behavior.","a":"B","v":"corrected","vd":"已修正（原答案：C；修订：B）","e":"正确答案 B。网站可在法国访问、使用英语和法语，本身不足以证明经营者有意向欧盟数据主体提供商品或服务。A\n以欧元报价是明确的欧盟市场指向因素；D 通过 cookie 监测欧盟用户行为可触发第 3(2)(b) 条；C 若法国关联机构通\n过稳定安排参与相关业务，处理即使在美国完成也可能属于第 3(1) 条“在欧盟设立机构活动背景下”的处理。","t":"ePrivacy指令"},{"n":177,"q":"When does the European Data Protection Board (EDPB) recommend reevaluating whether a transfer tool\nis effectively providing a level of personal data protection that is in compliance with the European Union\n(EU) level?","o":"A. After a personal data breach.\nB. Every three (3) years.\nC. On an ongoing basis.\nD. Every year.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。EDPB 在 Schrems II 判决后发布的补充措施建议中强调，数据出口方应对传输工具（如\nSCC）所提供的保护水平进行“持续性”（on an ongoing basis）监测和评估，而非仅在特定固定周期（如每\n年或每三年，B、D）或仅在发生数据泄露后（A）才进行评估，因为第三国法律环境可能随时发生变\n化，需持续跟踪。知识点：EDPB 关于跨境传输保护水平持续评估义务的建议（Schrems II 判决后的补充\n措施指南）。","t":"判例法"},{"n":178,"q":"Which judicial body makes decisions on actions taken by individuals wishing to enforce their rights under\nEU law?","o":"A. Court of Auditors\n\nB. Court of Justice of European Union\nC. European Court of Human Rights\nD. European Data Protection Board","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。欧盟法院（CJEU）负责就欧盟法律的解释和适用作出终局裁决，包括个人依据欧盟法（如\nGDPR）寻求权利救济时的相关诉讼（含成员国法院提请的初步裁决程序）。审计法院（A）负责欧盟财\n政审计；欧洲人权法院（C）审理的是《欧洲人权公约》项下的申诉，与欧盟法律体系是两套独立机制；\nEDPB（D）是行政协调机构而非司法机构，无权作出司法裁决。知识点：CJEU 作为欧盟法律解释与个人\n权利救济的最终司法机构，及其与 ECtHR、EDPB 的区分。","t":"判例法"},{"n":179,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nSandy recently joined Market4U, an advertising technology company founded in 2016, as their VP of\nPrivacy and Data Governance. Through her first initiative in conducting a data inventory, Sandy learned\nthat Market4U maintains a list of 19 million global contacts that were collected throughout the course of\nMarket4U’s existence. Knowing the risk of having such a large amount of data, Sandy wanted to purge all\ncontacts that were entered into Market4U’s systems prior to May 2018, unless such contacts had a more\nrecent interaction with Market4U content. However, Dan, the VP of Sales, informed Sandy that all of the\ncontacts provide useful information regarding successful marketing campaigns and trends in industry\nverticals for Market4U’s clients.\n\nDan also informed Sandy that he had wanted to focus on gaining more customers within the sports and\nentertainment industry. To assist with this behavior, Market4U’s marketing team decided to add several\n\nnew fields to Market4U’s website forms, including forms for downloading white papers, creating accounts\nto participate in Market4U’s forum, and attending events. Such fields include birth date and salary.\n\nWhat should Sandy give as feedback to Dan and the marketing team regarding the new fields Dan wants\nto add to Market4U’s forms?","o":"A. Make all the fields optional.\nB. Only request the information in brackets (i.e., age group and salary range).\nC. Eliminate the fields, as they are not proportional to the services being offered.\nD. Eliminate the fields as they are not necessary for the purposes of providing white papers or registration\nfor events.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。生日和薪资信息与下载白皮书、创建论坛账户或活动报名等服务的实现之间不存在必要关\n联，收集这些字段违反第 5(1)(c)条数据最小化原则，正确做法是直接取消这些非必要字段，而非仅设为\n可选（A，可选并不能改变“非必要收集”这一本质问题）、以区间代替精确值收集（B，即便区间化仍可\n能构成非必要收集）或泛泛地以“不成比例”为由处理（C，表述不如 D 具体准确地指出“非实现该服务目\n的所必需”这一核心法律标准）。知识点：第 5(1)(c)条数据最小化原则——收集字段须与处理目的具有必\n要关联性。","t":"GDPR"},{"n":180,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nSandy recently joined Market4U, an advertising technology company founded in 2016, as their VP of\nPrivacy and Data Governance. Through her first initiative in conducting a data inventory, Sandy learned\nthat Market4U maintains a list of 19 million global contacts that were collected throughout the course of\nMarket4U’s existence. Knowing the risk of having such a large amount of data, Sandy wanted to purge all\ncontacts that were entered into Market4U’s systems prior to May 2018, unless such contacts had a more\n\nrecent interaction with Market4U content. However, Dan, the VP of Sales, informed Sandy that all of the\n\ncontacts provide useful information regarding successful marketing campaigns and trends in industry\nverticals for Market4U’s clients.\n\nDan also informed Sandy that he had wanted to focus on gaining more customers within the sports and\n\nentertainment industry. To assist with this behavior, Market4U’s marketing team decided to add several\nnew fields to Market4U’s website forms, including forms for downloading white papers, creating accounts\nto participate in Market4U’s forum, and attending events. Such fields include birth date and salary.\n\nWhat is the best way that Sandy can gain the insights that Dan seeks while still minimizing risks for\nMarket4U?","o":"A. Conduct analysis only on anonymized personal data.\nB. Conduct analysis only on pseudonymized personal data.\nC. Delete all data collected prior to May 2018 after conducting the trend analysis.\nD. Procure a third party to conduct the analysis and delete the data from Market4U’s systems.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。为在满足 Dan 获取行业趋势洞察需求的同时最大限度降低隐私风险，最佳做法是仅对已完\n全匿名化、无法重新识别到具体个人的数据进行趋势分析，因为匿名化数据不再受 GDPR 约束，可自由\n用于统计分析；假名化数据（B）仍是个人数据，风险依然存在；仅在分析后才删除数据（C）无法在分\n析阶段本身降低风险；委托第三方分析并事后删除（D）不仅未降低风险，反而增加了额外的数据共享和\n处理者管理风险。知识点：匿名化作为在保留数据分析价值的同时消除 GDPR 合规风险的最佳技术手\n段。","t":"GDPR"},{"n":181,"q":"A data controller appoints a data protection officer. Which of the following conditions would NOT result in\nan infringement of Articles 37 to 39 of the GDPR?","o":"A. If the data protection officer lacks ISO 27001 auditor certification.\nB. If the data protection officer is provided by the data processor.\nC. If the data protection officer also manages the marketing budget.\nD. If the data protection officer receives instructions from the data controller.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 明确不构成违规，因为 GDPR 不要求 DPO 具备特定 ISO 认证。B 也并非当然违规：DPO 可依据服务合同由\n外部个人或机构提供；只有在处理者角色造成利益冲突、缺乏独立性或无法履职时才会违规。因此本题有一定歧\n义。","t":"GDPR"},{"n":182,"q":"Data retention in the EU was underpinned by a legal framework established by the Data Retention\nDirective (2006/24/EC). Why is the Directive no longer part of EU law?","o":"A. The Directive was superseded by the EU Directive on Privacy and Electronic Communications.\nB. The Directive was superseded by the General Data Protection Regulation.\nC. The Directive was annulled by the Court of Justice of the European Union.\nD. The Directive was annulled by the European Court of Human Rights.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。数据留存指令因欧洲法院在 Digital Rights Ireland 案（2014）中认定其对隐私权和数据保护\n权的干预不成比例而被宣告无效（annulled），而非被其他立法“取代”（A、B 均为错误表述，尽管\nePrivacy 指令及 GDPR 确实涉及相关领域，但数据留存指令的失效并非源于被这些法律“取代”，而是被欧\n洲法院直接宣告无效）；欧洲人权法院（D）并非该案的审理法院，审理该案的是欧盟法院（CJEU）。\n知识点：Digital Rights Ireland 案及数据留存指令因比例原则被欧盟法院宣告无效。","t":"ePrivacy指令"},{"n":183,"q":"Which of the following is the weakest lawful basis for processing employee personal data?","o":"A. Processing based on fulfilling an employment contract.\nB. Processing based on employee consent.\nC. Processing based on legitimate interests.\n\nD. Processing based on legal obligation.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。基于同意作为雇佣关系中处理员工数据的合法依据被认为是最薄弱的选择，原因在于雇主\n与员工之间存在明显的权力不对等，员工的同意往往难以被视为真正“自由给予”（前言第 43 条），一旦\n同意被认定无效，处理即丧失合法依据基础。相较之下，履行劳动合同（A）、法定义务（D）、合法利\n益（C，须经审慎的利益平衡测试）通常在雇佣场景下更为稳健和适用。知识点：同意在雇佣关系中作为\n合法依据的固有弱点（权力不对等下的自愿性缺陷）。","t":"GDPR"},{"n":184,"q":"An organization receives a request multiple times from a data subject seeking to exercise his rights with\nrespect to his own personal data. Under what condition can the organization charge the data subject a fee\nfor processing the request?","o":"A. Only where the organization can show that it is reasonable to do so because more than one request\nwas made.\nB. Only to the extent this is allowed under the restrictions on data subjects’ rights introduced under Art 23\nof GDPR.\nC. Only where the administrative costs of taking the action requested exceeds a certain threshold.\nD. Only if the organization can demonstrate that the request is clearly excessive or misguided.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 应按 GDPR 第 12(5) 条理解为“请求明显无依据（manifestly unfounded）或过度（excessive）”。“misguided”并\n非法定标准；仅仅重复请求也不自动允许收费，控制者负有证明责任。","t":"GDPR"},{"n":185,"q":"To receive a preliminary interpretation on provisions of the GDPR, a national court will refer its case to\nwhich of the following?","o":"A. The Court of Justice of the European Union.\nB. The European Data Protection Supervisor.\n\nC. The European Court of Human Rights.\nD. The European Data Protection Board.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。当成员国法院在审理案件过程中对欧盟法（包括 GDPR）的解释存在疑问时，依据 TFEU 第\n267 条可（在终审法院则须）向欧盟法院（CJEU）提起“初步裁决请求”（preliminary ruling），以获得具\n有约束力的权威解释。B（EDPS 负责监督欧盟机构自身的数据处理，非成员国法院寻求法律解释的对\n象）、C（ECtHR 审理的是欧洲人权公约项下的申诉而非欧盟法解释请求）、D（EDPB 是行政协调机构\n而 非司 法机 构 ）均 不具 备 此项 职能 。 知识 点： TFEU 第 267 条 初步 裁决 程 序及 CJEU 对 欧盟 法（ 含\nGDPR）的权威解释职能。","t":"判例法"},{"n":186,"q":"A grade school is planning to use facial recognition to track student attendance. Which of the following\nmay provide a lawful basis for this processing?","o":"A. The school places a notice near each camera.\nB. The school gets explicit consent from the students.\nC. Processing is necessary for the legitimate interests pursed by the school.\nD. A state law requires facial recognition to verify attendance.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。当法律（如某州/成员国法律）明确要求学校使用人脸识别技术核验出勤时，该处理的合法\n依据可依托第 6(1)(c)条“履行控制者所负法定义务”（结合第 9(2)(g)条“基于重大公共利益的成员国法律”处\n理生物识别数据的例外，因人脸识别涉及第 9 条生物识别特殊类别数据）。A（张贴告示，仅满足透明度\n要求，不构成独立合法依据）、B（学生同意，在校方与未成年学生存在权力不对等的教育场景中，同意\n的自愿性通常存疑，尤其对未成年人更是如此）、C（笼统主张合法利益，在处理生物识别这类特殊类别\n数据时，合法利益本身并不足以满足第 9 条更严格的例外要求）均不如 D 稳妥准确。知识点：处理生物\n识别等特殊类别数据须同时满足第 6 条一般合法依据和第 9 条特殊类别数据例外的双重要求，法定义务+\n重大公共利益的成员国法律是常见组合依据。","t":"GDPR"},{"n":187,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nABC Hotel Chain and XYZ Travel Agency are U.S.-based multinational companies. They use an internet-\n\nbased common platform for collecting and sharing their customer data with each other, in order to\nintegrate their marketing efforts. Additionally, they agree on the data to be stored, how reservations will be\n\nbooked and confirmed, and who has access to the stored data.\n\nMike, an EU resident, has booked travel itineraries in the past through XYZ Travel Agency to stay at ABC\nHotel Chain’s locations. XYZ Travel Agency offers a rewards program that allows customers to sign up to\naccumulate points that can later be redeemed for free travel. Mike has signed the agreement to be a\nrewards program member.\n\nNow Mike wants to know what personal information the company holds about him. He sends an email\nrequesting access to his data, in order to exercise what he believes are his data subject rights.\n\nWhat is the time period in which Mike should receive a response to his request?","o":"A. Not more than one month of receipt of Mike’s request.\nB. Not more than two months after verifying Mike’s identity.\nC. When all the information about Mike has been collected.\nD. Not more than thirty days after submission of Mike’s request.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 12(3)条规定，控制者应在收到访问请求后一个月内响应（如请求复杂可延长至多两个\n月，但须在首月内告知延期原因及理由），A 准确反映这一基本期限起算点（自收到请求之日起），而\n非以身份核实完成后起算（B，身份核实通常应在请求收到后尽快完成，而非将响应期限的起算点推迟至\n核实完成之后另计）、以数据收集完毕为准（C，缺乏时限约束，不符合法条精神）或使用“30 天”这一非\n法定单位表述（D，法条使用的是“一个月”而非固定 30 天，两者虽接近但并非完全等同的法律术语）。\n知识点：第 12(3)条数据主体访问请求响应期限的起算及计算方式。","t":"GDPR"},{"n":188,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nABC Hotel Chain and XYZ Travel Agency are U.S.-based multinational companies. They use an internet-\n\nbased common platform for collecting and sharing their customer data with each other, in order to\nintegrate their marketing efforts. Additionally, they agree on the data to be stored, how reservations will be\nbooked and confirmed, and who has access to the stored data.\n\nMike, an EU resident, has booked travel itineraries in the past through XYZ Travel Agency to stay at ABC\nHotel Chain’s locations. XYZ Travel Agency offers a rewards program that allows customers to sign up to\naccumulate points that can later be redeemed for free travel. Mike has signed the agreement to be a\nrewards program member.\n\nNow Mike wants to know what personal information the company holds about him. He sends an email\nrequesting access to his data, in order to exercise what he believes are his data subject rights.\n\nWhat are ABC Hotel Chain and XYZ Travel Agency’s roles in this relationship?","o":"A. ABC Hotel Chain is the controller and XYZ Travel Agency is the processor.\nB. XYZ Travel Agency is the controller and ABC Hotel Chain is the processor.\nC. ABC Hotel Chain and XYZ Travel Agency are independent controllers.\nD. ABC Hotel Chain and XYZ Travel Agency are joint controllers.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。ABC 酒店集团与 XYZ 旅行社共同决定通过共享平台收集、存储客户数据的方式、内容及访\n问权限，共同参与决定处理的目的和方式，符合第 26 条“共同控制者”（joint controllers）的认定标准，双\n方须通过协议明确各自的责任分工。A、B（将其中一方定性为处理者，忽略了双方共同决策处理方式和\n目的的事实）、C（独立控制者，忽略了双方在同一平台上协作决定处理目的和方式的共同性）均不准\n确。知识点：第 26 条共同控制者的认定标准——共同决定处理的目的和方式。","t":"GDPR"},{"n":189,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nABC Hotel Chain and XYZ Travel Agency are U.S.-based multinational companies. They use an internet-\n\nbased common platform for collecting and sharing their customer data with each other, in order to\n\nintegrate their marketing efforts. Additionally, they agree on the data to be stored, how reservations will be\n\nbooked and confirmed, and who has access to the stored data. 6\nMike, an EU resident, has booked travel itineraries in the past through XYZ Travel Agency to stay at ABC\nHotel Chain’s locations. XYZ Travel Agency offers a rewards program that allows customers to sign up to\naccumulate points that can later be redeemed for free travel. Mike has signed the agreement to be a\nrewards program member.\n\nNow Mike wants to know what personal information the company holds about him. He sends an email\nrequesting access to his data, in order to exercise what he believes are his data subject rights.\n\nIn which of the following situations would ABC Hotel Chain and XYZ Travel Agency NOT have to honor\nMike’s data access request?","o":"A. The request is to obtain access and correct inaccurate personal data in his profile.\nB. The request is to obtain access and information about the purpose of processing his personal data.\nC. The request is to obtain access and erasure of his personal data while keeping his rewards\nmembership.\nD. The request is to obtain access and the categories of recipients who have received his personal data to\nprocess his rewards membership.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 是四项中最接近的选项，但题干把访问权与删除权混为一体。即使删除请求不能全部满足，控制者仍应回应\n并履行访问权部分。对维持奖励会员关系所必需的数据，删除权可能因第 17(1)(a) 条的“数据仍为原目的所必需”而不\n成立，或因其他适用的法定义务而受限；“履行合同所必需”并不是第 17(3)(b) 条列明的独立例外。","t":"GDPR"},{"n":190,"q":"Which of the following Convention 108+ principles, as amended in 2018, is NOT consistent with a principle\n\nfound in the GDPR?","o":"A. The obligation of companies to declare data breaches.\nB. The requirement to demonstrate compliance to a supervisory authority.\nC. The lawfulness of the bulk collection of personal data by the government.\nD. The necessity of establishing a specific legal basis for processing personal data.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。经 2018 年现代化修订的 108+号公约明确要求政府对个人数据的收集和监控须符合必要性和\n比例原则，并不认可无差别、无限制的政府大规模数据收集行为，这与 GDPR 及欧盟基本权利保护理念\n（如 Digital Rights Ireland 案所体现的比例原则）是一致的，而非“合法”，因此 C 的表述（认可政府大规\n模无差别收集数据的合法性）与 GDPR 原则不一致，是本题应选的“不一致项”。A（数据泄露申报义\n务）、B（问责制下的合规证明义务）、D（须有具体合法依据）均是 108+号公约与 GDPR 理念高度一致\n的原则。知识点：108+号公约（2018 现代化修订）与 GDPR 在政府大规模数据收集比例原则上的一致\n性。","t":"Convention 108/108+"},{"n":191,"q":"If a data subject puts a complaint before a DPA and receives no information about its progress or\noutcome, how long does the data subject have to wait before taking action in the courts?","o":"A. 1 month.\nB. 3 months.\nC. 5 months.\nD. 12 months.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。根据 GDPR 体系及相关实践（前言第 141 条、第 78 条司法救济权），若数据主体向监管机\n构投诉后三个月内未收到关于投诉处理进展或结果的告知，即可据此向法院提起诉讼寻求有效司法救\n济，无需无限期等待监管机构处理。知识点：第 78(2)条及前言第 141 条——监管机构三个月内未回应投\n诉时数据主体可诉诸法院的救济权。","t":"GDPR"},{"n":192,"q":"For which of the following operations would an employer most likely be justified in requesting the data\nsubject’s consent?","o":"A. Posting an employee’s bicycle race photo on the company’s social media. 6\nB. Processing an employee’s health certificate in order to provide sick leave.\nC. Operating a CCTV system on company premises.\nD. Assessing a potential employee’s job application.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。在企业社交媒体上发布员工参加自行车比赛的照片，属于与雇佣关系履行、法定义务均无\n必然关联的“额外”用途（本质上更接近宣传/公关性质），员工在此类非雇佣必需事项上拥有真正的自由\n选择空间，因此同意可以成为恰当且有效的合法依据。B（处理健康证明以安排病假，属于履行雇佣合同\n/法定义务的必要处理，不适合、也无需以同意作为依据）、C（运营 CCTV 系统，通常基于合法利益/安\n全需要而非员工同意，且雇佣关系下同意的自愿性存疑）、D（评估求职申请，属于订立合同前的必要步\n骤，同样不适合以同意作为依据）均不如 A 适合使用同意机制。知识点：雇佣关系中同意作为合法依据\n的适用场景——仅限于真正非强制性、员工有实际自由选择权的处理活动。","t":"GDPR"},{"n":193,"q":"An entity’s website stores text files on EU users’ computer and mobile device browsers. Prior to doing so,\nthe entity is required to provide users with notices containing information and consent under which of the\nfollowing frameworks?","o":"A. General Data Protection Regulation 2016/679.\nB. E-Privacy Directive 2002/58/EC.\nC. E-Commerce Directive 2000/31/EC.\nD. Data Protection Directive 95/46/EC.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。在用户设备终端存储或读取信息（如 cookie 等文本文件）的行为，专门由 ePrivacy 指令\n（第 5(3)条“cookie 规则”）规制，要求企业事先提供信息并取得用户同意，这是相较 GDPR、电子商务指\n令、原 95/46 指令更具体、更直接适用的专门规则。知识点：ePrivacy 指令第 5(3)条对终端设备存储/读取\n信息（cookie）的专门规制。","t":"ePrivacy指令"},{"n":194,"q":"All of the following are considered fair processing practices in relation to the transparency principle\nEXCEPT?","o":"A. Providing a multi-layered privacy notice, in a website environment.\nB. Providing a QR code linking to more detailed privacy notice, in a CCTV sign.\nC. Providing a hyperlink to the organization’s home page, in a hard copy application form.\n\nD. Providing a “just-in-time” contextual pop-up privacy notice, in an online application form field.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。在纸质申请表上仅提供指向机构主页（而非具体隐私政策页面）的超链接，既不符合纸质\n媒介本身无法直接点击访问的现实限制，也未能提供充分、具体、易于获取的隐私信息，不构成有效的\n公平透明处理实践。A（网站分层通知）、B（CCTV 告示配二维码链接详细政策）、D（在线表单即时\n情境弹窗提示）均是 ICO 透明度实践指南认可的有效透明度实现方式。知识点：ICO 透明度实践指南关\n于不同媒介（纸质、网站、CCTV 等）下有效告知方式的具体要求。","t":"GDPR"},{"n":195,"q":"Which of the following was the first to implement national law for data protection in 1973?","o":"A. France\nB. Sweden\nC. Germany\nD. United Kingdom","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。瑞典于 1973 年颁布了《数据法》（Datalagen），是世界上第一部国家层面的综合性数据保\n护立法，早于德国黑森州 1970 年的地方性立法（黑森州立法虽更早但属于州/地方层面而非国家层面法\n律）及法国、英国后续的国家立法。知识点：瑞典 1973 年《数据法》作为全球首部国家层面数据保护立\n法的历史地位。","t":"GDPR"},{"n":196,"q":"The GDPR forbids the practice of “forum shopping”, which occurs when companies do what?","o":"A. Choose the data protection officer that is most sympathetic to their business concerns. 6\nB. Designate their main establishment in member state with the most flexible practices.\nC. File appeals of infringement judgments with more than one EU institution simultaneously.\nD. Select third-party processors on the basis of cost rather than quality of privacy protection.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。（与前述 Q100 同一知识点）“监管机构选购”（forum shopping）是指企业刻意将“主要设立\n地”设在监管执法环境相对宽松的成员国，以规避严格监管，这被 GDPR 一站式机制的立法精神所禁止。\nA、C、D 均非 forum shopping 的准确定义。知识点：一站式机制下主要设立地认定标准与 forum shopping\n的禁止。","t":"GDPR"},{"n":197,"q":"What is the most frequently used mechanism for legitimizing cross-border data transfer?","o":"A. Standard Contractual Clauses.\nB. Approved Code of Conduct.\nC. Binding Corporate Rules.\nD. Derogations.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。标准合同条款（SCCs）因其无需事先获得监管机构逐案批准、可直接采用欧盟委员会制定\n的标准文本、灵活适用于各类跨境传输场景，是目前实践中使用最广泛的跨境传输合法化机制，相较约\n束性企业规则（C，审批耗时较长，多用于大型跨国集团内部传输）、行为守则（B）、克减条款（D，\n仅作为最后手段的例外情形）使用频率更高。知识点：标准合同条款（SCCs）作为最常用的跨境传输合\n法化机制。","t":"GDPR"},{"n":198,"q":"If a French controller has a car-sharing app available only in Morocco, Algeria and Tunisia, but the data\n\nprocessing activities are carried out by the appointed processor in Spain, the GDPR will apply to the\nprocessing of the personal data so long as?","o":"A. The individuals are European citizens or residents.\nB. The data processing activities are in Spain.\nC. The data controller is in France.\nD. The EU individuals are targeted.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 3(1)条设立地标准规定，只要处理活动是在欧盟设立机构“活动的背景下”进行的，无论该\n处理实际发生地点在何处（此处为西班牙处理者执行处理）、也无论数据主体是否为欧盟居民或位于欧\n盟境内（此处数据主体位于摩洛哥、阿尔及利亚、突尼斯等非欧盟国家），只要控制者本身在欧盟设立\n（此处为法国控制者），该处理即受 GDPR 约束——这体现了设立地标准相较目标指向标准（第 3(2)\n条，需数据主体位于欧盟境内）更宽泛的适用逻辑。知识点：第 3(1)条设立地标准的域内适用——不要\n求处理发生地或数据主体位于欧盟境内，只要求控制者在欧盟设立且处理在其活动背景下进行。","t":"GDPR"},{"n":199,"q":"Select the answer below that accurately completes the following:\n\n“The right to compensation and liability under the GDPR…","o":"A. …provides for an exemption from liability if the data controller (or data processor) proves that it is not in\nany way responsible for the event giving rise to the damage.”\nB. …precludes any subsequent recourse proceedings against other controllers or processors involved in\nthe same processing.”\nC. ...can only be exercised against the data controller, even if a data processor was involved in the same\nprocessing.”\nD. …is limited to a maximum amount of EUR 20 million per event of damage or loss.”","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 82(3)条规定，控制者或处理者若能证明其对造成损害的事件完全不承担责任（即在任何\n方面均无过错），可免除赔偿责任，这是唯一的法定免责事由。B（不排斥追偿权，控制者/处理者承担\n全部赔偿后仍可向其他责任方追偿，第 82(5)条）、C（数据主体不仅可向控制者主张，也可直接向处理\n者主张赔偿，视具体责任情形而定）、D（GDPR 并未设定统一的赔偿上限，与行政罚款上限是两套不同\n机制）均不准确。知识点：第 82 条数据主体获得赔偿权利的免责事由及连带责任下的追偿权。","t":"GDPR"},{"n":200,"q":"Pursuant to Article 4(5) of the GDPR, data is considered “pseudonymized” if?","o":"A. It cannot be attributed to a data subject without the use of additional information.\nB. It cannot be attributed to a person under any circumstances.\nC. It can only be attributed to a person by the controller.\nD. It can only be attributed to a person by a third party.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 4(5)条对“假名化”的定义核心是：个人数据在不借助另外保存的补充信息的情况下不能再\n归属于特定数据主体。B（不可再识别，混淆了假名化与匿名化的概念，假名化理论上仍可通过补充信息\n重新识别）、C、D（仅限控制者或第三方才能重新识别，并非该定义的核心要件，定义关注的是“是否需\n要额外信息”而非“由谁掌握该信息”这一维度本身，尽管补充信息通常由控制者掌握并单独保存）均不如\nA 准确对应法条原文。知识点：第 4(5)条假名化定义的准确表述。","t":"GDPR"},{"n":201,"q":"According to Article 84 of the GDPR, the rules on penalties applicable to infringements shall be laid down\nby?","o":"A. The local Data Protection Supervisory Authorities.\nB. The European Data Protection Board.\nC. The EU Commission.\nD. The Member States.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 84 条明确规定，成员国应自行制定适用于违反 GDPR 行为的处罚规则（尤其是不属于第\n83 条行政罚款范畴的其他违规情形，如未落实行政罚款条款的违规行为，成员国须规定“有效、相称且具\n有警示性”的处罚措施，含可能的刑事处罚），这属于成员国立法保留事项，而非欧盟层面统一规定。知\n识点：第 84 条成员国就 GDPR 之外违规行为处罚规则的立法保留。","t":"GDPR"},{"n":202,"q":"A company plans to transfer employee health information between two of its entities in France. To maintain\nthe security of the processing, what would be the most important security measure to apply to the health\ndata transmission?","o":"A. Inform the data subject of the security measures in place.\nB. Ensure that the receiving entity has signed a data processing agreement.\nC. Encrypt the transferred data in transit and at rest.\nD. Conduct a data protection impact assessment.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。对健康数据这类特殊类别数据在传输过程中，加密是保护数据机密性、防止未经授权访问\n最直接、最核心的技术安全措施（第 32(1)(a)条明确列举加密为示例措施），尤其适用于传输中和静态存\n储双重场景。A（告知数据主体安全措施，属透明度义务而非安全措施本身）、B（签订处理协议，适用\n于控制者-处理者关系而非本案两个关联实体间传输的直接安全措施）、D（开展 DPIA，是风险评估的前\n置程序而非传输本身的直接安全保护措施）均不如 C 直接对应“安全措施”这一问题核心。知识点：第 32\n条安全处理措施——加密作为保护敏感数据传输的核心技术手段。","t":"GDPR"},{"n":203,"q":"If a company chooses to ground an international data transfer on the contractual route, which of the\nfollowing is NOT a valid set of standard contractual clauses?","o":"A. Decision 2001/497/EC (EU controller to non-EU or EEA controller).\nB. Decision 2004/915/EC (EU controller to non-EU or EEA controller).\nC. Decision 2007/72/EC (EU processor to non-EU or EEA controller).\nD. Decision 2010/87/EU (Non-EU or EEA processor from EU controller).","a":"无（现行法下四项均已过时；历史预期答案为 C）","v":"corrected","vd":"已修正（原答案：C；修订：\n无（现行法下四项均已过时；历史预期答案为 C））","e":"本题已过时。现行法下 A、B、C、D 均不能作为新安排使用的有效 SCC 集合。欧盟委员会实施决定 (EU) 2021/914\n自 2021 年起提供模块化跨境 SCC，并废止 2001/497/EC、2004/915/EC 和 2010/87/EU；旧合同过渡期已于 2022 年 12\n月 27 日结束。按旧题历史语境，C 曾是预期答案，因为不存在 2007/72/EC 这一 SCC 决定。","t":"GDPR"},{"n":204,"q":"Article 58 of the GDPR describes the power of supervisory authorities. Which of the following is NOT\namong those granted?","o":"A. Legislative powers.\nB. Corrective powers.\nC. Investigatory powers.\nD. Authorization and advisory powers.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 58 条列明监管机构享有调查权（第 1 款，C）、更正权/纠正权（第 2 款，B）、授权及\n咨询权（第 3 款，D），但监管机构本身并不享有制定新法律的“立法权”——立法权属于成员国议会及欧\n盟立法机构（欧洲议会、欧盟理事会），监管机构仅在授权/执法层面行使职权，无权自行创设具有普遍\n约束力的新法律规范。知识点：第 58 条监管机构三类职权（调查、纠正、授权咨询）与立法权的区分。","t":"GDPR"},{"n":205,"q":"According to the European Data Protection Board, which of the following concepts or practices does NOT\nfollow from the principles relating to the processing of personal data under EU data protection law?","o":"A. Data ownership allocation.\nB. Access control management.\nC. Frequent pseudonymization key rotation.\nD. Error propagation avoidance along the processing chain.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。欧盟数据保护法律框架下的核心原则（如访问控制管理 B、避免处理链条中的错误传播 D、\n假名化密钥定期轮换 C 作为安全和数据最小化实践）均与数据保护基本原则（尤其是完整性保密性、准\n确性原则）密切相关；而“数据所有权分配”（data ownership）并非欧盟数据保护法的核心概念——GDPR\n框架下讨论的是控制者/处理者的角色与责任分配，而非“数据所有权”这一非法律术语（欧盟数据保护法\n并不采用“所有权”框架来描述个人数据上的权益）。知识点：欧盟数据保护法不采用“数据所有权”框架，\n而是以控制者/处理者角色及数据主体权利体系为核心。","t":"GDPR"},{"n":206,"q":"Which statement provides an accurate description of a directive?","o":"A. A directive specifies certain results that must be achieved, but each member state is free to decide how\nto turn it into a national law.\nB. A directive has binding legal force throughout every member state and enters into force on a set date in\nall the member states.\nC. A directive is a legal act relating to specific cases and directed towards member states, companies or\nprivate individuals.\nD. A directive is a legal act that applies automatically and uniformly to all EU countries as soon as it enters\ninto force.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。“指令”（Directive）是欧盟对成员国规定应实现的特定结果或目标，但赋予各成员国在多大\n程度上、以何种立法形式将其转化为本国法的自由裁量空间，与“条例”（Regulation，直接统一适用、无\n需转化，对应 B、D 的描述）及“决定”（Decision，针对特定对象的具体法律行为，对应 C 的描述）在法\n律 效 力 和 适 用 方 式 上 存 在 本 质 区 别 。 知 识 点 ： 欧 盟 法 律 渊 源 —— 指 令 （ Directive ） 与 条 例\n（Regulation）、决定（Decision）的效力区别。","t":"GDPR"},{"n":207,"q":"Which aspect of processing does the GDPR allow processors to determine for themselves?","o":"A. The question of whether the controller needs to be informed about the substitution of another\nprocessor carrying out specific processing activities on behalf of the controller.\n\nB. Their own purposes for the processing, if such purposes are compatible with those for which the\n\npersonal data were initially collected.\n\nC. The parameters of their marketing campaigns using personal data relating to the controller's\ncustomers.\n\nD. Their own type of hardware or software and the speci
