<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@500;700&family=Noto+Sans+SC:wght@400;500;700&display=swap');

:root{
  --ink:#1F2A44; --ink-soft:#3B4863; --paper:#F7F4EC; --card:#FFFFFF;
  --line:#E4DFD0; --seal:#9B3A3A; --seal-soft:#F3E4E1; --gold:#B08A3E;
  --gold-soft:#F1E7D2; --sage:#4B6B57; --sage-soft:#E7EEE9; --muted:#6B7280;
  --amber:#B0691E; --amber-soft:#F3E2CC; --blue:#3A5E8C; --blue-soft:#E1E9F2;
}
@media (prefers-color-scheme: dark){
  :root{
    --ink:#EDEAE0; --ink-soft:#C9C4B4; --paper:#15171C; --card:#20232A;
    --line:#33363E; --seal:#E38686; --seal-soft:#3A2426; --gold:#D8B978;
    --gold-soft:#332A17; --sage:#8FBBA3; --sage-soft:#1E2B25; --muted:#9CA0AA;
    --amber:#E0A15C; --amber-soft:#332A1A; --blue:#8FADD6; --blue-soft:#212C3C;
  }
}
*{box-sizing:border-box;}
#cippe-app{font-family:'Noto Sans SC',sans-serif;color:var(--ink);background:var(--paper);
  padding:0;max-width:920px;margin:0 auto;line-height:1.6;}
#cippe-app h1,#cippe-app h2,#cippe-app h3{font-family:'Noto Serif SC',serif;font-weight:700;margin:0;}
.hdr{display:flex;align-items:center;justify-content:space-between;gap:16px;
  padding:22px 20px;border-bottom:2px solid var(--gold);}
.hdr-title{font-size:22px;letter-spacing:0.5px;}
.hdr-sub{font-size:12.5px;color:var(--muted);margin-top:4px;font-family:'Noto Sans SC',sans-serif;}
.seal{width:56px;height:56px;border-radius:50%;background:var(--seal);color:#fff;display:flex;
  flex-direction:column;align-items:center;justify-content:center;flex-shrink:0;font-family:'Noto Serif SC',serif;}
.seal b{font-size:18px;line-height:1;}
.seal span{font-size:9px;opacity:0.9;}
.tabs{display:flex;gap:2px;padding:0 20px;border-bottom:1px solid var(--line);overflow-x:auto;}
.tab{padding:12px 16px;font-size:14px;cursor:pointer;color:var(--muted);white-space:nowrap;
  border-bottom:2px solid transparent;user-select:none;}
.tab.active{color:var(--ink);border-bottom:2px solid var(--seal);font-weight:500;}
.tab:hover{color:var(--ink);}
.body{padding:20px;}
.card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:16px 18px;margin-bottom:12px;}
.search{width:100%;padding:10px 12px;border:1px solid var(--line);border-radius:8px;
  background:var(--card);color:var(--ink);font-size:14px;font-family:inherit;margin-bottom:14px;}
.search:focus{outline:none;border-color:var(--gold);}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:var(--gold-soft);
  color:var(--gold);margin-right:6px;font-weight:500;}
.tag.status-live{background:var(--sage-soft);color:var(--sage);}
.tag.status-repealed{background:var(--seal-soft);color:var(--seal);}
.tag.t-done{background:var(--sage-soft);color:var(--sage);}
.tag.t-hard{background:var(--amber-soft);color:var(--amber);}
.ref-title{font-size:15.5px;font-weight:700;margin:2px 0 4px;font-family:'Noto Serif SC',serif;}
.ref-code{font-size:12px;color:var(--muted);margin-bottom:8px;}
.ref-note{font-size:13.5px;color:var(--ink-soft);margin-bottom:8px;}
.ref-link{font-size:12.5px;color:var(--seal);text-decoration:none;}
.ref-link:hover{text-decoration:underline;}
.group-title{font-size:13px;font-weight:700;color:var(--gold);margin:22px 0 8px;text-transform:uppercase;
  letter-spacing:1px;}
.group-title:first-child{margin-top:0;}
.btn{padding:9px 16px;border-radius:8px;border:1px solid var(--seal);background:var(--seal);color:#fff;
  font-size:13.5px;cursor:pointer;font-family:inherit;font-weight:500;}
.btn:hover{opacity:0.9;}
.btn.secondary{background:transparent;color:var(--ink-soft);border:1px solid var(--line);}
.btn.small{padding:5px 10px;font-size:12px;}
.btn.ghost{background:transparent;color:var(--muted);border:none;text-decoration:underline;}
label{font-size:12.5px;color:var(--muted);display:block;margin:10px 0 4px;}
label:first-child{margin-top:0;}
input[type=text],textarea,select{width:100%;padding:8px 10px;border:1px solid var(--line);border-radius:7px;
  background:var(--paper);color:var(--ink);font-size:13.5px;font-family:inherit;resize:vertical;}
input[type=text]:focus,textarea:focus,select:focus{outline:none;border-color:var(--gold);}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.form-actions{display:flex;gap:10px;margin-top:14px;}
.m-q{font-size:14.5px;font-weight:500;margin-bottom:6px;}
.m-meta{display:flex;gap:8px;align-items:center;margin-bottom:8px;flex-wrap:wrap;}
.m-answers{font-size:13px;color:var(--ink-soft);margin-bottom:6px;}
.m-answers b{color:var(--seal);}
.m-explain{font-size:13px;color:var(--ink-soft);background:var(--paper);border-radius:7px;padding:8px 10px;
  margin-top:6px;border-left:3px solid var(--gold);}
.m-actions{display:flex;gap:8px;margin-top:10px;}
.mastered-badge{background:var(--sage-soft);color:var(--sage);}
.empty{text-align:center;padding:50px 20px;color:var(--muted);font-size:14px;}
.empty .big{font-size:32px;margin-bottom:10px;opacity:0.5;}
.flash-card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:32px 26px;
  min-height:180px;display:flex;flex-direction:column;justify-content:center;cursor:pointer;}
.flash-q{font-size:16px;font-weight:500;line-height:1.7;}
.flash-hint{text-align:center;color:var(--muted);font-size:12px;margin-top:14px;}
.flash-reveal{margin-top:16px;padding-top:16px;border-top:1px dashed var(--line);}
.flash-progress{font-size:12.5px;color:var(--muted);margin-bottom:12px;text-align:center;}
.flash-nav{display:flex;justify-content:center;gap:10px;margin-top:18px;}
.note-item{border-bottom:1px solid var(--line);padding:12px 0;}
.note-item:last-child{border:none;}
.note-topic{font-size:11.5px;color:var(--gold);font-weight:700;margin-bottom:3px;}
.note-content{font-size:13.5px;white-space:pre-wrap;}
.note-date{font-size:11px;color:var(--muted);margin-top:6px;}
.stats-row{display:flex;gap:8px;margin-bottom:14px;}
.stat-box{flex:1;background:var(--card);border:1px solid var(--line);border-radius:8px;padding:8px 6px;text-align:center;}
.stat-num{font-size:16px;font-weight:700;font-family:'Noto Serif SC',serif;}
.stat-lbl{font-size:10px;color:var(--muted);margin-top:1px;}

.graph-hint{font-size:12.5px;color:var(--muted);margin-bottom:16px;}
.graph-legend{display:flex;flex-wrap:wrap;gap:8px 14px;margin-bottom:22px;padding:12px 14px;
  background:var(--card);border:1px solid var(--line);border-radius:8px;}
.graph-legend-item{display:flex;align-items:center;gap:6px;font-size:11.5px;color:var(--ink-soft);}
.graph-legend-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0;}
.graph-tier{width:100%;}
.graph-tier-label{font-size:12.5px;font-weight:700;color:var(--ink-soft);margin-bottom:10px;
  padding-left:10px;border-left:3px solid var(--line);}
.graph-cards{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;}
.graph-node{border:1px solid var(--line);border-left:4px solid var(--line);border-radius:8px;
  padding:10px 13px;background:var(--card);min-width:150px;max-width:230px;cursor:pointer;
  transition:transform 0.1s;}
.graph-node:hover{transform:translateY(-1px);}
.graph-node .gn-t{font-size:13px;font-weight:700;margin-bottom:3px;line-height:1.35;}
.graph-node .gn-c{font-size:11px;color:var(--muted);line-height:1.4;}
.graph-node.gn-core{max-width:280px;}
.graph-node.gn-core .gn-t{font-size:15px;}
.graph-connector{display:flex;flex-direction:column;align-items:center;padding:8px 0 4px;}
.graph-connector .gc-line{width:1px;height:14px;background:var(--line);}
.graph-connector .gc-lbl{font-size:11px;color:var(--muted);text-align:center;max-width:280px;margin:1px 0;}
.graph-connector .gc-arrow{font-size:12px;color:var(--muted);line-height:1;}

.bank-toolbar{display:flex;flex-wrap:wrap;gap:8px;margin-bottom:10px;}
.bank-count{font-size:12px;color:var(--muted);margin-bottom:14px;}
.bank-card{background:var(--card);border:1px solid var(--line);border-radius:10px;padding:14px 16px;margin-bottom:10px;}
.bank-card.in-mistakes{border-color:var(--seal);}
.bank-meta{display:flex;align-items:center;gap:8px;margin-bottom:8px;flex-wrap:wrap;}
.bank-num{font-size:11.5px;color:var(--muted);font-family:'Noto Serif SC',serif;}
.tag.v-accurate{background:var(--sage-soft);color:var(--sage);}
.tag.v-corrected{background:var(--seal-soft);color:var(--seal);}
.tag.v-qualified{background:var(--gold-soft);color:var(--gold);}
.bank-q{font-size:14px;font-weight:500;margin-bottom:8px;white-space:pre-wrap;}
.bank-o{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;margin-bottom:8px;line-height:1.65;}
.bank-a{font-size:12.5px;margin-bottom:4px;}
.bank-a b{color:var(--seal);}
.bank-vd{font-size:12px;color:var(--muted);margin-bottom:6px;}
.bank-card details{margin-top:8px;}
.bank-card summary{cursor:pointer;font-size:12.5px;color:var(--gold);font-weight:500;list-style:none;}
.bank-card summary::-webkit-details-marker{display:none;}
.bank-card summary:before{content:'▸ ';}
.bank-card details[open] summary:before{content:'▾ ';}
.ref-mini-item{margin-bottom:10px;padding-bottom:10px;border-bottom:1px dashed var(--line);}
.ref-mini-item:last-child{margin-bottom:0;padding-bottom:0;border-bottom:none;}
.bank-explain{font-size:13px;color:var(--ink-soft);white-space:pre-wrap;margin-top:8px;line-height:1.65;
  background:var(--paper);border-radius:7px;padding:10px 12px;border-left:3px solid var(--gold);}
.bank-actions{margin-top:10px;}
.btn.toggle-add{background:transparent;border:1px solid var(--seal);color:var(--seal);}
.btn.toggle-remove{background:var(--seal);color:#fff;}
.btn.toggle-done-off{background:transparent;border:1px solid var(--sage);color:var(--sage);}
.btn.toggle-done-on{background:var(--sage);color:#fff;border:1px solid var(--sage);}
.btn.toggle-hard-off{background:transparent;border:1px solid var(--amber);color:var(--amber);}
.btn.toggle-hard-on{background:var(--amber);color:#fff;border:1px solid var(--amber);}
.bank-card.is-hard{border-left:3px solid var(--amber);}
.bank-card.is-done:not(.is-hard){border-left:3px solid var(--sage);}
.load-more-wrap{text-align:center;margin:18px 0;}
.backup-bar{display:flex;gap:10px;align-items:center;padding:6px 20px;border-bottom:1px solid var(--line);
  font-size:11.5px;color:var(--muted);flex-wrap:wrap;}
.backup-bar .btn.ghost{font-size:11.5px;}
.backup-status{margin-left:auto;}
#sync-status{font-size:11px;color:var(--muted);}
#sync-panel{padding:12px 14px;}
#sync-panel .sync-title{font-size:12.5px;font-weight:700;margin-bottom:4px;display:flex;align-items:center;gap:6px;}
#sync-panel .sync-help-toggle{font-size:11px;font-weight:400;color:var(--gold);cursor:pointer;text-decoration:underline;}
#sync-help{font-size:11px;color:var(--muted);line-height:1.6;margin:6px 0 10px;display:none;}
#sync-panel label{font-size:11px;margin:6px 0 3px;}
#sync-panel input[type=text]{padding:6px 9px;font-size:12.5px;}
#sync-panel .form-actions{margin-top:8px;gap:6px;}
#sync-panel .btn{padding:6px 12px;font-size:12px;}
</style>

<div id="cippe-app">
  <div class="hdr">
    <div>
      <div class="hdr-title">CIPP/E 备考档案</div>
      <div class="hdr-sub">欧盟数据保护法律体系 · 错题追踪 · 复习笔记</div>
    </div>
    <div class="seal"><b id="seal-num">0</b><span>错题</span></div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="backup-bar">
    <span id="backup-status">数据自动保存中…</span>
    <button class="btn ghost" onclick="cippeExportBackup()">导出备份（JSON）</button>
    <button class="btn ghost" onclick="document.getElementById('import-file').click()">导入备份</button>
    <input type="file" id="import-file" accept="application/json" style="display:none;" onchange="cippeImportBackup(this.files[0])">
    <button class="btn ghost" onclick="cippeToggleSyncPanel()">☁ 云同步设置</button>
    <span id="sync-status" class="backup-status"></span>
  </div>
  <div id="sync-panel" class="card" style="display:none;margin:0 20px 14px;">
    <div class="sync-title">跨设备云同步（JSONBin.io）<span class="sync-help-toggle" onclick="var h=document.getElementById('sync-help');h.style.display=h.style.display==='none'?'block':'none';">怎么用？</span></div>
    <div id="sync-help">
      1. 打开 jsonbin.io 免费注册 → 登录后右上角头像菜单找 "API Keys"，复制 X-MASTER-KEY<br>
      2. 粘贴到下面"API Key"，留空"Bin ID"，点"保存并连接"——首次自动创建云端存档<br>
      3. 第二台设备同样粘贴 API Key，再把生成的 Bin ID 也复制过去，即可连到同一份数据
    </div>
    <label>API Key（X-MASTER-KEY）</label>
    <input type="text" id="sync-apikey" placeholder="$2b$10$...">
    <label>Bin ID（首次留空，保存后自动生成）</label>
    <input type="text" id="sync-binid" placeholder="留空=自动创建新档案">
    <div class="form-actions">
      <button class="btn" onclick="cippeSyncConnect()">保存并连接</button>
      <button class="btn secondary" onclick="cippeSyncPushNow()">推送到云端</button>
      <button class="btn secondary" onclick="cippeSyncPullNow()">从云端拉取</button>
      <button class="btn ghost" onclick="cippeSyncDisconnect()">断开</button>
    </div>
  </div>
  <div class="body" id="content"></div>
</div>

<script>
(function(){
  var notes = [];
  var mistakes = [];
  var bankStatus = {}; // { [questionNum]: {done:bool, hard:bool} }
  var customRef = [];
  var syncConfig = {apiKey:'', binId:''};
  var activeTab = 'ref';
  var reviewIndex = 0;
  var reviewRevealed = false;
  var loaded = false;

  var TABS = [
    {id:'ref', label:'法条速查'},
    {id:'graph', label:'关系图谱'},
    {id:'bank', label:'题库(319题)'},
    {id:'mistakes', label:'错题本'},
    {id:'review', label:'错题闪卡复习'},
    {id:'notes', label:'我的笔记'}
  ];

  var REFERENCE = [
    {group:'核心保护框架', t:'GDPR', title:'GDPR 通用数据保护条例', code:'Regulation (EU) 2016/679', status:'live',
      note:'2018.5.25生效，废止Directive 95/46/EC，欧盟数据保护核心法律。', link:'https://eur-lex.europa.eu/eli/reg/2016/679/oj'},
    {group:'核心保护框架', t:'ePrivacy指令', title:'ePrivacy 电子隐私指令', code:'Directive 2002/58/EC（经2009/136/EC修订）', status:'live',
      note:'特别法优于GDPR，规范Cookie/流量数据/位置数据。替代它的条例草案已于2025年2月被欧委会正式撤回。', link:'https://eur-lex.europa.eu/eli/dir/2002/58/oj'},
    {group:'核心保护框架', t:'LED执法指令', title:'LED 执法指令', code:'Directive (EU) 2016/680', status:'live',
      note:'规范主管机关为预防/调查/侦查/起诉刑事犯罪目的处理个人数据，与GDPR互斥适用。', link:'https://eur-lex.europa.eu/eli/dir/2016/680/oj'},
    {group:'核心保护框架', t:'EUDPR', title:'EUDPR 欧盟机构数据保护条例', code:'Regulation (EU) 2018/1725', status:'live',
      note:'相当于"欧盟机构版GDPR"，规范欧委会、欧洲议会等机构自身的数据处理。', link:'https://eur-lex.europa.eu/eli/reg/2018/1725/oj'},
    {group:'核心保护框架', t:'GDPR', title:'GDPR程序条例（跨境执法程序）', code:'Regulation (EU) 2025/2518', status:'live',
      note:'2026.1.1生效，2027.4.2起适用，统一一站式机制下15个月调查时限等程序规则。', link:'https://eur-lex.europa.eu/eli/reg/2025/2518/oj'},
    {group:'数字经济立法', t:'AI Act', title:'AI Act 人工智能法案', code:'Regulation (EU) 2024/1689', status:'live',
      note:'2024.8.1生效，分阶段适用。高风险系统义务经Digital Omnibus顺延至2027.12.2（附件III）。', link:'https://eur-lex.europa.eu/eli/reg/2024/1689/oj'},
    {group:'数字经济立法', t:'Data Act', title:'Data Act 数据法案', code:'Regulation (EU) 2023/2854', status:'live',
      note:'2025.9.12全面适用，规范非个人数据/物联网数据可携带权，涉个人数据部分从属GDPR。', link:'https://eur-lex.europa.eu/eli/reg/2023/2854/oj'},
    {group:'数字经济立法', t:'其他数字立法', title:'Data Governance Act 数据治理法', code:'Regulation (EU) 2022/868', status:'live',
      note:'规范数据中介服务与数据利他主义框架。', link:'https://eur-lex.europa.eu/eli/reg/2022/868/oj'},
    {group:'数字经济立法', t:'其他数字立法', title:'DSA 数字服务法', code:'Regulation (EU) 2022/2065', status:'live',
      note:'规范在线中介服务的内容审核与平台责任。', link:'https://eur-lex.europa.eu/eli/reg/2022/2065/oj'},
    {group:'数字经济立法', t:'其他数字立法', title:'DMA 数字市场法', code:'Regulation (EU) 2022/1925', status:'live',
      note:'规范"看门人"平台的市场行为。', link:'https://eur-lex.europa.eu/eli/reg/2022/1925/oj'},
    {group:'历史沿革（已失效）', t:'历史沿革/95-46-EC', title:'Directive 95/46/EC 数据保护指令', code:'Directive 95/46/EC', status:'repealed',
      note:'GDPR前身，1995年通过，已被GDPR第94条明确废止。指令需成员国转化，规则不统一，是GDPR改用"条例"形式的重要原因。', link:'https://eur-lex.europa.eu/eli/dir/1995/46/oj'},
    {group:'历史沿革（已失效）', t:'历史沿革/95-46-EC', title:'Data Retention Directive 数据保留指令', code:'Directive 2006/24/EC', status:'repealed',
      note:'要求电信商强制留存通信元数据，2014年被CJEU在Digital Rights Ireland案中宣告整体无效。失效后数据留存回归ePrivacy指令第15(1)条由各成员国自行立法。', link:'https://eur-lex.europa.eu/eli/dir/2006/24/oj'},
    {group:'国际条约', t:'Convention 108/108+', title:'Convention 108 / 108+', code:'ETS No.108 / CETS No.223', status:'live',
      note:'欧洲理事会框架下，1981年首个具有法律约束力的数据保护国际条约。108+为现代化议定书。GDPR第45条充分性认定会考量第三国是否加入。', link:'https://www.coe.int/en/web/data-protection/convention108-and-protocol'},
    {group:'重要判例', t:'判例法', title:'Schrems I', code:'C-362/14，2015.10.6', status:'live',
      note:'宣告EU-US Safe Harbor（安全港协议）无效。', link:'https://curia.europa.eu/juris/liste.jsf?num=C-362/14'},
    {group:'重要判例', t:'判例法', title:'Schrems II', code:'C-311/18，2020.7.16', status:'live',
      note:'宣告EU-US Privacy Shield（隐私盾）无效；确认SCC原则有效但需个案评估（TIA）。', link:'https://curia.europa.eu/juris/liste.jsf?num=C-311%2F18'},
    {group:'重要判例', t:'判例法', title:'Planet49', code:'C-673/17，2019.10.1', status:'live',
      note:'预先勾选的Cookie同意复选框不构成有效同意；无论信息是否为个人数据，ePrivacy第5(3)条同样适用。', link:'https://curia.europa.eu/juris/liste.jsf?num=C-673%2F17'},
    {group:'重要判例', t:'判例法', title:'Digital Rights Ireland', code:'并案C-293/12&C-594/12，2014.4.8', status:'live',
      note:'宣告数据保留指令（2006/24/EC）无效。', link:'https://curia.europa.eu/juris/liste.jsf?num=C-293/12'},
    {group:'重要判例', t:'判例法', title:'Tele2 Sverige / Watson', code:'并案C-203/15&C-698/15，2016.12.21', status:'live',

  var QUESTION_BANK = [{"n":1,"q":"Which statement is correct when considering the right to privacy under Article 8 of the European\nConvention on Human Rights (ECHR)?","o":"A. The right to privacy is an absolute right\nB. The right to privacy has to be balanced against other rights under the ECHR\nC. The right to freedom of expression under Article 10 of the ECHR will always override the right to\nprivacy\nD. The right to privacy protects the right to hold opinions and to receive and impart ideas without\ninterference","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。ECHR 第 8 条规定的隐私权是一项限制性权利（qualified right），并非绝对权利，须依第\n8(2)条与其他权利（如第 10 条言论自由）进行平衡。A 错在“绝对权利”的表述——只有极少数权利（如\n禁止酷刑）才是绝对的；C 错在言论自由并不“always override”隐私权，两者需个案平衡，不存在单向优\n先；D 描述的其实是第 10 条言论自由的内容，而非第 8 条隐私权。知识点：欧洲人权公约中权利的“绝对\n权利”与“限制性权利”区分、比例原则与利益平衡。","t":"判例法"},{"n":2,"q":"What is one major goal that the OECD Guidelines, Convention 108 and the Data Protection Directive\n(Directive 95/46/EC) all had in common but largely failed to achieve in Europe?","o":"A. The establishment of a list of legitimate data processing criteria\nB. The creation of legally binding data protection principles\nC. The synchronization of approaches to data protection\nD. The restriction of cross-border data flow","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。OECD 隐私指南（1980）、欧洲理事会 108 号公约（1981）与 95/46/EC 指令都致力于协调\n各国数据保护做法、便利数据跨境流动，但因均为软法或指令（需各国转化），最终未能实现欧洲范围\n内做法的“同步化/一致化”，这正是 GDPR 以直接适用的“条例”形式出台的原因之一。A、B、D 分别只是\n部分文件的具体内容，并非三者共同且失败的目标。知识点：数据保护立法史（OECD 指南、108 公约、\n95/46 指令）及 GDPR 的立法动因。","t":"历史沿革/95-46-EC"},{"n":3,"q":"A key component of the OECD Guidelines is the “Individual Participation Principle”. What parts of the\nGeneral Data Protection Regulation (GDPR) provide the closest equivalent to that principle?","o":"A. The lawful processing criteria stipulated by Articles 6 to 9\nB. The information requirements set out in Articles 13 and 14\nC. The breach notification requirements specified in Articles 33 and 34\nD. The rights granted to data subjects under Articles 12 to 22","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。OECD 指南中的“个人参与原则”（Individual Participation Principle）赋予个人知悉、查阅、\n更正与其相关数据的权利，这与 GDPR 第三章（第 12-22 条）规定的数据主体权利体系最为对应。A 是合\n法处理依据（第 6-9 条），B 是信息告知义务（第 13-14 条，属于透明度原则的一部分），C 是数据泄露\n通知义务，均不是“参与原则”的对应条款。知识点：OECD 八项原则与 GDPR 原则/权利的对应关系。","t":"Convention 108/108+"},{"n":4,"q":"Which EU institution is vested with the competence to propose new data protection legislation on its own\ninitiative?","o":"A. The European Council\nB. The European Parliament\nC. The European Commission\nD. The Council of the European Union","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。根据欧盟条约框架，欧盟委员会（European Commission）在普通立法程序中享有专属立法\n提案权，负责提出新法案（包括数据保护立法）。欧洲议会和欧盟理事会负责审议、修改和通过立法，\n但通常不能主动提案；欧洲理事会（European Council）则是设定政治方向的机构，不参与具体立法提\n案。知识点：欧盟机构架构及普通立法程序（Ordinary Legislative Procedure）中各机构角色。","t":"监管机构"},{"n":5,"q":"What is an important difference between the European Court of Human Rights (ECHR) and the Court of\nJustice of the European Union (CJEU) in relation to their roles and functions?","o":"A. ECHR can rule on issues concerning privacy as a fundamental right, while the CJEU cannot.\nB. CJEU can force national governments to implement and honor EU law, while the ECHR cannot.\nC. CJEU can hear appeals on human rights decisions made by national courts, while the ECHR cannot.\nD. ECHR can enforce human rights laws against governments that fail to implement them, while the CJEU\ncannot.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。CJEU 的判决对成员国具有直接约束力，欧盟法优先原则和成员国违约诉讼程序（TFEU 第\n258-260 条）使 CJEU 能够强制成员国执行欧盟法；而欧洲人权法院（ECtHR，此处以 ECHR 代称）的判\n决执行依赖部长委员会监督，缺乏同等的强制执行机制。A 错——CJEU 同样可以通过《欧盟基本权利宪\n章》第 7、8 条处理隐私问题；C、D 则颠倒或混淆了两个法院的职权范围。知识点：CJEU 与 ECtHR 在\n职权、判决效力及执行机制上的区别。","t":"判例法"},{"n":6,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nAnna and Frank both work at Granchester University. Anna is a lawyer responsible for data protection,\n\nwhile Frank is a lecturer in the engineering department. The University maintains a number of types of\nrecords:\n\nStudent records, including names, student numbers, home addresses, pre-university information,\n\nuniversity attendance and performance records, details of special educational needs and financial\ninformation.\nStaff records, including autobiographical materials (such as curricula, professional contact files, student\nevaluations and other relevant teaching files).\nAlumni records, including birthplaces, years of birth, dates of matriculation and conferrals of degrees.\nThese records are available to former students after registering through Granchester’s Alumni portal.\nDepartment for Education records, showing how certain demographic groups (such as first-generation\nstudents) could be expected, on average, to progress. These records do not contain names or\nidentification numbers.\nUnder their security policy, the University encrypts all of its personal data records in transit and at rest.\n\nIn order to improve his teaching, Frank wants to investigate how his engineering students perform in\nrelational to Department for Education expectations. He has attended one of Anna’s data protection\ntraining courses and knows that he should use no more personal data than necessary to accomplish his\ngoal. He creates a program that will only export some student data: previous schools attended, grades\noriginally obtained, grades currently obtained and first time university attended. He wants to keep the\nrecords at the individual student level. Mindful of Anna’s training, Frank runs the student numbers through\nan algorithm to transform them into different reference numbers. He uses the same algorithm on each\noccasion so that he can update each record over time.\n\nOne of Anna’s tasks is to complete the record of processing activities, as required by the GDPR. After\nreceiving her email reminder, as required by the GDPR. After receiving her email reminder, Frank informs\nAnna about his performance database.\n\nAnn explains to Frank that, as well as minimizing personal data, the University has to check that this new\nuse of existing data is permissible. She also suspects that, under the GDPR, a risk analysis may have to\nbe carried out before the data processing can take place. Anna arranges to discuss this further with Frank\nafter she has done some additional research.\n\nFrank wants to be able to work on his analysis in his spare time, so he transfers it to his home laptop\n(which is not encrypted). Unfortunately, when Frank takes the laptop into the University he loses it on the\n\ntrain. Frank has to see Anna that day to discuss compatible processing. He knows that he needs to report\nsecurity incidents, so he decides to tell Anna about his lost laptop at the same time.\n\nWhich of the University’s records does Anna NOT have to include in her record of processing activities?","o":"A. Student records\nB. Staff and alumni records\nC. Frank’s performance database\nD. Department for Education records","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。教育部统计记录不含姓名或身份编号，且用于展示群体层面的平均趋势，属于无法识别到\n具体个人的匿名化数据，不构成 GDPR 意义上的“个人数据”，因此无需列入处理活动记录（第 30 条）。\n学生记录、教职工/校友记录显然是个人数据；Frank 的成绩数据库虽经过“算法转换学号”，但因使用同一\n算法且可在同一学生层面持续更新，属于假名化（pseudonymization）而非匿名化，假名化数据仍是个人\n数据，须纳入记录。知识点：匿名化与假名化的区别、第 30 条处理活动记录的适用范围。","t":"GDPR"},{"n":7,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nAnna and Frank both work at Granchester University. Anna is a lawyer responsible for data protection,\nwhile Frank is a lecturer in the engineering department. The University maintains a number of types of\nrecords:\n Student records, including names, student numbers, home addresses, pre-university information,\n university attendance and performance records, details of special educational needs and financial\n information.\n Staff records, including autobiographical materials (such as curricula, professional contact files, student\n\nevaluations and other relevant teaching files).\n\nAlumni records, including birthplaces, years of birth, dates of matriculation and conferrals of degrees.\nThese records are available to former students after registering through Granchester’s Alumni portal.\n\nDepartment for Education records, showing how certain demographic groups (such as first-generation\n\nstudents) could be expected, on average, to progress. These records do not contain names or\nidentification numbers.\nUnder their security policy, the University encrypts all of its personal data records in transit and at rest.\n\nIn order to improve his teaching, Frank wants to investigate how his engineering students perform in\nrelational to Department for Education expectations. He has attended one of Anna’s data protection\ntraining courses and knows that he should use no more personal data than necessary to accomplish his\ngoal. He creates a program that will only export some student data: previous schools attended, grades\noriginally obtained, grades currently obtained and first time university attended. He wants to keep the\nrecords at the individual student level. Mindful of Anna’s training, Frank runs the student numbers through\nan algorithm to transform them into different reference numbers. He uses the same algorithm on each\noccasion so that he can update each record over time.\n\nOne of Anna’s tasks is to complete the record of processing activities, as required by the GDPR. After\nreceiving her email reminder, as required by the GDPR. After receiving her email reminder, Frank informs\nAnna about his performance database.\n\nAnn explains to Frank that, as well as minimizing personal data, the University has to check that this new\nuse of existing data is permissible. She also suspects that, under the GDPR, a risk analysis may have to\n\nbe carried out before the data processing can take place. Anna arranges to discuss this further with Frank\nafter she has done some additional research.\n\nFrank wants to be able to work on his analysis in his spare time, so he transfers it to his home laptop\n(which is not encrypted). Unfortunately, when Frank takes the laptop into the University he loses it on the\ntrain. Frank has to see Anna that day to discuss compatible processing. He knows that he needs to report\nsecurity incidents, so he decides to tell Anna about his lost laptop at the same time.\n\nBefore Anna determines whether Frank’s performance database is permissible, what additional\ninformation does she need?","o":"A. More information about Frank’s data protection training.\nB. More information about the extent of the information loss.\nC. More information about the algorithm Frank used to mask student numbers.\nD. More information about what students have been told and how the research will be used.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。根据 GDPR 第 5(1)(b)条“目的限制原则”及第 6(4)条的兼容性测试，判断新用途是否与原始\n收集目的相兼容，需要了解数据主体当初被告知的收集目的，以及新研究将如何使用这些数据，才能进\n行兼容性评估。A（培训情况）、B（丢失范围）、C（算法技术细节）均与“该新处理是否被允许”这一\n合法性判断无直接关系。知识点：目的限制原则与兼容性处理测试（compatible use test）。","t":"GDPR"},{"n":8,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nAnna and Frank both work at Granchester University. Anna is a lawyer responsible for data protection,\nwhile Frank is a lecturer in the engineering department. The University maintains a number of types of\nrecords:\n Student records, including names, student numbers, home addresses, pre-university information,\n university attendance and performance records, details of special educational needs and financial\n information.\n Staff records, including autobiographical materials (such as curricula, professional contact files, student\n evaluations and other relevant teaching files).\n Alumni records, including birthplaces, years of birth, dates of matriculation and conferrals of degrees.\n These records are available to former students after registering through Granchester’s Alumni portal.\n Department for Education records, showing how certain demographic groups (such as first-generation\n students) could be expected, on average, to progress. These records do not contain names or\n\nidentification numbers.\n\nUnder their security policy, the University encrypts all of its personal data records in transit and at rest.\n\nIn order to improve his teaching, Frank wants to investigate how his engineering students perform in\n\nrelational to Department for Education expectations. He has attended one of Anna’s data protection\n\ntraining courses and knows that he should use no more personal data than necessary to accomplish his\ngoal. He creates a program that will only export some student data: previous schools attended, grades\n\noriginally obtained, grades currently obtained and first time university attended. He wants to keep the\nrecords at the individual student level. Mindful of Anna’s training, Frank runs the student numbers through\nan algorithm to transform them into different reference numbers. He uses the same algorithm on each\noccasion so that he can update each record over time.\n\nOne of Anna’s tasks is to complete the record of processing activities, as required by the GDPR. After\nreceiving her email reminder, as required by the GDPR. After receiving her email reminder, Frank informs\nAnna about his performance database.\n\nAnn explains to Frank that, as well as minimizing personal data, the University has to check that this new\nuse of existing data is permissible. She also suspects that, under the GDPR, a risk analysis may have to\nbe carried out before the data processing can take place. Anna arranges to discuss this further with Frank\nafter she has done some additional research.\n\nFrank wants to be able to work on his analysis in his spare time, so he transfers it to his home laptop\n(which is not encrypted). Unfortunately, when Frank takes the laptop into the University he loses it on the\ntrain. Frank has to see Anna that day to discuss compatible processing. He knows that he needs to report\nsecurity incidents, so he decides to tell Anna about his lost laptop at the same time.\n\nAnna will find that a risk analysis is NOT necessary in this situation as long as?","o":"A. The data subjects are no longer current students of Frank’s\nB. The processing will not negatively affect the rights of the data subjects\nC. The algorithms that Frank uses for the processing are technologically sound\nD. The data subjects gave their unambiguous consent for the original processing","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 为最佳选项，但更准确的法定门槛是“处理是否很可能造成高风险”，而不是笼统地看是否会产生任何不利影\n响。低风险或一般风险不触发 DPIA；高风险判断应结合第 35 条及监管机构清单。","t":"GDPR"},{"n":9,"q":"Which institution has the power to adopt findings that confirm the adequacy of the data protection level in a\nnon-EU country?","o":"A. The European Parliament\nB. The European Commission\nC. The Article 29 Working Party\nD. The European Council","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。根据 GDPR 第 45 条，认定第三国数据保护水平是否“充分”（adequacy decision）的权限属于\n欧盟委员会（在征询 EDPB 意见并经审查程序后作出）。欧洲议会、原第 29 条工作组（现为 EDPB，仅\n提供意见）及欧洲理事会均无权直接作出充分性认定。知识点：充分性认定机制（Adequacy Decision，第\n45 条）。","t":"监管机构"},{"n":10,"q":"What is true of both the General Data Protection Regulation (GDPR) and the Council of Europe\nConvention 108?","o":"A. Both govern international transfers of personal data\n\nB. Both govern the manual processing of personal data\nC. Both only apply to European Union countries\n\nD. Both require notification of processing activities to a supervisory authority","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。GDPR（第五章跨境数据传输规则）与 108 号公约（尤其经现代化后的 108+号公约）都建立\n了关于个人数据跨境传输的规则框架。B 错——108 号公约最初仅适用于自动化处理，而 GDPR 同时涵盖\n自动化处理和构成档案系统的人工处理，二者范围并不完全一致；C 错——108 号公约向非欧盟国家开放\n签署，并不限于欧盟国家；D 错——两者均未一律要求处理活动须向监管机构“通知”（GDPR 已取消一般\n性通知义务，改为处理活动记录制度）。知识点：GDPR 与 108 号公约的适用范围比较。","t":"Convention 108/108+"},{"n":11,"q":"Which aspect of the GDPR will likely have the most impact on the consistent implementation of data\nprotection laws throughout the European Union?","o":"A. That it essentially functions as a one-stop shop mechanism\nB. That it takes the form of a Regulation as opposed to a Directive\nC. That it makes notification of large-scale data breaches mandatory\nD. That it makes appointment of a data protection officer mandatory","a":"B","v":"corrected","vd":"已修正（原答案：A；修订：B）","e":"正确答案 B。GDPR 采取“条例”（Regulation）而非“指令”（Directive）的形式，原则上无需成员国转化即可直接适\n用，最直接地减少了原 95/46/EC 指令在各国转化时产生的文本与实施差异。A 所述一站式机制主要改善跨境案件的\n监管协作与执法一致性，也很重要，但题目问的是数据保护法律在全欧盟的一致实施，B 更切题。","t":"历史沿革/95-46-EC"},{"n":12,"q":"How is the retention of communications traffic data for law enforcement purposes addressed by European\ndata protection law?","o":"A. The ePrivacy Directive allows individual EU member states to engage in such data retention.\nB. The ePrivacy Directive harmonizes EU member states’ rules concerning such data retention.\nC. The Data Retention Directive’s annulment makes such data retention now permissible.\n\nD. The GDPR allows the retention of such data for the prevention, investigation, detection or prosecution\nof criminal offences only.","a":"A","v":"corrected","vd":"已修正（原答案：B；修订：A）","e":"正确答案 A。ePrivacy Directive 2002/58/EC 第 15(1) 条允许成员国为国家安全、预防和侦查犯罪等目的，在必要、适\n当且成比例的范围内立法限制通信保密和删除义务，包括在有限期间留存流量或位置数据。该条提供的是成员国采\n取留存措施的授权及边界，并未建立统一的数据留存制度；CJEU 还对一般、无差别留存施加了严格限制。B、C、D\n均不准确。","t":"ePrivacy指令"},{"n":13,"q":"What type of data lies beyond the scope of the General Data Protection Regulation?","o":"A. Pseudonymized\nB. Anonymized\nC. Encrypted\nD. Masked","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。只有真正的匿名化数据——即不能通过任何合理可能的方式重新识别到特定个人——才不\n属于 GDPR 调整范围（详见前言第 26 条）。假名化、加密和掩码处理的数据由于理论上可借助密钥或额\n外信息重新识别，仍被视为“个人数据”，继续受 GDPR 约束。知识点：匿名化 vs 假名化/加密/掩码处\n理，及前言第 26 条关于个人数据可识别性判断标准。","t":"GDPR"},{"n":14,"q":"Under what circumstances would the GDPR apply to personal data that exists in physical form, such as\ninformation contained in notebooks or hard copy files?","o":"A. Only where the personal data is produced as a physical output of specific automated processing\nactivities, such as printing, labelling, or stamping.\n\nB. Only where the personal data is to be subjected to specific computerized processing, such as image\n\nscanning or optical character recognition.\n\nC. Only where the personal data is treated by automated means in some way, such as computerized\ndistribution or filing.\nD. Only where the personal data is handled in a sufficiently structured manner so as to form part of a filing\nsystem.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。依据 GDPR 第 2(1)条及第 4(6)条“档案系统”（filing system）定义，纸质等非自动化处理的\n个人数据只有在按照特定标准结构化组织、构成或拟构成档案系统的一部分时，才落入 GDPR 的适用范\n围；单纯以自动化设备产出物理输出（A）、拟进行计算机化处理（B）或曾经过自动化处理（C）均不\n是判断标准。知识点：GDPR 对非自动化处理（人工档案）适用范围的界定。","t":"GDPR"},{"n":15,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nYou have just been hired by a toy manufacturer based in Hong Kong. The company sells a broad range of\ndolls, action figures and plush toys that can be found internationally in a wide variety of retail stores.\nAlthough the manufacturer has no offices outside Hong Kong and in fact does not employ any staff outside\nHong Kong, it has entered into a number of local distribution contracts. The toys produced by the company\ncan be found in all popular toy stores throughout Europe, the United States and Asia. A large portion of the\ncompany’s revenue is due to international sales.\n\nThe company now wishes to launch a new range of connected toys, ones that can talk and interact with\nchildren. The CEO of the company is touting these toys as the next big thing, due to the increased\npossibilities offered: The figures can answer children’s questions on various subjects, such as\nmathematical calculations or the weather. Each figure is equipped with a microphone and speaker and can\nconnect to any smartphone or tablet via Bluetooth. Any mobile device within a 10-meter radius can\nconnect to the toys via Bluetooth as well. The figures can also be associated with other figures (from the\nsame manufacturer) and interact with each other for an enhanced play experience.\n\nWhen a child asks the toy a question, the request is sent to the cloud for analysis, and the answer is\ngenerated on cloud servers and sent back to the figure. The answer is given through the figure’s integrated\nspeakers, making it appear as though that the toy is actually responding to the child’s question. The\npackaging of the toy does not provide technical details on how this works, nor does it mention that this\nfeature requires an internet connection. The necessary data processing for this has been outsourced to a\ndata center located in South Africa. However, your company has not yet revised its consumer-facing\nprivacy policy to indicate this.\n\nIn parallel, the company is planning to introduce a new range of game systems through which consumers\ncan play the characters they acquire in the course of playing the game. The system will come bundled with\na portal that includes a Near-Field Communications (NFC) reader. This device will read an RFID tag in the\naction figure, making the figure come to life onscreen. Each character has its own stock features and\nabilities, but it is also possible to earn additional ones by accomplishing game goals. The only information\nstored in the tag relates to the figures’ abilities. It is easy to switch characters during the game, and it is\npossible to bring the figure to locations outside of the home and have the character’s abilities remain\nintact.\n\nWhy is this company obligated to comply with the GDPR?","o":"A. The company has offices in the EU.\nB. The company employs staff in the EU.\nC. The company’s data center is located in a country outside the EU.\nD. The company’s products are marketed directly to EU customers.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。根据 GDPR 第 3(2)(a)条域外适用规则，即便控制者/处理者未在欧盟设立机构，只要其向欧\n盟数据主体提供商品或服务（包括通过分销渠道将产品营销至欧盟市场），即需遵守 GDPR。该玩具公\n司在香港，无欧盟机构、员工（排除 A、B），数据中心在南非本身也不是触发 GDPR 的理由（排除 C，\n位置只涉及跨境传输问题），而其产品直接面向欧盟市场销售才是触发域外效力的关键。知识点：第 3\n条域外适用性——设立地标准 vs 目标指向标准（targeting criterion）。","t":"GDPR"},{"n":16,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nYou have just been hired by a toy manufacturer based in Hong Kong. The company sells a broad range of\ndolls, action figures and plush toys that can be found internationally in a wide variety of retail stores.\nAlthough the manufacturer has no offices outside Hong Kong and in fact does not employ any staff outside\nHong Kong, it has entered into a number of local distribution contracts. The toys produced by the company\ncan be found in all popular toy stores throughout Europe, the United States and Asia. A large portion of the\ncompany’s revenue is due to international sales.\n\nThe company now wishes to launch a new range of connected toys, ones that can talk and interact with\nchildren. The CEO of the company is touting these toys as the next big thing, due to the increased\npossibilities offered: The figures can answer children’s questions on various subjects, such as\nmathematical calculations or the weather. Each figure is equipped with a microphone and speaker and can\nconnect to any smartphone or tablet via Bluetooth. Any mobile device within a 10-meter radius can\nconnect to the toys via Bluetooth as well. The figures can also be associated with other figures (from the\nsame manufacturer) and interact with each other for an enhanced play experience.\n\nWhen a child asks the toy a question, the request is sent to the cloud for analysis, and the answer is\ngenerated on cloud servers and sent back to the figure. The answer is given through the figure’s integrated\nspeakers, making it appear as though that the toy is actually responding to the child’s question. The\npackaging of the toy does not provide technical details on how this works, nor does it mention that this\nfeature requires an internet connection. The necessary data processing for this has been outsourced to a\ndata center located in South Africa. However, your company has not yet revised its consumer-facing\nprivacy policy to indicate this.\n\nIn parallel, the company is planning to introduce a new range of game systems through which consumers\ncan play the characters they acquire in the course of playing the game. The system will come bundled with\na portal that includes a Near-Field Communications (NFC) reader. This device will read an RFID tag in the\naction figure, making the figure come to life onscreen. Each character has its own stock features and\n\nabilities, but it is also possible to earn additional ones by accomplishing game goals. The only information\nstored in the tag relates to the figures’ abilities. It is easy to switch characters during the game, and it is\npossible to bring the figure to locations outside of the home and have the character’s abilities remain\nintact.\n\nWhat presents the BIGGEST potential privacy issue with the company’s practices?","o":"A. The NFC portal can read any data stored in the action figures\nB. The information about the data processing involved has not been specified\nC. The cloud service provider is in a country that has not been deemed adequate\nD. The RFID tag in the action figures has the potential for misuse because of the toy’s evolving\ncapabilities","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。该联网玩具将儿童问题上传云端处理、依赖境外数据中心，但产品包装及隐私政策均未说\n明这些处理细节及依赖网络连接的事实，违反第 13/14 条透明度原则和以清晰易懂方式告知处理信息的要\n求，这是对儿童这类弱势数据主体而言最大的隐私风险点。相比之下，NFC 读取标签内容有限（A）、数\n据中心所在国是否获充分性认定（C）、RFID 标签滥用可能性（D）都是相对次要或未被证实的风险。知\n识点：透明度原则（第 12-14 条）及对儿童数据的特别关注（前言第 38 条）。","t":"GDPR"},{"n":17,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nYou have just been hired by a toy manufacturer based in Hong Kong. The company sells a broad range of\ndolls, action figures and plush toys that can be found internationally in a wide variety of retail stores.\nAlthough the manufacturer has no offices outside Hong Kong and in fact does not employ any staff outside\nHong Kong, it has entered into a number of local distribution contracts. The toys produced by the company\n\ncan be found in all popular toy stores throughout Europe, the United States and Asia. A large portion of the\n\ncompany’s revenue is due to international sales.\n\nThe company now wishes to launch a new range of connected toys, ones that can talk and interact with\n\nchildren. The CEO of the company is touting these toys as the next big thing, due to the increased\n\npossibilities offered: The figures can answer children’s questions on various subjects, such as\nmathematical calculations or the weather. Each figure is equipped with a microphone and speaker and can\n\nconnect to any smartphone or tablet via Bluetooth. Any mobile device within a 10-meter radius can\nconnect to the toys via Bluetooth as well. The figures can also be associated with other figures (from the\nsame manufacturer) and interact with each other for an enhanced play experience.\n\nWhen a child asks the toy a question, the request is sent to the cloud for analysis, and the answer is\ngenerated on cloud servers and sent back to the figure. The answer is given through the figure’s integrated\nspeakers, making it appear as though that the toy is actually responding to the child’s question. The\npackaging of the toy does not provide technical details on how this works, nor does it mention that this\nfeature requires an internet connection. The necessary data processing for this has been outsourced to a\ndata center located in South Africa. However, your company has not yet revised its consumer-facing\nprivacy policy to indicate this.\n\nIn parallel, the company is planning to introduce a new range of game systems through which consumers\ncan play the characters they acquire in the course of playing the game. The system will come bundled with\na portal that includes a Near-Field Communications (NFC) reader. This device will read an RFID tag in the\naction figure, making the figure come to life onscreen. Each character has its own stock features and\nabilities, but it is also possible to earn additional ones by accomplishing game goals. The only information\nstored in the tag relates to the figures’ abilities. It is easy to switch characters during the game, and it is\n\npossible to bring the figure to locations outside of the home and have the character’s abilities remain\nintact.\n\nTo ensure GDPR compliance, what should be the company’s position on the issue of consent?","o":"A. The child, as the user of the action figure, can provide consent himself, as long as no information is\nshared for marketing purposes.\nB. Written authorization attesting to the responsible use of children’s data would need to be obtained from\nthe supervisory authority.\n\nC. Consent for data collection is implied through the parent’s purchase of the action figure for the child.\nD. Parental consent for a child’s use of the action figures would have to be obtained before any data could\nbe collected.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 仅在公司以“同意”作为向儿童直接提供信息社会服务的处理依据、且儿童低于相关成员国数字同意年龄时成\n立。GDPR 第 8 条并不意味着所有儿童数据在任何合法依据下都必须先取得家长同意，“before any data could be\ncollected”的表述过于绝对。","t":"GDPR"},{"n":18,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nYou have just been hired by a toy manufacturer based in Hong Kong. The company sells a broad range of\ndolls, action figures and plush toys that can be found internationally in a wide variety of retail stores.\nAlthough the manufacturer has no offices outside Hong Kong and in fact does not employ any staff outside\nHong Kong, it has entered into a number of local distribution contracts. The toys produced by the company\ncan be found in all popular toy stores throughout Europe, the United States and Asia. A large portion of the\ncompany’s revenue is due to international sales.\n\nThe company now wishes to launch a new range of connected toys, ones that can talk and interact with\nchildren. The CEO of the company is touting these toys as the next big thing, due to the increased\npossibilities offered: The figures can answer children’s questions on various subjects, such as\nmathematical calculations or the weather. Each figure is equipped with a microphone and speaker and can\nconnect to any smartphone or tablet via Bluetooth. Any mobile device within a 10-meter radius can\nconnect to the toys via Bluetooth as well. The figures can also be associated with other figures (from the\n\nsame manufacturer) and interact with each other for an enhanced play experience.\n\nWhen a child asks the toy a question, the request is sent to the cloud for analysis, and the answer is\n\ngenerated on cloud servers and sent back to the figure. The answer is given through the figure’s integrated\nspeakers, making it appear as though that the toy is actually responding to the child’s question. The\n\npackaging of the toy does not provide technical details on how this works, nor does it mention that this\n\nfeature requires an internet connection. The necessary data processing for this has been outsourced to a\ndata center located in South Africa. However, your company has not yet revised its consumer-facing\nprivacy policy to indicate this.\n\nIn parallel, the company is planning to introduce a new range of game systems through which consumers\ncan play the characters they acquire in the course of playing the game. The system will come bundled with\na portal that includes a Near-Field Communications (NFC) reader. This device will read an RFID tag in the\naction figure, making the figure come to life onscreen. Each character has its own stock features and\nabilities, but it is also possible to earn additional ones by accomplishing game goals. The only information\nstored in the tag relates to the figures’ abilities. It is easy to switch characters during the game, and it is\npossible to bring the figure to locations outside of the home and have the character’s abilities remain\nintact.\n\nIn light of the requirements of Article 32 of the GDPR (related to the Security of Processing), which practice\nshould the company institute?","o":"A. Encrypt the data in transit over the wireless Bluetooth connection.\nB. Include dual-factor authentication before each use by a child in order to ensure a minimum amount of\nsecurity.\nC. Include three-factor authentication before each use by a child in order to ensure the best level of\nsecurity possible.\nD. Insert contractual clauses into the contract between the toy manufacturer and the cloud service\nprovider, since South Africa is outside the European Union.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 32 条安全处理要求中明确将加密列为适当技术措施的示例（第 32(1)(a)条）。鉴于玩具\n通过蓝牙与移动设备通信，且任意 10 米内设备均可连接，存在被截获的风险，对传输中的数据加密是最\n直接对应的安全措施。双因素/三因素认证（B、C）对儿童玩具场景并不现实也非第 32 条例举措施，标\n准合同条款（D）解决的是第五章跨境传输合法性问题，与第 32 条安全要求无关。知识点：第 32 条处理\n安全的技术与组织措施示例。","t":"GDPR"},{"n":19,"q":"Which of the following would most likely NOT be covered by the definition of “personal data” under the\nGDPR?","o":"A. The payment card number of a Dutch citizen\nB. The U.S. social security number of an American citizen living in France\nC. The unlinked aggregated data used for statistical purposes by an Italian company\nD. The identification number of a German candidate for a professional examination in Germany","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。经过匿名化处理、用于统计目的且无法关联回具体个人的“非关联聚合数据”不构成 GDPR\n项下的个人数据（参见前言第 26 条判断标准）。A、B、D 虽然分别涉及非欧盟公民或专业考试编号，但\n只要能够识别或关联到特定自然人，无论国籍或数据主体地理位置如何，都属于个人数据——GDPR 对\n“个人数据”的定义并不以数据主体的国籍为前提条件。知识点：个人数据定义的属地/属人范围与匿名化\n数据的排除。","t":"GDPR"},{"n":20,"q":"Which of the following would MOST likely trigger the extraterritorial effect of the GDPR, as specified by\nArticle 3?","o":"A. The behavior of suspected terrorists being monitored by EU law enforcement bodies.\nB. Personal data of EU citizens being processed by a controller or processor based outside the EU.\nC. The behavior of EU citizens outside the EU being monitored by non-EU law enforcement bodies.\nD. Personal data of EU residents being processed by a non-EU business that targets EU customers.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 3(2)条域外效力包含两类触发情形：(a)向欧盟数据主体提供商品或服务，(b)监测欧盟境\n内数据主体的行为。非欧盟企业主动以营销等方式定向欧盟客户即落入(a)项。B 表述过于宽泛——单纯\n“数据在欧盟境外被处理”并不必然触发第 3(2)条，还需存在“指向欧盟”的定向行为；A、C 涉及执法机构\n的监控活动，通常由《执法指令》（Law Enforcement Directive）而非 GDPR 调整。知识点：第 3 条域外\n适用性的两种触发路径（目标指向标准与行为监测标准）。","t":"LED执法指令"},{"n":21,"q":"How does the GDPR now define “processing”?","o":"A. Any act involving the collecting and recording of personal data.\nB. Any operation or set of operations performed on personal data or on sets of personal data.\nC. Any use or disclosure of personal data compatible with the purpose for which the data was collected.\nD. Any operation or set of operations performed by automated means on personal data or on sets of\npersonal data.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。GDPR 第 4(2)条将“处理”定义为对个人数据或个人数据集所进行的任何操作或一系列操作\n（无论是否自动化），涵盖收集、记录、组织、存储、使用、披露、删除等各环节。A（仅收集记录）范\n围过窄；C 混淆了“兼容处理”概念；D 遗漏了对“非自动化但构成档案系统”处理方式的涵盖（旧指令\n95/46/EC 才强调自动化处理，GDPR 的定义更广）。知识点：第 4(2)条“处理”的定义。","t":"历史沿革/95-46-EC"},{"n":22,"q":"What is the consequence if a processor makes an independent decision regarding the purposes and\nmeans of processing it carries out on behalf of a controller?","o":"A. The controller will be liable to pay an administrative fine\nB. The processor will be liable to pay compensation to affected data subjects\nC. The processor will be considered to be a controller in respect of the processing concerned\nD. The controller will be required to demonstrate that the unauthorized processing negatively affected one\nor more of the parties involved","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。根据第 28 条及问责制原则，处理者一旦超出控制者指示、自行决定处理的目的和方式，就\n在该部分处理活动中被视为（事实上的）控制者，须独立承担控制者的合规义务和责任。A、B、D 均描\n述 了 可 能 的 后 果 ， 但 并 非 GDPR 明 确 规 定 的 直 接 法 律 定 性 结 果 。 知 识 点 ： 处 理 者 转 变 为 控 制 者\n（“controller in disguise”）的认定标准，第 28 条委托处理协议。","t":"GDPR"},{"n":23,"q":"According to the GDPR, how is pseudonymous personal data defined?","o":"A. Data that can no longer be attributed to a specific data subject without the use of additional information\nkept separately.\nB. Data that can no longer be attributed to a specific data subject, with no possibility of re-identifying the\ndata.\nC. Data that has been rendered anonymous in such a manner that the data subject is no longer\nidentifiable.\nD. Data that has been encrypted or is subject to other technical safeguards.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 4(5)条对“假名化”的定义是：个人数据在不借助另外保存的补充信息的情况下，不能再归\n属于特定数据主体，且该补充信息须单独保存并采取技术组织措施确保不能被重新关联。B、C 描述的其\n实是“匿名化”（不可再识别、无法复原），D 仅是加密等技术保护措施的泛泛描述，并非假名化的法定定\n义。知识点：假名化与匿名化的法律定义区别（第 4(5)条、前言第 26、29 条）。","t":"GDPR"},{"n":24,"q":"Under which of the following conditions does the General Data Protection Regulation NOT apply to the\nprocessing of personal data?","o":"A. When the personal data is processed only in non-electronic form\nB. When the personal data is collected and then pseudonymised by the controller\n\nC. When the personal data is held by the controller but not processed for further purposes\n\nD. When the personal data is processed by an individual only for their household activities","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 2(2)(c)条明确将“自然人纯粹为个人或家庭事务从事的处理活动”排除在 GDPR 适用范围\n之外（家庭例外，household exemption）。A（非电子形式处理）只要构成档案系统仍受 GDPR 约束；B\n（假名化后的数据）依然是个人数据；C（收集后未进一步处理）本身也已构成“处理”的一环（收集本身\n即为处理行为），并不能因此豁免。知识点：第 2 条 GDPR 适用范围的例外情形——家庭活动豁免。","t":"GDPR"},{"n":25,"q":"According to the E-Commerce Directive 2000/31/EC, where is the place of “establishment” for a company\nproviding services via an Internet website confirmed by the GDPR?","o":"A. Where the technology supporting the website is located\nB. Where the website is accessed\nC. Where the decisions about processing are made\n\nD. Where the customer’s Internet service provider is located","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 是四项中最接近的选项，但“设立地”取决于通过稳定安排开展真实、有效活动的地点，不能机械地等同于某\n一次数据处理决策的作出地。服务器位置、网站访问地或客户 ISP 所在地通常都不是决定性因素。","t":"GDPR"},{"n":26,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLouis, a long-time customer of Bedrock Insurance, was involved in a minor car accident a few months ago.\nAlthough no one was hurt, Louis has been plagued by texts and calls from a company called Accidentable\noffering to help him recover compensation for personal injury. Louis has heard about insurance companies\nselling customers’ data to third parties, and he’s convinced that Accidentable must have gotten his\n\ninformation from Bedrock Insurance.\n\nLouis has also been receiving an increased amount of marketing information from Bedrock, trying to sell\nhim their full range of their insurance policies.\n\nPerturbed by this, Louis has started looking at price comparison sites on the internet and has been\nshocked to find that other insurers offer much cheaper rates than Bedrock, even though he has been a\nloyal customer for many years. When his Bedrock policy comes up for renewal, he decides to switch to\nZantrum Insurance.\n\nIn order to activate his new insurance policy, Louis needs to supply Zantrum with information about his No\nClaims bonus, his vehicle and his driving history. After researching his rights under the GDPR, he writes to\nask Bedrock to transfer his information directly to Zantrum. He also takes this opportunity to ask Bedrock\nto stop using his personal data for marketing purposes.\n\nBedrock supplies Louis with a PDF and XML (Extensible Markup Language) versions of his No Claims\nCertificate, but tells Louis it cannot transfer his data directly to Zantrum as this is not technically feasible.\nBedrock also explains that Louis’s contract included a provision whereby Louis agreed that his data could\nbe used for marketing purposes; according to Bedrock, it is too late for Louis to change his mind about\nthis. It angers Louis when he recalls the wording of the contract, which was filled with legal jargon and very\nconfusing.\n\nIn the meantime, Louis is still receiving unwanted calls from Accidentable Insurance. He writes to\nAccidentable to ask for the name of the organization that supplied his details to them. He warns\nAccidentable that he plans to complain to the data protection authority, because he thinks their company\nhas been using his data unlawfully. His letter states that he does not want his data being used by them in\nany way.\n\nAccidentable’s response letter confirms Louis’s suspicions. Accidentable is Bedrock Insurance’s wholly\n\nowned subsidiary, and they received information about Louis’s accident from Bedrock shortly after Louis\n\nsubmitted his accident claim. Accidentable assures Louis that there has been no breach of the GDPR, as\nLouis’s contract included, a provision in which he agreed to share his information with Bedrock’s affiliates\n\nfor business purposes.\n\nLouis is disgusted by the way in which he has been treated by Bedrock, and writes to them insisting that all\n\nhis information be erased from their computer system. 6\nWhich statement accurately summarizes Bedrock’s obligation in regard to Louis’s data portability request?","o":"A. Bedrock does not have a duty to transfer Louis’s data to Zantrum if doing so is legitimately not\ntechnically feasible.\nB. Bedrock does not have to transfer Louis’s data to Zantrum because the right to data portability does\nnot apply where personal data are processed in order to carry out tasks in the public interest.\nC. Bedrock has failed to comply with the duty to transfer Louis’s data to Zantrum because the duty applies\nwherever personal data are processed by automated means and necessary for the performance of a\ncontract with the customer.\nD. Bedrock has failed to comply with the duty to transfer Louis’s data to Zantrum because it has an\nobligation to develop commonly used, machine-readable and interoperable formats so that all customer\ndata can be ported to other insurers on request.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。数据可携权（第 20 条）仅要求控制者以结构化、常用、机器可读格式提供数据，并在“技术\n上可行”的情况下实现控制者之间的直接传输；若直接传输在技术上确实不可行，Bedrock 没有强制实现\n直接传输的义务（已提供 PDF/XML 格式部分履行了可携权）。B 错——可携权的例外是处理基于公共利\n益任务或官方权力，而非本案的合同/同意基础；C 表述过于绝对，混淆了“提供数据”与“直接传输给另一\n控制者”两个层次的义务；D 并无要求控制者须为全行业开发统一互操作格式的强制性法律义务。知识\n点：第 20 条数据可携权的范围及“技术可行性”限制。","t":"GDPR"},{"n":27,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLouis, a long-time customer of Bedrock Insurance, was involved in a minor car accident a few months ago.\nAlthough no one was hurt, Louis has been plagued by texts and calls from a company called Accidentable\n\noffering to help him recover compensation for personal injury. Louis has heard about insurance companies\nselling customers’ data to third parties, and he’s convinced that Accidentable must have gotten his\ninformation from Bedrock Insurance.\n\nLouis has also been receiving an increased amount of marketing information from Bedrock, trying to sell\nhim their full range of their insurance policies.\n\nPerturbed by this, Louis has started looking at price comparison sites on the internet and has been\n\nshocked to find that other insurers offer much cheaper rates than Bedrock, even though he has been a\nloyal customer for many years. When his Bedrock policy comes up for renewal, he decides to switch to\nZantrum Insurance.\n\nIn order to activate his new insurance policy, Louis needs to supply Zantrum with information about his No\nClaims bonus, his vehicle and his driving history. After researching his rights under the GDPR, he writes to\nask Bedrock to transfer his information directly to Zantrum. He also takes this opportunity to ask Bedrock\nto stop using his personal data for marketing purposes.\n\nBedrock supplies Louis with a PDF and XML (Extensible Markup Language) versions of his No Claims\nCertificate, but tells Louis it cannot transfer his data directly to Zantrum as this is not technically feasible.\nBedrock also explains that Louis’s contract included a provision whereby Louis agreed that his data could\nbe used for marketing purposes; according to Bedrock, it is too late for Louis to change his mind about\nthis. It angers Louis when he recalls the wording of the contract, which was filled with legal jargon and very\nconfusing.\n\nIn the meantime, Louis is still receiving unwanted calls from Accidentable Insurance. He writes to\nAccidentable to ask for the name of the organization that supplied his details to them. He warns\nAccidentable that he plans to complain to the data protection authority, because he thinks their company\nhas been using his data unlawfully. His letter states that he does not want his data being used by them in\nany way.\n\nAccidentable’s response letter confirms Louis’s suspicions. Accidentable is Bedrock Insurance’s wholly\nowned subsidiary, and they received information about Louis’s accident from Bedrock shortly after Louis\n\nsubmitted his accident claim. Accidentable assures Louis that there has been no breach of the GDPR, as\nLouis’s contract included, a provision in which he agreed to share his information with Bedrock’s affiliates\nfor business purposes.\n\nLouis is disgusted by the way in which he has been treated by Bedrock, and writes to them insisting that all\nhis information be erased from their computer system.\n\nAfter Louis has exercised his right to restrict the use of his data, under what conditions would Accidentable\nhave grounds for refusing to comply?","o":"A. If Accidentable is entitled to use of the data as an affiliate of Bedrock.\nB. If Accidentable also uses the data to conduct public health research.\nC. If the data becomes necessary to defend Accidentable’s legal rights.\nD. If the accuracy of the data is not an aspect that Louis is disputing.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 18 条限制处理权及第 17 条被遗忘权的例外情形之一是：处理是为了行使或抗辩法律权利\n主张（establishment, exercise or defence of legal claims）所必需。因此若数据对 Accidentable 抗辩自身法律\n权利属必要，可以拒绝停止使用该数据。A（关联公司身份）本身不构成拒绝理由，作为 Bedrock 子公司\n仍须独立遵守 GDPR；B（公共卫生研究）与本案无关；D 与限制处理权的触发条件（数据准确性存疑）\n是另一独立情形，与“能否拒绝”无关。知识点：第 17-18 条被遗忘权/限制处理权的法定例外——法律主\n张的确立、行使或抗辩。","t":"GDPR"},{"n":28,"q":"Under the GDPR, who would be LEAST likely to be allowed to engage in the collection, use, and\ndisclosure of a data subject’s sensitive medical information without the data subject’s knowledge or\nconsent?","o":"A. A member of the judiciary involved in adjudicating a legal dispute involving the data subject and\nconcerning the health of the data subject.\nB. A public authority responsible for public health, where the sharing of such information is considered\nnecessary for the protection of the general populace.\n\nC. A health professional involved in the medical care for the data subject, where the data subject’s life\nhinges on the timely dissemination of such information.\nD. A journalist writing an article relating to the medical condition in question, who believes that the\npublication of such information is in the public interest.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 9(2)条列举了处理特殊类别数据（如健康数据）无需同意即可处理的法定情形：司法程序\n中确立、行使或抗辩法律权利（A）、公共卫生领域重大公共利益（B）、维护数据主体或他人生命攸关\n利益的医疗紧急情况（C）等均在列。而记者基于“公共利益”自行发表他人医疗状况报道，须依赖单独的\n新闻自由/表达自由例外条款（第 85 条，由各成员国国内法具体落实且通常仍须满足严格比例原则），并\n非当然可未经同意披露，因此 D 是最不可能被允许、限制最严的情形。知识点：第 9 条特殊类别数据处\n理的法定例外情形，第 85 条新闻自由与数据保护的平衡。","t":"GDPR"},{"n":29,"q":"With the issue of consent, the GDPR allows member states some choice regarding what?","o":"A. The mechanisms through which consent may be communicated\nB. The circumstances in which silence or inactivity may constitute consent\nC. The age at which children must be required to obtain parental consent\nD. The timeframe in which data subjects are allowed to withdraw their consent","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。GDPR 在多处保留“开放条款”（opening clause）允许成员国自行立法补充，其中关于儿童同\n意年龄（第 8 条，13-16 岁区间由各成员国自行确定）是典型例子。同意的沟通方式、默示同意的可能性\n（GDPR 明确排除沉默/不作为构成同意）以及撤回同意的时限，均由 GDPR 统一规定，不留给成员国自\n由裁量空间。知识点：GDPR 中的成员国“开放条款”（Opening Clauses），儿童同意年龄的弹性规定（第\n8 条）。","t":"GDPR"},{"n":30,"q":"Which sentence BEST summarizes the concepts of “fairness,” “lawfulness” and “transparency”, as\n\nexpressly required by Article 5 of the GDPR?","o":"A. Fairness and transparency refer to the communication of key information before collecting data;\n\nlawfulness refers to compliance with government regulations.\n\nB. Fairness refers to limiting the amount of data collected from individuals; lawfulness refers to the\n\napproval of company guidelines by the state; transparency solely relates to communication of key\ninformation before collecting data.\n\nC. Fairness refers to the security of personal data; lawfulness and transparency refers to the analysis of\nordinances to ensure they are uniformly enforced.\nD. Fairness refers to the collection of data from diverse subjects; lawfulness refers to the need for legal\nrules to be uniform; transparency refers to giving individuals access to their data.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 5(1)(a)条“合法、公正、透明”原则中，“公正”和“透明”共同要求控制者在收集数据前以清\n晰易懂的方式向数据主体传达关键处理信息（呼应第 12-14 条透明度义务），“合法”则指处理须具备第 6\n条规定的合法依据并符合适用法律法规。B、C、D 均对三个概念作出了错误或过窄的解读（如将公正等\n同于“限制收集量”，将合法等同于“国家批准公司准则”等）。知识点：第 5(1)(a)条合法、公正、透明原则\n的内涵区分。","t":"GDPR"},{"n":31,"q":"Article 5(1)(b) of the GDPR states that personal data must be “collected for specified, explicit and\nlegitimate purposes and not further processed in a way incompatible with those purposes.” Based on\nArticle 5(1)(b), what is the impact of a member state’s interpretation of the word “incompatible”?","o":"A. It dictates the level of security a processor must follow when using and storing personal data for two\ndifferent purposes.\nB. It guides the courts on the severity of the consequences for those who are convicted of the intentional\nmisuse of personal data.\nC. It sets the standard for the level of detail a controller must record when documenting the purpose for\ncollecting personal data.\nD. It indicates the degree of flexibility a controller has in using personal data in ways that may vary from its\noriginal intended purpose.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。“不兼容”（incompatible）的判断标准直接决定了控制者能在多大程度上将已收集数据用于\n原始目的之外的用途（即目的限制原则下“兼容处理”的弹性空间），第 6(4)条列出了判断兼容性需考量的\n因素（如原始与新目的的关联性、收集情境、数据性质、可能后果、是否有保障措施等）。A、B、C 分\n别涉及安全标准、量刑、记录细节要求，均非“不兼容”概念本身所规范的内容。知识点：第 5(1)(b)目的\n限制原则与第 6(4)条兼容性处理测试。","t":"GDPR"},{"n":32,"q":"Tanya is the Data Protection Officer for Curtains Inc., a GDPR data controller. She has recommended that\nthe company encrypt all personal data at rest. Which GDPR principle is she following?","o":"A. Accuracy\nB. Storage Limitation\nC. Integrity and confidentiality\nD. Lawfulness, fairness and transparency","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。对静态存储数据加密属于保护数据机密性和完整性、防止未经授权访问或篡改的技术措\n施，直接对应第 5(1)(f)条“完整性与保密性”原则（同时也呼应第 32 条安全处理要求）。准确性原则针对\n数据正确与否，存储限制原则针对保留期限，合法公正透明原则针对处理依据与告知义务，均与加密静\n态数据的目的不符。知识点：第 5(1)(f)条完整性与保密性原则（安全原则）。","t":"GDPR"},{"n":33,"q":"A well-known video production company, based in Spain but specializing in documentaries filmed\nworldwide, has just finished recording several hours of footage featuring senior citizens in the streets of\nMadrid. Under what condition would the company NOT be required to obtain the consent of everyone\nwhose image they use for their documentary?","o":"A. If obtaining consent is deemed to involve disproportionate effort.\n\nB. If obtaining consent is deemed voluntary by local legislation.\n\nC. If the company limits the footage to data subjects solely of legal age.\n\nD. If the company’s status as a documentary provider allows it to claim legitimate interest.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。在街头拍摄纪录片这类新闻/文艺创作活动中，制作公司可依据第 6(1)(f)条“合法利益”作为\n处理依据（尤其结合第 85 条对新闻/艺术/文学表达的特别平衡条款），从而在特定情况下无需逐一取得\n路人同意。A（获得同意成本过高）本身不是 GDPR 列明的独立合法依据；B（当地法律认定同意为自\n愿）表述含混，不构成豁免理由；C（仅限拍摄成年人）与是否需要同意无直接因果关系。知识点：第\n6(1)(f)条合法利益作为处理依据，第 85 条表达自由与数据保护的平衡。","t":"GDPR"},{"n":34,"q":"A Spanish electricity customer calls her local supplier with questions about the company’s upcoming\nmerger. Specifically, the customer wants to know the recipients to whom her personal data will be\ndisclosed once the merger is final. According to Article 13 of the GDPR, what must the company do before\nproviding the customer with the requested information?","o":"A. Verify that the request is applicable to the data collected before the GDPR entered into force.\nB. Verify that the purpose of the request from the customer is in line with the GDPR.\nC. Verify that the personal data has not already been sent to the customer.\nD. Verify that the identity of the customer can be proven by other means.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 只能在控制者对请求人身份存在合理怀疑时适用。GDPR 第 12(6) 条允许此时要求额外信息核实身份，但并\n不要求控制者在每一次信息请求前都进行额外身份验证。","t":"GDPR"},{"n":35,"q":"Under the GDPR, where personal data is not obtained directly from the data subject, a controller is exempt\nfrom directly providing information about processing to the data subject if?","o":"A. The data subject already has information regarding how his data will be used\n\nB. The provision of such information to the data subject would be too problematic\nC. Third-party data would be disclosed by providing such information to the data subject\nD. The processing of the data subject’s data is protected by appropriate technical measures","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 14(5)(a)条规定，若数据主体已经掌握相关处理信息，控制者无需就非直接从数据主体处\n获取的数据重复履行第 14 条告知义务。B（告知过于麻烦）、C（涉及第三方信息）、D（已采取技术保\n护措施）均不是第 14(5)条列明的豁免情形（第 14(5)条实际的其他例外包括：告知不可能或需付出不成比\n例的努力、法律明确规定获取或披露、数据须保密等，但“麻烦”或“已加密”本身不构成独立豁免理由）。\n知识点：第 14(5)条间接获取数据时告知义务的例外情形。","t":"GDPR"},{"n":36,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nDue to rapidly expanding workforce, Company A has decided to outsource its payroll function to Company\nB. Company B is an established payroll service provider with a sizable client base and a solid reputation in\nthe industry.\n\nCompany B’s payroll solution for Company A relies on the collection of time and attendance data obtained\nvia a biometric entry system installed in each of Company A’s factories. Company B won’t hold any\nbiometric data itself, but the related data will be uploaded to Company B’s UK servers and used to provide\nthe payroll service. Company B’s live systems will contain the following information for each of Company\nA’s employees:\n Name\n Address\n Date of Birth\n Payroll number\n\nNational Insurance number\nSick pay entitlement\n\nMaternity/paternity pay entitlement\n\nHoliday entitlement\nPension and benefits contributions\n\nTrade union contributions\n\nJenny is the compliance officer at Company A. She first considers whether Company A needs to carry out\na data protection impact assessment in relation to the new time and attendance system, but isn’t sure\nwhether or not this is required.\n\nJenny does know, however, that under the GDPR there must be a formal written agreement requiring\nCompany B to use the time and attendance data only for the purpose of providing the payroll service, and\nto apply appropriate technical and organizational security measures for safeguarding the data. Jenny\nsuggests that Company B obtain advice from its data protection officer. The company doesn’t have a DPO\nbut agrees, in the interest of finalizing the contract, to sign up for the provisions in full. Company A enters\ninto the contract.\n\nWeeks later, while still under contract with Company A, Company B embarks upon a separate project\nmeant to enhance the functionality of its payroll service, and engages Company C to help. Company C\nagrees to extract all personal data from Company B’s live systems in order to create a new database for\nCompany B. This database will be stored in a test environment hosted on Company C’s U.S. server. The\ntwo companies agree not to include any data processing provisions in their services agreement, as data is\nonly being used for IT testing purposes.\n\nUnfortunately, Company C’s U.S. server is only protected by an outdated IT security system, and suffers a\ncyber security incident soon after Company C begins work on the project. As a result, data relating to\nCompany A’s employees is visible to anyone visiting Company C’s website. Company A is unaware of this\nuntil Jenny receives a letter from the supervisory authority in connection with the investigation that ensues.\nAs soon as Jenny is made aware of the breach, she notifies all affected employees.\n\nUnder the GDPR, which of Company B’s actions would NOT be likely to trigger a potential enforcement\naction?","o":"A. Their omission of data protection provisions in their contract with Company C.\n\nB. Their failure to provide sufficient security safeguards to Company A’s data.\nC. Their engagement of Company C to improve their payroll service.\nD. Their decision to operate without a data protection officer.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。企业将业务外包给第三方（Company C）以提升服务功能本身是正常商业行为，并不违反\nGDPR；真正触发执法风险的是随之而来的合规缺失：未签订数据处理协议（A，违反第 28 条书面协议要\n求）、未提供充分安全保障导致数据泄露（B，违反第 28/32 条）、未设立 DPO（D，若符合第 37 条强制\n设 DPO 情形则构成违规）。知识点：第 28 条委托处理协议的强制要素，合规行为与违规诱因的区分。","t":"GDPR"},{"n":37,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nDue to rapidly expanding workforce, Company A has decided to outsource its payroll function to Company\nB. Company B is an established payroll service provider with a sizable client base and a solid reputation in\nthe industry.\n\nCompany B’s payroll solution for Company A relies on the collection of time and attendance data obtained\nvia a biometric entry system installed in each of Company A’s factories. Company B won’t hold any\nbiometric data itself, but the related data will be uploaded to Company B’s UK servers and used to provide\nthe payroll service. Company B’s live systems will contain the following information for each of Company\nA’s employees:\n Name\n Address\n Date of Birth\n Payroll number\n\nNational Insurance number\nSick pay entitlement\n\nMaternity/paternity pay entitlement\n\nHoliday entitlement\nPension and benefits contributions\n\nTrade union contributions\n\nJenny is the compliance officer at Company A. She first considers whether Company A needs to carry out\na data protection impact assessment in relation to the new time and attendance system, but isn’t sure\nwhether or not this is required.\n\nJenny does know, however, that under the GDPR there must be a formal written agreement requiring\nCompany B to use the time and attendance data only for the purpose of providing the payroll service, and\nto apply appropriate technical and organizational security measures for safeguarding the data. Jenny\nsuggests that Company B obtain advice from its data protection officer. The company doesn’t have a DPO\nbut agrees, in the interest of finalizing the contract, to sign up for the provisions in full. Company A enters\ninto the contract.\n\nWeeks later, while still under contract with Company A, Company B embarks upon a separate project\nmeant to enhance the functionality of its payroll service, and engages Company C to help. Company C\nagrees to extract all personal data from Company B’s live systems in order to create a new database for\nCompany B. This database will be stored in a test environment hosted on Company C’s U.S. server. The\ntwo companies agree not to include any data processing provisions in their services agreement, as data is\nonly being used for IT testing purposes.\n\nUnfortunately, Company C’s U.S. server is only protected by an outdated IT security system, and suffers a\ncyber security incident soon after Company C begins work on the project. As a result, data relating to\nCompany A’s employees is visible to anyone visiting Company C’s website. Company A is unaware of this\nuntil Jenny receives a letter from the supervisory authority in connection with the investigation that ensues.\n\nAs soon as Jenny is made aware of the breach, she notifies all affected employees.\n\nThe GDPR requires sufficient guarantees of a company’s ability to implement adequate technical and\norganizational measures. What would be the most realistic way that Company B could have fulfilled this\nrequirement?","o":"A. Hiring companies whose measures are consistent with recommendations of accrediting bodies.\nB. Requesting advice and technical support from Company A’s IT team.\nC. Avoiding the use of another company’s data to improve their own services.\nD. Vetting companies’ measures with the appropriate supervisory authority.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。为确保次级处理者（Company C）具备充分技术组织措施保障能力，Company B 切实可行的\n做法是选用其安全措施符合认证机构/行业公认标准（如 ISO27001 等认可框架）的合作方，这也呼应第\n28(1)条要求控制者/处理者只能委托“能够提供充分保证”的处理者。B（向委托方 IT 团队求助）、C（完\n全避免使用他人数据改进服务，不现实）、D（要求监管机构逐一审核厂商，监管机构并不提供此类逐案\n审查服务）均不现实或不准确。知识点：第 28 条委托处理者选任的尽职调查义务及“充分保证”标准。","t":"GDPR"},{"n":38,"q":"In 2016’s Guidance, the United Kingdom’s Information Commissioner’s Office (ICO) reaffirmed the\nimportance of using a “layered notice” to provide data subjects with what?","o":"A. A privacy notice containing brief information whilst offering access to further detail.\nB. A privacy notice explaining the consequences for opting out of the use of cookies on a website.\nC. An explanation of the security measures used when personal data is transferred to a third party.\nD. An efficient means of providing written consent in member states where they are required to do so.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。英国 ICO 在其 2016 年指引中提倡使用“分层告知”（layered notice），即先以简明方式呈现\n关键信息，再提供链接/入口供数据主体查阅更详细的隐私政策内容，以平衡透明度与可读性。B、C、D\n均是对分层告知目的的错误延伸（分别限定于 cookie 退出说明、第三方传输安全说明、书面同意机\n制），并非该指引的核心含义。知识点：透明度原则的实践方法——分层告知（Layered Notice），呼应\n第 12 条“简洁、透明、易懂”的告知方式要求。","t":"ePrivacy指令"},{"n":39,"q":"When collecting personal data in a European Union (EU) member state, what must a company do if it\ncollects personal data from a source other than the data subjects themselves?","o":"A. Inform the subjects about the collection\n\nB. Provide a public notice regarding the data 6\nC. Upgrade security to match that of the source\nD. Update the data within a reasonable tim
