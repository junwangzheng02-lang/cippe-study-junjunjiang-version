ivacy team noted in the transfer impact assessment that\nUpFinance implements several data protection measures including end-lo-end encryption, with encryption\nkeys held by the customer. Notably, UpFinance has not received any government requests in its 7 years of\nbusiness. Still, Jackie recommended that the contract require UpFinance to notify ProStorage if it receives\na government request for personal data UpFinance processes on its behalf prior to disclosing such data.\n\nWhat transfer mechanism should Jackie recommend for using InstaHR?","o":"A. Adequacy.\nB. Binding corporate rules.\nC. Explicit consent of employees.\nD. Standard contractual clauses.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。InstaHR 位于澳大利亚（未获欧盟充分性认定的第三国），Jackie 为其完成了跨境传输影响\n评估（TIA），最贴切的传输合法化机制是标准合同条款（SCCs），无需专为单一供应商制定 BCRs\n（B，通常用于集团内部）、充分性认定（A，澳大利亚未获欧盟充分性认定）或依赖同意（C，同意作\n为跨境传输机制通常仅作为补充/最后手段，不适合大规模常态化的供应商数据传输）。知识点：向未获\n充分性认定的第三国供应商传输数据时标准合同条款（SCCs）的适用。","t":"GDPR"},{"n":262,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nProStorage is a multinational cloud storage provider headquartered in the Netherlands. Its CEO, Ruth\n\nBrown, has developed a two-pronged strategy for growth: 1) expand ProStorage's global customer base\nand 2) increase ProStorage's sales force by efficiently onboarding effective teams. Enacting this strategy\n\nhas recently been complicated by Ruth's health condition, which has limited her working hours, as well as\n\nher ability to travel to meet potential customers. ProStorage's Human Resources department and Ruth's\n\nChief of Staff now work together to manage her schedule and ensure that she is able to make all her\nmedical appointments. The latter has become especially crucial after Ruth's last trip to India, where she\nsuffered a medical emergency and was hospitalized in New Delhi. Unable to reach Ruth's family, the\nhospital reached out to ProStorage and was able to connect with her Chief of Staff, who in coordination\nwith Mary, the head of HR, provided information to the doctors based on accommodation requests Ruth\nmade when she started at ProStorage.\n\nIn support of Ruth's strategic goals of hiring more sales representatives, the Human Resources team is\nfocused on improving its processes to ensure that new employees are sourced, interviewed, hired, and on\nboarded efficiently. To help with this, Mary identified two vendors, HRYourWay, a German based\ncompany, and InstaHR, an Australian based company. She decided to have both vendors go through\nProStorage's vendor risk review process so she can work with Ruth to make the final decision. As part of\nthe review process, Jackie, who is responsible for maintaining ProStorage's privacy program (including\nmaintaining controller BCRs and conducting vendor risk assessments), reviewed both vendors but\ncompleted a transfer impact assessment only for InstaHR. After her review of both vendors, she\ndetermined that InstaHR satisfied more of the requirements as it boasted a more established privacy\nprogram and provided third-party attestations, whereas HRYourWay was a small vendor with minimal data\nprotection operations. Thus, she recommended InstaHR.\n\nProStorage's marketing team also worked to meet the strategic goals of the company by focusing on\nindustries where it needed to grow its market share. To help with this, the team selected as a partner\nUpFinance. a US based company with deep connections to financial industry customers. During\nProStorage's diligence process, Jackie from the privacy team noted in the transfer impact assessment that\nUpFinance implements several data protection measures including end-lo-end encryption, with encryption\nkeys held by the customer. Notably, UpFinance has not received any government requests in its 7 years of\nbusiness. Still, Jackie recommended that the contract require UpFinance to notify ProStorage if it receives\na government request for personal data UpFinance processes on its behalf prior to disclosing such data.\n\nWhy was Jackie correct in not completing a transfer impact assessment for HRYourWay?","o":"A. HRYourWay was ultimately not selected.\nB. HRYourWay is not located in a third country.\nC. ProStorage will obtain consent for all transfers.\nD. ProStorage can rely on its Binding Corporate Rules.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。HRYourWay 位于德国，属于欧盟成员国境内，数据从荷兰传输至德国属于欧盟内部数据流\n动，不涉及第三国跨境传输，因此无需开展跨境传输影响评估（TIA，该评估专门针对向第三国传输的合\n规审查）。A（是否最终被选用，与是否需要开展 TIA 的判断标准无关，TIA 应在选定前的尽职调查阶段\n考虑）、C（获取同意，非本案的判断依据）、D（依赖 BCRs，欧盟内部传输本身无需援引任何第三国\n传输机制）均不准确。知识点：跨境传输影响评估（TIA）仅适用于向欧盟/欧洲经济区外第三国的传\n输，欧盟内部传输不适用。","t":"GDPR"},{"n":263,"q":"According to the European Data Protection Board, data subjects should be made aware of any video\nsurveillance in operation. How should a retail shop operator ensure that data subjects receive all\ninformation required for such a purpose under EU data protection law?","o":"A. The shop operator should post a copy of the manual of the video surveillance system in the shop and\non its social media channels.\nB. The shop operator should provide full notice of the intended video surveillance outside the shop, for\nexample with a sign or a stand-up display.\nC. The shop operator should instruct the data protection officer to hand out a comprehensive notice to\ndata subjects every time they enter the shop.\nD. The shop operator should provide the most important information on a clearly readable warning sign to\ndata subjects before they enter the monitored area, and additional mandatory details by other means.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。EDPB 关于视频监控告知的建议采用“分层告知”思路：在进入监控区域前，以清晰易读的警\n示标志提供最核心的信息（如监控主体、目的等），并通过其他补充渠道（如详细隐私政策链接、张贴\n处所等）提供第 14 条要求的完整详细信息，而非仅张贴设备说明书（A）、仅依赖社交媒体发布（A）、\n要求 DPO 每次现场发放详细通知（C，不现实）或未提供任何现场提示而仅笼统告知（B，仅有笼统外部\n告示但未结合分层补充信息不够完整）。知识点：EDPB 关于 CCTV 监控告知的分层实践建议——现场简\n明标识+补充详细信息渠道。","t":"监管机构"},{"n":264,"q":"According to the GDPR, Article 4(14), biometric data is defined as:\n\n\"Personal data resulting from specific technical processing relating to the ___ characteristics of a natural\nperson.\"\n\nWhich term could NOT be placed in the above definition?","o":"A. Physiological.\nB. Physical.\nC. Intellectual.\nD. Behavioral.","a":"C","v":"accurate","vd":"准确","e":"正 确 答 案 C 。 第 4(14) 条 对 “ 生 物 识 别 数 据 ” 的 定 义 表 述 为 ： 源 于 特 定 技 术 处 理 、 与 自 然 人 的 “ 身 体\n（physical）、生理（physiological）或行为（behavioral）特征”相关、能够识别或确认该自然人身份的个\n人数据，并不包含“智力（intellectual）特征”这一表述，该词是干扰项，非定义原文用语。知识点：第\n4(14)条生物识别数据定义的准确措辞——身体、生理、行为三类特征，不含智力特征。","t":"GDPR"},{"n":265,"q":"Jerry, the Chief Marketing Officer for a sports apparel and trophy company, sells products to schools and\nathletic clubs globally. Recently the company has decided to invest in a new line of customized sports\nequipment. Jerry plans to email his current customer base to offer them a discount on their first purchase\nof such equipment.\n\nJerry tells Kate, the Director of Privacy, about his plan. What is the best guidance Kate can provide to\nJerry?","o":"A. Permit Jerry to carry out his plan on the basis of marketing similar products to existing customers.\nB. Require Jerry to send all current customers a second notice to allow them to opt-in to marketing\nemails.\nC. Permit Jerry to carry out his marketing plan on the basis of legitimate interest.\nD. Require Jerry to include an option to opt out of marketing emails in the future.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 是必须满足的条件，但并不足以单独使计划合法。软退出还要求联系方式在销售或销售磋商中取得、营销自\n身类似产品或服务，并在收集联系方式时就提供退出机会。","t":"GDPR"},{"n":266,"q":"A homeowner has installed a motion-detecting surveillance system that films his front door and entryway.\nThe camera does not film any public areas, only areas that are the property of the homeowner. The\nsystem has been declared to the authorities per the homeowner's country law, and a placard indicating the\narea is being video monitored is visible when entering the property.\n\nWhy can the homeowner NOT depend on the household exemption with regards to the processing of the\nvideo images recorded by the surveillance camera system?","o":"A. The surveillance camera system can potentially capture biometric information of the homeowner's\nfamily, which would be considered a processing of special categories of personal data.\nB. The homeowner has not specified which security measures are in place as part of the surveillance\ncamera system.\nC. The GDPR specifically excludes surveillance camera images from the household exemption.\nD. The surveillance camera system can potentially film individuals who enter its filming perimeter.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 2(2)(c)条家庭活动豁免仅适用于处理范围严格限于纯粹个人或家庭事务的情形；由于该\n监控摄像头对准的是自家前门和入口区域，客观上会拍摄到任何经过或到访该区域的公众（如邮递员、\n访客、路人），处理范围已超出纯粹私人家庭领域，涉及第三方（非家庭成员）的个人数据处理，因此\n不能完整援引家庭活动豁免（欧洲法院 Ryneš案确立的原则）。A（是否涉及生物识别特殊类别数据，非\n该豁免不适用的核心原因）、B（未说明具体安全措施，与豁免适用与否无关）、C（GDPR 并未“专门排\n除监控摄像头”，而是依据处理范围是否超出纯家庭活动来判断）均不准确。知识点：Ryneš案确立的家\n庭活动豁免例外——监控范围延伸至公共/第三方区域时不再适用该豁免。","t":"GDPR"},{"n":267,"q":"Which of the following elements does NOT need to be presented to a data subject in order to collect valid\nconsent for the use of cookies?","o":"A. A \"Cookies Settings\" button.\nB. A \"Reject All\" cookies button.\nC. A list of cookies that may be placed.\nD. Information on the purpose of the cookies.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 是最佳选项，因为法律不要求按钮必须使用特定名称。不过，有效同意要求拒绝与接受同样容易、目的清\n晰、选择未预勾选；是否必须展示逐项 cookie 名称取决于所提供信息是否足够具体，C 的绝对表述也可能引起争\n议。","t":"ePrivacy指令"},{"n":268,"q":"Since blockchain transactions are classified as pseudonymous, are they considered to be within the\nmaterial scope of the GDPR, or outside of it?","o":"A. Outside the material scope of the GDPR, because transactions do not include personal data about\ndata subjects in the European Union.\nB. Outside the material scope of the GDPR, because transactions are for personal or household\npurposes.\nC. Within the material scope of the GDPR to the extent that transactions include data subjects in the\nEuropean Union.\n\nD. Within the material scope of the GDPR but outside of the territorial scope, because blockchains are\ndecentralized.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。区块链交易记录中的信息（如公钥、交易哈希等）通常被视为假名化数据而非匿名化数\n据，因为在特定条件下仍存在将其与自然人关联的可能性；只要交易涉及欧盟数据主体，这些假名化数\n据仍构成 GDPR 意义上的“个人数据”，落入 GDPR 的实质适用范围（material scope），而非因交易性质\n本身（A，理由表述错误，问题的关键在于是否涉及欧盟数据主体而非交易本身）、个人/家庭用途（B，\n商业性质的区块链交易通常不属于家庭活动豁免范畴）或域外适用问题的混淆（D，去中心化技术架构本\n身不影响 GDPR 域外适用性判断，该判断仍取决于第 3 条标准）而被排除在外。知识点：假名化数据\n（含区块链交易记录）落入 GDPR 实质适用范围的判断标准。","t":"GDPR"},{"n":269,"q":"Following the United Kingdom's withdrawal from the European Union, what law do companies established\nin the UK and processing the personal data of people in the EU need to adhere to?","o":"A. The Privacy and Electronic Communications Regulations.\nB. The EU General Data Protection Regulation.\nC. The UK General Data Protection Regulation.\nD. The UK Data Protection Act.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 仅在英国公司满足 GDPR 第 3(2) 条，例如有意向欧盟境内个人提供商品或服务或监测其在欧盟境内的行为时\n成立。单纯“处理欧盟人士的数据”或数据主体具有欧盟国籍，并不足以触发域外适用。","t":"GDPR"},{"n":270,"q":"How can the relationship between the GDPR and the Digital Services Act, the Data Governance Act and\nthe Digital Markets Act most accurately be described?","o":"A. The aforementioned legal acts do not refer to (i.e., do not mention) the GDPR.\n\nB. The aforementioned legal acts apply without prejudice (i.e., in parallel) to the GDPR.\n\nC. The aforementioned legal acts change specific provisions (i.e., certain articles) of the GDPR.\n\nD. The aforementioned legal acts contain some sector-specific exemptions (i.e., only for certain\nbusinesses) from the GDPR.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。《数字服务法》（DSA）、《数据治理法》（DGA）及《数字市场法》（DMA）均在各自\n立法文本中明确声明“不影响”（without prejudice to）GDPR 的适用，即与 GDPR 并行适用、互为补充，\n而非取代或修改 GDPR 具体条款（C）、完全不提及 GDPR（A，实际上均有明确援引和协调条款）或包\n含针对特定行业的 GDPR 豁免（D，这些法律主要规范数字服务/数据治理/市场竞争等领域，未创设专门\n的 GDPR 适用豁免）。知识点：欧盟新兴数字立法（DSA、DGA、DMA）与 GDPR 的并行适用关系\n（without prejudice 条款）。","t":"GDPR"},{"n":271,"q":"All of the following will be established by the second Network and Information Security Directive (\"NIS2\")\nEXCEPT?","o":"A. Baseline cybersecurity measures that each covered entity must address.\nB. Powers to inspect, audit, or require information from covered organizations.\nC. A common controls framework that every organization must adopt.\nD. A new network for EU member states to cooperate on large-scale breaches.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。NIS2 指令要求受监管实体落实基线网络安全措施（A）、赋予监管机构检查审计权（B）、\n建立成员国间大规模安全事件协作网络（D，如 CSIRT 网络），但并未强制规定所有受监管组织必须采\n纳统一的“通用控制框架”——具体安全措施的选择和实施方式留有一定弹性空间，只需达到基线安全水平\n要求即可，而非强制套用单一标准化框架。知识点：NIS2 指令的核心要素（基线安全措施、检查权、成\n员国协作网络）及其未强制统一控制框架的弹性设计。","t":"GDPR"},{"n":272,"q":"According to the Personal Data Protection Commission’s (PDPC) “Guide to basic data anonymization\ntechniques,” recently adopted by the Spanish Data Protection Agency, which of the following is NOT a\nvalid basic anonymization technique?","o":"A. Swapping.\nB. Generalization.\nC. Data Adjustment.\nD. Attribute Suppression.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。西班牙数据保护局（AEPD）采纳的新加坡 PDPC《基本数据匿名化技术指南》中列举的基\n本匿名化技术包括：数据交换/置换（swapping，A）、泛化（generalization，B）、属性抑制（attribute\nsuppression，D）等，但并未将“数据调整”（Data Adjustment）列为该指南认可的具体技术术语——这是\n虚构或不准确的干扰选项，非该指南中的标准技术名称。知识点：PDPC 匿名化技术指南列举的基本技术\n清单（交换、泛化、属性抑制等）。","t":"GDPR"},{"n":273,"q":"In the EDPB’s Guidelines 4/2019 on Article 25 Data Protection by Design and by Default, all of the\nfollowing practices follow from the principles relating to the processing of personal data under EU data\nprotection law EXCEPT?","o":"A. Data ownership allocation.\nB. Access control management.\nC. Frequent pseudonymization key rotation.\nD. Error propagation avoidance along the processing chain.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。（与 Q205 同一知识点）EDPB《4/2019 号指南》（第 25 条设计与默认阶段隐私保护）中体\n现数据保护原则的实践包括访问控制管理（B）、假名化密钥定期轮换（C）、避免处理链条中的错误传\n播（D）等具体技术组织措施，但并未涉及“数据所有权分配”这一概念——欧盟数据保护法框架下不采用\n“数据所有权”这一表述，而是以控制者/处理者角色及数据主体权利体系为核心。知识点：EDPB 指南\n4/2019（第 25 条设计默认隐私）不涉及“数据所有权”概念。","t":"监管机构"},{"n":274,"q":"According to the European Data Protection Board, controllers responding to a data subject access request\ncan refuse to provide a copy of personal data under certain conditions. Which of the following is NOT one\n\nof these conditions?","o":"A. If the data subject access request was sent to an employee that is not involved in the processing of\nsuch requests.\nB. If there is such a large amount of data that the controller cannot identify the data subject of the request.\nC. If the controller is unable to use end-to-end encrypted emails for responding to such requests.\nD. If the personal data was processed in the past but is no longer at the controller’s disposal at the time of\nthe request.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 最明确：不能使用端到端加密邮件不构成拒绝访问权的理由，控制者应提供其他安全交付方式。A、B、D 均\n需结合事实：请求发送至非专门人员通常仍应内部转交；无法识别时应先允许补充信息；数据已不再持有则应如实\n说明，而非任意拒绝。","t":"GDPR"},{"n":275,"q":"A high-ranking employee has his laptop bag stolen in a train station. In addition to the laptop, the bag\ncontained the employee’s ID card, confidential company documents (such as financial information and\nminutes of board meetings, including participants and their roles), company payment cards, and\nauthorization tokens.\n\nAs the company's Data Protection Officer, what should be your first action?","o":"A. Inform the appropriate supervisory authority of the breach.\nB. Verify whether the laptop contained personal data and, if so, if it was encrypted.\nC. Inform the meeting participants of the breach and provide them with next steps to be taken.\nD. Request deactivation of the authorization tokens to avoid access to company data, and remotely wipe\nthe laptop.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 可视为 DPO 的首要合规评估步骤，但安全团队应同时立即采取 D 所述的遏制措施，例如停用令牌和远程擦\n除。事件响应中的风险核实与技术遏制通常应并行，而非严格串行。","t":"GDPR"},{"n":276,"q":"According to the European Data Protection Board, if a controller that is not established in the EU but still\nsubject to the GDPR becomes aware of a personal data breach, which supervisory authority or authorities\nmust be notified?","o":"A. Only the supervisory authority of the EU member state in which the controller's EU representative\n\n(pursuant to Article 27) is established.\nB. Only one lead supervisory authority, as a controller benefits from the one-stop shop mechanism under\nthe GDPR’s enforcement regime.\nC. Every supervisory authority of the EU member states where the controller is offering goods or services.\nD. Every supervisory authority for which affected data subjects reside in their EU member state.","a":"D","v":"corrected","vd":"已修正（原答案：A；修订：D）","e":"正确答案 D。仅因第 27 条代表位于某成员国，并不会触发一站式机制。未在欧盟设立、仅依据第 3(2) 或 3(3) 条受\nGDPR 约束的控制者发生需报告的数据泄露时，应向每一个受影响数据主体居住于其成员国的监管机构报告。","t":"监管机构"},{"n":277,"q":"Which mechanism, introduced by the GDPR as a means of ensuring both compliance and transparency,\nallows for the possibility of personal data transfers to third countries under Article 42?","o":"A. Approved certifications.\n\nB. Binding corporate rules.\n\nC. Law enforcement requests.\n\nD. Standard contractual clauses.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。（与 Q125 同一知识点重复出现）第 42 条认证机制是 GDPR 新引入的跨境传输保障工具之\n一，通过认证标志/印章使已获认证的接收方可依此进行跨境传输，而非 BCRs、SCCs（二者并非 GDPR\n新创设的机制）或执法请求（与合法传输机制无关）。知识点：第 42 条认证机制作为 GDPR 新设立的跨\n境传输保障工具。","t":"GDPR"},{"n":278,"q":"A private company has establishments in France, Poland, the United Kingdom and, most prominently,\nGermany, where its headquarters is established. The company offers its services worldwide. Most of the\nservices are designed in Germany and supported in the other establishments. However, one of the\nservices, a Software as a Service (SaaS) application, was defined and implemented by the Polish\nestablishment. It is also supported by the other establishments.\n\nWhat is the lead supervisory authority for the SaaS service?","o":"A. The supervisory authority of Germany at federal level.\nB. The supervisory authority of Germany at regional level.\nC. The supervisory authority of the Republic of Poland.\nD. The supervisory authority of the European Union.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。主导监管机构的认定核心在于“实际作出处理决策的地点”，该 SaaS 服务由波兰分支机构独\n立定义、开发和实施（即便获得其他分支机构的支持），说明与该特定服务相关的处理决策实际发生在\n波兰，因此波兰监管机构应为该项服务的主导监管机构，而非笼统以公司整体总部所在地（德国，A、\nB）作为统一判断标准，也不存在“欧盟层面统一监管机构”这一机构设置（D，不存在此类超国家层面的\n单一数据保护监管机构，欧盟层面协调机制是 EDPB 而非直接执法机构）。知识点：主导监管机构的认\n定应针对具体处理活动/服务的实际决策地，而非一概以企业整体总部所在地为准。","t":"监管机构"},{"n":279,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nBased on the scenario, what are the primary privacy risks of the planned surveillance system?","o":"A. A Chinese vendor and the monitoring of EU-based employees.\nB. Facial recognition data stored in the cloud and lack of encryption.\nC. Excessive scope of monitoring and lack of legitimate purpose for data collection.\nD. Missing E2EE encryption in the monitoring system and unclear data storage duration.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。该监控系统提供全天候摄像头/麦克风访问、屏幕截图、邮件、网站浏览记录及按键记录等\n极为广泛、侵入性极强的监控能力，远超防范旷工、提升客服质量等既定目的所合理必要的范围，构成\n过度监控（违反数据最小化及比例原则），且部分监控目的（如“奖励优秀员工”）本身也难以充分证成如\n此全面的持续监控具有正当必要性，这是本情节中最核心、最突出的隐私风险，而非仅聚焦供应商国籍\n（A，虽然涉及跨境传输合规，但非最核心隐私风险）、云存储加密与否（B，题目未提供加密状态信\n息，且非监控范围本身的问题）或存储时长模糊（D，同样是次要问题）。知识点：员工监控中的数据最\n小化及比例原则——监控范围与合法目的之间必须具有相称性。","t":"GDPR"},{"n":280,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nUnder what condition could the surveillance system be used on the personal devices of employees?","o":"A. Only if the monitoring system is manufactured by a European vendor storing the monitoring data within\nthe EU.\n\nB. Only if the employees give valid consent and the monitoring is narrowly limited to their professional\ntasks.\nC. Only if the cloud that stores the monitoring data is certified by the EDPB as GDPR compliant.\nD. Only if the employer offers an adequate compensation for using the employee’s devices.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 只能在极少数情况下成立。雇佣关系中的权力不平衡通常使员工同意难以被视为自由给予；即使是 BYOD，\n也应优先评估必要性、比例性、合法利益或法定义务、工作与私人空间隔离以及 DPIA，而不能仅靠同意。","t":"监管机构"},{"n":281,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\n\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\n\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nthat\nAfter fixing the privacy problems, how long may Gentle Hedgehog store the monitoring data, assuming\nno valid data erasure request is received?","o":"A. As long as required by the company’s legitimate interests.\nB. As long as a concerned employee does not request erasure of the data.\nC. As long as provided by the EDPB guidelines for remote employee monitoring.\nD. As long as stated in the privacy policy that all employees must follow when processing personal data.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 只能理解为“为明确、合法的目的客观必要的最短期间”。企业应预先设定并记录具体留存期限或复核标准；\n不能因为企业笼统声称存在合法利益就无限期保存。","t":"监管机构"},{"n":282,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\n\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\n\nservers operated by Sauron Eye, which are physically located in France.\n\nWhat is the main problem with the 24/7 camera monitoring?","o":"A. It must not be operated during non-business hours and employee holidays.\nB. It may accidentally film third parties whose consent is required for monitoring.\nC. It has no valid legal basis to be implemented in the context of Gentle Hedgehog’s business.\nD. It must first be approved by the trade union and then granted a license from the national DPA.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。24/7 全天候摄像头及麦克风监控（含私人时间、非工作场景）的侵入性极高，明显超出预防\n旷工、提升客服质量等既定目的所合理必要的范围，难以找到能够证成如此广泛、持续监控的正当合法\n依据（无论是合法利益的平衡测试还是同意的自愿性均难以满足），这是该监控方案最根本的问题——\n缺乏有效合法依据，而非仅仅是时间限制问题（A）、意外拍摄第三方问题（B，虽也存在但非核心问\n题）或程序性审批缺失问题（D，工会审批和 DPA 许可并非普遍适用的强制前置程序）。知识点：过度\n监控因缺乏与处理目的相称的合法依据而整体不具备合法性。","t":"GDPR"},{"n":283,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\n\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\n\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\n\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\n\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nWhat monitoring may be lawfully performed within the scope of Gentle Hedgehog’s business?","o":"A. Everything offered by Sauron Eye's software with the exception of camera and microphone monitoring.\nB. Everything offered by Sauron Eye's software, assuming employees provide daily consent to the\nmonitoring.\nC. Only video calls conducted during business hours and emails that do not contain a “private” or\n“personal” tag.\nD. Only emails, website browsing history and camera for internal video calls that are expressly marked as\nmonitored.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。为使监控方案具备合法性，应将监控范围严格限定在与工作直接相关、且经明确标识告知\n的活动范围内（如仅限于内部视频通话、邮件、网站浏览记录，并将监控对象限定为已被清晰标注告知\n“正在被监控”的部分），排除对摄像头/麦克风的全天候、无差别侵入性监控。A（排除摄像头麦克风但保\n留其余全部功能，仍可能范围过广）、B（依赖“每日同意”，同意的自愿性在雇佣关系及重复要求下难以\n成立）、C（限定视频通话及排除标记为私人的邮件，范围仍显宽泛且执行标准模糊）均不如 D 准确体现\n比例原则下的合理监控边界。知识点：合法监控范围的设计——限定于工作相关活动、并配合明确标识\n告知。","t":"GDPR"},{"n":284,"q":"According to the AI Act, a provider of a high-risk AI system has all of the following obligations EXCEPT?","o":"A. Ensuring users understand how the system mitigates bias\nB. Registering the system in the European AI Board s database.\nC. Providing detailed documentation about the system to the users\nD. Conducting a conformity assessment before placing the system on the market.","a":"A","v":"corrected","vd":"已修正（原答案：B；修订：A）","e":"正确答案 A。AI Act 对高风险 AI 系统提供者规定风险管理、数据治理、技术文档和使用说明、合格评定及在欧盟数\n据库登记等义务。B 虽把数据库错误地称为“欧洲 AI 委员会的数据库”，但描述的是实质存在的登记义务；C、D 也\n属于明确义务。法案并未以 A 所述措辞要求提供者保证用户“理解系统如何缓解偏见”；其透明度和说明义务有更具\n体的法定内容。","t":"AI Act"},{"n":285,"q":"What is the main purpose of the EU Data Act?","o":"A. To enable the processing and transfer of non-personal data within the EU.\nB. To allow users of connected devices to access data generated by their use.\nC. To facilitate the voluntary sharing of data between individuals and businesses\nD. To regulate individuals’ privacy rights and the processing of their personal data","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。欧盟《数据法》（Data Act）的核心目标是赋予联网设备（如物联网设备）用户访问和利用\n其使用过程中产生的数据的权利，促进数据访问的公平性，推动数据驱动型创新的普惠共享，而非专门\n规制非个人数据的处理传输（A，这更接近其技术效果而非核心立法目的表述）、个人与企业间数据自愿\n共享的笼统促进（C，表述过于宽泛）或个人隐私权规制（D，隐私权规制是 GDPR 的核心领域，而非数\n据法的主要立法目标）。知识点：欧盟《数据法》赋予联网设备用户数据访问权这一核心立法目的。","t":"Data Act"},{"n":286,"q":"Once an organization has conducted an internal investigation to determine the scope of a ransomware\nattack, what is the appropriate next step in the process?","o":"A. Assess the risks associated with the breach and. if necessary, notify affected individuals and regulatory\nbodies within the relevant timeframes.\nB. Notify law enforcement and consult with legal counsel to understand the implications of the breach and\nthe notification requirements.\nC. Inform all customers and the public via social media platforms to ensure rapid dissemination of relevant\ninformation.\nD. Wait for law enforcement to provide guidance on notification procedures before taking any further\naction.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。在确定勒索软件攻击的影响范围后，下一步关键行动是评估该事件对数据主体造成的风险\n程度（结合数据敏感性、潜在危害等），并据此判断是否需要在法定时限内通知受影响个人及监管机\n构，这是风险评估驱动合规响应的核心逻辑（B 虽然也是响应流程中的重要环节，但风险评估及依法通知\n这一步骤更直接紧随范围确定之后；C 未经风险评估贸然公开信息可能造成不必要恐慌且不符合审慎响应\n原则；D 消极等待执法机构指示会延误法定通知时限，不符合 GDPR 不得无故拖延的要求）。知识点：\n数据泄露响应流程中风险评估作为承上启下的关键环节。","t":"GDPR"},{"n":287,"q":"Through a combination of hardware failure and human error, the decryption key for a bank's customer\naccount transaction database has been lost. An investigation has determined that this was not the result of\nhacking or malfeasance, simply an unfortunate combination of circumstances. Which of the following\naccurately indicates the nature of this incident?","o":"A. A data breach has not occurred because the loss was not the result of hacking.\nB. A data breach has not occurred because no data was exposed to any unauthorized individual\nC. A data breach has occurred because the loss of the key has resulted in the data no longer being\naccessible\nD. A data breach has occurred because the loss of the key has resulted in the loss of confidentiality or\nintegrity of the data","a":"C","v":"corrected","vd":"已修正（原答案：B；修订：C）","e":"正确答案 C。GDPR 第 4(12) 条的个人数据泄露包括意外或非法的毁损、丢失、改变、未经授权披露或访问，不以黑\n客攻击或泄密为必要。EDPB 明确把加密数据的解密密钥永久丢失且无法从备份恢复，列为可用性泄露。","t":"监管机构"},{"n":288,"q":"When can the EU-US Data Privacy Framework be used as a valid mechanism to transfer personal data\n\nfrom the European Union to the United States?","o":"A. When the recipient has self-certified under the framework.\n\nB. When the transfer in question has been certified under the framework.\n\nC. When the recipient has been certified by a third party under the framework.\n\nD. When a data transfer assessment has not identified any risks to data subjects.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。欧盟-美国数据隐私框架（DPF）采用的是企业自我认证机制——美国接收方企业通过向美\n国商务部自我认证承诺遵守 DPF 原则，即可依据欧盟委员会已对 DPF 作出的充分性认定，合法接收来自\n欧盟的个人数据传输，而非需第三方认证（C）、逐笔交易单独认证（B）或以传输风险评估结果作为前\n提 （D ，DPF 本 身作 为充 分 性认 定 机制 不要 求 逐案 风 险评 估） 。 知识 点： 欧 盟-美 国数 据隐 私 框架\n（DPF）的自我认证机制及其作为充分性认定的传输合法化路径。","t":"GDPR"},{"n":289,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nIt has been a tough season for the Spanish Handball League, with acts of violence and racism having\nincreased exponentially during their last few matches.\n\nIn order to address this situation, the Spanish Minister of Sports, in conjunction with the National Handball\nLeague Association, issued an Administrative Order (the \"Act\") obliging all the professional clubs to install\na fingerprint-reading system for accessing some areas of the sports halls, primarily the ones directly\nbehind the goalkeepers. The rest of the areas would retain the current access system, which allows any\nspectators access as long as they hold valid tickets.\n\nThe Act named a selected hardware and software provider, New Digital Finger, Ltd., for creation of the\n\nnew fingerprint system. Additionally, it stipulated that any of the professional clubs that failed to install this\nsystem within a two-year period would face fines under the Act.\n\nThe Murla HB Club was the first to install the new system, renting the New Digital Finger hardware and\nsoftware. Immediately afterwards, the Murla HB Club automatically renewed current supporters’\nsubscriptions, while introducing a new contractual clause requiring supporters to access specific areas of\nthe hall through the new fingerprint reading system installed at the gates.\n\nAfter the first match hosted by the Murla HB Club, a local supporter submitted a complaint to the club and\nto the Spanish Data Protection Authority (the AEPD), claiming that the new access system violates EU\ndata protection laws. Having been notified by the AEPD of the upcoming investigation regarding this\ncomplaint, the Murla HB Club immediately carried out a Data Protection Impact Assessment (DPIA), the\nconclusions of which stated that the new access system did not pose any high risks to data subjects'\nprivacy rights.\n\nAccording to the GDPR, who is the controller for the personal data processed by the fingerprint access\nsystem?","o":"A. Murla HB Club.\nB. New Digital Finger, Ltd.\nC. Spanish Ministry of Sports\nD. National Handball Association.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Murla HB 俱乐部作为实际租用、安装该指纹识别系统并自主决定具体使用条款（如与球迷\n续约合同中加入指纹准入条款）的主体，是实际决定该特定处理活动目的和方式的一方，因此是该处理\n的控制者；新数字指纹公司（B）仅作为系统供应商/技术提供方（可能是处理者角色）、体育部及协会\n（C、D）仅是发布强制性法规的行政机构，均不直接决定该俱乐部层面具体处理活动的目的和方式。知\n识点：控制者身份的认定——实际决定具体处理活动目的和方式的主体，而非法规制定者或技术供应\n商。","t":"GDPR"},{"n":290,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nIt has been a tough season for the Spanish Handball League, with acts of violence and racism having\nincreased exponentially during their last few matches.\n\nIn order to address this situation, the Spanish Minister of Sports, in conjunction with the National Handball\nLeague Association, issued an Administrative Order (the \"Act\") obliging all the professional clubs to install\na fingerprint-reading system for accessing some areas of the sports halls, primarily the ones directly\nbehind the goalkeepers. The rest of the areas would retain the current access system, which allows any\nspectators access as long as they hold valid tickets.\n\nThe Act named a selected hardware and software provider, New Digital Finger, Ltd., for creation of the\nnew fingerprint system. Additionally, it stipulated that any of the professional clubs that failed to install this\nsystem within a two-year period would face fines under the Act.\n\nThe Murla HB Club was the first to install the new system, renting the New Digital Finger hardware and\nsoftware. Immediately afterwards, the Murla HB Club automatically renewed current supporters’\nsubscriptions, while introducing a new contractual clause requiring supporters to access specific areas of\nthe hall through the new fingerprint reading system installed at the gates.\n\nAfter the first match hosted by the Murla HB Club, a local supporter submitted a complaint to the club and\nto the Spanish Data Protection Authority (the AEPD), claiming that the new access system violates EU\ndata protection laws. Having been notified by the AEPD of the upcoming investigation regarding this\ncomplaint, the Murla HB Club immediately carried out a Data Protection Impact Assessment (DPIA), the\nconclusions of which stated that the new access system did not pose any high risks to data subjects'\n\nprivacy rights.\n\nWhat is the proper legal base for processing fingerprints at the Murla HB Club gates?","o":"A. The consent provided by the spectators.\nB. The Act, imposing security measures on the spectators.\nC. The contract between the Club and the affected spectators.\nD. The legitimate interest of preventing violent acts from the spectators.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 是简化表述。完整分析应同时满足一般个人数据的第 6(1)(c) 条法定义务，以及生物识别特殊类别数据的第\n9(2)(g) 条重大公共利益例外；所依据的成员国法律还必须明确、必要、成比例并提供适当保障。","t":"GDPR"},{"n":291,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nIt has been a tough season for the Spanish Handball League, with acts of violence and racism having\nincreased exponentially during their last few matches.\n\nIn order to address this situation, the Spanish Minister of Sports, in conjunction with the National Handball\nLeague Association, issued an Administrative Order (the \"Act\") obliging all the professional clubs to install\n\na fingerprint-reading system for accessing some areas of the sports halls, primarily the ones directly\n\nbehind the goalkeepers. The rest of the areas would retain the current access system, which allows any\n\nspectators access as long as they hold valid tickets. 6\nThe Act named a selected hardware and software provider, New Digital Finger, Ltd., for creation of the\nnew fingerprint system. Additionally, it stipulated that any of the professional clubs that failed to install this\nsystem within a two-year period would face fines under the Act.\n\nThe Murla HB Club was the first to install the new system, renting the New Digital Finger hardware and\nsoftware. Immediately afterwards, the Murla HB Club automatically renewed current supporters’\nsubscriptions, while introducing a new contractual clause requiring supporters to access specific areas of\nthe hall through the new fingerprint reading system installed at the gates.\n\nAfter the first match hosted by the Murla HB Club, a local supporter submitted a complaint to the club and\nto the Spanish Data Protection Authority (the AEPD), claiming that the new access system violates EU\ndata protection laws. Having been notified by the AEPD of the upcoming investigation regarding this\ncomplaint, the Murla HB Club immediately carried out a Data Protection Impact Assessment (DPIA), the\nconclusions of which stated that the new access system did not pose any high risks to data subjects'\nprivacy rights.\n\nThe Murla HB Club should have carried out a DPIA before the installation of the new access system AND\nat what other time?","o":"A. After the complaint of the supporter.\nB. Periodically, when new risks were foreseen.\nC. At the end of every match of the season.\n\nD. After the AEPD notification of the investigation.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。除在部署新的高风险处理活动前须开展 DPIA 外，第 35(11)条还要求，当处理活动的风险状\n况发生重大变化（如出现新的风险因素）时，控制者应定期重新评估（周期性开展 DPIA），以确保持续\n合规，而非仅在收到投诉（A）或监管机构通知（D）等被动触发情形下才进行评估，也非机械地按每场\n比赛结束这一固定且与风险变化无关的时间点进行（C）。知识点：第 35(11)条 DPIA 的持续性/周期性重\n新评估义务，而非仅一次性评估。","t":"GDPR"},{"n":292,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nIt has been a tough season for the Spanish Handball League, with acts of violence and racism having\nincreased exponentially during their last few matches.\n\nIn order to address this situation, the Spanish Minister of Sports, in conjunction with the National Handball\nLeague Association, issued an Administrative Order (the \"Act\") obliging all the professional clubs to install\na fingerprint-reading system for accessing some areas of the sports halls, primarily the ones directly\nbehind the goalkeepers. The rest of the areas would retain the current access system, which allows any\nspectators access as long as they hold valid tickets.\n\nThe Act named a selected hardware and software provider, New Digital Finger, Ltd., for creation of the\nnew fingerprint system. Additionally, it stipulated that any of the professional clubs that failed to install this\nsystem within a two-year period would face fines under the Act.\n\nThe Murla HB Club was the first to install the new system, renting the New Digital Finger hardware and\n\nsoftware. Immediately afterwards, the Murla HB Club automatically renewed current supporters’\nsubscriptions, while introducing a new contractual clause requiring supporters to access specific areas of\n\nthe hall through the new fingerprint reading system installed at the gates.\n\nAfter the first match hosted by the Murla HB Club, a local supporter submitted a complaint to the club and\n\nto the Spanish Data Protection Authority (the AEPD), claiming that the new access system violates EU 6\ndata protection laws. Having been notified by the AEPD of the upcoming investigation regarding this\ncomplaint, the Murla HB Club immediately carried out a Data Protection Impact Assessment (DPIA), the\nconclusions of which stated that the new access system did not pose any high risks to data subjects'\nprivacy rights.\n\nAccording to Article 83 of the GDPR, what should the AEPD take into account when determining a\npossible fine?","o":"A. That the complainant had adhered to a binding contractual clause.\n\nB. That the Murla HB Club promptly obeyed the Administrative Order (the Act).\nC. That the Murla HB Club immediately carried out a DPIA after the AEPD notification.\nD. That the number of affected data subjects is limited to the ones accessing a specific area.","a":"D","v":"corrected","vd":"已修正（原答案：C；修订：D）","e":"正确答案 D。GDPR 第 83(2)(a) 条明确要求监管机构考虑侵权的性质、严重程度和持续时间，包括处理的性质、范\n围、目的、受影响数据主体人数及其损害程度。事后补做 DPIA 可能在个案中体现合作，但不能替代本应在处理前\n完成的 DPIA，也不是本题最直接的法定裁量因素。","t":"GDPR"},{"n":293,"q":"Under the Data Protection Law Enforcement Directive, a government can carry out a covert investigation\ninvolving personal data, as long the investigation is sanctioned by law and constitutes a measure that is\nboth necessary and what?","o":"A. Prudent\nB. Important\nC. Proportionate\nD. DPA-approved","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。（与 Q135 同一知识点）欧盟执法指令要求政府秘密调查须同时满足法律授权、必要性及比\n例性（proportionate）要求。知识点：执法指令下秘密调查的比例原则要求。","t":"LED执法指令"},{"n":294,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\n\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\n\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\n\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\n\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nWhat is the main problem with the 24/7 camera monitoring?","o":"A. It is applicable only to the sales team members who are contractors.\nB. The security measures in place don 't guarantee the confidentiality of the personal data\nC. It has no valid legal basis to be implemented in the context of Gentle Hedgehog's business.\nD. It must first be approved by the trade union and then granted a license from the national DPA.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。（与 Q282 同一知识点）24/7 全天候摄像头监控因缺乏与既定目的相称的有效合法依据而构\n成主要问题，而非仅适用范围限定于承包商（A）、安全措施保密性不足（B，题目未提及此类安全缺\n陷）或须经工会审批和 DPA 许可（D，非普遍强制程序）。知识点：过度监控缺乏合法依据的核心问\n题。","t":"GDPR"},{"n":295,"q":"Start-up company MagicAI is developing an AI system that will be part of a medical device that detects\nskin cancer. To take measures against potential bias in its AI system, the IT Team decides to collect data\nabout users' ethnic origin, nationality and gender.\n\nWhich would be the most appropriate legal basis for this processing under the GDPR, Article 9\n(Processing of special categories of personal data)?","o":"A. Processing necessary for scientific or statistical purposes.\nB. Processing necessary for reasons of substantial public interest\nC. Processing necessary for purposes of preventive or occupational medicine\nD. Processing necessary for the defense of legal claims in potential negligence cases","a":"B","v":"corrected","vd":"已修正（原答案：C；修订：B）","e":"正确答案 B。AI Act 第 10(5) 条专门规定：高风险 AI 系统为检测和纠正偏见而处理 GDPR 第 9(1) 条特殊类别数据，\n在严格必要且满足访问限制、删除、记录和安全等保障条件时，属于 GDPR 第 9(2)(g) 条所称重大公共利益。C 所称\n预防或职业医学通常面向医疗照护或职业健康专业活动，并非 IT 团队开展模型偏见测试的最佳依据。","t":"AI Act"},{"n":296,"q":"What was the main failing of Convention 108 that led to the creation of the Data Protection Directive\n\n(Directive 95/46/EC)?","o":"A. It did not account for the rapid growth of the Internet.\n\nB. It did not include protections for sensitive personal data.\n\nC. It prescribed insufficient penalties for data protection violations. 6\nD. It was implemented in a fragmented manner by a small number of states.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。（与 Q227 同一知识点）108 号公约因缔约国实施不均衡、呈碎片化状态，促成 95/46/EC 指\n令的制定。知识点：108 号公约实施碎片化催生 95/46/EC 指令。","t":"历史沿革/95-46-EC"},{"n":297,"q":"The EU Data Act mitigates the abuse of contract imbalances that impede equitable data sharing by doing\nwhich of the following?","o":"A. Providing a 30 day right of recission, allowing a party to nullify a contract for any reason within 30 days\nof execution.\nB. Safeguarding enterprises from unjust contract terms imposed by a party wielding a considerably\nstronger market position.\nC. Requiring the use of standard contract clauses whenever data is shared between parties of\nsubstantially disproportionate bargaining power or market position.\nD. Requiring all data protection provisions to be bilateral, prohibiting one party from imposing\ndisproportionate obligations on the other in the event of a data breach.","a":"B","v":"corrected","vd":"已修正（原答案：C；修订：B）","e":"正确答案 B。Data Act 通过规定：由处于明显更强谈判地位的一方单方面强加的不公平数据访问、使用或责任条\n款，对另一企业不具约束力，以缓解合同失衡。该法提供模型合同条款和公平性规则，但不要求此类交易一律使用\n标准合同条款，因此 C 错误。","t":"Data Act"},{"n":298,"q":"Which of the following is an example of an AI system posing unacceptable risk under the EU AI Act?","o":"A. A system aiding in legal interpretation and application of the law.\nB. A real-time biometric identification system by law enforcement.\nC. A migration, asylum and border control management system.\nD. A system managing and operating a critical infrastructure.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。欧盟 AI 法案将执法机构在公共场所使用的“实时”生物识别身份识别系统列为具有“不可接受\n风险”（unacceptable risk）的 AI 应用（原则上被禁止，仅有极其有限的例外情形），因其高度侵入性监\n控能力及对基本权利（尤其隐私权、行动自由权）构成的严重威胁；法律解释辅助系统（A）、移民庇护\n边境管理系统（C）、关键基础设施管理系统（D）则通常被归类为“高风险”（high-risk，需满足严格合规\n要求但并非被禁止）而非“不可接受风险”类别。知识点：欧盟 AI 法案风险分级体系——“不可接受风险”\n类别（如公共场所实时生物识别执法系统）与“高风险”类别的区分。","t":"AI Act"},{"n":299,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nFinancially, it has been a very good year at ARRA Hotels: Their 21 hotels, located in Greece (5), Italy (15)\n\nand Spain (1), have registered their most profitable results ever. To celebrate this achievement, ARRA\n\nHotels’ Human Resources office, based in ARRA’s main Italian establishment, has organized a team event\n\nfor its 420 employees and their families at its hotel in Spain. 6\nUpon arrival at the hotel, each employee and family member is given an electronic wristband at the\nreception desk. The wristband serves a number of functions:\n\nAllows access to the “party zone” of the hotel, and emits a buzz if the user approaches any\nunauthorized areas\nAllows up to three free drinks for each person of legal age, and emits a buzz once this limit has been\nreached\nGrants a unique ID number for participating in the games and contests that have been planned.\n\nAlong with the wristband, each guest receives a QR code that leads to the online privacy notice describing\nthe use of the wristband. The page also contains an unchecked consent checkbox. In the case of\nemployee family members under the age of 16, consent must be given by a parent.\n\nAmong the various activities planned for the event, ARRA Hotels’ HR office has autonomously set up a\nphotocall area, separate from the main event venue, where employees can come and have their pictures\ntaken in traditional carnival costume. The photos will be posted on ARRA Hotels’ main website for general\nmarketing purposes.\n\nOn the night of the event, an employee from one of ARRA’s Greek hotels is displeased with the results of\nthe photos in which he appears. He intends to file a complaint with the relevant supervisory authority in\nregard to the following:\n\nThe lack of any privacy notice in the separate photocall area\nThe unlawful cross-border processing of his personal data\nThe unacceptable aesthetic outcome of his photos\n\nWhich of the following is NOT necessarily considered a factor in identifying whether the processing could\n\nbe considered a “cross-border processing”?","o":"A. The total number of data subjects.\nB. The potential harm for the data subjects.\nC. The collection of personal data of children.\nD. The processing of a wide range of personal data","a":"A","v":"corrected","vd":"已修正（原答案：B；修订：A）","e":"正确答案 A。EDPB 指出，即使处理涉及多个成员国的大量个人，也不必然产生“实质性影响”；仍须结合个案影响判\n断。潜在损害、处理儿童或其他脆弱群体数据，以及处理广泛数据类型，均属于评估实质性影响的相关因素。","t":"监管机构"},{"n":300,"q":"Based on the EDPB’s Guidelines on data subject rights - Right of access, and on Article 15 of the GDPR,\nwhich of the following is NOT a requirement that a data controller is required to undertake?","o":"A. Providing copies of personal data to the data subject.\nB. Informing the data subject about the processing of their data.\nC. Registering each access request by the data subject in a publicly available list.\nD. Implementing measures to verify the identity of the data subject making the request.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。EDPB《访问权指南》及第 15 条要求控制者提供数据副本（A）、告知处理相关信息\n（B）、核实请求人身份（D），但并未要求控制者将每一次访问请求记录并对外“公开”发布——尽管出\n于问责制目的，控制者内部保留处理请求的记录是良好实践，但对外公开这些记录既非法定要求，也可\n能反而侵犯提出请求的数据主体自身的隐私。知识点：第 15 条访问权的法定义务清单及不包含“公开访问\n请求记录”这一要求。","t":"监管机构"},{"n":301,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe started the Gummy Bear Company in 2000 from his home in Vermont, USA. Today, it is a multi-billion-\ndollar candy company operating in every continent. All of the company’s IT servers are located in Vermont.\nThis year Joe hires his son Ben to join the company and head up Project Big, which is a major marketing\nstrategy to triple gross revenue in just 5 years. Ben graduated with a PhD in computer software from a top\nuniversity. Ben decided to join his father’s company, but is also secretly working on launching a new global\nonline dating website company called Ben Knows Best.\n\nBen is aware that the Gummy Bear Company has millions of customers and believes that many of them\nmight also be interested in finding their perfect match. For Project Big, Ben redesigns the company’s\nonline web portal and requires customers in the European Union and elsewhere to provide additional\npersonal information in order to remain a customer. Project Ben begins collecting data about customers’\nphilosophical beliefs, political opinions and marital status.\n\nIf a customer identifies as single, Ben then copies all of that customer’s personal data onto a separate\ndatabase for Ben Knows Best. Ben believes that he is not doing anything wrong, because he explicitly\nasks each customer to give their consent by requiring them to check a box before accepting their\ninformation. As Project Big is an important project, the company also hires a first-year college student\nnamed Sam, who is studying computer science, to help Ben out.\n\nBen calls out sick and Sam comes across the Ben Knows Best database. Sam is planning on going to\n\nIreland over Spring Beak with 10 of his friends, so he copies all of the customer information of people that\nreside in Ireland so that he and his friends can contact people when they are in Ireland.\n\nJoe also hires his best friend’s daughter, Alice, who just graduated from law school in the U.S., to be the\ncompany’s new General Counsel. Alice has heard about the GDPR, so she does some research on it.\nAlice approaches Joe and informs him that she has drafted up Binding Corporate Rules for everyone in the\ncompany to follow, as it is important for the company to have in place a legal mechanism to transfer data\ninternally from the company’s operations in the European Union to the U.S.\n\nJoe believes that Alice is doing a great job, and informs her that she will also be in-charge of handling a\nmajor lawsuit that has been brought against the company in federal court in the U.S. To prepare for the\nlawsuit, Alice instructs the company’s IT department to make copies of the computer hard drives from the\nentire global sales team, including the European Union, and send everything to her so that she can review\neveryone’s information. Alice believes that Joe will be happy that she did the first level review, as it will\nsave the company a lot of money that would otherwise be paid to its outside law firm.\n\nBen’s collection of additional data from customers created several potential issues for the company, which\nwould most likely require which of the following actions?","o":"A. Performing a data protection impact assessment.\nB. Entering into a data processing agreement.\nC. Establishing a new corporate governance.\nD. Signing a non-disclosure agreement.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。（与 Q172 同一知识点）新增收集哲学信仰、政治观点等第 9 条特殊类别数据，且用途涉及\n交友撮合等新目的，属于很可能带来高风险的处理，须开展 DPIA 评估。B、C、D 均非最直接对应的合\n规回应措施。知识点：第 35 条 DPIA 触发情形——新增涉及特殊类别数据的高风险处理。","t":"GDPR"},{"n":302,"q":"A patient advocacy group publishes an email newsletter for subscribers, who create profiles on the\npublisher’s website including expressed areas of interest such as diabetes, narcolepsy, weight\nmanagement and information on clinical trials. The publisher, as data controller, has just received a data\nsubject access request.\n\nWhat is the most appropriate identity verification that the controller may request from the data subject\nbefore complying with the request?","o":"A. The mobile telephone number associated with the data subject.\nB. A copy of a government-issued ID such as a driver’s license of passport.\nC. An access code that was sent by the controller to the email address on file.\nD. A credit card number to which a test authorization of 1 euro will be made for validation.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。EDPB 身份核实指南倡导“分层”验证方式，即采取与请求敏感程度相称、侵入性最小的核验\n手段；向请求人预留在系统内的邮箱发送验证码，既能确认请求人对该账户的实际控制权，又无需额外\n收集政府身份证件（B，过度收集）、手机号（A，若系统内本未预留则不适用且核验强度较弱）或信用\n卡信息（D，明显超出必要范围且不当涉及支付数据）。知识点：EDPB 分层身份核验原则——采用与请\n求相称、最小侵入性的验证方式（如已注册邮箱验证码）。","t":"监管机构"},{"n":303,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nIt has been a tough season for the Spanish Handball League, with acts of violence and racism having\nincreased exponentially during their last few matches.\n\nIn order to address this situation, the Spanish Minister of Sports, in conjunction with the National Handball\nLeague Association, issued an Administrative Order (the “Act”) obliging all the professional clubs to install\na fingerprint-reading system for accessing some areas of the sports halls, primarily the ones directly\nbehind the goalkeepers. The rest of the areas would retain the current access system, which allows any\nspectators access as long as they hold valid tickets.\n\nThe Act named a selected hardware and software provider, New Digital Finger, Ltd., for creation of the\nnew fingerprint system. Additionally, it stipulated that any of the professional clubs that failed to install this\nsystem within a two-year period would face fines under the Act.\n\nThe Murla HB Club was the first to install the new system, renting the New Digital Finger hardware and\nsoftware. Immediately afterwards, the Murla HB Club automatically renewed current supporters’\nsubscriptions, while introducing a new contractual clause requiring supporters to access specific areas of\nthe hall through the new fingerprint reading system installed at the gates.\n\nAfter the first match hosted by the Murla HB Club, a local supporter submitted a complaint to the club and\nto the Spanish Data Protection Authority (the AEPD), claiming that the new access system violates EU\ndata protection laws. Having been notified by the AEPD of the upcoming investigation regarding this\ncomplaint, the Murla HB Club immediately carried out a Data Protection Impact Assessment (DPIA), the\nconclusions of which stated that the new access system did not pose any high risks to data subjects'\nprivacy rights.\n\nWhile assessing the possible use of fingerprints for accessing the sport hall, what criteria should NOT be\n\nincluded in the analysis carried out in the DPIA?","o":"A. Necessity.\n\nB. Suitability.\n\nC. Confidentiality.\nD. Proportionality.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 35 条及 EDPB 相关指南要求 DPIA 须评估处理的必要性（A）、比例性（D）、以及涉及\n的风险（含机密性保护，C，属于安全风险评估的一部分）等，但“适宜性”（suitability，即某项技术方案\n是否“合适/管用”这一更偏工程实施层面的判断）并非 DPIA 法定评估框架下的专门列明标准用语——\nDPIA 的核心分析框架聚焦必要性与比例性测试，而非泛泛的“适宜性”概念。知识点：第 35 条 DPIA 的核\n心评估要素——必要性与比例性测试，而非笼统的“适宜性”标准。","t":"监管机构"},{"n":304,"q":"When cookies of a third party (e.g., a social media, travel, or online banking website) are implemented by\nyour organization’s website, your organization acts as which of the following?","o":"A. A controller.\nB. A processor.\nC. A joint controller.\nD. A sub-processor.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 仅适用于网站运营者与第三方共同决定的收集和向第三方传输阶段。根据 Fashion ID 等判例，网站运营者通\n常不对第三方收到数据后的全部后续处理当然承担共同控制者责任。","t":"ePrivacy指令"},{"n":305,"q":"Which of the following elements does NOT need to be presented to a data subject in order to collect valid\nconsent for the use of cookies?","o":"A. A “Cookies Settings” button.\nB. Information on the purpose of the cookies.\nC. A “Reject All” cookies button on the first layer.\nD. Unticked boxes representing categories of cookies to be dropped.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 为最佳选项，因为 GDPR/ePrivacy 并不规定按钮必须使用“Cookie Settings”这一固定名称。拒绝应与接受同样\n容易，非必要 cookie 不得预先勾选；“Reject All”是否必须位于首层应结合适用监管规则和界面整体是否提供等效、\n即时的拒绝路径判断。","t":"ePrivacy指令"},{"n":306,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe is the new privacy manager for Who-R-U, a Canadian business that provides DNA analysis. The\n\ncompany is headquartered in Montreal, and all of its employees are located there. The company offers its\nservices to Canadians only: Its website is in English and French, it accepts only Canadian currency, and it\n\nblocks internet traffic from outside of Canada (although this solution doesn’t prevent all non-Canadian\n\ntraffic). It also declines to process orders that request the DNA report to be sent outside of Canada, and\n\nreturns orders that show a non-Canadian return address. 6\nBob, the President of Who-R-U, thinks there is a lot of interest for the product in the EU, and the company\nis exploring a number of plans to expand its customer base.\n\nThe first plan, collegially called We-Track-U, will use an app to collect information about its current\nCanadian customer base. The expansion will allow its Canadian customers to use the app while traveling\nabroad. He suggests that the company use this app to gather location information. If the plan shows\npromise, Bob proposes to use push notifications and text messages to encourage existing customers to\npre-register for an EU version of the service. Bob calls this work plan, We-Text-U. Once the company has\ngathered enough pre-registrations, it will develop EU-specific content and services.\n\nAnother plan is called Customer for Life. The idea is to offer additional services through the company’s\napp, like storage and sharing of DNA information with other applications and medical providers. The\ncompany’s contract says that it can keep customer DNA indefinitely, and use it to offer new services and\nmarket them to customers. It also says that customers agree not to withdraw direct marketing consent.\nPaul, the marketing director, suggests that the company should fully exploit these provisions, and that it\ncan work around customers’ attempts to withdraw consent because the contract invalidates them.\n\nThe final plan is to develop a brand presence in the EU. The company has already begun this process. It is\nin the process of purchasing the naming rights for a building in Germany, which would come with a few\noffices that Who-R-U executives can use while traveling internationally. The office doesn’t include any\ntechnology or infrastructure; rather, it’s simply a room with a desk and some chairs.\n\nOn a recent trip concerning the naming-rights deal, Bob’s laptop is stolen. The laptop held unencrypted\nDNA reports on 5,000 Who-R-U customers, all of whom are residents of Canada. The reports include\ncustomer name, birthdate, ethnicity, racial background, names of relatives, gender, and occasionally\nhealth information.\n\nThe Customer for Life plan may conflict with which GDPR provision?","o":"A. Article 7, which requires that consent be as easy to withdraw as it is to give.\nB. Article 15, which requires that data subjects be given a right of access.\nC. Article 16, which provides data subjects with a right to rectification.\nD. Article 20, which provides data subjects with a right to data portability.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。（与 Q152 同一知识点）合同条款约定客户“不得撤回直接营销同意”，直接违反第 7(3)条“撤\n回同意须与给予同意同样简便”的强制性要求，此类条款无效。B、C、D 并非本案合同条款直接冲突的条\n款。知识点：第 7(3)条同意可撤回性要求及限制撤回条款的无效性。","t":"GDPR"},{"n":307,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nGentle Hedgehog Inc. is a privately owned website design agency incorporated in Italy. The company has\nnumerous remote workers in different EU countries. Recently, the management of Gentle Hedgehog\nnoticed a decrease in productivity of their sales team, especially among remote workers. As a result, the\ncompany plans to implement a robust but privacy-friendly remote surveillance system to prevent\nabsenteeism, reward top performers, and ensure the best quality of customer service when sales people\nare interacting with customers.\n\nGentle Hedgehog eventually hires Sauron Eye Inc., a Chinese vendor of employee surveillance software\n\nwhose European headquarters is in Germany. Sauron Eye s software provides powerful remote-\nmonitoring capabilities, including 24/7 access to computer cameras and microphones, screen captures,\n\nemails, website history, and keystrokes. Any device can be remotely monitored from a central server that\n\nis securely installed at Gentle Hedgehog headquarters. The monitoring is invisible by default; however, a\n\nso-called Transparent Mode, which regularly and conspicuously notifies all users about the monitoring and\nits precise scope, also exists. Additionally, the monitored employees are required to use a built-in\nverification technology involving facial recognition each time they log in.\n\nAll monitoring data, including the facial recognition data, is securely stored in Microsoft Azure cloud\nservers operated by Sauron Eye, which are physically located in France.\n\nWhat monitoring may lawfully be performed within the scope of Gentle Hedgehog’s business?","o":"A. Everything offered by Sauron Eye s software in relation to activity by sales team contractors.\nB. Everything offered by Sauron Eye’s software, assuming employees provide daily consent to the\nmonitoring.\nC. Only emails, website browsing history, and camera for internal video calls conducted in a non-secure\nenvironment.\nD. Only emails, website browsing history, and camera for internal video calls that are expressly marked as\nmonitored.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。（与 Q283 同一知识点）合法监控范围应限定于与工作直接相关、且经明确标识告知监控状\n态的活动（如内部视频通话、邮件、网站浏览记录），排除全天候无差别的摄像头麦克风侵入性监控。\n知识点：合法监控范围设计——限定于工作相关活动并配合明确标识告知。","t":"GDPR"},{"n":308,"q":"How did the European Union's (EU) first post-Brexit adequacy decisions for the United Kingdom (UK)\ndiffer\nfrom previous adequacy decisions?","o":"A. It concerns only the private sector.\nB. It expires automatically after four years.\nC. It also applies to the ePrivacy Regulation.\nD. It had to be approved by the EU Parliament.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 描述的是 2021 年首份英国充分性决定的历史创新：设置四年日落条款。该决定已于 2025 年 12 月 19 日续\n期，当前有效期至 2031 年 12 月 27 日，因此不能再把“四年后自动失效”理解为当前剩余期限。","t":"ePrivacy指令"},{"n":309,"q":"In 2018, why was the Convention for the Protection of Individuals with regard to Automatic Processing of\nPersonal Data (Convention 108) updated to Convention 108+?","o":"A. To respond to challenges posed by the use of new information and communication technologies.\nB. To address inconsistencies in how European countries implemented Convention 108.\n\nC. To harmonize key definitions and principles with the GDPR.\nD. To open it up for signatories by non-European countries.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。108 号公约现代化修订为 108+号公约的主要动因，是应对新兴信息通信技术（如大数据、\n人工智能、生物识别技术等）带来的新型隐私和数据保护挑战，确保该框架在数字时代继续保持有效性\n和相关性，而非专门解决各国实施不一致问题（B，此问题更多是催生 95/46 指令的历史原因而非 108+号\n公约现代化的直接动因）、单纯与 GDPR 定义对齐（C，虽然确实吸收借鉴了 GDPR 的部分理念，但这并\n非该修订的“主要”原因表述）或向非欧洲国家开放签署（D，108 号公约本身早已向非欧洲国家开放）。\n知识点：108+号公约现代化修订应对新技术挑战这一核心动因。","t":"历史沿革/95-46-EC"},{"n":310,"q":"Which of the following describes a primary effect that the EU Artificial Intelligence Act (AI Act) has on the\nGDPR?","o":"A. The AI Act takes precedence when it comes to AI systems.\n\nB. The AI Act defines additional requirements related to AI systems.\nC. The AI Act establishes a joint authority for supervision of AI systems.\n\nD. The AI Act introduces new legal bases for personal data in AI systems.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。欧盟 AI 法案作为专门规范 AI 系统的新立法，在 GDPR 既有的一般数据保护框架基础上，\n针对 AI 系统新增了特定的合规要求（如高风险 AI 系统的合格评定、透明度、人工监督等），二者并行\n互补，而非 AI 法案取代或优先于 GDPR 适用于 AI 系统的数据保护事项（A，两部法律各有其规制重点，\nGDPR 仍是个人数据处理的基础性法律）、设立联合监管机构（C，AI 法案设有自身的市场监管机构体\n系，并非与数据保护监管机构合并设立联合机构）或创设新的个人数据处理合法依据（D，AI 法案并未\n新增 GDPR 第 6/9 条之外的合法依据类型）。知识点：AI 法案与 GDPR 的互补关系——AI 法案新增 AI\n系统专属合规要求，而非取代 GDPR 的一般数据保护规则。","t":"AI Act"},{"n":311,"q":"Which of the following is an initial core requirement of a good incident response plan?","o":"A. A rehearsed training program.\nB. An incident detection tool.\nC. A classification scheme.\nD. A governance model.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。构建有效事件响应计划的首要基础性要求是建立事件分类体系（按类型、严重程度、影响\n范围对事件进行分级归类），这为后续确定响应优先级、触发相应处置流程提供了结构化框架，是响应\n培训（A）、检测工具（B）、治理模式（D）等后续要素得以有效运作的前提基础。知识点：事件响应\n计划构建中分类体系（classification scheme）作为基础性初始要求的重要性。","t":"GDPR"},{"n":312,"q":"You're a Data Protection Officer who learns that your company's call center has experienced a brief power\noutage lasting several minutes, which left customers unable to contact the company or access their\nrecords during that time. A responsible team leader calls you to ask if anything needs to be done regarding\nGDPR compliance.\n\nWhat course of action should you advise?","o":"A. Notify the supervisory authority, as the incident constitutes a toss of availability.\nB. Report the incident to select individuals based on the nature of the data that was unable to be\naccessed.\nC. Launch an investigation to assess whether the current measures ensure an appropriate level of\nsecurity.\nD. Inform the controller of the incident so that a decision on reporting it to a supervisory authority can be\nmade.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。GDPR 将泄露风险评估及是否通知监管机构的最终决策权赋予控制者（而非 DPO 本人直接\n决定），DPO 作为顾问角色应及时将事件情况汇报给控制者，由控制者结合具体情况判断该事件是否构\n成需要通知的“个人数据泄露”并决定后续步骤，而非由 DPO 越权直接决定通知监管机构（A）、自行选\n择性通知特定人员（B）或仅聚焦安全措施审查而忽略向控制者汇报决策链条（C，尽管安全审查也是重\n要环节，但并非本题问的“该做什么”这一首要程序性回应）。知识点：数据泄露评估与通知决策权归属于\n控制者，DPO 的角色是及时汇报并提供专业建议。","t":"GDPR"},{"n":313,"q":"A financial services company based in Europe is evaluating several cloud service providers to help\nprocess customer data. To comply with the GDPR, the company must only consider vendors who do\nwhat?","o":"A. Engage a Data Protection Officer to oversee secure processing of customer data.\n\nB. Use security controls that have been certified by an external auditor to minimize risk and protect\ncustomer data.\n\nC. Provide sufficient guarantees to implement appropriate technical and organizational measures to 6\nprotect customer data.\nD. Process data only in jurisdictions deemed adequate by the European Commission to ensure\ncompliance with data transfer requirements.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 28(1)条要求控制者只能委托能够提供“充分保证”（sufficient guarantees）以实施适当技术\n组织措施、确保处理符合 GDPR 要求并保护数据主体权利的处理者，这是选择云服务商的核心法定标\n准，而非仅要求供应商设有 DPO（A，非普遍强制标准）、要求经外部审计认证（B，认证是证明“充分\n保证”的一种方式但非唯一强制途径）或要求仅在充分性认定国家处理数据（D，充分性认定针对跨境传\n输问题，并非选择处理者的一般性前提要求，本地或境内处理同样须满足第 28 条充分保证要求）。知识\n点：第 28(1)条控制者选任处理者须确保其提供“充分保证”这一核心法定标准。","t":"监管机构"},{"n":314,"q":"For an organization acting as a data processor, which of the following would NOT be required to be\nincluded in the Record of Processing Activities under Article 30 of the GDPR?","o":"A. Categories of personal data processing.\nB. Name and contact details of the controller.\nC. Retention periods for processed personal data categories.\nD. Technical and organizational security measures implemented.","a":"C","v":"accurate","vd":"准确","e":"正确 答案 C。第 30(2)条要 求处理 者的处 理活动 记录须 包含： 所代表 的每个 控制者 的名称 联系方 式\n（B）、代表其开展的处理类别（A）、跨境传输情况、以及技术组织安全措施的概括性描述（D），但\n并不要求处理者的记录中包含具体数据类别的留存期限——留存期限的确定和记录属于控制者依第 30(1)\n条承担的义务范畴，而非处理者记录内容的强制要素。知识点：第 30(2)条处理者记录内容清单及与控制\n者记录内容（含留存期限）的区分。","t":"GDPR"},{"n":315,"q":"According to Guidelines 1/2024 on processing of personal data based on Article 6(1)(f) GDPR, which\nwould NOT be a valid lawful basis for transferring personal data to a third country law enforcement\nauthority?","o":"A. Legitimate interest, where the controller is subject to the third country law.\nB. Vital interest of a natural person, where the conditions are set out in international law.\nC. Legal obligation, where the third country law provides adequate protection for the data.\nD. Public interest, where an international agreement exists and member state law allows it.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 正确，但题干引用的指南名称有误。相关现行文件是 EDPB《Guidelines 02/2024 on Article 48 GDPR》（2025\n年最终版），而非关于第 6(1)(f) 条合法利益的 Guidelines 1/2024。第三国法律本身不能构成 GDPR 第 6(1)(c) 条意义\n上的欧盟或成员国法定义务。","t":"监管机构"},{"n":316,"q":"An online fashion retailer based in Italy sells high-end clothing, accessories and beauty products to\n\ncustomers around the world. When customers make a purchase on the retailer's website, they can register\n\nto create a user profile, or complete their purchase without doing so. One of the benefits of registration is\nthe storage of payment data, which provides a quick and seamless checkout experience for future\ntransactions.\n\nWhich is the most appropriate legal basis or bases for processing customer information from their user\nprofiles AND from their stored payment data?","o":"A. Consent for both the user profile and the stored payment data.\n\nB. Legitimate interest for both the user profile and the stored payment data.\nC. Legitimate interest for the user profile; consent for the stored payment data.\nD. Performance of a contract for the user profile; legitimate interest for the stored payment data.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 是四项中最合理的组合，但应注意支付卡数据并非 GDPR 第 9 条特殊类别数据。对未来交易保存支付数据属\n于可选便利功能，通常需单独、明确选择；用户资料的合法依据则应根据账户功能逐项判断，可能是合同、合法利\n益或同意，而非一概而论。","t":"GDPR"},{"n":317,"q":"SCENARIO\n\nPlease use the following to answer the next questions:\n\nFastHire, an Artificial Intelligence-driven company based in Amsterdam, sells a solution to customers that\nuses machine learning to help filter resumes for open positions.\n\nThis solution catches the attention of Marie, the talent acquisition lead at Fashionista, a clothing company\nwith multiple locations across Europe. Because Fashionista has recently come under fire for discrimination\n\nin its hiring practices, Marie decides to onboard FastHire to assist with selecting sales associate\ncandidates. She believes that this process will be more objective, since FastHire will make accurate\npredictions regarding whether a candidate would make a successful sales associate or not. Marie\nunderstands that she will first have to provide the FastHire solution with resumes so that the algorithm can\nlearn the qualities of successful candidates.\n\nA short time after FastHire's solution has been put into use by Fashionista, Charles and Chloe submit\napplications for a sales associate position in Fashionista's London store. Only Charles is immediately\nnotified that he is not qualified for the job, despite having similar experience as Chloe.\n\nTo deploy FastHire at Fashonista, Marie must be able to do what?","o":"A. Explain the way the machine learning algorithm works to Charles.\nB. Train the machine learning algorithm with historical data from other retailers.\nC. Obtain prior consent of candidates for their resumes being filtered through FastHire's product.\nD. Ask candidates whether they want their resumes reviewed by a talent acquisition lead or through the\nFastHire product.","a":"A","v":"corrected","vd":"已修正（原答案：C；修订：A）","e":"正确答案 A（四项中最接近）。招聘场景通常不能把候选人同意视为部署 AI 筛选的普遍前提，尤其因雇佣关系存在\n权力不平衡；D 也不是 GDPR 规定的固定选择权。若系统作出仅由自动化处理产生、对候选人具有法律或类似重大\n影响的决定，控制者必须以清晰、可理解方式说明所用程序或主要逻辑、意义和预期后果，并提供第 22 条要求的保\n障。A 不意味着必须披露源代码或完整数学公式。","t":"AI Act"},{"n":318,"q":"SCENARIO\n\nPlease use the following to answer the next questions:\n\nFastHire, an Artificial Intelligence-driven company based in Amsterdam, sells a solution to customers that\nuses machine learning to help filter resumes for open positions.\n\nThis solution catches the attention of Marie, the talent acquisition lead at Fashionista, a clothing company\nwith multiple locations across Europe. Because Fashionista has recently come under fire for discrimination\nin its hiring practices, Marie decides to onboard FastHire to assist with selecting sales associate\ncandidates. She believes that this process will be more objective, since FastHire will make accurate\npredictions regarding whether a candidate would make a successful sales associate or not. Marie\nunderstands that she will first have to provide the FastHire solution with resumes so that the algorithm can\nlearn the qualities of successful candidates.\n\nA short time after FastHire's solution has been put into use by Fashionista, Charles and Chloe submit\napplications for a sales associate position in Fashionista's London store. Only Charles is immediately\nnotified that he is not qualified for the job, despite having similar experience as Chloe.\n\nIn order to properly train and use the FastHire machine learning algorithm, Marie should do what?","o":"A. Only use dummy data to train the machine learning model.\nB. Ensure that resumes of current sales associates are used to train the machine learning algorithms.\nC. Collaborate with FastHire by sharing candidate information so FastHire can improve the algorithm.\nD. Ensure that a Fashionista talent acquisition member reviews all applicants determined to be unqualified\nby FastHire.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 在系统作出仅由自动化处理产生且对候选人具有法律或类似重大影响的决定时成立。人工复核必须真实、有\n能力改变结果，并由理解模型局限和相关事实的人员进行，不能只是形式化盖章。","t":"AI Act"},{"n":319,"q":"What is considered a best practice under the EDPB's Guidelines 3/2022 on Dark patterns in social media\nplatform interfaces?","o":"A. Offer multiple options users can choose from to set up their privacy settings and data protection\npreferences.\nB. Offer several data protection tools for users to control how their data is processed and how to exercise\ntheir rights.\nC. Provide relevant links to additional information, settings, or actions wherever helpful for users to\nnavigate online interfaces.\nD. Provide a variety of content to users so they can answer multiple questions about their personal data\nand make their privacy choices.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 正确。该 EDPB 文件的最 终名称已由早 期的“Dark patterns” 改为 “Deceptive design patterns in social media\nplatform interfaces”；其核心仍是避免操纵性界面，并在需要处提供清晰、易达的信息和操作入口。","t":"监管机构"}];

  // ---------- 题库（319题） ----------
  var bankSearch = '';
  var bankVerdict = 'all';
  var bankTopic = 'all';
  var bankStatusFilter = 'undone'; // undone(默认) | done | hard | mistakes | all
  var bankPageSize = 20;
  var bankShown = 20;
