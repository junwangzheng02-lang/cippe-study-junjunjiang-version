r to make personal data pseudonymous?","o":"A. Separately hold any information that would allow linking the data to the data subject.\nB. Encrypt the data in order to prevent any unauthorized access or modification.\nC. Remove all indirect data identifiers and dispose of them securely.\nD. Use the data only in aggregated form for research purposes.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 4(5)条对假名化的核心要求是：用于重新识别数据主体的补充信息须单独保存，并采取技\n术和组织措施确保个人数据不会被归属到已识别或可识别的自然人。加密（B）只是可用于实现假名化目\n标的技术手段之一而非唯一/充分方式；移除间接标识符（C）更接近匿名化操作；仅用于研究的聚合数\n据（D）已超出假名化范畴，接近匿名化。知识点：第 4(5)条假名化的法定构成要件——补充信息的分离\n保存。","t":"GDPR"},{"n":99,"q":"Which of the following entities would most likely be exempt from complying with the GDPR?","o":"A. A South American company that regularly collects European customers’ personal data.\nB. A company that stores all customer data in Australia and is headquartered in a European Union (EU)\nmember state.\nC. A Chinese company that has opened a satellite office in a European Union (EU) member state to\nservice European customers.\nD. A North American company servicing customers in South Africa that uses a cloud storage system\nmade by a European company.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。北美公司服务的是南非（非欧盟）客户，即便使用了欧洲云服务商提供的存储系统，只要\n其处理活动本身既不针对欧盟数据主体提供商品服务，也不监测欧盟境内的行为，就不落入 GDPR 第 3\n条域外适用范围（云服务商所在地本身不足以触发 GDPR 对客户公司的适用）。A（南美公司定期收集欧\n洲客户数据，构成向欧盟提供服务，触发 GDPR）、B（欧盟成员国总部公司显然受 GDPR 约束，数据存\n储地不影响其作为欧盟设立机构须遵守 GDPR）、C（在欧盟设立卫星机构服务欧洲客户，同样落入\nGDPR 适用范围）均需遵守 GDPR。知识点：第 3 条域外适用性判断——设立地标准与目标指向标准，及\n“云服务商所在地”通常不构成触发因素。","t":"GDPR"},{"n":100,"q":"Article 29 Working Party has emphasized that the GDPR forbids “forum shopping”, which occurs when\ncompanies do what?","o":"A. Choose the data protection officer that is most sympathetic to their business concerns.\n\nB. Designate their main establishment in member state with the most flexible practices.\nC. File appeals of infringement judgments with more than one EU institution simultaneously.\nD. Select third-party processors on the basis of cost rather than quality of privacy protection.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。“监管机构选购”（forum shopping）是指企业刻意将其“主要设立地”（main establishment，决\n定主导监管机构归属的关键因素）设在监管执法相对宽松、被认为对企业更“友好”的成员国，以规避严格\n监管，这被 WP29 明确批评为规避一站式机制精神的行为。A（挑选 DPO 人选，与 forum shopping 无\n关）、C（同时向多个欧盟机构提起上诉，与 forum shopping 概念不符）、D（基于成本选择处理者，属\n于采购决策而非监管机构选购）均非 forum shopping 的准确定义。知识点：一站式机制下“监管机构选购”\n（forum shopping）的定义及主要设立地认定的实质性要求（第 4(16)条，须为实际作出处理决策的地\n点）。","t":"GDPR"},{"n":101,"q":"Under Article 9 of the GDPR, which of the following categories of data is NOT expressly prohibited from\ndata processing?","o":"A. Personal data revealing ethnic origin.\nB. Personal data revealing genetic information.\nC. Personal data revealing financial information.\n\nD. Personal data revealing trade union membership.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 9(1)条列举的特殊类别数据包括种族/民族出身、政治观点、宗教信仰、工会会员身份、\n基因/生物识别数据、健康数据、性生活/性取向数据，财务信息并不在该列举范围内，因此处理财务数据\n一般适用第 6 条普通合法依据即可，无需满足第 9(2)条更严格的例外条件。知识点：第 9 条特殊类别数据\n的封闭式列举范围（不含财务信息）。","t":"GDPR"},{"n":102,"q":"When does the GDPR provide more latitude for a company to process data beyond its original collection\npurpose?","o":"A. When the data has been pseudonymized.\nB. When the data is protected by technological safeguards.\nC. When the data serves legitimate interest of third parties.\nD. When the data subject has failed to use a provided opt-out mechanism.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。假名化被 GDPR 明确列为有助于满足目的限制原则下“兼容性处理”测试的保障措施之一\n（第 6(4)(e)条将“是否采取假名化等适当保障措施”列为判断新处理是否与原目的兼容的考量因素），从\n而为控制者在原始收集目的之外使用数据提供更大灵活性。B（技术保护措施笼统表述，不如假名化具体\n对应法条）、C（服务第三方合法利益，与是否可超范围处理无必然联系）、D（未使用退出机制不代表\n默示同意新用途）均不准确。知识点：第 6(4)条兼容性处理测试中假名化作为保障措施的作用。","t":"GDPR"},{"n":103,"q":"In which situation would a data controller most likely be able to justify the processing of the data of a child\nwithout parental consent?","o":"A. When the data is to be processed for market research.\nB. When providing preventive or counselling services to the child.\nC. When providing the child with materials purely for educational use.\n\nD. When a legitimate business interest makes obtaining consent impractical.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。为儿童提供预防性或咨询性服务（如青少年心理健康、性教育咨询热线等）时，出于保护\n儿童自身利益、避免因需要监护人知情而阻碍儿童获得必要帮助的考虑，通常被认为可以在无监护人同\n意的情况下提供，这也是许多成员国及 WP29 相关指引认可的例外情形。A（市场调研）、C（纯教育用\n途材料）、D（合法利益+同意不便）均不构成第 8 条同意规则的正当例外理由。知识点：儿童数据处理\n中监护人同意规则的例外情形（预防或咨询服务）。","t":"GDPR"},{"n":104,"q":"According to the GDPR, when should the processing of photographs be considered processing of special\ncategories of personal data?","o":"A. When processed with the intent to publish information regarding a natural person on publicly\naccessible media.\nB. When processed with the intent to proceed to scientific or historical research projects.\nC. When processed with the intent to uniquely identify or authenticate a natural person.\nD. When processed with the intent to comply with a law.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。前言第 51 条明确指出，仅当照片经过特定技术手段处理、用于唯一识别或验证特定自然人\n身份（即构成“生物识别数据”）时，照片处理才落入第 9 条特殊类别数据的范畴；单纯为发布报道\n（A）、科研历史研究（B）或履行法律义务（D）而处理照片，若未涉及生物识别目的，则不自动构成\n特殊类别数据处理。知识点：前言第 51 条关于照片构成生物识别特殊类别数据的判断标准。","t":"GDPR"},{"n":105,"q":"Which GDPR principle would a Spanish employer most likely depend upon to annually send the personal\n\ndata of its employees to the national tax authority?","o":"A. The consent of the employees.\n\nB. The legal obligation of the employer.\n\nC. The legitimate interest of the public administration.\n\nD. The protection of the vital interest of the employees. 6","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。雇主向国家税务机关报送员工薪酬等个人数据是履行税法等法定义务的强制性要求，其合\n法处理依据是第 6(1)(c)条“履行控制者所负法定义务”，而非需要员工同意（A，在雇佣关系及法定义务场\n景下同意并非合适依据）、公共行政的合法利益（C，此处更准确的依据是法定义务而非合法利益）或员\n工生命攸关利益（D，与个税申报无关）。知识点：第 6(1)(c)条“法定义务”作为处理合法依据的典型应用\n场景。","t":"GDPR"},{"n":106,"q":"An online company’s privacy practices vary due to the fact that it offers a wide variety of services. How\ncould it best address the concern that explaining them all would make the policies incomprehensible?","o":"A. Use a layered privacy notice on its website and in its email communications.\nB. Identify uses of data in a privacy notice mailed to the data subject.\nC. Provide only general information about its processing activities and offer a toll-free number for more\ninformation.\nD. Place a banner on its website stipulating that visitors agree to its privacy policy and terms of use by\nvisiting the site.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。当企业业务和处理活动种类繁多、难以用单一简明政策全部说清时，采用“分层隐私声明”\n（在网站和邮件中先提供简明概览，再提供入口链接到详细政策）是 ICO 推荐的最佳实践，可兼顾透明\n度与可读性。B（邮寄详细清单，操作成本高且可读性未必提升）、C（仅提供概括信息+客服电话，不\n满足透明度所需的具体信息告知要求）、D（“继续访问网站即视为同意”的横幅方式，不构成有效同意也\n不满足透明度要求）均不是理想做法。知识点：透明度原则的实践方法——分层隐私声明（Layered\nNotice）。","t":"GDPR"},{"n":107,"q":"The GDPR requires controllers to supply data subjects with detailed information about the processing of\ntheir data. Where a controller obtains data directly from data subjects, which of the following items of\ninformation does NOT legally have to be supplied?","o":"A. The recipients or categories of recipients.\nB. The categories of personal data concerned.\nC. The rights of access, erasure, restriction, and portability.\nD. The right to lodge a complaint with a supervisory authority.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 13 条要求直接从数据主体处收集数据时应告知的信息包括：控制者身份联系方式、处理\n目的和依据、合法利益（如适用）、接收方或接收方类别（A）、留存期限、数据主体权利（含访问、删\n除、限制、可携权，C）、投诉权（D）等，但并未要求须告知“所涉及的个人数据类别”这一项——该项\n告知义务实际上出现在第 14 条（针对非直接从数据主体处获得数据的情形），因为直接从本人收集时其\n本身已知晓所提供的数据类别，无需另行告知。知识点：第 13 条（直接收集）与第 14 条（间接收集）告\n知义务清单的差异比较。","t":"GDPR"},{"n":108,"q":"According to Article 14 of the GDPR, how long does a controller have to provide a data subject with\nnecessary privacy information, if that subject’s personal data has been obtained from other sources?","o":"A. As soon as possible after obtaining the personal data.\nB. As soon as possible after the first communication with the data subject.\nC. Within a reasonable period after obtaining the personal data, but no later than one month.\nD. Within a reasonable period after obtaining the personal data, but no later than eight weeks.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 14(3)(a)条规定，若数据并非直接从数据主体处获得，控制者须在获得数据后的合理期限\n内提供相关信息，但最迟不得超过一个月（若数据将用于与数据主体沟通，则最迟应在首次沟通时提\n供；若拟披露给其他接收方，则最迟应在首次披露时提供，取二者中较早者，但整体不超过一个月的上\n限）。A、B 表述过于宽泛缺少明确期限，D 的“八周”并非法定期限。知识点：第 14(3)条间接获取个人数\n据时告知义务的具体时限规定。","t":"GDPR"},{"n":109,"q":"When would a data subject NOT be able to exercise the right to portability?","o":"A. When the processing is necessary to perform a task in the exercise of authority vested in the controller.\nB. When the processing is carried out pursuant to a contract with the data subject.\nC. When the data was supplied to the controller by the data subject.\nD. When the processing is based on consent.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 20(1)条规定数据可携权仅适用于处理基于同意或合同（B、D 情形），且处理须通过自\n动化方式进行，数据须是数据主体本人提供的（C 情形属于适用范围内）；而当处理是为履行控制者被赋\n予的公共职权任务或行使公权力所必需时（即基于第 6(1)(e)条的法定职权），数据可携权不适用。知识\n点：第 20 条数据可携权的适用条件及排除情形（公共职权处理）。","t":"GDPR"},{"n":110,"q":"In which of the following situations would an individual most likely to be able to withdraw her consent for\nprocessing?","o":"A. When she is leaving her bank and moving to another bank.\nB. When she has recently changed jobs and no longer works for the same company.\nC. When she disagrees with a diagnosis her doctor has recorded on her records.\nD. When she no longer wishes to be sent marketing materials from an organization.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。撤回同意仅适用于以“同意”作为合法处理依据的场景，直接营销通常正是基于同意（或作为\n对合法利益处理的反对权行使）开展的，因此个人可随时要求停止接收营销材料，相当于撤回同意/行使\n反对权。A（更换银行涉及合同关系终止，非同意撤回问题）、B（离职涉及雇佣合同关系变化）、C\n（对诊断结果有异议属于数据准确性/更正权问题，第 16 条）均与撤回同意的场景不符。知识点：第 7(3)\n条同意撤回权的适用范围，直接营销场景下同意/反对权的行使。","t":"GDPR"},{"n":111,"q":"As a result of the European Court of Justice’s ruling in the case of Google v. Spain, search engines\noutside the EEA are also likely to be subject to the Regulation’s right to be forgotten. This holds true if the\nactivities of an EU subsidiary and its U.S. parent are what?","o":"A. Supervised by the same Data Protection Officer.\nB. Consistent with Privacy Shield requirements\nC. Bound by a standard contractual clause.\nD. Inextricably linked in their businesses.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。欧洲法院在 Google 诉西班牙案（Google Spain，2014）中确立：只要非欧盟母公司的搜索引\n擎业务与其欧盟子公司（如广告销售业务）在经济上“密不可分”（inextricably linked），即可将该母公司\n的搜索处理活动视为在欧盟境内“设立机构背景下”进行的处理，从而使被遗忘权等 GDPR 规则得以适用\n于欧盟境外的母公司业务。A、B、C 均非该案确立的关键判断标准。知识点：Google Spain 案确立的“设\n立地”及“活动关联”标准，用于将境外母公司处理活动纳入欧盟数据保护法适用范围。","t":"监管机构"},{"n":112,"q":"A German data subject was the victim of an embarrassing prank 20 years ago. A newspaper website\npublished an article about the prank at the time, and the article is still available on the newspaper’s\nwebsite. Unfortunately, the prank is the top search result when a user searches on the victim’s name. The\ndata subject requests that SearchCo delist this result. SearchCo agrees, and instructs its technology team\nto avoid scanning or indexing the article. What else must SearchCo do?","o":"A. Notify the newspaper that its article it is delisting the article.\nB. Fully erase the URL to the content, as opposed to delist which is mainly based on data subject’s name.\nC. Identify other controllers who are processing the same information and inform them of the delisting\n\nrequest.\n\nD. Prevent the article from being listed in search results no matter what search terms are entered into the\nsearch engine.","a":"无（原四项均不准确）","v":"corrected","vd":"已修正（原答案：C；修订：无（原四项均不准确））","e":"现行法下原四项均不准确。EDPB《搜索引擎被遗忘权指南 5/2019》明确指出，GDPR 第 17(2) 条的“通知其他控制\n者”义务通常不适用于搜索引擎，因此无需通知原始发布者或其他搜索引擎（排除 A、C）。去索引通常只要求链接\n不再出现在以数据主体姓名为主要检索条件的结果中，内容仍可通过其他检索条件访问（排除 D）；也不要求一般\n性地从索引或缓存中彻底删除 URL，只有少数例外情形才需完全删除（排除 B）。","t":"监管机构"},{"n":113,"q":"What are the obligations of a processor that engages a sub-processor?","o":"A. The processor must give the controller prior written notice and perform a preliminary audit of the sub-\nprocessor.\n\nB. The processor must obtain the controller’s specific written authorization and provide annual reports on\nthe sub-processor’s performance.\nC. The processor must receive a written agreement that the sub-processor will be fully liable to the\ncontroller for the performance of its obligations in relation to the personal data concerned.\nD. The processor must obtain the consent of the controller and ensure the sub-processor complies with\ndata processing obligations that are equivalent to those that apply to the processor.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 28(4)条规定，处理者委托次级处理者（sub-processor）时，须事先取得控制者的一般或\n特定书面授权，并通过合同确保次级处理者承担与主处理者相同水准的数据保护义务。A（须进行“初步\n审计”，非法定强制要求的具体表述）、B（要求“年度报告”，非法条明确规定的内容）、C（次级处理者\n须对控制者承担“完全责任”的书面协议，责任结构上主处理者仍对控制者负首要责任，次级处理者违约由\n处理者向控制者负责，而非次级处理者直接对控制者负全责）均不准确。知识点：第 28(4)条次级处理者\n的委托授权及等同保护义务要求。","t":"GDPR"},{"n":114,"q":"What must be included in a written agreement between the controller and processor in relation to\nprocessing conducted on the controller’s behalf?","o":"A. An obligation on the processor to report any personal data breach to the controller within 72 hours.\n\nB. An obligation on both parties to report any serious personal data breach to the supervisory authority.\nC. An obligation on both parties to agree to a termination of the agreement if the other party is responsible\nfor a personal data breach.\nD. An obligation on the processor to assist the controller in complying with the controller’s obligations to\nnotify the supervisory authority about personal data breaches.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 28(3)(f)条要求处理者协议中包含处理者协助控制者履行其向监管机构通知数据泄露等义\n务的条款（因为通知监管机构本质上是控制者的义务，处理者需提供必要协助）。A（要求处理者 72 小\n时内报告控制者，72 小时是控制者向监管机构报告的期限，而非处理者向控制者报告的强制期限，处理\n者义务是“不得无故拖延”地通知，无固定 72 小时数字）、B（两方均须报告监管机构，实际上通常仅控\n制者负责对外报告）、C（因泄露而须终止协议，非法定强制条款）均不准确。知识点：第 28(3)条处理\n者协议须包含的协助控制者履行泄露通知义务的条款。","t":"GDPR"},{"n":115,"q":"To provide evidence of GDPR compliance, a company performs an internal audit. As a result, it finds a\ndata base, password-protected, listing all the social network followers of the client.\nRegarding the domain of the controller-processor relationships, how is this situation considered?","o":"A. Compliant with the security principle, because the data base is password-protected.\nB. Non-compliant, because the storage of the data exceeds the tasks contractually authorized by the\ncontroller.\nC. Not applicable, because the data base is password protected, and therefore is not at risk of identifying\nany data subject.\n\nD. Compliant with the storage limitation principle, so long as the internal auditor permanently deletes the\ndata base.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。处理者建立、存储超出委托合同授权范围（如控制者未授权存储全部社交媒体关注者名\n单）的数据库，即便采取了密码保护等安全措施，仍属于超越合同授权范围处理数据的违规行为（违反\n第 28(3)(a)条“仅按控制者指示处理”的核心要求）。A、C 仅关注安全措施本身而忽视了“超范围处理”这一\n核心违规点；D 的表述（内部审计员事后删除即视为合规存储限制）并不能追溯性地使此前的违规存储\n行为合法化。知识点：第 28 条处理者“仅按指示处理”原则及超范围处理的违规认定。","t":"GDPR"},{"n":116,"q":"There are three domains of security covered by Article 32 of the GDPR that apply to both the controller\n\nand the processor. These include all of the following EXCEPT?","o":"A. Consent management and withdrawal.\nB. Incident detection and response.\nC. Preventative security.\nD. Remedial security.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 32 条安全处理要求围绕预防性安全措施（C，如加密、访问控制等）、事件检测与响应\n（B）、补救性安全措施（D，如灾难恢复、可用性保障）等技术组织安全域展开，而“同意管理与撤回”\n属于第 7 条同意规则范畴，并非第 32 条安全处理所涵盖的安全域。知识点：第 32 条安全处理要求所涵盖\n的技术组织安全维度及其与同意规则（第 7 条）的区分。","t":"GDPR"},{"n":117,"q":"In the event of a data breach, which type of information are data controllers NOT required to provide to\neither the supervisory authorities or the data subjects?","o":"A. The predicted consequences of the breach.\nB. The measures being taken to address the breach.\nC. The type of security safeguards used to protect the data.\nD. The contact details of the appropriate data protection officer.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 33、34 条要求控制者向监管机构/数据主体说明的信息包括：泄露性质、可能后果\n（A）、已采取或将采取的补救措施（B）、DPO 联系方式（D）等，但并不要求详细披露“用于保护数据\n所采用的具体安全防护技术类型”——出于安全考虑，过度公开具体安全技术细节反而可能带来二次安全\n风险，因此法律未将此列为强制披露内容。知识点：第 33/34 条数据泄露通知内容清单及不要求披露具体\n安全技术细节的考量。","t":"GDPR"},{"n":118,"q":"In which case would a controller who has undertaken a DPIA most likely need to consult with a\nsupervisory authority?","o":"A. Where the DPIA identifies that personal data needs to be transferred to other countries outside of the\nEEA.\nB. Where the DPIA identifies high risks to individuals’ rights and freedoms that the controller can take\nsteps to reduce.\nC. Where the DPIA identifies that the processing being proposed collects the sensitive data of EU\ncitizens.\nD. Where the DPIA identifies risks that will require insurance for protecting its business interests.","a":"无（B 仅在“无法充分降低风险”时才正确）","v":"corrected","vd":"已修正（原答案：B；修订：无（B 仅\n在“无法充分降低风险”时才正确））","e":"现行法下原四项没有完全正确的答案。GDPR 第 36(1) 条要求：DPIA 显示在控制者未采取措施降低风险的情况下，\n拟议处理仍会造成高风险，或采取合理措施后仍存在无法充分降低的残余高风险，才须在处理前咨询监管机构。B\n若把“the controller can take steps to reduce”改为“the controller cannot sufficiently reduce”，才是准确表述。","t":"GDPR"},{"n":119,"q":"According to the GDPR, what is the main task of a Data Protection Officer (DPO)?","o":"A. To create and maintain records of processing activities.\nB. To conduct Privacy Impact Assessments on behalf of the controller or processor.\nC. To monitor compliance with other local or European data protection provisions.\nD. To create procedures for notification of personal data breaches to competent supervisory authorities.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 39(1)(b)条将“监督遵守 GDPR 及其他欧盟/成员国数据保护规定的情况”列为 DPO 的核心\n任务之一。制作处理活动记录（A）、开展 DPIA（B，DPO 应就 DPIA 提供建议并监督其执行，但 DPIA\n本身由控制者负责开展而非 DPO 代为执行）、制定数据泄露通知流程（D）均是 DPO 可能参与协助的具\n体工作，但并非第 39 条概括性描述的“主要任务”本身，监督合规才是 DPO 最核心、最具概括性的职责。\n知识点：第 39 条 DPO 的法定职责清单及“监督合规”这一核心任务。","t":"GDPR"},{"n":120,"q":"In which of the following cases, cited as an example by a WP29 guidance, would conducting a single data\nprotection impact assessment to address multiple processing operations be allowed?","o":"A. A medical organization that wants to begin genetic testing to support earlier research for which they\nhave performed a DPIA.\nB. A data controller who plans to use a new technology product that has already undergone a DPIA by the\nproduct’s provider.\nC. A marketing team that wants to collect mailing addresses of customers for whom they already have\nemail addresses.\nD. A railway operator who plans to evaluate the same video surveillance in all the train stations of his\ncompany.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。WP29 DPIA 指南举例说明，当处理活动具有高度相似性（如同一铁路运营商在旗下所有车\n站采用相同类型、相同用途的视频监控系统）时，可以针对该类同质化、大规模重复的处理操作开展一\n份综合性 DPIA，而无需逐一评估。A（不同研究目的的新增基因检测项目）、B（依赖供应商已做的\nDPIA 而非自行评估自身具体处理情境的风险，供应商的产品 DPIA 不能替代控制者自身的处理情境评\n估）、C（收集新类别数据用于不同目的，非典型的“同质化重复处理”情形）均不符合 WP29 列举的“单\n一 DPIA 覆盖多重处理”适用情形。知识点：WP29 DPIA 指南关于对相似、重复处理操作可合并评估的例\n外规定。","t":"GDPR"},{"n":121,"q":"Under Article 30 of the GDPR, controllers are required to keep records of all of the following EXCEPT?","o":"A. Incidents of personal data breaches, whether disclosed or not.\nB. Data inventory or data mapping exercises that have been conducted.\n\nC. Categories of recipients to whom the personal data have been disclosed.\nD. Retention periods for erasure and deletion of categories of personal data.","a":"A、B（题目存在多解）","v":"corrected","vd":"已修正（原答案：A；修订：A、B（题目存在多解））","e":"本题存在多解。GDPR 第 30(1) 条的法定记录内容包括处理目的、数据主体与数据类别、接收方类别、跨境传输、预\n计删除期限及安全措施概述等。数据泄露事件记录属于第 33(5) 条的独立义务，因此 A 不属于第 30 条法定内容；\n“已开展的数据盘点或数据映射活动”本身也不是第 30(1) 条要求必须写入记录的项目，因此 B 同样符合“EXCEPT”。\nC、D 则属于第 30 条要求。","t":"GDPR"},{"n":122,"q":"In which scenario is a Controller most likely required to undertake a Data Protection Impact Assessment?","o":"A. When the controller is collecting email addresses from individuals via an online registration form for\nmarketing purposes.\nB. When personal data is being collected and combined with other personal data to profile the\ncreditworthiness of individuals.\nC. When the controller is required to have a Data Protection Officer.\nD. When personal data is being transferred outside of the EEA.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。结合个人数据评估信用状况属于典型的“画像”评估个人经济状况、可靠性等方面特征的行\n为，且往往涉及大规模、系统性评估并可能对个人产生重大法律或类似重大影响（如信贷决策），属于\nWP29 DPIA 指南明确列举的高风险情形，须开展 DPIA。A（简单收集邮箱用于营销）、C（企业设有\nDPO 本身并非 DPIA 触发条件）、D（跨境传输本身若非结合其他高风险因素，不必然触发 DPIA）均非\n典型高风险情形。知识点：第 35(3)(a)条及 WP29 指南——大规模画像评估信用等重大决策场景须做\nDPIA。","t":"GDPR"},{"n":123,"q":"Which of the following demonstrates compliance with the accountability principle found in Article 5,\nSection\n\n2 of the GDPR?","o":"A. Anonymizing special categories of data.\n\nB. Conducting regular audits of the data protection program.\n\nC. Getting consent from the data subject for a cross border data transfer.\n\nD. Encrypting data in transit and at rest using strong encryption algorithms. 6","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 5(2)条问责制原则要求控制者不仅要遵守数据保护原则，还须能够证明其合规，定期开展\n数据保护项目内部审计正是主动证明并持续验证合规状态的典型问责制实践。A（匿名化特殊类别数据，\n属于具体的数据最小化/安全技术措施而非问责制的直接体现）、C（获得跨境传输同意，属于合法依据/\n传输机制层面）、D（加密静态和传输中数据，属于第 32 条安全措施）均是具体合规动作，而非“证明并\n持续管理整体合规状态”这一问责制原则的典型例证。知识点：第 5(2)条问责制原则及其典型落地措施\n（内部审计）。","t":"GDPR"},{"n":124,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nDynaroux Fashion (‘Dynaroux’) is a successful international online clothing retailer that employs\napproximately 650 people at its headquarters based in Dublin, Ireland. Ronan is their recently appointed\ndata protection officer, who oversees the company’s compliance with the General Data Protection\nRegulation (GDPR) and other privacy legislation.\n\nThe company offers both male and female clothing lines across all age demographics, including children.\nIn doing so, the company processes large amounts of information about such customers, including\npreferences and sensitive financial information such as credit card and bank account numbers.\n\nIn an aggressive bid to build revenue growth, Jonas, the CEO, tells Ronan that the company is launching a\nnew mobile app and loyalty scheme that puts significant emphasis on profiling the company’s customers\nby analyzing their purchases. Ronan tells the CEO that: (a) the potential risks of such activities means that\nDynaroux needs to carry out a data protection impact assessment to assess this new venture and its\nprivacy implications; and (b) where the results of this assessment indicate a high risk in the absence of\nappropriate protection measures, Dynaroux may have to undertake a prior consultation with the Irish Data\nProtection Commissioner before implementing the app and loyalty scheme.\n\nJonas tells Ronan that he is not happy about the prospect of having to directly engage with a supervisory\nauthority and having to disclose details of Dynaroux’s business plan and associated processing activities.\n\nWhich of the following facts about Dynaroux would trigger a data protection impact assessment under the\nGDPR?","o":"A. The company will be undertaking processing activities involving sensitive data categories such as\nfinancial and children’s data.\nB. The company employs approximately 650 people and will therefore be carrying out extensive\n\nprocessing activities.\nC. The company plans to undertake profiling of its customers through analysis of their purchasing\npatterns.\nD. The company intends to shift their business model to rely more heavily on online shopping.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。基于购买行为分析对客户进行画像评估，属于第 35(3)(a)条列举的“系统性、广泛评估个人特\n征以致对个人产生重大影响”情形，是触发 DPIA 的直接原因。A（涉及金融和儿童敏感数据类别，虽是\n风险因素之一，但触发本题 DPIA 的关键情节是画像本身而非数据类别）、B（员工人数不是 DPIA 触发\n标准）、D（商业模式转型不构成 DPIA 触发条件）均不是最直接、最贴切的触发因素。知识点：第\n35(3)(a)条画像评估作为 DPIA 触发情形之一。","t":"GDPR"},{"n":125,"q":"Which mechanism, new to the GDPR, now allows for the possibility of personal data transfers to third\ncountries under Article 42?","o":"A. Approved certifications.\nB. Binding corporate rules.\n\nC. Law enforcement requests.\n\nD. Standard contractual clauses.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 42 条引入的“认证机制”（approved certification，如获批的数据保护印章/标志）是 GDPR\n新增的跨境传输保障工具之一（第 46(2)(f)条），使已获得认证并作出具有约束力承诺的数据接收方可依\n此进行跨境传输。约束性企业规则（B）和标准合同条款（D）并非 GDPR 新创设的机制，二者在\n95/46/EC 指令体系下已存在（BCRs 为 WP29 实践发展而来，SCCs 为欧盟委员会决定所创设），执法请\n求（C）与跨境传输合法机制无关。知识点：第 42、46 条新增的“认证”作为跨境传输保障机制。","t":"历史沿革/95-46-EC"},{"n":126,"q":"Which sentence best describes proper compliance for an international organization using Binding\nCorporate Rules (BCRs) as a controller or processor?","o":"A. Employees must sign an ad hoc contractual agreement each time personal data is exported.\nB. All employees are subject to the rules in their entirety, regardless of where the work is taking place.\nC. All employees must follow the privacy regulations of the jurisdictions where the current scope of their\nwork is established.\nD. Employees who control personal data must complete a rigorous certification procedure, as they are\nexempt from legal enforcement.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。约束性企业规则（BCRs）一经获批，即对企业集团内部所有相关实体及其员工具有统一约\n束力，无论其身处哪个司法管辖区，都须遵守同一套集团内部规则，这正是 BCRs 作为“全球统一方案”的\n核心特征。A（每次数据出境须单独签订临时合同，与 BCRs“一次审批、持续适用”的特性相悖）、C\n（须遵守其所在辖区隐私法规，混淆了 BCRs 作为集团内部统一标准与各地本地法律遵从的关系）、D\n（可豁免法律责任，明显错误，BCRs 并不豁免任何法定义务或责任）均不准确。知识点：约束性企业规\n则（BCRs）对企业集团内部的统一约束效力。","t":"GDPR"},{"n":127,"q":"With respect to international transfers of personal data, the European Data Protection Board (EDPB)\nconfirmed that derogations may be relied upon under what condition?","o":"A. If the data controller has received preapproval from a Data Protection Authority (DPA), after submitting\nthe appropriate documents.\nB. When it has been determined that adequate protection can be performed.\n\nC. Only if the Data Protection Impact Assessment (DPIA) shows low risk.\nD. Only as a last resort and when interpreted restrictively.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。欧洲法院 Schrems II 判决后，EDPB 在其关于第 49 条克减条款（derogations，如明确同意、\n合同必需等）的常见问题解答中强调：这些克减情形应作为跨境传输的“最后手段”（last resort），且须严\n格限缩解释，不能作为常规传输机制的替代。A（须 DPA 事先批准，非法定要求）、B（存在“充分保护”\n的判断，恰恰与克减条款适用于缺乏适当保障机制情形下的例外性质相悖）、C（DPIA 显示低风险，非\n第 49 条的判断标准）均不准确。知识点：第 49 条克减条款的“最后手段”属性及限缩解释原则（Schrems\nII 判决后 EDPB 指引）。","t":"判例法"},{"n":128,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nT-Craze, a German-headquartered specialty t-shirt company, was successfully selling to large German\nmetropolitan cities. However, after a recent merger with another German-based company that was selling\nto a broader European market, T-Craze revamped its marketing efforts to sell to a wider audience. These\nefforts included a complete redesign of its logo to reflect the recent merger, and improvements to its\nwebsite meant to capture more information about visitors through the use of cookies.\n\nT-Craze also opened various office locations throughout Europe to help expand its business. While\nGermany continued to host T-Craze’s headquarters and main product-design office, its French affiliate\nbecame responsible for all marketing and sales activities. The French affiliate recently procured the\nservices of Right Target, a renowned marketing firm based in the Philippines, to run its latest marketing\ncampaign. After thorough research, Right Target determined that T-Craze is most successful with\ncustomers between the ages of 18 and 22. Thus, its first campaign targeted university students in several\nEuropean capitals, which yielded nearly 40% new customers for T-Craze in one quarter. Right Target also\nran subsequent campaigns for T-Craze, though with much less success.\n\nThe last two campaigns included a wider demographic group and resulted in countless unsubscribe\n\nrequests, including a large number in Spain. In fact, the Spanish data protection authority received a\n\ncomplaint from Sofia, a mid-career investment banker. Sofia was upset after receiving a marketing\ncommunication even after unsubscribing from such communications from the Right Target on behalf of T-\nCraze.\n\nWhich of the following is T-Craze’s lead supervisory authority?","o":"A. Germany, because that is where T-Craze is headquartered.\nB. France, because that is where T-Craze conducts processing of personal information.\nC. Spain, because that is T-Craze’s primary market based on its marketing campaigns.\nD. T-Craze may choose its lead supervisory authority where any of its affiliates are based, because it has\npresence in several European countries.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。主导监管机构的认定核心标准是控制者“主要设立地”，即实际作出关于处理目的和方式决策\n的地点（第 4(16)条）；本案中，T-Craze 的营销和销售决策实际由其法国分支负责，即实际处理决策发生\n地在法国，因此法国监管机构（CNIL）为主导监管机构，而非仅因总部所在地德国（A）、市场规模较\n大的西班牙（C）或可任意选择（D，主要设立地须依据实际决策地这一客观标准确定，而非企业自由选\n择）。知识点：第 4(16)条主导监管机构认定标准——实际处理决策地而非总部注册地。","t":"ePrivacy指令"},{"n":129,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nT-Craze, a German-headquartered specialty t-shirt company, was successfully selling to large German\nmetropolitan cities. However, after a recent merger with another German-based company that was selling\nto a broader European market, T-Craze revamped its marketing efforts to sell to a wider audience. These\nefforts included a complete redesign of its logo to reflect the recent merger, and improvements to its\nwebsite meant to capture more information about visitors through the use of cookies.\n\nT-Craze also opened various office locations throughout Europe to help expand its business. While\nGermany continued to host T-Craze’s headquarters and main product-design office, its French affiliate\n\nbecame responsible for all marketing and sales activities. The French affiliate recently procured the\nservices of Right Target, a renowned marketing firm based in the Philippines, to run its latest marketing\ncampaign. After thorough research, Right Target determined that T-Craze is most successful with\ncustomers between the ages of 18 and 22. Thus, its first campaign targeted university students in several\nEuropean capitals, which yielded nearly 40% new customers for T-Craze in one quarter. Right Target also\nran subsequent campaigns for T-Craze, though with much less success.\n\nThe last two campaigns included a wider demographic group and resulted in countless unsubscribe\nrequests, including a large number in Spain. In fact, the Spanish data protection authority received a\ncomplaint from Sofia, a mid-career investment banker. Sofia was upset after receiving a marketing\ncommunication even after unsubscribing from such communications from the Right Target on behalf of T-\n\nCraze.\n\nWhy does the Spanish supervisory authority notify the French supervisory authority when it opens an\ninvestigation into T-Craze based on Sofia’s complaint?","o":"A. T-Craze has a French affiliate.\nB. The French affiliate procured the services of Right Target.\nC. T-Craze conducts its marketing and sales activities in France.\nD. The Spanish supervisory authority is providing a courtesy notification not required under the GDPR.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。西班牙监管机构收到投诉后通知法国监管机构，是因为根据第 56(3)条一站式合作机制，涉\n及跨境处理的投诉应转交由主导监管机构（本案为法国 CNIL，因其负责该处理活动的决策）处理，而\nRight Target 受法国分支委托开展了该营销活动，说明处理决策与法国存在关联，因此触发向法国通知的\n合作程序。A（仅因有法国分支的事实本身不足以说明理由）、C（营销活动实际是在法国分支决策下开\n展的，而非“T-Craze 在法国开展营销销售活动”这一泛泛表述）、D（并非“礼貌性通知”，而是法定的一\n站式合作程序要求）均不如 B 准确。知识点：第 56 条一站式合作机制下跨境投诉向主导监管机构转交的\n程序。","t":"ePrivacy指令"},{"n":130,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nT-Craze, a German-headquartered specialty t-shirt company, was successfully selling to large German\n\nmetropolitan cities. However, after a recent merger with another German-based company that was selling\nto a broader European market, T-Craze revamped its marketing efforts to sell to a wider audience. These\nefforts included a complete redesign of its logo to reflect the recent merger, and improvements to its\nwebsite meant to capture more information about visitors through the use of cookies.\n\nT-Craze also opened various office locations throughout Europe to help expand its business. While\nGermany continued to host T-Craze’s headquarters and main product-design office, its French affiliate\nbecame responsible for all marketing and sales activities. The French affiliate recently procured the\nservices of Right Target, a renowned marketing firm based in the Philippines, to run its latest marketing\ncampaign. After thorough research, Right Target determined that T-Craze is most successful with\ncustomers between the ages of 18 and 22. Thus, its first campaign targeted university students in several\nEuropean capitals, which yielded nearly 40% new customers for T-Craze in one quarter. Right Target also\nran subsequent campaigns for T-Craze, though with much less success.\n\nThe last two campaigns included a wider demographic group and resulted in countless unsubscribe\nrequests, including a large number in Spain. In fact, the Spanish data protection authority received a\ncomplaint from Sofia, a mid-career investment banker. Sofia was upset after receiving a marketing\ncommunication even after unsubscribing from such communications from the Right Target on behalf of T-\nCraze.\n\nWhat is the best option for the lead regulator when responding to the Spanish supervisory authority’s\nnotice that it plans to take action regarding Sofia’s complaint?","o":"A. Accept, because it did not receive any complaints.\nB. Accept, because GDPR permits non-lead authorities to take action for such complaints.\nC. Reject, because Right Target’s processing was conducted throughout Europe.\nD. Reject, because GDPR does not allow other supervisory authorities to take action if there is a lead\nauthority.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。GDPR 并未赋予主导监管机构对所有跨境投诉案件的绝对排他管辖权；对于具有纯粹本地影\n响、仅涉及本地设立机构且不实质影响其他成员国数据主体的投诉，非主导监管机构（此处为西班牙监\n管机构）依第 56(2)条仍可自行处理，主导监管机构应予接受（accept）而非拒绝，这体现了一站式机制\n“仅适用于跨境处理”的边界。A、C、D 均误解了一站式机制关于本地事项处理权限保留的规则。知识\n点：第 56(2)条“仅本地影响”例外——非主导监管机构对纯粹本地投诉的处理权限。","t":"ePrivacy指令"},{"n":131,"q":"Which of the following is one of the supervisory authority’s investigative powers?","o":"A. To notify the controller or the processor of an alleged infringement of the GDPR.\nB. To require that controllers or processors adopt approved data protection certification mechanisms.\nC. To determine whether a controller or processor has the right to a judicial remedy concerning a\ncompensation decision made against them.\nD. To require data controllers to provide them with written notification of all new processing activities.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 58(1)条列明监管机构的调查权，包括：要求提供信息、开展数据保护审计、访问处理场\n所设备、以及就涉嫌违反 GDPR 的情况向控制者/处理者发出通知等。B（要求采纳认证机制）属于第\n58(3)条的“授权权力”而非调查权；C（裁定司法救济权，属于法院职权而非监管机构调查权）；D（要求\n就所有新处理活动提交书面通知，GDPR 已废除一般性通知义务）均不属于第 58(1)条调查权范畴。知识\n点：第 58 条监管机构三类职权——调查权、更正权、授权权的区分。","t":"GDPR"},{"n":132,"q":"Many businesses print their employees’ photographs on building passes, so that employees can be\nidentified by security staff. This is notwithstanding the fact that facial images potentially qualify as biometric\ndata under the GDPR. Why would such practice be permitted?","o":"A. Because use of biometric data to confirm the unique identification of data subjects benefits from an\n\nexemption.\n\nB. Because photographs qualify as biometric data only when they undergo a “specific technical\nprocessing”.\nC. Because employees are deemed to have given their explicit consent when they agree to be\n\nphotographed by their employer.\n\nD. Because photographic ID is a physical security measure which is “necessary for reasons of substantial\n\npublic interest”.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。前言第 51 条及第 9 条明确，只有照片经过“特定技术处理”（specific technical processing，如\n面部识别算法提取生物特征模板）以实现对个人的唯一识别或验证，才构成生物识别特殊类别数据；企\n业门禁卡上普通打印的照片仅用于人工目视识别，未经过此类特定技术处理，因此不构成第 9 条意义上\n的生物识别数据，无需援引特殊类别数据处理的例外。A（笼统的“豁免”表述不准确）、C（默示同意的\n说法不成立，未必构成有效同意）、D（“重大公共利益”例外通常适用于更严格的场景，非普通门禁照片\n的准确依据）均不如 B 准确抓住问题核心。知识点：前言第 51 条“特定技术处理”作为区分普通照片与生\n物识别数据的关键标准。","t":"GDPR"},{"n":133,"q":"A worker in a European Union (EU) member state has ceased his employment with a company. What\nshould the employer most likely do in regard to the worker’s personal data?","o":"A. Destroy sensitive information and store the rest per applicable data protection rules.\nB. Store all of the data in case the departing worker makes a subject access request.\nC. Securely store the data that is required to be kept under local law.\nD. Provide the employee the reasons for retaining the data.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。员工离职后，雇主应依据存储限制原则（第 5(1)(e)条），仅保留依据当地劳动法、税法等\n法律法规要求必须留存的数据（如社保记录、税务记录等），并依法定期限保存，而非无限期保留所有\n数据（B）、简单区分“敏感与否”笼统处理（A，并非法定的处理标准）或需向员工说明留存理由（D，\n非普遍强制的操作要求，尽管良好实践中告知留存政策是有益的）。知识点：第 5(1)(e)条存储限制原则\n在员工离职后数据处理中的应用。","t":"GDPR"},{"n":134,"q":"Which of the following is NOT a role of works councils?","o":"A. Determining the monetary fines to be levied against employers for data breach violations of employee\ndata.\nB. Determining whether to approve or reject certain decisions of the employer that affect employees.\nC. Determining whether employees’ personal data can be processed or not.\nD. Determining what changes will affect employee working conditions.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。雇员代表机构（works council）依据劳动法在涉及影响员工权益的决策（如引入新的员工监\n控系统、处理员工个人数据的政策，B、C、D 均是其常见职权范围）中享有知情、协商甚至否决权，但\n对违反数据保护法的行政罚款金额认定和裁量属于监管机构和/或法院的法定职权，并非工会/员工代表机\n构的角色。知识点：员工代表机构（Works Council）在数据保护相关事务中的协商/审批角色，及其与监\n管机构行政处罚权的区分。","t":"GDPR"},{"n":135,"q":"Under the Data Protection Law Enforcement Directive of the EU, a government can carry out covert\ninvestigations involving personal data, as long it is set forth by law and constitutes a measure that is both\nnecessary and what?","o":"A. Prudent.\nB. Important.\nC. Proportionate.\nD. DPA-approved.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。欧盟执法指令（Law Enforcement Directive）及其他涉及国家安全/执法领域的欧盟法律框架\n普遍要求，任何限制隐私权的措施（包括秘密调查）须同时满足“必要性”和“比例性”（proportionate）两\n项条件，这也是欧盟基本权利宪章第 52(1)条对权利限制的一般要求。A（审慎）、B（重要）、D（须经\nDPA 批准）均非该法律框架下的标准用语和要求。知识点：欧盟基本权利限制的比例原则要求，执法指\n令下秘密调查的合法性条件。","t":"LED执法指令"},{"n":136,"q":"Which GDPR requirement will present the most significant challenges for organizations with Bring Your\n\nOwn Device (BYOD) programs?","o":"A. Data subjects must be sufficiently informed of the purposes for which their personal data is processed.\nB. Processing of special categories of personal data on a large scale requires appointing a DPO.\nC. Personal data of data subjects must always be accurate and kept up to date.\nD. Data controllers must be in control of the data they hold at all times.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。BYOD 环境下，个人数据分散存储在员工自有设备中，企业往往难以像管理企业统一设备\n那样，随时掌控数据的存储位置、访问权限及安全状况，这对“控制者须始终掌控其所持有数据”这一核心\n合规要求（呼应问责制及安全原则）构成最大挑战。A（透明度告知）、B（大规模处理特殊类别数据须\n设 DPO，与 BYOD 本身无直接必然关联）、C（准确性原则）相对而言不是 BYOD 场景下最突出的合规\n难点。知识点：BYOD 环境下数据控制力与安全管理的合规挑战。","t":"GDPR"},{"n":137,"q":"A company in France suffers a robbery over the weekend owing to a faulty alarm system. When it is\ndetermined that the break-in involves the loss of a substantial amount of data, the company decides on a\nCCTV system to monitor for future incidents. Company technicians install cameras in the entrance of the\nbuilding, hallways and offices. Footage is recorded continuously, and is monitored by the home office in\nthe United States. What is the most realistic step the company could take to address their security\nconcerns and comply with the personal data processing principles set out in Article 5 of the GDPR?","o":"A. Seek informed consent from company employees.\nB. Have cameras recording during work hours only.\nC. Retain captured footage for no more than 30 days.\nD. Restrict camera placement to building entrances only.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。依据数据最小化原则（第 5(1)(c)条），CCTV 监控应限于实现安全目的所必需的范围；本案\n中安全隐患源于入室盗窃，将摄像头限制安装在建筑入口等关键出入位置即可满足安防需求，无需在办\n公室、走廊等非必要区域全面持续监控（这会造成过度监控，侵犯员工隐私）。A（笼统寻求员工同意，\n在雇佣关系权力不对等下并非合适的合法依据，也非该场景下的“现实”解决方案）、B（仅工作时间录\n像，与防范周末此类非工作时间入室盗窃的安全目的相悖）、C（留存不超过 30 天，属于留存期限问题\n而非本题聚焦的“数据最小化-摄像头布设范围”问题）均不如 D 贴切。知识点：第 5(1)(c)条数据最小化原\n则在 CCTV 监控范围设计中的应用。","t":"GDPR"},{"n":138,"q":"Which of the following is an example of direct marketing that would be subject to European data protection\nlaws?","o":"A. An updated privacy notice sent to an individual’s personal email address.\nB. A charity fundraising event notice sent to an individual at her business address.\nC. A service outage notification provided to an individual by recorded telephone message.\nD. A revision of contract terms conveyed to an individual by SMS from a marketing organization.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。以个人身份（而非仅工作身份）向个人商业地址寄送慈善筹款活动通知，属于以说服个人\n参与/捐赠为目的的直接营销信息，落入欧盟数据保护及 ePrivacy 规则对直接营销的规制范围。A（隐私\n政策更新，属于合规告知而非营销）、C（服务中断通知，属于服务性/事务性通信，非营销）、D（合同\n条款变更通知，同样属于服务性通知）均不构成“直接营销”性质的信息。知识点：直接营销的认定标准—\n—以说服个人购买/参与为目的的商业性信息，区别于服务性/事务性通信。","t":"ePrivacy指令"},{"n":139,"q":"Article 9 of the GDPR lists exceptions to the general prohibition against processing biometric data. Which\nof the following is NOT one of these exceptions?","o":"A. The processing is done by a non-profit organization and the results are disclosed outside the\norganization.\nB. The processing is necessary to protect the vital interests of the data subject when he or she is\nincapable of giving consent.\nC. The processing is necessary for the establishment, exercise or defense of legal claims when courts are\n\nacting in a judicial capacity.\n\nD. The processing is explicitly consented to by the data subject and he or she is allowed by Union or\nMember State law to lift the prohibition.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 9(2)条列举的处理生物识别等特殊类别数据的例外情形包括：数据主体明确同意且法律允\n许（D）、保护数据主体重大利益（B）、司法程序中确立/行使/抗辩法律权利（C）、以及公共利益、就\n业社保、医疗卫生、科研统计等具体法定情形，但并未包括“非营利组织处理后向组织外部披露结果”这一\n情形——非营利组织身份本身不构成脱离第 9 条限制的独立例外依据。知识点：第 9(2)条特殊类别数据处\n理例外情形的封闭列举，非营利组织身份本身不构成豁免理由。","t":"GDPR"},{"n":140,"q":"Which marketing-related activity is least likely to be covered by the provisions of Privacy and Electronic\nCommunications Regulations (Directive 2002/58/EC)?","o":"A. Advertisements passively displayed on a website.\nB. The use of cookies to collect data about an individual.\nC. A text message to individuals from a company offering concert tickets for sale.\nD. An email from a retail outlet promoting a sale to one of their previous customer.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。ePrivacy 指令（2002/58/EC，及后续修订）主要规制通过电子通信手段（如电话、短信、邮\n件、cookie 等）针对特定个人进行的直接营销和电子通信隐私事项；网站上被动展示、面向所有访客的一\n般性广告展示（并非针对特定个人发送的定向通信），通常不落入该指令关于直接营销同意规则的规制\n范围（可能受其他广告或 cookie 相关规则约束，但非典型的“直接营销通信”）。B（cookie 追踪，属于\nePrivacy 核心规制对象）、C（短信营销）、D（邮件营销，均属于典型的电子直接营销通信）均受该指\n令规制。知识点：ePrivacy 指令对直接营销电子通信的规制范围及被动展示广告与定向通信的区分。","t":"ePrivacy指令"},{"n":141,"q":"Which of the following is NOT recognized as being a common characteristic of cloud-computing services?","o":"A. The service’s infrastructure is shared among the supplier’s customers and can be located in a number\nof countries.\nB. The supplier determines the location, security measures, and service standards applicable to the\nprocessing.\n\nC. The supplier allows customer data to be transferred around the infrastructure according to capacity.\nD. The supplier assumes the vendor’s business risk associated with data processed by the supplier.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。云计算服务的典型特征包括：基础设施在多个客户间共享且可能跨多国分布（A）、由云服\n务商决定基础设施位置及部分安全标准（B）、数据可根据资源容量在基础设施间灵活迁移（C），但云\n服务商作为处理者（或在特定情形下的控制者）通常不会因此“承担”客户企业作为控制者对其处理活动所\n负的整体业务风险与法律责任——责任划分仍依双方合同及各自角色（控制者/处理者）确定，供应商并\n不天然“接手”客户的业务风险。知识点：云计算服务的一般特征及云服务商与客户之间的责任划分（并非\n风险转移）。","t":"GDPR"},{"n":142,"q":"When may browser settings be relied upon for the lawful application of cookies?","o":"A. When a user rejects cookies that are strictly necessary.\nB. When users are aware of the ability to adjust their settings.\nC. When users are provided with information about which cookies have been set.\nD. When it is impossible to bypass the choices made by users in their browser settings.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。ICO 指引指出，若技术上用户在浏览器中所做的 cookie 选择设置能够被网站可靠地读取并\n严格遵从（即网站无法绕过用户设置擅自放置 cookie），浏览器设置理论上可作为合法获取同意的手段\n之一；但由于目前技术上难以保证网站始终准确识别并完全遵从各类浏览器设置，实践中很少能真正满\n足这一条件。A（拒绝严格必要 cookie，与合法性判断无关，严格必要 cookie 本就无需同意）、B（用户\n知晓可调整设置，仅是必要条件之一，不充分）、C（被告知已设置哪些 cookie，同样只是透明度层面的\n部分要求）均不完整。知识点：浏览器设置作为 cookie 同意机制的有效性条件——须确保用户选择不可\n被绕过。","t":"ePrivacy指令"},{"n":143,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nThe fitness company Vigotron has recently developed a new app called M-Health, which it wants to market\n\non its website as a free download. Vigotron’s marketing manager asks his assistant Emily to create a\n\nwebpage that describes the app and specifies the terms of use. Emily, who is new at Vigotron, is excited\nabout this task. At her previous job she took a data protection class, and though the details are a little\n\nhazy, she recognizes that Vigotron is going to need to obtain user consent for use of the app in some\n\ncases. Emily sketches out the following draft, trying to cover as much as possible before sending it to\nVigotron’s legal department.\n\nRegistration Form\n\nVigotron’s new M-Health app makes it easy for you to monitor a variety of health-related activities,\nincluding diet, exercise, and sleep patterns. M-Health relies on your smartphone settings (along with other\nthird-party apps you may already have) to collect data about all of these important lifestyle elements, and\nprovide the information necessary for you to enrich your quality of life. (Please click here to read a full\ndescription of the services that M-Health provides.)\n\nVigotron values your privacy. The M-Health app allows you to decide which information is stored in it, and\nwhich apps can access your data. When your device is locked with a passcode, all of your health and\nfitness data is encrypted with your passcode. You can back up data stored in the Health app to Vigotron’s\n\ncloud provider, Stratculous. (Read more about Stratculous here.)\n\nVigotron will never trade, rent or sell personal information gathered from the M-Health app. Furthermore,\nwe will not provide a customer’s name, email address or any other information gathered from the app to\nany third-party without a customer’s consent, unless ordered by a court, directed by a subpoena, or to\nenforce the manufacturer’s legal rights or protect its business or property.\n\nWe are happy to offer the M-Health app free of charge. If you want to download and use it, we ask that you\nfirst complete this registration form. (Please note that use of the M-Health app is restricted to adults aged\n16 or older, unless parental consent has been given to minors intending to use it.)\n\nFirst name:\nSurname:\nYear of birth:\nEmail:\n\nPhysical Address (optional*):\nHealth status:\n\n*If you are interested in receiving newsletters about our products and services that we think may be of\ninterest to you, please include your physical address. If you decide later that you do not wish to receive\nthese newsletters, you can unsubscribe by sending an email to unsubscribe@vigotron.com or send a letter\nwith your request to the address listed at the bottom of this page.\n\nTerms and Conditions\n\n1. Jurisdiction. […]\n2. Applicable law. […]\n3. Limitation of liability. […]\n\nConsent\n\nBy completing this registration form, you attest that you are at least 16 years of age, and that you consent\nto the processing of your personal data by Vigotron for the purpose of using the M-Health app. Although\nyou are entitled to opt out of any advertising or marketing, you agree that Vigotron may contact you or\nprovide you with any required notices, agreements, or other information concerning the services by email\nor other electronic means. You also agree that the Company may send automated emails with alerts\nregarding any problems with the M-Health app that may affect your well being.\n\nEmily sends the draft to Sam for review. Which of the following is Sam most likely to point out as the\nbiggest problem with Emily’s consent provision?","o":"A. It is not legal to include fields requiring information regarding health status without consent.\nB. Processing health data requires explicit consent, but the form does not ask for explicit consent.\n\nC. Direct marketing requires explicit consent, whereas the registration form only provides for a right to\n\nobject\n\nD. The provision of the fitness app should be made conditional on the consent to the data processing for\ndirect marketing.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。健康数据属于第 9 条特殊类别数据，处理须取得“明确同意”（explicit consent），而 Emily\n起草的注册表格仅笼统地要求用户“同意处理个人数据以使用 App”，并未针对健康状况这一特殊类别数据\n单独征求符合更高标准的明确同意，这是最大的合规漏洞。A（健康状况字段本身收集并无不合法，只是\n需明确同意）、C（表述不准确，题目更核心问题在于健康数据同意标准而非营销同意机制本身的对\n错）、D（将服务提供与营销同意捆绑属另一违规问题，但非 Sam 最先指出的“最大”问题）均不如 B 贴\n切。知识点：第 9(2)(a)条特殊类别数据的“明确同意”标准，区别于一般处理的普通同意。","t":"GDPR"},{"n":144,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nThe fitness company Vigotron has recently developed a new app called M-Health, which it wants to market\non its website as a free download. Vigotron’s marketing manager asks his assistant Emily to create a\nwebpage that describes the app and specifies the terms of use. Emily, who is new at Vigotron, is excited\nabout this task. At her previous job she took a data protection class, and though the details are a little\nhazy, she recognizes that Vigotron is going to need to obtain user consent for use of the app in some\ncases. Emily sketches out the following draft, trying to cover as much as possible before sending it to\nVigotron’s legal department.\n\nRegistration Form\n\nVigotron’s new M-Health app makes it easy for you to monitor a variety of health-related activities,\nincluding diet, exercise, and sleep patterns. M-Health relies on your smartphone settings (along with other\nthird-party apps you may already have) to collect data about all of these important lifestyle elements, and\nprovide the information necessary for you to enrich your quality of life. (Please click here to read a full\ndescription of the services that M-Health provides.)\n\nVigotron values your privacy. The M-Health app allows you to decide which information is stored in it, and\nwhich apps can access your data. When your device is locked with a passcode, all of your health and\n\nfitness data is encrypted with your passcode. You can back up data stored in the Health app to Vigotron’s\ncloud provider, Stratculous. (Read more about Stratculous here.)\n\nVigotron will never trade, rent or sell personal information gathered from the M-Health app. Furthermore,\nwe will not provide a customer’s name, email address or any other information gathered from the app to\nany third-party without a customer’s consent, unless ordered by a court, directed by a subpoena, or to\nenforce the manufacturer’s legal rights or protect its business or property.\n\nWe are happy to offer the M-Health app free of charge. If you want to download and use it, we ask that you\n\nfirst complete this registration form. (Please note that use of the M-Health app is restricted to adults aged\n16 or older, unless parental consent has been given to minors intending to use it.)\n\nFirst name:\nSurname:\nYear of birth:\nEmail:\nPhysical Address (optional*):\nHealth status:\n\n*If you are interested in receiving newsletters about our products and services that we think may be of\ninterest to you, please include your physical address. If you decide later that you do not wish to receive\nthese newsletters, you can unsubscribe by sending an email to unsubscribe@vigotron.com or send a letter\nwith your request to the address listed at the bottom of this page.\n\nTerms and Conditions\n\n1. Jurisdiction. […]\n2. Applicable law. […]\n3. Limitation of liability. […]\n\nConsent\n\nBy completing this registration form, you attest that you are at least 16 years of age, and that you consent\n\nto the processing of your personal data by Vigotron for the purpose of using the M-Health app. Although\nyou are entitled to opt out of any advertising or marketing, you agree that Vigotron may contact you or\n\nprovide you with any required notices, agreements, or other information concerning the services by email\nor other electronic means. You also agree that the Company may send automated emails with alerts\nregarding any problems with the M-Health app that may affect your well being.\n\nIf a user of the M-Health app were to decide to withdraw his consent, Vigotron would first be required to do\nwhat?","o":"A. Provide the user with logs of data collected through use of the app.\nB. Erase any data collected from the time the app was first used.\nC. Inform any third parties of the user’s withdrawal of consent.\nD. Cease processing any data collected through use of the app.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 7(3)条规定，同意撤回后，控制者应立即停止基于该同意的处理活动，这是撤回同意后的\n首要、直接义务。删除既往收集的数据（B）、告知第三方（C）、提供数据日志（A）可能是后续需要\n考虑的事项，但并非撤回同意后“首先”必须履行的义务，停止处理才是第一步。知识点：第 7(3)条同意撤\n回后控制者的首要义务——立即停止处理。","t":"GDPR"},{"n":145,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nThe fitness company Vigotron has recently developed a new app called M-Health, which it wants to market\non its website as a free download. Vigotron’s marketing manager asks his assistant Emily to create a\nwebpage that describes the app and specifies the terms of use. Emily, who is new at Vigotron, is excited\nabout this task. At her previous job she took a data protection class, and though the details are a little\n\nhazy, she recognizes that Vigotron is going to need to obtain user consent for use of the app in some\ncases. Emily sketches out the following draft, trying to cover as much as possible before sending it to\nVigotron’s legal department.\n\nRegistration Form\n\nVigotron’s new M-Health app makes it easy for you to monitor a variety of health-related activities,\nincluding diet, exercise, and sleep patterns. M-Health relies on your smartphone settings (along with other\nthird-party apps you may already have) to collect data about all of these important lifestyle elements, and\nprovide the information necessary for you to enrich your quality of life. (Please click here to read a full\ndescription of the services that M-Health provides.)\n\nVigotron values your privacy. The M-Health app allows you to decide which information is stored in it, and\nwhich apps can access your data. When your device is locked with a passcode, all of your health and\nfitness data is encrypted with your passcode. You can back up data stored in the Health app to Vigotron’s\ncloud provider, Stratculous. (Read more about Stratculous here.)\n\nVigotron will never trade, rent or sell personal information gathered from the M-Health app. Furthermore,\nwe will not provide a customer’s name, email address or any other information gathered from the app to\nany third-party without a customer’s consent, unless ordered by a court, directed by a subpoena, or to\nenforce the manufacturer’s legal rights or protect its business or property.\n\nWe are happy to offer the M-Health app free of charge. If you want to download and use it, we ask that you\nfirst complete this registration form. (Please note that use of the M-Health app is restricted to adults aged\n16 or older, unless parental consent has been given to minors intending to use it.)\n\nFirst name:\nSurname:\nYear of birth:\n\nEmail:\n\nPhysical Address (optional*):\nHealth status:\n\n*If you are interested in receiving newsletters about our products and services that we think may be of\n\ninterest to you, please include your physical address. If you decide later that you do not wish to receive\n\nthese newsletters, you can unsubscribe by sending an email to unsubscribe@vigotron.com or send a letter\nwith your request to the address listed at the bottom of this page.\n\nTerms and Conditions\n\n1. Jurisdiction. […]\n2. Applicable law. […]\n3. Limitation of liability. […]\n\nConsent\n\nBy completing this registration form, you attest that you are at least 16 years of age, and that you consent\nto the processing of your personal data by Vigotron for the purpose of using the M-Health app. Although\nyou are entitled to opt out of any advertising or marketing, you agree that Vigotron may contact you or\nprovide you with any required notices, agreements, or other information concerning the services by email\nor other electronic means. You also agree that the Company may send automated emails with alerts\nregarding any problems with the M-Health app that may affect your well being.\n\nWhat is one potential problem Vigotron’s age policy might encounter under the GDPR?","o":"A. Age restrictions are more stringent when health data is involved.\nB. Users are only required to be aged 13 or over to be considered adults.\nC. Organizations must make reasonable efforts to verify parental consent.\nD. Organizations that tie a service to marketing must seek consent for each purpose.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 8 条规定，向儿童提供信息社会服务时，若儿童低于同意年龄门槛（各成员国 13-16 岁不\n等），控制者须“尽合理努力”核实监护人同意的真实性（并需考虑当时可用技术），Vigotron 的表格仅要\n求用户自行勾选确认年满 16 岁或已获监护人同意，并未采取任何核实监护人同意真实性的合理措施，这\n构成潜在合规漏洞。A（健康数据不改变儿童同意年龄门槛的一般规则）、B（GDPR 下儿童同意年龄门\n槛可低至 13 岁，但并非“13 岁即视为成年”这一表述准确）、D（“按各目的分别征求同意”是同意具体性\n的一般要求，但非本题聚焦的年龄政策问题）均不如 C 准确。知识点：第 8 条儿童同意年龄门槛及监护\n人同意的合理核实义务。","t":"GDPR"},{"n":146,"q":"SCENARIO\n\nPlease use the following to answer the next question\n\nLouis, a long-time customer of Bedrock Insurance, was involved in a minor car accident a few months ago.\nAlthough no one was hurt, Louis has been plagued by texts and calls from a company called Accidentable\noffering to help him recover compensation for personal injury. Louis has heard about insurance companies\nselling customers’ data to third parties, and he’s convinced that Accidentable must have gotten his\n\ninformation from Bedrock Insurance.\n\nLouis has also been receiving an increased amount of marketing information from Bedrock, trying to sell\nhim their full range of their insurance policies.\n\nPerturbed by this, Louis has started looking at price comparison sites on the internet and has been\nshocked to find that other insurers offer much cheaper rates than Bedrock, even though he has been a\nloyal customer for many years. When his Bedrock policy comes up for renewal, he decides to switch to\nZantrum Insurance.\n\nIn order to activate his new insurance policy, Louis needs to supply Zantrum with information about his No\nClaims bonus, his vehicle and his driving history. After researching his rights under the GDPR, he writes to\nask Bedrock to transfer his information directly to Zantrum. He also takes this opportunity to ask Bedrock\nto stop using his personal data for marketing purposes.\n\nBedrock supplies Louis with a PDF and XML (Extensible Markup Language) versions of his No Claims\nCertificate, but tells Louis it cannot transfer his data directly to Zantrum as this is not technically feasible.\n\nBedrock also explains that Louis’s contract included a provision whereby Louis agreed that his data could\n\nbe used for marketing purposes; according to Bedrock, it is too late for Louis to change his mind about\nthis. It angers Louis when he recalls the wording of the contract, which was filled with legal jargon and very\nconfusing.\n\nIn the meantime, Louis is still receiving unwanted calls from Accidentable Insurance. He writes to\n\nAccidentable to ask for the name of the organization that supplied his details to them. He warns 6\nAccidentable that he plans to complain to the data protection authority, because he thinks their company\nhas been using his data unlawfully. His letter states that he does not want his data being used by them in\nany way.\n\nAccidentable’s response letter confirms Louis’s suspicions. Accidentable is Bedrock Insurance’s wholly\nowned subsidiary, and they received information about Louis’s accident from Bedrock shortly after Louis\nsubmitted his accident claim. Accidentable assures Louis that there has been no breach of the GDPR, as\nLouis’s contract included, a provision in which he agreed to share his information with Bedrock’s affiliates\nfor business purposes.\n\nLouis is disgusted by the way in which he has been treated by Bedrock, and writes to them insisting that all\nhis information be erased from their computer system.\n\nBased on the GDPR’s position on the use of personal data for direct marketing purposes, which of the\nfollowing is true about Louis’s rights as a data subject?","o":"A. Louis does not have the right to object to the use of his data because he previously consented to it.\nB. Louis has the right to object at any time to the use of his data and Bedrock must honor his request to\ncease use.\n\nC. Louis has the right to object to the use of his data, unless his data is required by Bedrock for the\npurpose of exercising a legal claim.\nD. Louis does not have the right to object to the use of his data if Bedrock can demonstrate compelling\nlegitimate grounds for the processing.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 21(2)(3)条规定，数据主体对直接营销目的的处理享有绝对反对权，任何时候均可行使，\n控制者收到反对后须立即停止基于该目的的处理，不存在“合同已同意即不可反对”（A）或“控制者可主\n张令人信服的合法理由继续处理”（D，令人信服理由的抗辩仅适用于第 21(1)条基于合法利益/公共利益的\n一般反对权，不适用于直接营销这一绝对反对权）的例外；C（除非用于法律主张）属于对被遗忘权/限\n制处理权例外的混淆，并非直接营销反对权的例外情形。知识点：第 21(2)(3)条直接营销绝对反对权，区\n别于第 21(1)条一般反对权下的利益衡量机制。","t":"GDPR"},{"n":147,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBrady is a computer programmer based in New Zealand who has been running his own business for two\nyears. Brady’s business provides a low-cost suite of services to customers throughout the European\nEconomic Area (EEA). The services are targeted towards new and aspiring small business owners.\nBrady’s company, called Brady Box, provides web page design services, a Social Networking Service\n(SNS) and consulting services that help people manage their own online stores.\n\nUnfortunately, Brady has been receiving some complaints. A customer named Anna recently uploaded her\nplans for a new product onto Brady Box’s chat area, which is open to public viewing. Although she realized\nher mistake two weeks later and removed the document, Anna is holding Brady Box responsible for not\nnoticing the error through regular monitoring of the website. Brady believes he should not be held liable.\n\nAnother customer, Felipe, was alarmed to discover that his personal information was transferred to a third-\nparty contractor called Hermes Designs and worries that sensitive information regarding his business\nplans may be misused. Brady does not believe he violated European privacy rules. He provides a privacy\nnotice to all of his customers explicitly stating that personal data may be transferred to specific third parties\nin fulfillment of a requested service. Felipe says he read the privacy notice but that it was long and\ncomplicated\n\nBrady continues to insist that Felipe has no need to be concerned, as he can personally vouch for the\nintegrity of Hermes Designs. In fact, Hermes Designs has taken the initiative to create sample customized\n\nbanner advertisements for customers like Felipe. Brady is happy to provide a link to the example banner\n\nads, now posted on the Hermes Designs webpage. Hermes Designs plans on following up with direct\nmarketing to these customers.\n\nBrady was surprised when another customer, Serge, expressed his dismay that a quotation by him is\n\nbeing used within a graphic collage on Brady Box’s home webpage. The quotation is attributed to Serge by\n\nfirst and last name. Brady, however, was not worried about any sort of litigation. He wrote back to Serge to\nlet him know that he found the quotation within Brady Box’s Social Networking Service (SNS), as Serge\nhimself had posted the quotation. In his response, Brady did offer to remove the quotation as a courtesy.\n\nDespite some customer complaints, Brady’s business is flourishing. He even supplements his income\nthrough online behavioral advertising (OBA) via a third-party ad network with whom he has set clearly\ndefined roles. Brady is pleased that, although some customers are not explicitly aware of the OBA, the\nadvertisements contain useful products and services.\n\nBased on the scenario, what is the main reason that Brady should be concerned with Hermes Designs’\nhandling of customer personal data?","o":"A. The data is sensitive.\nB. The data is uncategorized.\nC. The data is being used for a new purpose.\nD. The data is being processed via a new means.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。Hermes Designs 原本仅作为处理者协助完成客户委托的服务（如网页设计相关的第三方外\n包），但其后续未经明确同意就利用客户数据制作营销广告并计划开展直接营销，属于将数据用于原始\n收集目的之外的“新目的”，违反目的限制原则（第 5(1)(b)条），这才是 Brady 应重点关注的问题，而非数\n据本身的敏感性（A）、分类状态（B）或处理手段是否新颖（D）。知识点：第 5(1)(b)条目的限制原\n则，第三方处理者将数据挪作他用构成违规的典型情形。","t":"GDPR"},{"n":148,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBrady is a computer programmer based in New Zealand who has been running his own business for two\nyears. Brady’s business provides a low-cost suite of services to customers throughout the European\nEconomic Area (EEA). The services are targeted towards new and aspiring small business owners.\nBrady’s company, called Brady Box, provides web page design services, a Social Networking Service\n(SNS) and consulting services that help people manage their own online stores.\n\nUnfortunately, Brady has been receiving some complaints. A customer named Anna recently uploaded her\nplans for a new product onto Brady Box’s chat area, which is open to public viewing. Although she realized\nher mistake two weeks later and removed the document, Anna is holding Brady Box responsible for not\nnoticing the error through regular monitoring of the website. Brady believes he should not be held liable.\n\nAnother customer, Felipe, was alarmed to discover that his personal information was transferred to a third-\nparty contractor called Hermes Designs and worries that sensitive information regarding his business\nplans may be misused. Brady does not believe he violated European privacy rules. He provides a privacy\nnotice to all of his customers explicitly stating that personal data may be transferred to specific third parties\n\nin fulfillment of a requested service. Felipe says he read the privacy notice but that it was long and\ncomplicated\n\nBrady continues to insist that Felipe has no need to be concerned, as he can personally vouch for the\nintegrity of Hermes Designs. In fact, Hermes Designs has taken the initiative to create sample customized\nbanner advertisements for customers like Felipe. Brady is happy to provide a link to the example banner\nads, now posted on the Hermes Designs webpage. Hermes Designs plans on following up with direct\nmarketing to these customers.\n\nBrady was surprised when another customer, Serge, expressed his dismay that a quotation by him is\nbeing used within a graphic collage on Brady Box’s home webpage. The quotation is attributed to Serge by\nfirst and last name. Brady, however, was not worried about any sort of litigation. He wrote back to Serge to\nlet him know that he found the quotation within Brady Box’s Social Networking Service (SNS), as Serge\n\nhimself had posted the quotation. In his response, Brady did offer to remove the quotation as a courtesy.\n\nDespite some customer complaints, Brady’s business is flourishing. He even supplements his income\n\nthrough online behavioral advertising (OBA) via a third-party ad network with whom he has set clearly\ndefined roles. Brady is pleased that, although some customers are not explicitly aware of the OBA, the\n\nadvertisements contain useful products and services.\n\nBased on current trends in European privacy practices, which aspect of Brady Box’ Online Behavioral\nAdvertising (OBA) is most likely to be insufficient if the company becomes established in Europe?","o":"A. The lack of the option to opt in.\nB. The level of security within the website.\nC. The contract with the third-party advertising network.\nD. The need to have the contents of the advertising approved.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。在欧盟数据保护实践中，基于 cookie 等技术开展的线上行为广告（OBA）通常需要用户事\n先明确选择加入（opt-in）同意，而非仅提供事后选择退出（opt-out）的机制；Brady 目前的做法未给客\n户提供明确的加入选项（“部分客户甚至完全不知晓存在 OBA”），这在欧盟框架下明显不足。B、C、D\n虽然也是潜在合规议题，但并非欧盟 OBA 合规实践中最突出的欠缺点。知识点：欧盟对线上行为广告\n（OBA）的 opt-in 同意要求，区别于 opt-out 模式。","t":"ePrivacy指令"},{"n":149,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBrady is a computer programmer based in New Zealand who has been running his own business for two\nyears. Brady’s business provides a low-cost suite of services to customers throughout the European\nEconomic Area (EEA). The services are targeted towards new and aspiring small business owners.\n\nBrady’s company, called Brady Box, provides web page design services, a Social Networking Service\n(SNS) and consulting services that help people manage their own online stores.\n\nUnfortunately, Brady has been receiving some complaints. A customer named Anna recently uploaded her\n\nplans for a new product onto Brady Box’s chat area, which is open to public viewing. Although she realized\nher mistake two weeks later and removed the document, Anna is holding Brady Box responsible for not\nnoticing the error through regular monitoring of the website. Brady believes he should not be held liable.\n\nAnother customer, Felipe, was alarmed to discover that his personal information was transferred to a third-\nparty contractor called Hermes Designs and worries that sensitive information regarding his business\nplans may be misused. Brady does not believe he violated European privacy rules. He provides a privacy\nnotice to all of his customers explicitly stating that personal data may be transferred to specific third parties\nin fulfillment of a requested service. Felipe says he read the privacy notice but that it was long and\ncomplicated\n\nBrady continues to insist that Felipe has no need to be concerned, as he can personally vouch for the\nintegrity of Hermes Designs. In fact, Hermes Designs has taken the initiative to create sample customized\nbanner advertisements for customers like Felipe. Brady is happy to provide a link to the example banner\nads, now posted on the Hermes Designs webpage. Hermes Designs plans on following up with direct\nmarketing to these customers.\n\nBrady was surprised when another customer, Serge, expressed his dismay that a quotation by him is\nbeing used within a graphic collage on Brady Box’s home webpage. The quotation is attributed to Serge by\nfirst and last name. Brady, however, was not worried about any sort of litigation. He wrote back to Serge to\nlet him know that he found the quotation within Brady Box’s Social Networking Service (SNS), as Serge\nhimself had posted the quotation. In his response, Brady did offer to remove the quotation as a courtesy.\n\nDespite some customer complaints, Brady’s business is flourishing. He even supplements his income\nthrough online behavioral advertising (OBA) via a third-party ad network with whom he has set clearly\ndefined roles. Brady is pleased that, although some customers are not explicitly aware of the OBA, the\nadvertisements contain useful products and services.\n\nUnder the General Data Protection Regulation (GDPR), what is the most likely reason Serge may have\n\ngrounds to object to the use of his quotation?","o":"A. Because of the misrepresentation of personal data as an endorsement.\n\nB. Because of the juxtaposition of the quotation with others’ quotations.\n\nC. Because of the use of personal data outside of the social networking service (SNS). 6\nD. Because of the misapplication of the household exception in relation to a social networking service\n(SNS).","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Serge 的原话被抽取并置于 Brady Box 主页的宣传拼贴中，容易使访客误以为该引语构成\nSerge 对 Brady Box 产品/服务的“背书”或推荐，这种脱离原语境、可能造成误导性关联使用的行为，构成\n其反对处理（或异议）的合理依据（涉及个人数据被用于超出其原意的新语境和目的，损害其个人形象\n权益）。B（与其他引语并列，并非核心问题）、C（脱离 SNS 平台使用，虽有一定关联但并非“误导性\n背书”这一实质性问题）、D（家庭活动例外的误用，与本题场景不符，Brady Box 运营主页宣传并非家\n庭、个人事务）均不如 A 准确。知识点：目的限制原则及个人数据被脱离语境挪用可能构成的权益损害\n（误导性背书）。","t":"GDPR"},{"n":150,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nTripBliss Inc. is a travel service company which has lost substantial revenue over the last few years. Their\nnew manager, Oliver, suspects that this is partly due to the company’s outdated website. After doing some\nresearch, he meets with a sales representative from the up-and-coming IT company Techiva, hoping that\nthey can design a new, cutting-edge website for TripBliss Inc.’s foundering business.\n\nDuring negotiations, a Techiva representative describes a plan for gathering more customer information\nthrough detailed questionnaires, which could be used to tailor their preferences to specific travel\ndestinations. TripBliss Inc. can choose any number of data categories – age, income, ethnicity – that\nwould help them best accomplish their goals. Oliver loves this idea, but would also like to have some way\nof gauging how successful this approach is, especially since the questionnaires will require customers to\nprovide explicit consent to having their data collected. The Techiva representative suggests that they also\nrun a program to analyze the new website’s traffic, in order to get a better understanding of how customers\nare using it. He explains his plan to place a number of cookies on customer devices. The cookies will allow\nthe company to collect IP addresses and other information, such as the sites from which the customers\n\ncame, how much time they spend on the TripBliss Inc. website, and which pages on the site they visit. All\nof this information will be compiled in log files, which Techiva will analyze by means of a special program.\nTripBliss Inc. would receive aggregate statistics to help them evaluate the website’s effectiveness. Oliver\nenthusiastically engages Techiva for these services.\n\nTechiva assigns the analytics portion of the project to longtime account manager Leon Santos. As is\nstandard practice, Leon is given administrator rights to TripBliss Inc.’s website, and can authorize access\nto the log files gathered from it. Unfortunately for TripBliss Inc., however, Leon is taking on this new project\nat a time when his dissatisfaction with Techiva is at a high point. In order to take revenge for what he feels\nhas been unfair treatment at the hands of the company, Leon asks his friend Fred, a hobby hacker, for\nhelp. Together they come up with the following plan: Fred will hack into Techiva’s system and copy their\nlog files onto a USB stick. Despite his initial intention to send the USB to the press and to the data\nprotection authority in order to denounce Techiva, Leon experiences a crisis of conscience and ends up\nreconsidering his plan. He decides instead to securely wipe all the data from the USB stick and inform his\nmanager that the company’s system of access control must be reconsidered.\n\nAfter Leon has informed his manager, what is Techiva’s legal responsibility as a processor?","o":"A. They must report it to TripBliss Inc.\nB. They must conduct a full systems audit.\nC. They must report it to the supervisory authority.\nD. They must inform customers who have used the website.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 33(2)条规定，处理者一旦知悉个人数据泄露，须“不得无故拖延”地通知控制者，而非直\n接越过控制者自行通知监管机构（C）或数据主体（D），也没有法定义务要求处理者独立开展“全面系统\n审计”（B，尽管这可能是良好实践，但非第 28 条项下的强制法律义务本身）。本案中 Leon 已将泄露事\n件报告经理，说明公司内部已启动处理，接下来 Techiva（处理者）的法律义务是正式通知 TripBliss Inc.\n（控制者）。知识点：第 33(2)条处理者向控制者通知泄露的义务及责任链条。","t":"ePrivacy指令"},{"n":151,"q":"SCENARIO\n\nPlease use the following to answer the next question: 6\nJoe is the new privacy manager for Who-R-U, a Canadian business that provides DNA analysis. The\ncompany is headquartered in Montreal, and all of its employees are located there. The company offers its\nservices to Canadians only: Its website is in English and French, it accepts only Canadian currency, and it\nblocks internet traffic from outside of Canada (although this solution doesn’t prevent all non-Canadian\ntraffic). It also declines to process orders that request the DNA report to be sent outside of Canada, and\nreturns orders that show a non-Canadian return address.\n\nBob, the President of Who-R-U, thinks there is a lot of interest for the product in the EU, and the company\nis exploring a number of plans to expand its customer base.\n\nThe first plan, collegially called We-Track-U, will use an app to collect information about its current\nCanadian customer base. The expansion will allow its Canadian customers to use the app while traveling\nabroad. He suggests that the company use this app to gather location information. If the plan shows\npromise, Bob proposes to use push notifications and text messages to encourage existing customers to\npre-register for an EU version of the service. Bob calls this work plan, We-Text-U. Once the company has\ngathered enough pre-registrations, it will develop EU-specific content and services.\n\nAnother plan is called Customer for Life. The idea is to offer additional services through the company’s\napp, like storage and sharing of DNA information with other applications and medical providers. The\ncompany’s contract says that it can keep customer DNA indefinitely, and use it to offer new services and\nmarket them to customers. It also says that customers agree not to withdraw direct marketing consent.\nPaul, the marketing director, suggests that the company should fully exploit these provisions, and that it\ncan work around customers’ attempts to withdraw consent because the contract invalidates them.\n\nThe final plan is to develop a brand presence in the EU. The company has already begun this process. It is\nin the process of purchasing the naming rights for a building in Germany, which would come with a few\noffices that Who-R-U executives can use while traveling internationally. The office doesn’t include any\ntechnology or infrastructure; rather, it’s simply a room with a desk and some chairs.\n\nOn a recent trip concerning the naming-rights deal, Bob’s laptop is stolen. The laptop held unencrypted\nDNA reports on 5,000 Who-R-U customers, all of whom are residents of Canada. The reports include\ncustomer name, birthdate, ethnicity, racial background, names of relatives, gender, and occasionally\nhealth information.\n\nIf Who-R-U decides to track locations using its app, what must it do to comply with the GDPR?","o":"A. Get consent from the app users.\nB. Provide a transparent notice to users.\nC. Anonymize the data and add latency so it avoids disclosing real time locations.\nD. Obtain a court order because location data is a special category of personal data.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 在该应用新增持续定位功能的场景中最稳妥，但 GDPR 并未规定所有位置数据处理一律只能依赖同意。应同\n时评估第 6 条合法依据、目的兼容性、透明度、数据最小化及 ePrivacy 对终端设备访问的要求。","t":"ePrivacy指令"},{"n":152,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJoe is the new privacy manager for Who-R-U, a Canadian business that provides DNA analysis. The\ncompany is headquartered in Montreal, and all of its employees are located there. The company offers its\nservices to Canadians only: Its website is in English and French, it accepts only Canadian currency, and it\n\nblocks internet traffic from outside of Canada (although this solution doesn’t prevent all non-Canadian\n\ntraffic). It also declines to process orders that request the DNA report to be sent outside of Canada, and\nreturns orders that show a non-Canadian return address.\n\nBob, the President of Who-R-U, thinks there is a lot of interest for the product in the EU, and the company\n\nis exploring a number of plans to expand its customer base. 6\nThe first plan, collegially called We-Track-U, will use an app to collect information about its current\nCanadian customer base. The expansion will allow its Canadian customers to use the app while traveling\nabroad. He suggests that the company use this app to gather location information. If the plan shows\npromise, Bob pr
