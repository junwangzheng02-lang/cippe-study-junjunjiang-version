eframe","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。根据第 14 条，若个人数据并非直接从数据主体处收集（即来自第三方来源），控制者仍须\n在合理期限内主动告知数据主体收集事实及相关处理信息，履行透明度义务。B（公开公告）、C（安全\n标准比照数据来源）、D（合理期限内更新数据）均非第 14 条规定的核心义务内容。知识点：第 14 条间\n接获取个人数据时的告知义务。","t":"GDPR"},{"n":40,"q":"Under the GDPR, which essential pieces of information must be provided to data subjects before collecting\ntheir personal data?","o":"A. The authority by which the controller is collecting the data and the third parties to whom the data will be\nsent.\nB. The name/s of relevant government agencies involved and the steps needed for revising the data.\nC. The identity and contact details of the controller and the reasons the data is being collected.\nD. The contact information of the controller and a description of the retention policy.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 13 条要求控制者在收集数据前告知的核心信息包括：控制者的身份和联系方式，以及处\n理数据的目的和法律依据等。A、B、D 虽包含部分正确元素（如联系方式、留存政策），但均遗漏了“处\n理目的”这一第 13 条最核心、必须告知的要素，或加入了法律未要求的内容（如政府机构名称）。知识\n点：第 13 条应告知数据主体的必要信息清单。","t":"GDPR"},{"n":41,"q":"Assuming that the “without undue delay” provision is followed, what is the time limit for complying with a\ndata access request?","o":"A. Within 40 days of receipt\nB. Within 40 days of receipt, which may be extended by up to 40 additional days\nC. Within one month of receipt, which may be extended by up to an additional month\nD. Within one month of receipt, which may be extended by an additional two months","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 12(3)条规定，控制者应在收到访问请求后一个月内响应，如请求复杂或数量众多，可再\n延长最多两个月，但须在初始一个月内告知数据主体延期原因。A、B（40 天表述）并非法条用语；C 遗\n漏了“最多可延长两个月”而非一个月的关键细节。知识点：第 12(3)条响应数据主体请求的期限及延期规\n则。","t":"GDPR"},{"n":42,"q":"A U.S.-based online shop uses sophisticated software to track the browsing behavior of its European\ncustomers and predict future purchases. It also shares this information with third parties. Under the GDPR,\nwhat is the online shop’s PRIMARY obligation while engaging in this kind of profiling?","o":"A. It must solicit informed consent through a notice on its website\nB. It must seek authorization from the European supervisory authorities\nC. It must be able to demonstrate a prior business relationship with the customers\nD. It must prove that it uses sufficient security safeguards to protect customer data","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 为最接近选项，但原解析把“画像必然以同意为合法依据”说得过于绝对。GDPR 下画像可视情形依赖不同合\n法依据；不过，使用 cookie 或类似技术访问终端设备通常还受 ePrivacy 规则约束并需要同意。无论依据为何，透明\n告知本身都不能替代合法依据。","t":"ePrivacy指令"},{"n":43,"q":"Which of the following would NOT be relevant when determining if a processing activity would be\nconsidered profiling?","o":"A. If the processing is to be performed by a third-party vendor\nB. If the processing involves data that is considered personal data\nC. If the processing of the data is done through automated means\nD. If the processing is used to predict the behavior of data subjects","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 4(4)条对“画像”的定义关键要素是：对个人数据的自动化处理，用于评估个人某些特定方\n面（如预测行为、偏好等）。处理是否由第三方供应商完成，与该处理活动本身是否构成“画像”无关，只\n影响谁是控制者/处理者的问题。B、C、D 均是判断是否构成画像的实质要素。知识点：第 4(4)条“画像”\n的构成要件。","t":"GDPR"},{"n":44,"q":"Under Article 21 of the GDPR, a controller must stop profiling when requested by a data subject, unless it\ncan demonstrate compelling legitimate grounds that override the interests of the individual. In the\nGuidelines on Automated individual decision-making and Profiling, the WP 29 says the controller needs to\ndo all of the following to demonstrate that it has such legitimate grounds EXCEPT?","o":"A. Carry out an exercise that weighs the interests of the controller and the basis for the data subject’s\nobjection.\nB. Consider the impact of the profiling on the data subject’s interest, rights and freedoms.\nC. Demonstrate that the profiling is for the purposes of direct marketing.\nD. Consider the importance of the profiling to their particular objective.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。WP29《自动化决策与画像指南》中列出控制者须证明存在“令人信服的合法理由”时应考虑\n的因素包括：权衡双方利益（A）、评估画像对数据主体权利自由的影响（B）、评估画像对控制者目标\n的重要性（D）等，但并未将“证明画像用于直接营销目的”列为证明合法理由的要素——事实上，若画像\n用于直接营销，数据主体享有绝对反对权（第 21(2)条），控制者根本无法以“令人信服的理由”对抗，无\n需也无法援引该项证明。知识点：第 21 条反对权，画像用于直接营销时的绝对反对权 vs. 一般反对权下\n的利益衡量。","t":"GDPR"},{"n":45,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nTripBliss Inc. is a travel service company which has lost substantial revenue over the last few years. Their\nnew manager, Oliver, suspects that this is partly due to the company’s outdated website. After doing some\nresearch, he meets with a sales representative from the up-and-coming IT company Techiva, hoping that\nthey can design a new, cutting-edge website for TripBliss Inc.’s foundering business.\n\nDuring negotiations, a Techiva representative describes a plan for gathering more customer information\nthrough detailed questionnaires, which could be used to tailor their preferences to specific travel\ndestinations. TripBliss Inc. can choose any number of data categories – age, income, ethnicity – that\nwould help them best accomplish their goals. Oliver loves this idea, but would also like to have some way\nof gauging how successful this approach is, especially since the questionnaires will require customers to\nprovide explicit consent to having their data collected. The Techiva representative suggests that they also\nrun a program to analyze the new website’s traffic, in order to get a better understanding of how customers\nare using it. He explains his plan to place a number of cookies on customer devices. The cookies will allow\nthe company to collect IP addresses and other information, such as the sites from which the customers\ncame, how much time they spend on the TripBliss Inc. website, and which pages on the site they visit. All\nof this information will be compiled in log files, which Techiva will analyze by means of a special program.\nTripBliss Inc. would receive aggregate statistics to help them evaluate the website’s effectiveness. Oliver\nenthusiastically engages Techiva for these services.\n\nTechiva assigns the analytics portion of the project to longtime account manager Leon Santos. As is\n\nstandard practice, Leon is given administrator rights to TripBliss Inc.’s website, and can authorize access\nto the log files gathered from it. Unfortunately for TripBliss Inc., however, Leon is taking on this new project\n\nat a time when his dissatisfaction with Techiva is at a high point. In order to take revenge for what he feels\n\nhas been unfair treatment at the hands of the company, Leon asks his friend Fred, a hobby hacker, for\nhelp. Together they come up with the following plan: Fred will hack into Techiva’s system and copy their\n\nlog files onto a USB stick. Despite his initial intention to send the USB to the press and to the data6\nprotection authority in order to denounce Techiva, Leon experiences a crisis of conscience and ends up\nreconsidering his plan. He decides instead to securely wipe all the data from the USB stick and inform his\nmanager that the company’s system of access control must be reconsidered.\n\nIf TripBliss Inc. decides not to report the incident to the supervisory authority, what would be their BEST\ndefense?","o":"A. The resulting obligation to notify data subjects would involve disproportionate effort.\nB. The incident resulted from the actions of a third-party that were beyond their control.\nC. The destruction of the stolen data makes any risk to the affected data subjects unlikely.\nD. The sensitivity of the categories of data involved in the incident was not substantial enough.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 仅在公司能够可靠证明数据已被安全删除、无其他副本且残余风险低到“不太可能造成风险”时成立。第 33 条\n监管机构通知门槛是“可能造成风险”，第 34 条通知个人的门槛则是“可能造成高风险”，二者不可混同。","t":"ePrivacy指令"},{"n":46,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nTripBliss Inc. is a travel service company which has lost substantial revenue over the last few years. Their\nnew manager, Oliver, suspects that this is partly due to the company’s outdated website. After doing some\nresearch, he meets with a sales representative from the up-and-coming IT company Techiva, hoping that\n\nthey can design a new, cutting-edge website for TripBliss Inc.’s foundering business.\n\nDuring negotiations, a Techiva representative describes a plan for gathering more customer information\nthrough detailed questionnaires, which could be used to tailor their preferences to specific travel\ndestinations. TripBliss Inc. can choose any number of data categories – age, income, ethnicity – that\nwould help them best accomplish their goals. Oliver loves this idea, but would also like to have some way\nof gauging how successful this approach is, especially since the questionnaires will require customers to\nprovide explicit consent to having their data collected. The Techiva representative suggests that they also\nrun a program to analyze the new website’s traffic, in order to get a better understanding of how customers\nare using it. He explains his plan to place a number of cookies on customer devices. The cookies will allow\nthe company to collect IP addresses and other information, such as the sites from which the customers\ncame, how much time they spend on the TripBliss Inc. website, and which pages on the site they visit. All\nof this information will be compiled in log files, which Techiva will analyze by means of a special program.\nTripBliss Inc. would receive aggregate statistics to help them evaluate the website’s effectiveness. Oliver\nenthusiastically engages Techiva for these services.\n\nTechiva assigns the analytics portion of the project to longtime account manager Leon Santos. As is\nstandard practice, Leon is given administrator rights to TripBliss Inc.’s website, and can authorize access\nto the log files gathered from it. Unfortunately for TripBliss Inc., however, Leon is taking on this new project\nat a time when his dissatisfaction with Techiva is at a high point. In order to take revenge for what he feels\nhas been unfair treatment at the hands of the company, Leon asks his friend Fred, a hobby hacker, for\nhelp. Together they come up with the following plan: Fred will hack into Techiva’s system and copy their\nlog files onto a USB stick. Despite his initial intention to send the USB to the press and to the data\nprotection authority in order to denounce Techiva, Leon experiences a crisis of conscience and ends up\nreconsidering his plan. He decides instead to securely wipe all the data from the USB stick and inform his\nmanager that the company’s system of access control must be reconsidered.\n\nWith regard to TripBliss Inc.’s use of website cookies, which of the following statements is correct?","o":"A. Because not all of the cookies are strictly necessary to enable the use of a service requested from\nTripBliss Inc., consent requirements apply to their use of cookies.\n\nB. Because of the categories of data involved, explicit consent for the use of cookies must be obtained\n\nseparately from customers.\n\nC. Because Techiva will receive only aggregate statistics of data collected from the cookies, no additional\n\nconsent is necessary.\nD. Because the use of cookies involves the potential for location tracking, explicit consent must be\nobtained from customers.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。并非所有 cookie 都属于严格必要（strictly necessary）以提供用户请求的服务（例如用于分\n析、画像的 cookie），根据 ePrivacy 指令，此类非必要 cookie 的放置须取得用户同意。B（“须单独获得\n明确同意”表述过于绝对，具体取决于 cookie 类别，并非因数据类别本身单独触发“明确同意”）、C\n（Techiva 仅获得汇总统计并不能豁免同意义务，同意义务在于 cookie 放置本身而非后续数据形式）、D\n（并非因为“可能定位追踪”才需同意，而是因为 cookie 本身非严格必要）均不准确。知识点：ePrivacy 指\n令下 cookie 同意规则，“严格必要”例外。","t":"ePrivacy指令"},{"n":47,"q":"Company X has entrusted the processing of their payroll data to Provider Y. Provider Y stores this\nencrypted data on its server. The IT department of Provider Y finds out that someone managed to hack\ninto the system and take a copy of the data from its server. In this scenario, whom does Provider Y have\nthe obligation to notify?","o":"A. The public\nB. Company X\nC. Law enforcement\nD. The supervisory authority","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。处理者（Provider Y）在知悉个人数据泄露后，依据第 33(2)条应“不得无故拖延”地通知控制\n者（Company X），再由控制者（若符合条件）负责向监管机构和/或数据主体通知，处理者本身通常无\n直接向监管机构或公众通知的义务。知识点：第 33 条数据泄露通知的责任链条——处理者通知控制者，\n控制者通知监管机构/数据主体。","t":"GDPR"},{"n":48,"q":"When hiring a data processor, which action would a data controller NOT be able to depend upon to avoid\nliability in the event of a security breach?","o":"A. Documenting due diligence steps taken in the pre-contractual stage.\nB. Conducting a risk assessment to analyze possible outsourcing threats.\nC. Requiring that the processor directly notifies the appropriate supervisory authority.\nD. Maintaining evidence that the processor was the best possible market choice available.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。要求处理者“直接”通知监管机构并不符合 GDPR 的责任分配机制——通知监管机构本质上\n是控制者的义务（处理者仅需按第 33(2)条通知控制者），控制者不能通过“转嫁通知职责给处理者”来免\n除自身的问责制义务。A（尽职调查记录）、B（风险评估）、D（保留处理者系市场最优选择的证据）\n都是控制者展示问责制、降低自身责任的合理措施。知识点：问责制原则下控制者的尽职调查义务与第\n33 条通知责任的不可转嫁性。","t":"GDPR"},{"n":49,"q":"WP29’s “Guidelines on Personal data breach notification under Regulation 2016/679’’ provides examples\nof ways to communicate data breaches transparently. Which of the following was listed as a method that\nwould NOT be effective for communicating a breach to data subjects?","o":"A. A postal notification\nB. A direct electronic message\nC. A notice on a corporate blog\nD. A prominent advertisement in print media","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。WP29《个人数据泄露通知指南》强调，通知数据主体须采用能够确保绝大多数受影响个体\n实际收到或知悉信息的专用沟通渠道（如直接邮件、短信、直接电子消息或醒目的印刷广告），而在企\n业博客上发布公告这种被动、需用户主动访问才能获知的方式，通常被认为不足以有效触达受影响个\n人，不构成合规的通知方式（除非作为补充措施）。知识点：第 34 条数据泄露通知数据主体的“有效沟\n通”标准。","t":"GDPR"},{"n":50,"q":"Which of the following would require designating a data protection officer?","o":"A. Processing is carried out by an organization employing 250 persons or more.\nB. Processing is carried out for the purpose of providing for-profit goods or services to individuals in the\nEU.\nC. The core activities of the controller or processor consist of processing operations of financial\ninformation or information relating to children.\nD. The core activities of the controller or processor consist of processing operations that require\nsystematic monitoring of data subjects on a large scale.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 37(1)(b)、(c)条规定强制设立 DPO 的情形包括：核心业务涉及对数据主体进行大规模、\n有规律和系统性监控，或核心业务涉及大规模处理特殊类别数据/犯罪记录数据。是否强制设 DPO 并不取\n决于员工人数（A，GDPR 未设此类门槛，虽然一般安全和记录义务在 250 人以下企业有部分豁免）、是\n否营利性提供商品服务（B）本身；C 的表述遗漏了“大规模”这一关键限定词，处理财务信息或儿童信息\n本身也不属于第 37 条列举的强制触发类型（更准确的是“大规模处理特殊类别数据”）。知识点：第 37 条\n强制指定 DPO 的三种法定情形。","t":"GDPR"},{"n":51,"q":"Which of the following describes a mandatory requirement for a group of undertakings that wants to\nappoint a single data protection officer?","o":"A. The group of undertakings must obtain approval from a supervisory authority.\nB. The group of undertakings must be comprised of organizations of similar sizes and functions.\nC. The data protection officer must be located in the country where the data controller has its main\nestablishment.\n\nD. The data protection officer must be easily accessible from each establishment where the undertakings\nare located.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 37(2)条允许集团企业共同指定一名 DPO，前提是该 DPO 须能够从集团内每一设立机构\n便捷地联系到（easily accessible），以确保履职实效。A（须监管机构批准）、B（企业须规模相近）、C\n（DPO 须常驻主要机构所在国）均非法定强制要求。知识点：第 37(2)条集团共同指定 DPO 的“易联系\n性”要求。","t":"GDPR"},{"n":52,"q":"What obligation does a data controller or processor have after appointing a data protection officer?","o":"A. To ensure that the data protection officer receives sufficient instructions regarding the exercise of his or\nher defined tasks.\nB. To provide resources necessary to carry out the defined tasks of the data protection officer and to\nmaintain his or her expert knowledge.\nC. To ensure that the data protection officer acts as the sole point of contact for individuals’ questions\nabout their personal data.\nD. To submit for approval to the data protection officer a code of conduct to govern organizational\npractices and demonstrate compliance with data protection principles.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 38(2)条要求控制者/处理者向 DPO 提供履行职责所必需的资源，并支持其维持专业知识\n（如培训）。A 表述恰恰相反——第 38(3)条明确规定 DPO 在履行职责时不得就其任务的行使接受指示，\n以保障独立性；C（DPO 并非必然是数据主体咨询的唯一联系人，虽常担任联系点，但并非强制“唯\n一”）；D（DPO 并无审批行为守则的权限，行为守则的批准由监管机构负责）。知识点：第 38 条 DPO\n的独立地位及企业对 DPO 的支持义务。","t":"GDPR"},{"n":53,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLiem, an online retailer known for its environmentally friendly shoes, has recently expanded its presence in\n\nEurope. Anxious to achieve market dominance, Liem teamed up with another eco friendly company, 6\nEcoMick, which sells accessories like belts and bags. Together the companies drew up a series of\nmarketing campaigns designed to highlight the environmental and economic benefits of their products.\nAfter months of planning, Liem and EcoMick entered into a data sharing agreement to use the same\nmarketing database, MarketIQ, to send the campaigns to their respective contacts.\n\nLiem and EcoMick also entered into a data processing agreement with MarketIQ, the terms of which\nincluded processing personal data only upon Liem and EcoMick’s instructions, and making available to\nthem all information necessary to demonstrate compliance with GDPR obligations.\n\nLiem and EcoMick then procured the services of a company called JaphSoft, a marketing optimization firm\nthat uses machine learning to help companies run successful campaigns. Clients provide JaphSoft with\nthe personal data of individuals they would like to be targeted in each campaign. To ensure protection of\nits clients’ data, JaphSoft implements the technical and organizational measures it deems appropriate.\nJaphSoft works to continually improve its machine learning models by analyzing the data it receives from\nits clients to determine the most successful components of a successful campaign. JaphSoft then uses\nsuch models in providing services to its client-base. Since the models improve only over a period of time\nas more information is collected, JaphSoft does not have a deletion process for the data it receives from\nclients. However, to ensure compliance with data privacy rules, JaphSoft pseudonymizes the personal\ndata by removing identifying information from the contact information. JaphSoft’s engineers, however,\nmaintain all contact information in the same database as the identifying information.\n\nUnder its agreement with Liem and EcoMick, JaphSoft received access to MarketIQ, which included\ncontact information as well as prior purchase history for such contacts, to create campaigns that would\nresult in the most views of the two companies’ websites. A prior Liem customer, Ms. Iman, received a\nmarketing campaign from JaphSoft regarding Liem’s as well as EcoMick’s latest products. While Ms. Iman\nrecalls checking a box to receive information in the future regarding Liem’s products, she has never\nshopped EcoMick, nor provided her personal data to that company.\n\nFor what reason would JaphSoft be considered a controller under the GDPR?","o":"A. It determines how long to retain the personal data collected.\nB. It has been provided access to personal data in the MarketIQ database.\nC. It uses personal data to improve its products and services for its client-base through machine learning.\nD. It makes decisions regarding the technical and organizational measures necessary to protect the\npersonal data.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。JaphSoft 通过分析客户提供的数据来持续优化自身机器学习模型、并将改进后的模型用于服\n务其整个客户群体，这已超出单纯按客户指示行事的处理者角色，转变为为自身商业目的（产品改进）\n独立决定处理目的和方式，因此在此范围内被认定为控制者。A（留存期限的决定权，本案未提及\nJaphSoft 对此有决定权）、B（仅仅获得数据访问权限本身不足以认定为控制者）、D（采取安全措施是\n处理者应尽的义务，并非控制者身份的判断标准）均不是认定为控制者的关键依据。知识点：控制者与\n处理者的实质判断标准——是否为自身目的独立决定处理方式（“controller in disguise”）。","t":"GDPR"},{"n":54,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLiem, an online retailer known for its environmentally friendly shoes, has recently expanded its presence in\nEurope. Anxious to achieve market dominance, Liem teamed up with another eco friendly company,\nEcoMick, which sells accessories like belts and bags. Together the companies drew up a series of\nmarketing campaigns designed to highlight the environmental and economic benefits of their products.\nAfter months of planning, Liem and EcoMick entered into a data sharing agreement to use the same\nmarketing database, MarketIQ, to send the campaigns to their respective contacts.\n\nLiem and EcoMick also entered into a data processing agreement with MarketIQ, the terms of which\nincluded processing personal data only upon Liem and EcoMick’s instructions, and making available to\n\nthem all information necessary to demonstrate compliance with GDPR obligations.\n\nLiem and EcoMick then procured the services of a company called JaphSoft, a marketing optimization firm\n\nthat uses machine learning to help companies run successful campaigns. Clients provide JaphSoft with\n\nthe personal data of individuals they would like to be targeted in each campaign. To ensure protection of\n\nits clients’ data, JaphSoft implements the technical and organizational measures it deems appropriate.\nJaphSoft works to continually improve its machine learning models by analyzing the data it receives from\nits clients to determine the most successful components of a successful campaign. JaphSoft then uses\nsuch models in providing services to its client-base. Since the models improve only over a period of time\nas more information is collected, JaphSoft does not have a deletion process for the data it receives from\nclients. However, to ensure compliance with data privacy rules, JaphSoft pseudonymizes the personal\ndata by removing identifying information from the contact information. JaphSoft’s engineers, however,\nmaintain all contact information in the same database as the identifying information.\n\nUnder its agreement with Liem and EcoMick, JaphSoft received access to MarketIQ, which included\ncontact information as well as prior purchase history for such contacts, to create campaigns that would\nresult in the most views of the two companies’ websites. A prior Liem customer, Ms. Iman, received a\nmarketing campaign from JaphSoft regarding Liem’s as well as EcoMick’s latest products. While Ms. Iman\nrecalls checking a box to receive information in the future regarding Liem’s products, she has never\nshopped EcoMick, nor provided her personal data to that company.\n\nWhy would the consent provided by Ms. Iman NOT be considered valid in regard to JaphSoft?","o":"A. She was not told which controller would be processing her personal data.\nB. She only viewed the visual representations of the privacy notice Liem provided.\nC. She did not read the privacy notice stating that her personal data would be shared.\nD. She has never made any purchases from JaphSoft and has no relationship with the company.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Ms. Iman 当初勾选同意框时，仅被告知 Liem 将使用其数据，并不知晓 EcoMick 或 JaphSoft\n也会成为其数据的（共同）控制者/使用方，同意必须具体（specific）并明确告知数据将提供给哪些控制\n者，因此该同意对 JaphSoft 的处理而言是无效的。B、C、D 均非导致同意无效的法律原因（是否阅读隐\n私声明、是否与 JaphSoft 有购买关系均不构成同意有效性的判断标准）。知识点：有效同意的“具体性”要\n求（第 4(11)、7 条），须明确告知涉及哪些控制者。","t":"GDPR"},{"n":55,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLiem, an online retailer known for its environmentally friendly shoes, has recently expanded its presence in\nEurope. Anxious to achieve market dominance, Liem teamed up with another eco friendly company,\nEcoMick, which sells accessories like belts and bags. Together the companies drew up a series of\nmarketing campaigns designed to highlight the environmental and economic benefits of their products.\nAfter months of planning, Liem and EcoMick entered into a data sharing agreement to use the same\nmarketing database, MarketIQ, to send the campaigns to their respective contacts.\n\nLiem and EcoMick also entered into a data processing agreement with MarketIQ, the terms of which\nincluded processing personal data only upon Liem and EcoMick’s instructions, and making available to\nthem all information necessary to demonstrate compliance with GDPR obligations.\n\nLiem and EcoMick then procured the services of a company called JaphSoft, a marketing optimization firm\nthat uses machine learning to help companies run successful campaigns. Clients provide JaphSoft with\nthe personal data of individuals they would like to be targeted in each campaign. To ensure protection of\nits clients’ data, JaphSoft implements the technical and organizational measures it deems appropriate.\nJaphSoft works to continually improve its machine learning models by analyzing the data it receives from\nits clients to determine the most successful components of a successful campaign. JaphSoft then uses\nsuch models in providing services to its client-base. Since the models improve only over a period of time\nas more information is collected, JaphSoft does not have a deletion process for the data it receives from\nclients. However, to ensure compliance with data privacy rules, JaphSoft pseudonymizes the personal\ndata by removing identifying information from the contact information. JaphSoft’s engineers, however,\nmaintain all contact information in the same database as the identifying information.\n\nUnder its agreement with Liem and EcoMick, JaphSoft received access to MarketIQ, which included\n\ncontact information as well as prior purchase history for such contacts, to create campaigns that would\nresult in the most views of the two companies’ websites. A prior Liem customer, Ms. Iman, received a\n\nmarketing campaign from JaphSoft regarding Liem’s as well as EcoMick’s latest products. While Ms. Iman\n\nrecalls checking a box to receive information in the future regarding Liem’s products, she has never\nshopped EcoMick, nor provided her personal data to that company.\n\nJaphSoft’s use of pseudonymization is NOT in compliance with the CDPR because?","o":"A. JaphSoft failed to first anonymize the personal data.\nB. JaphSoft pseudonymized all the data instead of deleting what it no longer needed.\nC. JaphSoft was in possession of information that could be used to identify data subjects.\nD. JaphSoft failed to keep personally identifiable information in a separate database.","a":"D","v":"corrected","vd":"已修正（原答案：C；修订：D）","e":"正确答案 D。GDPR 第 4(5) 条要求：用于重新归属数据主体的补充信息应当单独保存，并采取技术和组织措施防止\n未经授权的重新关联。题干明确说明联系信息与识别信息仍保存在同一数据库中，故不符合“单独保存”的要求。控\n制者持有可重新识别的补充信息本身并不违法，而是假名化区别于匿名化的特征，因此 C 不是违规原因。","t":"GDPR"},{"n":56,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLiem, an online retailer known for its environmentally friendly shoes, has recently expanded its presence in\nEurope. Anxious to achieve market dominance, Liem teamed up with another eco friendly company,\nEcoMick, which sells accessories like belts and bags. Together the companies drew up a series of\nmarketing campaigns designed to highlight the environmental and economic benefits of their products.\nAfter months of planning, Liem and EcoMick entered into a data sharing agreement to use the same\nmarketing database, MarketIQ, to send the campaigns to their respective contacts.\n\nLiem and EcoMick also entered into a data processing agreement with MarketIQ, the terms of which\nincluded processing personal data only upon Liem and EcoMick’s instructions, and making available to\n\nthem all information necessary to demonstrate compliance with GDPR obligations.\n\nLiem and EcoMick then procured the services of a company called JaphSoft, a marketing optimization firm\nthat uses machine learning to help companies run successful campaigns. Clients provide JaphSoft with\nthe personal data of individuals they would like to be targeted in each campaign. To ensure protection of\nits clients’ data, JaphSoft implements the technical and organizational measures it deems appropriate.\nJaphSoft works to continually improve its machine learning models by analyzing the data it receives from\nits clients to determine the most successful components of a successful campaign. JaphSoft then uses\nsuch models in providing services to its client-base. Since the models improve only over a period of time\nas more information is collected, JaphSoft does not have a deletion process for the data it receives from\nclients. However, to ensure compliance with data privacy rules, JaphSoft pseudonymizes the personal\ndata by removing identifying information from the contact information. JaphSoft’s engineers, however,\nmaintain all contact information in the same database as the identifying information.\n\nUnder its agreement with Liem and EcoMick, JaphSoft received access to MarketIQ, which included\ncontact information as well as prior purchase history for such contacts, to create campaigns that would\nresult in the most views of the two companies’ websites. A prior Liem customer, Ms. Iman, received a\nmarketing campaign from JaphSoft regarding Liem’s as well as EcoMick’s latest products. While Ms. Iman\nrecalls checking a box to receive information in the future regarding Liem’s products, she has never\nshopped EcoMick, nor provided her personal data to that company.\n\nWhich of the following BEST describes the relationship between Liem, EcoMick and JaphSoft?","o":"A. Liem is a controller and EcoMick is a processor because Liem provides specific instructions regarding\nhow the marketing campaigns should be rolled out.\nB. EcoMick and JaphSoft are is a controller and Liem is a processor because EcoMick is sharing its\nmarketing data with Liem for contacts in Europe.\nC. JaphSoft is the sole processor because it processes personal data on behalf of its clients.\n\nD. Liem and EcoMick are joint controllers because they carry out joint marketing activities.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。Liem 与 EcoMick 共同策划营销活动、共享同一营销数据库并共同决定处理目的和方式（联\n合开展营销活动），依据第 26 条构成共同控制者（joint controllers），双方须以协议明确各自在 GDPR\n项下的责任分工。A、B 错误地将其中一方定性为处理者而非共同控制者；C 错误地将 JaphSoft 认定为唯\n一处理者，而实际上 JaphSoft 因改进自身模型的独立处理行为已构成（部分）控制者。知识点：第 26 条\n共同控制者的认定及责任分配协议要求。","t":"GDPR"},{"n":57,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nLiem, an online retailer known for its environmentally friendly shoes, has recently expanded its presence in\nEurope. Anxious to achieve market dominance, Liem teamed up with another eco friendly company,\nEcoMick, which sells accessories like belts and bags. Together the companies drew up a series of\nmarketing campaigns designed to highlight the environmental and economic benefits of their products.\nAfter months of planning, Liem and EcoMick entered into a data sharing agreement to use the same\nmarketing database, MarketIQ, to send the campaigns to their respective contacts.\n\nLiem and EcoMick also entered into a data processing agreement with MarketIQ, the terms of which\nincluded processing personal data only upon Liem and EcoMick’s instructions, and making available to\nthem all information necessary to demonstrate compliance with GDPR obligations.\n\nLiem and EcoMick then procured the services of a company called JaphSoft, a marketing optimization firm\nthat uses machine learning to help companies run successful campaigns. Clients provide JaphSoft with\nthe personal data of individuals they would like to be targeted in each campaign. To ensure protection of\nits clients’ data, JaphSoft implements the technical and organizational measures it deems appropriate.\nJaphSoft works to continually improve its machine learning models by analyzing the data it receives from\nits clients to determine the most successful components of a successful campaign. JaphSoft then uses\nsuch models in providing services to its client-base. Since the models improve only over a period of time\nas more information is collected, JaphSoft does not have a deletion process for the data it receives from\nclients. However, to ensure compliance with data privacy rules, JaphSoft pseudonymizes the personal\ndata by removing identifying information from the contact information. JaphSoft’s engineers, however,\nmaintain all contact information in the same database as the identifying information.\n\nUnder its agreement with Liem and EcoMick, JaphSoft received access to MarketIQ, which included\ncontact information as well as prior purchase history for such contacts, to create campaigns that would\nresult in the most views of the two companies’ websites. A prior Liem customer, Ms. Iman, received a\nmarketing campaign from JaphSoft regarding Liem’s as well as EcoMick’s latest products. While Ms. Iman\nrecalls checking a box to receive information in the future regarding Liem’s products, she has never\nshopped EcoMick, nor provided her personal data to that company.\n\nUnder the GDPR, Liem and EcoMick’s contract with MarketIQ must include all of the following provisions\nEXCEPT?","o":"A. Processing the personal data upon documented instructions regarding data transfers outside of the\n\nEEA.\nB. Notification regarding third party requests for access to Liem and EcoMick’s personal data.\nC. Assistance to Liem and EcoMick in their compliance with data protection impact assessments.\nD. Returning or deleting personal data after the end of the provision of the services.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 28(3)条列明处理者合同必须包含的强制条款：按指示处理数据（包括跨境传输指示，\nA）、协助控制者履行 DPIA 等义务（C）、服务结束后返还或删除数据（D）等，但并未要求处理者合同\n中包含“就第三方请求访问数据向控制者通知”这一具体条款（该义务更多体现在处理者须协助控制者应对\n数据主体请求及配合监管调查，但不是以“第三方请求访问”这一表述作为第 28 条强制列明的条款）。知\n识点：第 28(3)条处理者合同的强制性条款清单。","t":"GDPR"},{"n":58,"q":"When is data sharing agreement MOST likely to be needed?","o":"A. When anonymized data is being shared.\n\nB. When personal data is being shared between commercial organizations acting as joint data controllers.\nC. When personal data is being proactively shared by a controller to support a police investigation.\n\nD. When personal data is being shared with a public authority with powers to require the personal data to\nbe disclosed.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。当多个商业机构作为共同控制者共享个人数据以协同实现共同目的时，最需要通过数据共\n享协议明确权责分配、合法依据及数据主体权利保障机制（呼应第 26 条）。A（匿名数据不涉及个人数\n据保护义务）、C、D（应执法或公权力机构法定要求进行的数据披露，属于法定义务而非协议安排的范\n畴）通常不需要（或不适用）数据共享协议。知识点：数据共享协议（Data Sharing Agreement）的适用\n场景，第 26 条共同控制者。","t":"GDPR"},{"n":59,"q":"An employee of company ABCD has just noticed a memory stick containing records of client data,\nincluding their names, addresses and full contact details has disappeared. The data on the stick is\nunencrypted and in clear text. It is uncertain what has happened to the stick at this stage, but it likely was\nlost during the travel of an employee. What should the company do?","o":"A. Notify as soon as possible the data protection supervisory authority that a data breach may have taken\nplace.\nB. Launch an investigation and if nothing is found within one month, notify the data protection supervisory\nauthority.\nC. Invoke the “disproportionate effort” exception under Article 33 to postpone notifying data subjects until\nmore information can be gathered.\nD. Immediately notify all the customers of the company that their information has been accessed by an\nunauthorized person.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 在该未加密 U 盘情形下通常成立，但公司仍应立即调查并记录事实、风险和决定；通知监管机构的 72 小时\n从控制者达到“合理确定已发生泄露”的知悉时点起算。通知数据主体仅在达到高风险门槛时触发。","t":"GDPR"},{"n":60,"q":"Which of the following does NOT have to be included in the records most processors must maintain in\nrelation to their data processing activities?","o":"A. Name and contact details of each controller on behalf of which the processor is acting.\nB. Categories of processing carried out on behalf of each controller for which the processor is acting.\nC. Details of transfers of personal data to a third country carried out on behalf of each controller for which\nthe processor is acting.\nD. Details of any data protection impact assessment conducted in relation to any processing activities\ncarried out by the processor on behalf of each controller for which the processor is acting.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 30(2)条规定处理者须维护的处理活动记录内容包括：控制者名称联系方式（A）、代表\n其处理的类别（B）、跨境传输详情（C）、以及安全措施描述等，但并不要求处理者的记录中包含\nDPIA 的详细信息——DPIA 属于控制者依第 35 条承担的义务及记录内容，而非处理者第 30(2)条记录清\n单的组成部分。知识点：第 30(2)条处理者处理活动记录的强制内容，与控制者记录内容（第 30(1)条）的\n区别。","t":"GDPR"},{"n":61,"q":"An unforeseen power outage results in company Z’s lack of access to customer data for six hours.\nAccording to article 32 of the GDPR, this is considered a breach. Based on the WP 29’s February, 2018\nguidance, company Z should do which of the following?","o":"A. Notify affected individuals that their data was unavailable for a period of time.\nB. Document the loss of availability to demonstrate accountability\nC. Notify the supervisory authority about the loss of availability\nD. Conduct a thorough audit of all security systems","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 32(1)(b)条将“可用性”（availability）列为安全处理三要素之一，短暂断电导致的数据不可\n用同样构成“个人数据泄露”（第 4(12)条泄露定义涵盖机密性、完整性、可用性受损）。但根据 WP29 指\n南，此类事件是否需要通知取决于对数据主体权利自由造成风险的可能性和严重程度；若风险很低（如\n短暂断电、数据未丢失且很快恢复），企业至少应将该事件记录在案以证明问责制（第 33(5)条要求记录\n所有泄露，无论是否通知），而不一定要通知监管机构（C）或数据主体（A），也非要求进行全面安全\n审计（D，非 WP29 该情形下的具体建议）。知识点：可用性泄露的认定及第 33(5)条泄露记录义务。","t":"GDPR"},{"n":62,"q":"In addition to the European Commission, who can adopt standard contractual clauses, assuming that all\n\nrequired conditions are met?","o":"A. Approved data controllers.\n\nB. The Council of the European Union.\nC. National data protection authorities.\nD. The European Data Protection Supervisor.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 46(2)(c)、(d)条规定，标准合同条款可由欧盟委员会制定（即“标准合同条款 SCCs”），\n此外成员国监管机构也可在获得一致性机制审查（第 64 条）通过后，制定并经欧盟委员会批准的标准数\n据保护条款。控制者本身（A）、欧盟理事会（B）、EDPS（D，仅负责监督欧盟机构）均无权制定此类\n标准条款。知识点：第 46 条跨境传输保障机制——标准合同条款的两种制定主体。","t":"监管机构"},{"n":63,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nZandelay Fashion (‘Zandelay’) is a successful international online clothing retailer that employs\napproximately 650 people at its headquarters based in Dublin, Ireland. Martin is their recently appointed\ndata protection officer, who oversees the company’s compliance with the General Data Protection\nRegulation (GDPR) and other privacy legislation.\n\nThe company offers both male and female clothing lines across all age demographics, including children.\nIn doing so, the company processes large amounts of information about such customers, including\npreferences and sensitive financial information such as credit card and bank account numbers.\n\nIn an aggressive bid to build revenue growth, Jerry, the CEO, tells Martin that the company is launching a\nnew mobile app and loyalty scheme that puts significant emphasis on profiling the company’s customers\nby analyzing their purchases. Martin tells the CEO that: (a) the potential risks of such activities means that\nZandelay needs to carry out a data protection impact assessment to assess this new venture and its\nprivacy implications; and (b) where the results of this assessment indicate a high risk in the absence of\nappropriate protection measures, Zandelay may have to undertake a prior consultation with the Irish Data\nProtection Commissioner before implementing the app and loyalty scheme.\n\nJerry tells Martin that he is not happy about the prospect of having to directly engage with a supervisory\nauthority and having to disclose details of Zandelay’s business plan and associated processing activities.\n\nWhat would MOST effectively assist Zandelay in conducting their data protection impact assessment?","o":"A. Information about DPIAs found in Articles 38 through 40 of the GDPR.\nB. Data breach documentation that data controllers are required to maintain.\nC. Existing DPIA guides published by local supervisory authorities.\nD. Records of processing activities that data controllers are required to maintain.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。虽然 GDPR 第 35 条本身对 DPIA 提出原则性要求，但对企业实操最有帮助的是各国监管机\n构已发布的具体 DPIA 操作指南/清单（如 ICO、CNIL 的 DPIA 模板），可提供更具体可操作的方法论。\nA 中的“第 38-40 条”实际上是关于 DPO 和行为守则/认证的条款，并非 DPIA 专门条款（DPIA 规定在第 35\n条），属于错误指向；B（数据泄露文档）、D（处理活动记录）与开展 DPIA 本身的方法论关系不大。\n知识点：第 35 条 DPIA 的实施及监管机构指南的实用价值。","t":"GDPR"},{"n":64,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nZandelay Fashion (‘Zandelay’) is a successful international online clothing retailer that employs\n\napproximately 650 people at its headquarters based in Dublin, Ireland. Martin is their recently appointed\n\ndata protection officer, who oversees the company’s compliance with the General Data Protection\n\nRegulation (GDPR) and other privacy legislation. 6\nThe company offers both male and female clothing lines across all age demographics, including children.\nIn doing so, the company processes large amounts of information about such customers, including\npreferences and sensitive financial information such as credit card and bank account numbers.\n\nIn an aggressive bid to build revenue growth, Jerry, the CEO, tells Martin that the company is launching a\nnew mobile app and loyalty scheme that puts significant emphasis on profiling the company’s customers\nby analyzing their purchases. Martin tells the CEO that: (a) the potential risks of such activities means that\nZandelay needs to carry out a data protection impact assessment to assess this new venture and its\nprivacy implications; and (b) where the results of this assessment indicate a high risk in the absence of\nappropriate protection measures. Zandelay may have to undertake a prior consultation with the Irish Data\nProtection Commissioner before implementing the app and loyalty scheme.\n\nJerry tells Martin that he is not happy about the prospect of having to directly engage with a supervisory\nauthority and having to disclose details of Zandelay’s business plan and associated processing activities.\n\nWhat must Zandelay provide to the supervisory authority during the prior consultation?","o":"A. An evaluation of the complexity of the intended processing.\nB. An explanation of the purposes and means of the intended processing.\nC. Records showing that customers have explicitly consented to the intended profiling activities.\nD. Certificates that prove Martin’s professional qualities and expert knowledge of data protection law.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。依据第 36(3)条，控制者在事先咨询监管机构时须提供的信息包括：各方的责任划分、处理\n目的和方式、保护数据主体权利自由的措施和保障、DPO 联系方式及 DPIA 本身等，核心是说明拟处理\n的目的和方式。A（评估处理复杂度）、C（客户明确同意的记录）、D（DPO 资质证书）均不是第 36(3)\n条列明的必须提交内容。知识点：第 36 条事先咨询监管机构的程序要求。","t":"GDPR"},{"n":65,"q":"A company is located in a country NOT considered by the European Union (EU) to have an adequate level\nof data protection. Which of the following is an obligation of the company if it imports personal data from\nanother organization in the European Economic Area (EEA) under standard contractual clauses?","o":"A. Submit the contract to its own government authority.\nB. Ensure that notice is given to and consent is obtained from data subjects.\nC. Supply any information requested by a data protection authority (DPA) within 30 days.\nD. Ensure that local laws do not impede the company from meeting its contractual obligations.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。标准合同条款（SCCs）作为跨境传输保障机制的核心要求之一，是数据进口方须确保其所\n在国的法律法规不会阻碍其履行合同项下的数据保护义务（这也是 Schrems II 判决后强调的传输影响评估\n要点）。A（须提交合同给本国政府）、B（须另行取得数据主体同意，本身并非 SCC 项下强制要求）、\nC（30 天内提供信息给 DPA，无此具体法定期限）均不准确。知识点：标准合同条款下数据进口方的义\n务及 Schrems II 判决对传输安全评估的要求。","t":"判例法"},{"n":66,"q":"Which of the following countries will continue to enjoy adequacy status under the GDPR, pending any\nfuture European Commission decision to the contrary?","o":"A. Greece\nB. Norway\nC. Australia\nD. Switzerland","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。瑞士在原指令 95/46/EC 体系下已获欧盟充分性认定，且该认定在 GDPR 框架下继续有效，\n直至欧盟委员会作出新的决定。澳大利亚、希腊（作为欧盟成员国不涉及“充分性”概念，充分性针对第三\n国）均不属于已获充分性认定的第三国；挪威作为欧洲经济区（EEA）成员，直接适用 GDPR，无需通过\n“充分性认定”这一第三国转移机制。知识点：充分性认定国家清单及历史沿革（95/46/EC 体系下认定的\n延续效力）。","t":"历史沿革/95-46-EC"},{"n":67,"q":"A company is hesitating between Binding Corporate Rules and Standard Contractual Clauses as a global\ndata transfer solution. Which of the following statements would help the company make an effective\ndecision?","o":"A. Binding Corporate Rules are especially recommended for small and medium companies.\nB. The data exporter does not need to be located in the EU for the standard Contractual Clauses.\nC. Binding Corporate Rules provide a global solution for all the entities of a company that are bound by\nthe intra-group agreement.\nD. The company will need the prior authorization of all EU data protection authorities for concluding\nStandard Contractual Clauses.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。约束性企业规则（BCRs）的最大优势在于，一旦获批，可作为覆盖集团内所有受协议约束\n实体之间跨境数据传输的“一揽子”解决方案，特别适合大型跨国企业集团内部数据流动。A 错——BCRs\n审批流程复杂、成本高，通常更适合大型跨国企业而非中小企业；B 错——标准合同条款目前的适用场景\n已扩展，但该表述与本题讨论的 BCRs/SCCs 选择要点关系不大且不准确；D 错——采用 SCCs 无需事先\n取得所有欧盟成员国监管机构的批准（这正是 SCCs 相较 BCRs 审批更简便的优势之一）。知识点：约束\n性企业规则（BCRs）与标准合同条款（SCCs）的比较。","t":"GDPR"},{"n":68,"q":"Under the GDPR, which of the following is true in regard to adequacy decisions involving cross-border\ntransfers?","o":"A. The European Commission can adopt an adequacy decision for individual companies.\nB. The European Commission can adopt, repeal or amend an existing adequacy decision.\n\nC. EU member states are vested with the power to accept or reject a European Commission adequacy\ndecision.\nD. To be considered as adequate, third countries must implement the EU General Data Protection\nRegulation into their national legislation.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 45(5)条明确欧盟委员会可对已作出的充分性认定进行监测、修改、暂停或撤销。A 错—\n—充分性认定针对的是国家/地区/行业整体（有时是特定行业部门），而非单个公司；C 错——成员国无\n权否决欧盟委员会的充分性认定决定（该决定对全体成员国具有约束力）；D 错——获得充分性认定并\n不要求第三国将 GDPR 原文纳入本国立法，而是要求其提供“实质相当”（essentially equivalent）的保护水\n平即可。知识点：第 45 条充分性认定的性质、认定标准及可撤销性。","t":"监管机构"},{"n":69,"q":"Under Article 58 of the GDPR, which of the following describes a power of supervisory authorities in\nEuropean Union (EU) member states?","o":"A. The ability to enact new laws by executive order.\nB. The right to access data for investigative purposes.\nC. The discretion to carry out goals of elected officials within the member state.\nD. The authority to select penalties when a controller is found guilty in a court of law.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 58(1)条列明监管机构的调查权，其中包括要求控制者/处理者提供其履行职责所需的一切\n信息、开展数据保护审计及访问处理者/控制者的场所和设备等（获取数据用于调查是调查权的核心体\n现）。A（无权以行政命令制定新法律）、C（并非执行选举官员意愿的机构，监管机构须独立行使职\n权）、D（法院量刑权与监管机构行政处罚权是两套体系，监管机构自身可直接开出行政罚款，无需等待\n法院判决）均不准确。知识点：第 58 条监管机构的调查权、更正权及授权权。","t":"GDPR"},{"n":70,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJavier is a member of the fitness club EVERFIT. This company has branches in many EU member states,\n\nbut for the purposes of the GDPR maintains its primary establishment in France. Javier lives in Newry,\n\nNorthern Ireland (part of the U.K.), and commutes across the border to work in Dundalk, Ireland. Two6\nyears ago while on a business trip, Javier was photographed while working out at a branch of EVERFIT in\nFrankfurt, Germany. At the time, Javier gave his consent to being included in the photograph, since he\nwas told that it would be used for promotional purposes only. Since then, the photograph has been used in\nthe club’s U.K. brochures, and it features in the landing page of its U.K. website. However, the fitness club\nhas recently fallen into disrepute due to widespread mistreatment of members at various branches of the\nclub in several EU member states. As a result, Javier no longer feels comfortable with his photograph\nbeing publicly associated with the fitness club.\n\nAfter numerous failed attempts to book an appointment with the manager of the local branch to discuss\nthis matter, Javier sends a letter to EVETFIT requesting that his image be removed from the website and\nall promotional materials. Months pass and Javier, having received no acknowledgment of his request,\nbecomes very anxious about this matter. After repeatedly failing to contact EVETFIT through alternate\nchannels, he decides to take action against the company.\n\nJavier contacts the U.K. Information Commissioner’s Office (‘ICO’ – the U.K.’s supervisory authority) to\nlodge a complaint about this matter. The ICO, pursuant to Article 56 (3) of the GDPR, informs the CNIL\n(i.e. the supervisory authority of EVERFIT’s main establishment) about this matter. Despite the fact that\nEVERFIT has an establishment in the U.K., the CNIL decides to handle the case in accordance with Article\n60 of the GDPR. The CNIL liaises with the ICO, as relevant under the cooperation procedure. In light of\nissues amongst the supervisory authorities to reach a decision, the European Data Protection Board\nbecomes involved and, pursuant to the consistency mechanism, issues a binding decision.\n\nAdditionally, Javier sues EVERFIT for the damages caused as a result of its failure to honor his request to\nhave his photograph removed from the brochure and website.\n\nUnder the cooperation mechanism, what should the lead authority (the CNIL) do after it has formed its\nview on the matter?","o":"A. Submit a draft decision to other supervisory authorities for their opinion.\nB. Request that the other supervisory authorities provide the lead authority with a draft decision for its\nconsideration.\nC. Submit a draft decision directly to the Commission to ensure the effectiveness of the consistency\nmechanism.\nD. Request that members of the seconding supervisory authority and the host supervisory authority co-\ndraft a decision.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 60 条合作机制下，主导监管机构（lead supervisory authority）在形成决定草案后，须将该\n决定草案提交给其他相关监管机构（concerned supervisory authorities）征求意见，各方在四周内可表达\n“相关且合理的异议”（relevant and reasoned objection），如无法达成共识才启动 EDPB 的一致性机制。\nB、C、D 均颠倒或误述了合作机制的具体流程和主体角色。知识点：第 60 条一站式合作机制中主导监管\n机构与相关监管机构之间的协作程序。","t":"监管机构"},{"n":71,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJavier is a member of the fitness club EVERFIT. This company has branches in many EU member states,\nbut for the purposes of the GDPR maintains its primary establishment in France. Javier lives in Newry,\nNorthern Ireland (part of the U.K.), and commutes across the border to work in Dundalk, Ireland. Two\nyears ago while on a business trip, Javier was photographed while working out at a branch of EVERFIT in\nFrankfurt, Germany. At the time, Javier gave his consent to being included in the photograph, since he\nwas told that it would be used for promotional purposes only. Since then, the photograph has been used in\nthe club’s U.K. brochures, and it features in the landing page of its U.K. website. However, the fitness club\nhas recently fallen into disrepute due to widespread mistreatment of members at various branches of the\n\nclub in several EU member states. As a result, Javier no longer feels comfortable with his photograph\n\nbeing publicly associated with the fitness club.\n\nAfter numerous failed attempts to book an appointment with the manager of the local branch to discuss\n\nthis matter, Javier sends a letter to EVETFIT requesting that his image be removed from the website and\n\nall promotional materials. Months pass and Javier, having received no acknowledgment of his request,6\nbecomes very anxious about this matter. After repeatedly failing to contact EVETFIT through alternate\nchannels, he decides to take action against the company.\n\nJavier contacts the U.K. Information Commissioner’s Office (‘ICO’ – the U.K.’s supervisory authority) to\nlodge a complaint about this matter. The ICO, pursuant to Article 56 (3) of the GDPR, informs the CNIL\n(i.e. the supervisory authority of EVERFIT’s main establishment) about this matter. Despite the fact that\nEVERFIT has an establishment in the U.K., the CNIL decides to handle the case in accordance with Article\n60 of the GDPR. The CNIL liaises with the ICO, as relevant under the cooperation procedure. In light of\nissues amongst the supervisory authorities to reach a decision, the European Data Protection Board\nbecomes involved and, pursuant to the consistency mechanism, issues a binding decision.\n\nAdditionally, Javier sues EVERFIT for the damages caused as a result of its failure to honor his request to\nhave his photograph removed from the brochure and website.\n\nAssuming that multiple EVETFIT branches across several EU countries are acting as separate data\ncontrollers, and that each of those branches were responsible for mishandling Javier’s request, how may\n\nJavier proceed in order to seek compensation?","o":"A. He will have to sue the EVETFIT’s head office in France, where EVETFIT has its main establishment.\nB. He will be able to sue any one of the relevant EVETFIT branches, as each one may be held liable for\nthe entire damage.\nC. He will have to sue each EVETFIT branch so that each branch provides proportionate compensation\ncommensurate with its contribution to the damage or distress suffered by Javier.\nD. He will be able to apply to the European Data Protection Board in order to determine which particular\nEVETFIT branch is liable for damages, based on the decision that was made by the board.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。当多个独立设立的分支机构分别作为独立控制者、共同对同一损害负有责任时，依据第\n82(4)条及各国民事责任规则（连带责任原则），受害人可以选择起诉其中任何一个责任主体，要求其对\n全部损害承担赔偿责任（该责任方随后可向其他责任方追偿）。A（必须起诉法国总部）、C（每个分支\n机构仅按比例赔偿，与连带责任的立法目的不符，除非最终各责任方之间内部分摊，但对外部受害人而\n言无需逐一按比例起诉）、D（EDPB 无权直接裁定具体分支机构的赔偿责任分配，这属于民事诉讼范\n畴）均不准确。知识点：第 82 条数据主体获得赔偿的权利及共同责任人的连带赔偿责任。","t":"监管机构"},{"n":72,"q":"The GDPR specifies fines that may be levied against data controllers for certain infringements. Which of\nthe following infringements would be subject to the less severe administrative fine of up to 10 million euros\n(or in the case of an undertaking, up to 2% of the total worldwide annual turnover of the preceding financial\nyear)?","o":"A. Failure to demonstrate that consent was given by the data subject to the processing of their personal\ndata where it is used as the basis for processing.\nB. Failure to implement technical and organizational measures to ensure data protection is enshrined by\ndesign and default.\nC. Failure to process personal information in a manner compatible with its original purpose.\nD. Failure to provide the means for a data subject to rectify inaccuracies in personal data.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 83(4)条规定的“较低档”行政罚款（最高 1000 万欧元或全球年营业额 2%，以较高者为\n准）适用于违反数据保护设计与默认（Privacy by Design and by Default，第 25 条）、处理者义务、认证\n机构义务等条款；而未能证明已获得同意（A，违反第 7 条同意条款）、未按兼容目的处理（C，违反第\n5、6 条处理原则）、未提供数据更正途径（D，违反数据主体权利第 16 条）均属于第 83(5)条规定的“较\n高档”罚款情形（最高 2000 万欧元或全球营业额 4%）。知识点：第 83 条两档行政罚款的具体适用范围\n区分。","t":"GDPR"},{"n":73,"q":"What is the MAIN reason GDPR Article 4(22) establishes the concept of the “concerned supervisory\nauthority”?","o":"A. To encourage the consistency of local data processing activity.\n\nB. To give corporations a choice about who their supervisory authority will be.\nC. To ensure the GDPR covers controllers that do not have an establishment in the EU but have a\n\nrepresentative in a member state.\n\nD. To ensure that the interests of individuals residing outside the lead authority’s jurisdiction are\nrepresented.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。“相关监管机构”（concerned supervisory authority，第 4(22)条）概念的设立，是为了在一站\n式机制下，确保处理活动影响到的、非主导监管机构辖区的数据主体权益也能得到代表和保护，即便案\n件由主导监管机构统一处理，其他相关成员国的监管机构仍可参与、提出意见、维护本国数据主体的利\n益。A、B、C 均未准确反映该概念设立的核心目的。知识点：第 4(22)条“相关监管机构”概念及其在一站\n式机制中的作用。","t":"GDPR"},{"n":74,"q":"Which area of privacy is a lead supervisory authority’s (LSA) MAIN concern?","o":"A. Data subject rights\nB. Data access disputes\nC. Cross-border processing\nD. Special categories of data","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。主导监管机构（LSA）制度的核心适用场景是“跨境处理”（cross-border processing，即控制\n者在多个成员国设有机构或处理活动实质影响多个成员国数据主体的情形），旨在为企业提供单一联系\n窗口。数据主体权利、数据获取纠纷及特殊类别数据处理并非 LSA 机制专门针对的核心领域，这些议题\n在任何处理场景（无论是否跨境）中都可能出现。知识点：主导监管机构（LSA）机制及“跨境处理”的定\n义（第 4(23)条）。","t":"监管机构"},{"n":75,"q":"If a multi-national company wanted to conduct background checks on all current and potential employees,\nincluding those based in Europe, what key provision would the company have to follow?","o":"A. Background checks on employees could be performed only under prior notice to all employees.\nB. Background checks are only authorized with prior notice and express consent from all employees\nincluding those based in Europe.\nC. Background checks on European employees will stem from data protection and employment law,\nwhich can vary between member states.\nD. Background checks may not be allowed on European employees, but the company can create lists\nbased on its legitimate interests, identifying individuals who are ineligible for employment.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。欧盟层面对员工背景调查并无统一专门立法，实际操作须同时遵循数据保护法（GDPR 及各\n国转化立法）与各成员国不同的劳动法/雇佣法规定，二者结合且因成员国而异，这正是跨国企业开展欧\n洲员工背景调查时面临的核心合规难点。A、B（须提前通知/需全体明确同意）过于绝对，并非 GDPR/劳\n动法的统一强制标准（合法依据可以是雇主合法利益等，未必需要同意）；D 的表述（可建立“不合格名\n单”）不准确且存在合规风险（可能违反数据保护原则）。知识点：员工背景调查须综合考量数据保护法\n与各国雇佣法的双重规制，以及处理雇员数据合法依据的复杂性。","t":"GDPR"},{"n":76,"q":"Why is advisable to avoid consent as a legal basis for an employer to process employee data?","o":"A. Employee data can only be processed if there is an approval from the data protection officer.\nB. Consent may not be valid if the employee feels compelled to provide it.\nC. An employer might have difficulty obtaining consent from every employee.\nD. Data protection laws do not apply to processing of employee data.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。在雇佣关系中，员工与雇主之间存在明显的权力不对等，员工往往难以自由拒绝雇主的同\n意请求（担心影响工作），因此以“同意”作为处理雇员数据的合法依据存在“自愿性”缺陷，同意可能被认\n定无效（前言第 43 条强调不平等权力关系下同意的有效性存疑）。A、C、D 均非同意在雇佣场景下不被\n推荐使用的准确原因（数据保护法当然适用于雇员数据处理，雇主获取同意的“难度”也不是核心法律顾\n虑）。知识点：同意作为合法依据在权力不对等关系（如雇佣关系）中的有效性问题（前言第 43 条）。","t":"GDPR"},{"n":77,"q":"What is true if an employee makes an access request to his employer for any personal data held about\nhim?","o":"A. The employer can automatically decline the request if it contains personal data about a third person.\nB. The employer can decline the request if the information is only held electronically.\nC. The employer must supply all the information held about the employee.\nD. The employer must supply any information held about an employee unless an exemption applies.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。雇主作为控制者，收到员工的访问请求后原则上须依第 15 条提供其持有的全部相关个人数\n据，但可依法适用特定豁免情形（如涉及第三方数据保护、商业秘密、法律特权等），因此答案是“除非\n适用豁免，否则须提供”，而非绝对地“必须提供全部信息”（C 过于绝对）或可仅因涉及第三人信息\n（A）或仅电子存储形式（B）就自动拒绝。知识点：第 15 条数据主体访问权及其法定豁免情形。","t":"GDPR"},{"n":78,"q":"Read the following steps:\nDiscover which employees are accessing cloud services and from which devices and apps\nLock down the data in those apps and devices\nMonitor and analyze the apps and devices for compliance\nManage application life cycles\nMonitor data sharing\n\nAn organization should perform these steps to do which of the following?","o":"A. Pursue a GDPR-compliant Privacy by Design process.\nB. Institute a GDPR-compliant employee monitoring process.\nC. Maintain a secure Bring Your Own Device (BYOD) program.\nD. Ensure cloud vendors are complying with internal data use policies.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。题目所列步骤（发现云服务访问设备应用、锁定数据、监控合规、管理应用生命周期、监\n控数据共享）是企业管理“自带设备办公”（BYOD）项目、平衡员工设备灵活性与企业数据安全合规的典\n型流程，而非隐私设计流程（A，Privacy by Design 关注产品/系统设计阶段）、员工监控合规流程（B，\n侧重合法监控依据而非设备管理）或供应商内部合规审查（D）。知识点：BYOD 项目管理与移动设备安\n全（MDM/MAM）在 GDPR 环境下的应用。","t":"GDPR"},{"n":79,"q":"If a company is planning to use closed-circuit television (CCTV) on its premises and is concerned with\nGDPR compliance, it should first do all of the following EXCEPT?","o":"A. Notify the appropriate data protection authority.\nB. Perform a data protection impact assessment (DPIA).\nC. Create an information retention policy for those who operate the system.\nD. Ensure that safeguards are in place to prevent unauthorized access to the footage.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。安装 CCTV 前，企业首先应做的是进行 DPIA 评估隐私风险（B）、制定录像留存政策\n（C）、确保未授权访问防护措施（D），但 GDPR 并未要求企业在部署 CCTV 前须事先向监管机构“通\n知/报备”——一般性的处理通知义务已被 GDPR 废除，仅在特定高风险且 DPIA 显示无法降低风险时才需\n依第 36 条进行“事先咨询”，而非泛泛的“通知”义务。知识点：CCTV 监控的 GDPR 合规要点及一般通知\n义务的废除（与 95/46 指令时代的区别）。","t":"历史沿革/95-46-EC"},{"n":80,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBuilding Block Inc. is a multinational company, headquartered in Chicago with offices throughout the\n\nUnited States, Asia, and Europe (including Germany, Italy, France and Portugal). Last year the company\n\nwas the victim of a phishing attack that resulted in a significant data breach. The executive board, in\ncoordination with the general manager, their Privacy Office and the Information Security team, resolved to\n\nadopt additional security measures. These included training awareness programs, a cybersecurity audit,\n\nand use of a new software tool called SecurityScan, which scans employees’ computers to see if they\n\nhave software that is no longer being supported by a vendor and therefore not getting security updates.\n\nHowever, this software also provides other features, including the monitoring of employees’ computers.\n\nSince these measures would potentially impact employees, Building Block’s Privacy Office decided to\nissue a general notice to all employees indicating that the company will implement a series of initiatives to\nenhance information security and prevent future data breaches.\n\nAfter the implementation of these measures, server performance decreased. The general manager\ninstructed the Security team on how to use SecurityScan to monitor employees’ computers activity and\ntheir location. During these activities, the Information Security team discovered that one employee from\nItaly was daily connecting to a video library of movies, and another one from Germany worked remotely\nwithout authorization. The Security team reported these incidents to the Privacy Office and the general\nmanager. In their report, the team concluded that the employee from Italy was the reason why the server\nperformance decreased.\n\nDue to the seriousness of these infringements, the company decided to apply disciplinary measures to\nboth employees, since the security and privacy policy of the company prohibited employees from installing\nsoftware on the company’s computers, and from working remotely without authorization.\n\nTo comply with the GDPR, what should Building Block have done as a first step before implementing the\nSecurityScan measure?","o":"A. Assessed potential privacy risks by conducting a data protection impact assessment.\nB. Consulted with the relevant data protection authority about potential privacy violations.\nC. Distributed a more comprehensive notice to employees and received their express consent.\nD. Consulted with the Information Security team to weigh security measures against possible server\nimpacts.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。在部署可能对员工隐私产生重大影响的监控软件（SecurityScan 除安全补丁扫描外还具备员\n工监控功能）之前，公司首先应当进行数据保护影响评估（DPIA），以识别、评估并降低对员工权利自\n由的潜在风险，这是“设计阶段隐私保护”和问责制原则的核心要求。B（咨询监管机构，仅在 DPIA 显示\n高风险且无法缓解时才需要，非首要步骤）、C（发一般性通知即视为获得同意，笼统通知不满足透明度\n和同意具体性要求）、D（仅与 IT 团队讨论服务器影响，未触及隐私合规核心）均非首要应采取的合规\n步骤。知识点：第 35 条 DPIA 作为部署高风险监控技术前的前置合规步骤，员工监控中的“设计阶段隐私\n保护”（Privacy by Design）。","t":"GDPR"},{"n":81,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBuilding Block Inc. is a multinational company, headquartered in Chicago with offices throughout the\nUnited States, Asia, and Europe (including Germany, Italy, France and Portugal). Last year the company\nwas the victim of a phishing attack that resulted in a significant data breach. The executive board, in\ncoordination with the general manager, their Privacy Office and the Information Security team, resolved to\n\nadopt additional security measures. These included training awareness programs, a cybersecurity audit,\nand use of a new software tool called SecurityScan, which scans employees’ computers to see if they\nhave software that is no longer being supported by a vendor and therefore not getting security updates.\nHowever, this software also provides other features, including the monitoring of employees’ computers.\n\nSince these measures would potentially impact employees, Building Block’s Privacy Office decided to\nissue a general notice to all employees indicating that the company will implement a series of initiatives to\nenhance information security and prevent future data breaches.\n\nAfter the implementation of these measures, server performance decreased. The general manager\ninstructed the Security team on how to use SecurityScan to monitor employees’ computers activity and\ntheir location. During these activities, the Information Security team discovered that one employee from\nItaly was daily connecting to a video library of movies, and another one from Germany worked remotely\nwithout authorization. The Security team reported these incidents to the Privacy Office and the general\n\nmanager. In their report, the team concluded that the employee from Italy was the reason why the server\n\nperformance decreased.\n\nDue to the seriousness of these infringements, the company decided to apply disciplinary measures to\n\nboth employees, since the security and privacy policy of the company prohibited employees from installing\nsoftware on the company’s computers, and from working remotely without authorization.\n\nWhat would be the MOST APPROPRIATE way for Building Block to handle the situation with the\nemployee from Italy?","o":"A. Since the GDPR does not apply to this situation, the company would be entitled to apply any\ndisciplinary measure authorized under Italian labor law.\nB. Since the employee was the cause of a serious risk for the server performance and their data, the\ncompany would be entitled to apply disciplinary measures to this employee, including fair dismissal.\nC. Since the employee was not informed that the security measures would be used for other purposes\nsuch as monitoring, the company could face difficulties in applying any disciplinary measures to this\nemployee.\nD. Since this was a serious infringement, but the employee was not appropriately informed about the\nconsequences the new security measures, the company would be entitled to apply some disciplinary\nmeasures, but not dismissal.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。公司发布的通知只泛泛提及“提升信息安全”，并未明确告知 SecurityScan 还具备监控员工活\n动和位置的功能，违反了透明度原则（第 13、14 条），员工因此并未被充分告知该数据将用于监控这一\n新目的，公司在此情况下对该员工采取纪律处分将面临合法性挑战。A 错——GDPR 同样适用于该情形\n（跨国公司在意大利分支处理欧盟员工数据）；B（径行认定可解雇）、D（可处分但不可解雇）都跳过\n了处理合法性/透明度这一根本前提问题。知识点：员工监控中的透明度义务，第 5(1)(a)、13 条，非法收\n集证据对后续管理措施的影响。","t":"GDPR"},{"n":82,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nBuilding Block Inc. is a multinational company, headquartered in Chicago with offices throughout the\n\nUnited States, Asia, and Europe (including Germany, Italy, France and Portugal). Last year the company\nwas the victim of a phishing attack that resulted in a significant data breach. The executive board, in\ncoordination with the general manager, their Privacy Office and the Information Security team, resolved to\nadopt additional security measures. These included training awareness programs, a cybersecurity audit,\nand use of a new software tool called SecurityScan, which scans employees’ computers to see if they\nhave software that is no longer being supported by a vendor and therefore not getting security updates.\nHowever, this software also provides other features, including the monitoring of employees’ computers.\n\nSince these measures would potentially impact employees, Building Block’s Privacy Office decided to\nissue a general notice to all employees indicating that the company will implement a series of initiatives to\nenhance information security and prevent future data breaches.\n\nAfter the implementation of these measures, server performance decreased. The general manager\ninstructed the Security team on how to use SecurityScan to monitor employees’ computers activity and\ntheir location. During these activities, the Information Security team discovered that one employee from\nItaly was daily connecting to a video library of movies, and another one from Germany worked remotely\nwithout authorization. The Security team reported these incidents to the Privacy Office and the general\nmanager. In their report, the team concluded that the employee from Italy was the reason why the server\nperformance decreased.\n\nDue to the seriousness of these infringements, the company decided to apply disciplinary measures to\nboth employees, since the security and privacy policy of the company prohibited employees from installing\nsoftware on the company’s computers, and from working remotely without authorization.\n\nIn addition to notifying employees about the purpose of the monitoring, the potential uses of their data and\ntheir privacy rights, what information should Building Block have provided them before implementing the\nsecurity measures?","o":"A. Information about what is specified in the employment contract.\n\nB. Information about who employees should contact with any queries.\n\nC. Information about how providing consent could affect them as employees.\n\nD. Information about how the measures are in the best interests of the company.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。除说明监控目的、数据用途和员工权利外，充分透明的告知还应包括员工对相关问题可联\n系的具体对象（如 DPO 或隐私办公室联系方式），这是落实数据主体行使权利、寻求解答的实际保障\n（呼应第 13(1)(b)条关于 DPO 联系方式的告知要求）。A（劳动合同条款内容）、C（同意对雇员的影\n响，本场景合法依据并非同意）、D（测量对公司的利益，无关告知义务）均非该告知缺口的准确答案。\n知识点：第 13/14 条告知内容的完整性——包括联系方式等程序性信息。","t":"GDPR"},{"n":83,"q":"Based on GDPR Article 35, which of the following situations would trigger the need to complete a DPIA?","o":"A. A company wants to combine location data with other data in order to offer more personalized service\nfor the customer.\nB. A company wants to use location data to infer information on a person’s clothes purchasing habits.\nC. A company wants to build a dating app that creates candidate profiles based on location data and data\nfrom third-party sources.\nD. A company wants to use location data to track delivery trucks in order to make the routes more\nefficient.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。约会软件基于位置数据及第三方来源数据构建用户画像以匹配潜在对象，涉及大规模处\n理、结合多源数据进行系统性画像评估，且可能间接涉及敏感信息（如推断性取向等），属于 WP29\nDPIA 指南中列举的高风险处理情形（画像评估+创新技术+可能涉及特殊类别数据的推断），须开展\nDPIA。A、B、D 虽然也涉及位置数据处理，但并未同时叠加“大规模画像+多源数据融合+可能触及敏感\n信息”等多重高风险因素，风险程度较低，未必强制触发 DPIA。知识点：第 35(3)条及 WP29 DPIA 指南\n列举的高风险处理情形（大规模画像、创新技术使用等）。","t":"GDPR"},{"n":84,"q":"In which of the following cases would an organization MOST LIKELY be required to follow both ePrivacy\nand data protection rules?","o":"A. When creating an untargeted pop-up ad on a website.\nB. When calling a potential customer to notify her of an upcoming product sale.\nC. When emailing a customer to announce that his recent order should arrive earlier than expected.\nD. When paying a search engine company to give prominence to certain products and services within\nspecific search results.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。电话营销涉及 ePrivacy 指令关于电子通信直接营销的同意/退出规则（因涉及电话这一“电子\n通信”手段），同时该处理个人数据的行为也须符合 GDPR 的合法处理原则，因此二者规则同时适用。A\n（非定向弹窗广告一般不涉及针对个人的直接电子通信）、C（订单到货提醒邮件属于服务性通知而非营\n销，一般豁免于营销同意规则）、D（付费提升搜索排名主要涉及商业合同及竞争法，非典型的 ePrivacy\n规制对象）均不如 B 典型地同时触发两套规则。知识点：ePrivacy 指令与 GDPR 在电子直接营销场景下\n的双重适用。","t":"ePrivacy指令"},{"n":85,"q":"What permissions are required for a marketer to send an email marketing message to a consumer in the\nEU?","o":"A. A prior opt-in consent for consumers unless they are already customers.\nB. A pre-checked box stating that the consumer agrees to receive email marketing.\nC. A notice that the consumer’s email address will be used for marketing purposes.\nD. No prior permission required, but an opt-out requirement on all emails sent to consumers.","a":"A","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 A 应理解为：电子邮件直销原则上需要事先同意；“soft opt-in”仅适用于在销售或销售磋商中直接取得联系方\n式、营销自身类似产品或服务，并在收集时及每封邮件中均提供简便免费退出方式的情形。","t":"GDPR"},{"n":86,"q":"Under what circumstances might the “soft opt-in” rule apply in relation to direct marketing?","o":"A. When an individual has not consented to the marketing. 6\nB. When an individual’s details are obtained from their inquiries about buying a product.\nC. Where an individual’s details have been obtained from a bought-in marketing list.\nD. Where an individual is given the ability to unsubscribe from marketing emails sent to him.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 为最佳选项，但“曾经咨询或交易”本身不够。软退出还要求联系方式是在销售或销售磋商中直接取得、营销\n主体为同一企业、内容是类似产品或服务，并在收集时和每次通信时提供退出。","t":"GDPR"},{"n":87,"q":"What should a controller do after a data subject opts out of a direct marketing activity?","o":"A. Without exception, securely delete all personal data relating to the data subject.\nB. Without undue delay, provide information to the data subject on the action that will be taken.\nC. Refrain from processing personal data relating to the data subject for the relevant type of\ncommunication.\nD. Take reasonable steps to inform third-party recipients that the data subject’s personal data should be\ndeleted and no longer processed.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 21(3)条规定，一旦数据主体反对将其数据用于直接营销，控制者必须立即停止将该数据\n用于该类营销目的的处理，这是绝对权利，控制者无需进行利益衡量即须遵从。A（无条件彻底删除所有\n数据）表述过于绝对，数据可能因其他合法依据/目的继续保留；B、D 虽是良好实践但并非第 21 条规定\n的核心法定义务表述。知识点：第 21(2)(3)条反对直接营销的绝对权利及控制者的对应义务。","t":"GDPR"},{"n":88,"q":"How is the GDPR’s position on consent MOST likely to affect future app design and implementation?","o":"A. App developers will expand the amount of data necessary to collect for an app’s functionality.\nB. Users will be given granular types of consent for particular types of processing.\nC. App developers’ responsibilities as data controllers will increase.\nD. Users will see fewer advertisements when using apps.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。为满足 GDPR 对同意“具体性”“清晰积极行为”等要求，App 开发者未来须为不同类型的处理\n活动分别提供细分（granular）的同意选项，而非笼统的“一揽子”同意，让用户能够对各项具体处理逐一\n作出选择。A（扩大收集数据量，与数据最小化原则相悖）、C（虽然合规责任客观上会增加，但并非题\n目问的“对 App 设计与实施”的直接影响）、D（广告数量减少并非同意规则的直接必然结果）均不是最贴\n切的答案。知识点：同意的“具体性”要求对产品设计（granular consent UX）的影响。","t":"GDPR"},{"n":89,"q":"A mobile device application that uses cookies will be subject to the consent requirement of which of the\nfollowing?","o":"A. The ePrivacy Directive\nB. The E-Commerce Directive\nC. The Data Retention Directive\nD. The EU Cybersecurity Directive","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。无论是网页还是移动应用，只要涉及在用户设备上存储或读取信息（cookie 或类似技术如\nSDK、本地存储），均受 ePrivacy 指令（“cookie 规则”）关于事先同意的规制，GDPR 则规范这些信息构\n成个人数据后的后续处理。电子商务指令（B）主要规范在线合同和服务提供的透明度，数据留存指令\n（C）已被宣告无效且规范执法数据留存，网络与信息安全指令（D）聚焦关键基础设施安全，均非规制\ncookie 同意的直接依据。知识点：ePrivacy 指令对 cookie 及类似追踪技术的同意规制，适用于网页与 App\n等各类终端设备。","t":"ePrivacy指令"},{"n":90,"q":"What term BEST describes the European model for data protection?","o":"A. Sectoral\nB. Self-regulatory\nC. Market-based\nD. Comprehensive","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。欧盟采用的是“综合性”（comprehensive/omnibus）数据保护立法模式，即以统一、全面的一\n般性法律（如 GDPR）适用于所有行业和数据类型，区别于美国式的“行业分散立法”（sectoral，A）模\n式、行业自律模式（self-regulatory，B）或市场化模式（C）。知识点：全球数据保护立法模式的比较—\n—欧盟综合型 vs. 美国分散型/自律型。","t":"GDPR"},{"n":91,"q":"What was the aim of the European Data Protection Directive 95/46/EC?","o":"A. To harmonize the implementation of the European Convention of Human Rights across all member\nstates.\nB. To implement the OECD Guidelines on the Protection of Privacy and trans-border flows of Personal\nData.\n\nC. To completely prevent the transfer of personal data out of the European Union.\nD. To further reconcile the protection of the fundamental rights of individuals with the free flow of data\nfrom one member state to another.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。95/46/EC 指令在立法目的中明确寻求在保护个人基本权利（尤其隐私权）与促进欧盟内部\n个人数据自由流动之间取得平衡，这也是欧盟数据保护立法一贯的双重目标（既保护权利又促进单一市\n场内的数据流通）。A（协调欧洲人权公约的实施，指令本身并非专门针对 ECHR 的协调工具）、B（实\n施 OECD 指南，指令借鉴但并非以“实施 OECD 指南”为直接立法目的）、C（完全禁止数据出境，与实际\n内容相悖，指令恰恰是为促进内部数据流动）均不准确。知识点：95/46/EC 指令的双重立法目标——基\n本权利保护与数据自由流动的平衡。","t":"历史沿革/95-46-EC"},{"n":92,"q":"What is the key difference between the European Council and the Council of the European Union?","o":"A. The Council of the European Union is helmed by a president.\nB. The Council of the European Union has a degree of legislative power.\nC. The European Council focuses primarily on issues involving human rights.\nD. The European Council is comprised of the heads of each EU member state.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 最准确地区分两机构的组成，但 B“欧洲理事会不通过欧盟立法”也是真命题，因此题目存在一定多解性。欧\n洲理事会由国家元首或政府首脑组成并确定政治方向；欧盟理事会由各国部长组成并与欧洲议会共同立法。","t":"监管机构"},{"n":93,"q":"Which change was introduced by the 2009 amendments to the e-Privacy Directive 2002/58/EC?","o":"A. A voluntary notification for personal data breaches applicable to all data controllers.\nB. A voluntary notification for personal data breaches applicable to electronic communication providers.\nC. A mandatory notification for personal data breaches applicable to all data controllers.\nD. A mandatory notification for personal data breaches applicable to electronic communication providers.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。2009 年对 ePrivacy 指令（2002/58/EC，经 2009/136/EC 修订）的修订新增了强制性数据泄露\n通知义务，但该义务仅适用于电子通信服务提供商（如电信运营商、ISP），而非所有数据控制者——面\n向所有控制者的强制泄露通知义务是后来 GDPR（第 33、34 条）才引入的。知识点：2009 年 ePrivacy 指\n令修订引入的强制泄露通知义务及其适用主体的历史局限性（相较 GDPR 的扩展）。","t":"ePrivacy指令"},{"n":94,"q":"What is a reason the European Court of Justice declared the Data Retention Directive invalid in 2014?","o":"A. The requirements affected individuals without exception.\nB. The requirements were financially burdensome to EU businesses.\nC. The requirements specified that data must be held within the EU.\nD. The requirements had limitations on how national authorities could use data.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。欧洲法院在 Digital Rights Ireland 案（2014）中认定《数据留存指令》无差别地要求对几乎\n所有电子通信用户的流量和位置数据进行大规模留存，未区分个人是否涉嫌犯罪或存在其他相关联系，\n构成对隐私权和数据保护权的不成比例干预，因而宣告该指令无效。B（财务负担）、C（数据须留在欧\n盟境内）、D（对国家机关使用数据的限制）均非该判决认定无效的核心理由。知识点：Digital Rights\nIreland 案及数据留存指令被宣告无效的比例原则依据。","t":"监管机构"},{"n":95,"q":"Which type of personal data does the GDPR define as a “special category” of personal data?","o":"A. Educational history.\nB. Trade-union membership.\nC. Closed Circuit Television (CCTV) footage.\nD. Financial information.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。第 9(1)条明确列举的“特殊类别数据”包括：种族或民族出身、政治观点、宗教或哲学信仰、\n工会会员身份、基因数据、生物识别数据（用于唯一识别）、健康数据、性生活或性取向数据。教育经\n历（A）、CCTV 影像（C，除非能揭示特殊类别信息如健康状况）、财务信息（D）通常属于一般个人\n数据而非特殊类别数据。知识点：第 9 条特殊类别数据的法定列举范围。","t":"GDPR"},{"n":96,"q":"After leaving the EU under the terms of Brexit, the United Kingdom will seek an adequacy determination.\nWhat is the reason for this?","o":"A. The Insurance Commissioner determined that an adequacy determination is required by the Data\nProtection Act.\nB. Adequacy determinations automatically lapse when a Member State leaves the EU.\nC. The UK is now a third country because it’s no longer subject to the GDPR.\nD. The UK is less trustworthy now that its not part of the Union.","a":"C","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 C 在历史语境下正确。英国自 2021 年起已是欧盟 GDPR 第五章意义上的第三国；欧盟委员会于 2021 年作出充\n分性决定，并于 2025 年 12 月 19 日续期，现有效期至 2031 年 12 月 27 日。","t":"GDPR"},{"n":97,"q":"To which of the following parties does the territorial scope of the GDPR NOT apply?","o":"A. All member countries of the European Economic Area.\nB. All member countries party to the Treaty of Lisbon.\nC. All member countries party to the Paris Agreement.\nD. All member countries of the European Union.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。GDPR 的属地适用范围（第 3 条）及一般性适用范围覆盖欧盟成员国及通过欧洲经济区协议\n延伸适用的 EEA 国家（冰岛、列支敦士登、挪威），与欧盟条约框架（如里斯本条约缔约国即为成员\n国）相关，但与《巴黎协定》（一项气候变化国际条约，成员国范围与气候治理相关，和数据保护法域\n无关）完全无关。知识点：GDPR 属地适用范围——欧盟成员国及 EEA 国家，排除与数据保护无关的国\n际协定缔约国范围。","t":"GDPR"},{"n":98,"q":"What must a data controller do in orde
