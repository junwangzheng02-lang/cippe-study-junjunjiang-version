fic security measures for the processing. 6","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。处理者虽须按照控制者的指示行事，但在具体的技术实现层面，如选用何种硬件/软件、部\n署哪些具体安全措施细节，处理者通常拥有一定的自主决定空间（只要能达到第 32 条要求的适当安全水\n平并符合控制者的整体指示）。A（更换次级处理者须事先告知/取得控制者授权，非处理者可自行决定\n的事项）、B（处理者不得为自身兼容目的自行处理数据，否则将转变为控制者）、C（处理者不能自行\n决定营销活动参数，这属于目的和方式层面的决策，超出处理者权限）均不属于处理者可自主决定的范\n畴。知识点：处理者在遵从控制者指示前提下，对具体技术安全实现方式享有的有限自主空间（第 28、\n32 条）。","t":"GDPR"},{"n":208,"q":"Two companies, Gellcoat and Freifish, make plans to launch a co-branded product, the prototype of which\nis called Gellifish 5337. The companies want to organize an event to introduce the new product, so they\ndecide to share data from their client databases and come up with a list of people to invite. They agree on\nthe content of the invitations and together build an app to gather feedback at the event.\n\nIn this scenario, Gellcoat and Freifish are considered to be?","o":"A. Joint controllers with respect to the personal data related to the event and separate controllers for their\nother purposes.\nB. Joint controllers for all purposes because they have merged their databases and their data is now\njointly owned.\nC. Separate controllers because joint controllership requires a written designation in a contract.\nD. Separate controllers and processors since they are each providing services to the other.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Gellcoat 与 Freifish 共同决定该联合营销活动的处理目的和方式（共享数据库邀请名单、共\n同设计邀请函内容、共建反馈 App），就该特定活动而言构成共同控制者；但对于各自其他业务范围内\n的处理活动（如各自其他产品线的客户数据处理），双方仍各自独立作为单独控制者，共同控制者身份\n并不自动延伸至合作范围之外的所有处理活动。B（笼统认定“数据库合并即所有目的下均为共同控制\n者”，扩大了共同控制者认定的范围）、C（共同控制者身份并非必须以书面合同形式“指定”才能成立，\n实质性共同决策的事实本身即可认定，尽管第 26 条确实要求以协议明确责任分工）、D（将双方定性为\n互为处理者，忽略了双方实际共同决策处理目的和方式的事实）均不准确。知识点：共同控制者身份的\n认定应限于共同决策的具体处理活动范围内，而非自动扩展至合作双方的全部业务。","t":"GDPR"},{"n":209,"q":"According to guidance from the European Data Protection Board, in which of the following cases would a\ncontroller established outside of the EU not be subject to the GDPR?","o":"A. If the controller monitors the behavior of persons on the territory of the Republic of Switzerland.\nB. If the controller has a fully-owned branch office in the EU overseeing all its European operations,\nincluding marketing and advertising.\nC. If the controller has its some of its offices and servers based in the EU without having a legal branch or\nsubsidiary in any EU Member State.\nD. If the controller uses the services of an EU-based processor without offering goods or services to\npersons on EU territory or monitoring their behavior.","a":"D","v":"accurate","vd":"准确","e":"【经复核，本题参考答案有误，正确答案应为 D，理由见文末【答案修正】说明】原解析（针对原答案\nA）：正确答案 A。第 3(2)(b)条“监测行为”标准仅适用于监测“欧盟境内”数据主体的行为，瑞士并非欧盟\n成员国，若控制者仅监测瑞士境内人员行为而不涉及欧盟境内数据主体，则不落入 GDPR 第 3(2)(b)条域\n外适用范围（除非瑞士个人当时身处欧盟境内被监测，情况另当别论，但题目情形为监测瑞士境内人\n员）。B（在欧盟设有全资分支机构负责营销广告等业务，构成第 3(1)条设立地关联标准，触发 GDPR 适\n用）、C（在欧盟设有办公室和服务器，即便无正式法律分支机构，仍可能构成“稳定安排”的设立，触发\n适用）、D（使用欧盟处理者的服务，若控制者本身既不提供商品服务也不监测欧盟个人行为，则不适用\nGDPR，这与 D 选项描述一致，因此 D 不是本题应选的“不适用”反例——需重新审视，实际上 D 描述的\n正是“不适用”的情形，但题目问的是“不受 GDPR 约束”的情形，A、D 都可能符合，但根据 EDPB 相关指\n南，A 更精确地对应“监测非欧盟地域”这一明确排除因素，是标准答案）。知识点：第 3(2)(b)条监测行为\n标准仅限于监测欧盟境内数据主体，监测欧盟境外人员（即便地理相邻如瑞士）不触发该项域外适用。\n 【答案修正】原答案标注为 A，经核查 EDPB《3/2018 号关于 GDPR 域外适用范围指南》原文，正确答\n案应为 D。该指南明确指出：“a 'non-EU' controller will not become subject to the GDPR simply because it\nchooses to use a processor in the Union”（非欧盟控制者不会仅因使用了欧盟境内的处理者而当然受 GDPR\n约束），这正是选项 D 所描述的情形（使用欧盟处理者、且未向欧盟提供商品服务或监测欧盟个人行\n为），也是该指南中被反复引用的经典示例。而选项 A（监测瑞士境内人员）虽然结论上也不触发第\n3(2)(b)条，但并非该指南原文引用的具体示例，题干“According to guidance from the EDPB”明确指向指南\n原文内容，因此 D 比 A 更准确、更贴合题意。","t":"监管机构"},{"n":210,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\n\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\n\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\n\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\n\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\ncaused the termination of the professional relationship between the two companies.\n\nAccording to the GDPR, current CreditPlaya customers who have expressly accepted the policy Terms\nand Conditions would NOT be granted which of the following rights?","o":"A. The Right To Object.\nB. The Right to Erasure.\nC. The Right to Data Portability.\nD. The Right Not to be Subject to Profiling.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。“不受制于纯自动化决策（含画像）的权利”（第 22 条）仅适用于对个人产生法律效力或类\n似重大影响的“完全自动化决策”，而 CreditPlaya 的核保决策虽然自动生成，但题目未表明该决策会对客\n户产生此类重大自动化决策效果达到触发第 22 条特别保护门槛的程度（且该处理是订立/履行保险合同所\n必需，属于第 22(2)(a)条允许自动化决策的例外情形），因此客户在此类基于合同必需的自动化承保场景\n下，其“不受纯自动化决策约束”的绝对权利受到限制。反对权（A）、删除权（B，除非有例外理由）、\n可携权（C，基于合同的自动化处理数据可携权通常适用）在一般情况下仍可正常行使。知识点：第 22\n条免受自动化决策约束权利的例外——订立/履行合同所必需的自动化决策。","t":"GDPR"},{"n":211,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\n\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\n\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\n\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\n\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\n\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\n\ncaused the termination of the professional relationship between the two companies.\n\nThe disclosure of personal data to the independent company in Uruguay should be regulated by which of\nthe following?","o":"A. Binding Corporate Rules.\nB. A controller/processor agreement.\nC. An ad hoc authorization from the EU Commission.\nD. An ad hoc authorization from the Spanish Data Protection Authority.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 正确：独立乌拉圭公司若代表 CreditPlaya 处理数据，双方须签订第 28 条控制者—处理者协议。乌拉圭已获\n欧盟充分性认定，因此通常无需另行使用 SCC；但仍须满足安全、指示处理、分包等第 28 条要求。","t":"GDPR"},{"n":212,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\n\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\ncaused the termination of the professional relationship between the two companies.\n\nThe privacy notice provided by CreditPlaya contravenes Article 13 of the GDPR because?","o":"A. The document is delivered after the personal data has been obtained.\nB. The document is separated from the document listing Terms and Conditions.\n\nC. The document is not written in the language of the average prospective customer.\nD. The document fails to mention the applicable security measures for the processing.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。第 13 条要求控制者应在“收集个人数据时”（at the time when personal data are obtained）即向\n数据主体提供隐私声明，而 CreditPlaya 是在收集数据、作出核保决定后才随邮件一并发送隐私声明，属\n于事后告知，违反了第 13 条关于告知时点的强制性要求。B（与条款文件分开提供，本身并不违反\nGDPR，甚至是良好实践）、C（语言问题，题目未提及存在语言障碍）、D（未提及安全措施，非第 13\n条强制要求告知的核心内容）均不构成本案违规的准确原因。知识点：第 13 条告知义务的时点要求——\n须在收集数据时提供，而非事后随附。","t":"GDPR"},{"n":213,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\n\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\ncaused the termination of the professional relationship between the two companies.\n\nIf the data on the Uruguay company's servers had been encrypted, what kind of security measure would\nthis be considered?","o":"A. A remediation security measure.\nB. A prevention security measure.\nC. A corrective security measure.\nD. A detection security measure.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。对静态存储数据进行加密属于预防性安全措施（preventative security），旨在事先降低数据\n被未经授权访问或泄露的风险，而非在事件发生后采取的补救性（remedial/corrective，A、C）或检测性\n（detection，D）措施。知识点：第 32 条安全措施的分类——预防性、检测性、补救性措施及加密的预防\n性质。","t":"GDPR"},{"n":214,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\n\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\n\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\ncaused the termination of the professional relationship between the two companies.\n\nThe content of the email that CreditPlaya sends does not comply with GDPR requirements because it\nlacks what?","o":"A. The list of information with regard to personal data that were not obtained from the data subject,\naccording to Article 14.\nB. The list of the processors and subprocessors involved in the processing, as required by Article 28.\nC. The list of processing activities as set out in the records of processing activities, according to Article 30.\n\nD. The list of technical and organizational measures that will be implemented, according to Article 32.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。由于部分申请人数据可能并非直接从数据主体本人处获得（如“家庭其他成年成员的姓名”是\n由申请人代为提供，而非该家庭成员本人直接提供），依据第 14 条，控制者对此类非直接获取的数据负\n有特定的告知义务（如告知数据来源），而 CreditPlaya 发送的隐私声明未能针对这部分数据履行第 14 条\n特有的告知要求。B、C、D 均非本案隐私声明内容缺失的准确指向。知识点：第 14 条间接获取个人数据\n（如通过申请人代填家庭成员信息）时控制者的特定告知义务。","t":"GDPR"},{"n":215,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nCreditPlaya, SA is an established Spanish online insurance company whose exclusive activity is providing\nhealth insurance for legal residents of Spain, regardless of their nationality.\n\nCreditPlaya autonomously manages its own website, through which a potential customer, engaging in a\nfree pre-contractual activity, enters his or her full name, e-mail address, tax identification number (to verify\n\nresidence in Spain), age, profession, and the full names of any other adult members of his or her family.\n\nWith this data, CreditPlaya immediately sends an email granting or denying eligibility for a health insurance\npolicy. In the case of eligibility, the email also contains the eventual cost of the policy and two PDF\ndocuments – one with the contractual Terms and Conditions, and the other with the privacy notice as\nrequired by Article 13 of the GDPR.\n\nThe CreditPlaya Information Tracking System (ITS) is very efficient, with a low rate of unpaid insurance\npolicies. The ITS is automatically fed by the information provided by every applicant, whose data is then\nused to refine insurance policy rates.\n\nTo ensure their back-up procedures, in January 2021 CreditPlaya started sending weekly copies of the\n\nwhole database with all the applicants' personal data to an independent company in Uruguay. The\ninformation was sent through state-of-the-art encrypting tools, but once in Uruguay was stored without any\nencryption method.\n\nIn March 2022, the entire data base stored on the Uruguay's company servers was encrypted by malicious\nransomware. There was no evidence that the data was accessed by unauthorized persons, much less\n\naltered or exfiltrated. Despite the incident, CreditPlaya found that they could rely on the locally based\nSpanish back-up information and carry on its activity without interrupting its operations. The incident\ncaused the termination of the professional relationship between the two companies.\n\nThe refinement of the CreditPlaya Information Tracking System (ITS) is a processing activity that should\nbe?","o":"A. Explained in the privacy notice, with a list of the special categories of applicants' data.\nB. Specified in the Terms and Conditions document sent to applicants.\nC. Capable of allowing applicants to exercise their Right to Object.\nD. Subject to the explicit consent of the applicants.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。CreditPlaya 利用申请人数据持续优化其信息追踪系统（ITS）以完善保费定价，这属于对个\n人数据的画像/评估类处理，即便基于合法利益，数据主体依第 21(1)条仍应享有反对此类处理的权利（除\n非控制者能证明存在令人信服的合法理由）；处理设计上应确保申请人能够便捷行使该反对权，而非仅\n限于书面条款说明（B）、笼统纳入隐私声明特殊类别数据说明（A，该处理未必涉及特殊类别数据）或\n一律要求明确同意（D，若合法依据是合法利益而非同意，则无需以同意作为该项处理的依据，但仍须保\n留反对权入口）。知识点：第 21 条反对权在基于合法利益的画像/评估处理中的落实要求。","t":"GDPR"},{"n":216,"q":"The Planet 49 decision clarified all of the following issues regarding cookies EXCEPT?","o":"A. Whether a pre-ticked box constitutes valid consent under the ePrivacy Directive and the GDPR.\nB. Whether consent may be bundled to cover a number of activities or purposes at the same time.\nC. Whether is it necessary to provide information about the duration of cookies and any third-party\n\ncookies.\nD. Whether users may be forced to provide their consent as a condition for benefiting from goods or\nservices being offered.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。Planet49 案主要澄清的问题包括：预勾选同意框不构成有效同意（A）、同意不得笼统打包\n覆盖多个不同处理目的（B，须具体明确）、须告知 cookie 存续时间及第三方 cookie 相关信息（C，属透\n明度告知内容）；但该案并未就“是否可以将同意作为获得商品/服务的强制条件”（即同意与服务提供“捆\n绑”问题，通常涉及第 7(4)条同意自由性判断）作出裁决，该问题并非 Planet49 案的争议焦点。知识点：\nPlanet49 案的具体裁决范围——不涉及“同意作为获取服务前提条件”这一问题（该问题主要由第 7(4)条及\n其他案例/指南规制）。","t":"ePrivacy指令"},{"n":217,"q":"Pursuant to Article 17 and EDPB Guidelines 5/2019 on RTBF criteria in search engines cases, all of the\nfollowing would be valid grounds for data subject delisting requests EXCEPT?","o":"A. The personal data has been collected in relation to the offer of information society services (ISS) to a\nchild.\nB. The data subject withdraws consent and there is no other legal basis for the processing.\nC. The personal data is no longer necessary in relation to the search engine provider's processing.\nD. The processing is necessary for exercising the right of freedom of expression and information.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。EDPB《5/2019 号指南》关于搜索引擎场景下被遗忇权（去索引）标准列举的有效去索引理\n由包括：数据涉及向儿童提供信息社会服务时收集（A）、同意被撤回且无其他合法依据（B）、数据不\n再为处理目的所必需（C）等；但若处理（即搜索结果的呈现）本身是为行使表达自由和信息获取权所必\n需（言论自由与信息公众利益的平衡），则这恰恰构成拒绝去索引请求的正当理由，而非支持去索引的\n依据，因此 D 不属于有效的去索引申请理由，反而是反对去索引的抗辩事由。知识点：EDPB 指南\n5/2019 下搜索引擎去索引的有效理由及言论自由抗辩的区分。","t":"监管机构"},{"n":218,"q":"Article 58 of the GDPR describes the powers of supervisory authorities. Which of the following is NOT\namong those granted?","o":"A. Legislative powers.\nB. Corrective powers.\nC. Investigatory powers.\nD. Authorization and advisory powers.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。（与 Q204 同一知识点重复出现）第 58 条监管机构职权分为调查权（C）、纠正权（B）、\n授权咨询权（D）三大类，不包含立法权（A）。知识点：第 58 条监管机构三类职权不含立法权。","t":"GDPR"},{"n":219,"q":"Which of the following statements is inconsistent with the EDPB's position on qualifying a given\nprocessing as a “transfer” under Chapter V of the GDPR?","o":"A. Transfers subject to the GDPR can only occur when two separate parties – each of them a controller,\njoint controller or processor – are involved.\nB. Transfers subject to the GDPR may involve data disclosures between entities belonging to the same\ncorporate group (intra-group data disclosures).\nC. Transfers subject to the GDPR may involve remote access of personal data from a third country during\na business trip of an employee of the controller for the given processing.\nD. Transfers in which a controller or processor makes personal data available to another controller, joint\ncontroller, or processor needs to be subject to the GDPR for the given processing.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。EDPB《跨境传输认定指南》明确“传输”须满足三要件：涉及控制者/处理者向另一（独立\n的）控制者、共同控制者或处理者披露/提供个人数据（A、D）、可涵盖集团内部披露（B，同一企业集\n团内不同法律实体之间的数据流动同样可构成“传输”）；但员工本人在出差至第三国期间，以受雇于该控\n制者的身份、代表该控制者远程访问位于欧盟的个人数据数据库，并不构成两个独立主体之间的数据“传\n输”（因为访问者仍是同一控制者的员工，并非独立的另一方接收数据），EDPB 明确将此类情形排除在\n“传输”认定之外。知识点：EDPB 跨境传输认定指南——员工出差远程访问不构成第五章意义上的“传\n输”。","t":"监管机构"},{"n":220,"q":"To comply with the GDPR and the EU Court of Justice's decision in Schrems II, the European Commission\nissued what are commonly referred to as the new standard contractual clauses (SCCs). As a result,\nbusinesses must do all of the following EXCEPT?","o":"A. Consider the new optional docking clause, which expressly permits adding new parties to the SCCs.\nB. Migrate all contracts entered into before September 27, 2021, that use the old SCCs to the new SCCs\nby December 27, 2022.\nC. Take steps to flow down the new SCCs to relevant parts of their supply chain using the new SCCs as\nof September 27, 2021, if the business is a data importer.\nD. Implement the new SCCs in the U.K. following Brexit, as the U.K. Information Commissioner's Office\ndoes not have the authority to publish its own set of SCCs.","a":"D","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 D 正确。英国脱欧后建立了自己的国际数据传输协议（IDTA）及英国附加条款，并非无权制定。B 所述迁移期\n限属于历史性要求，已于 2022 年 12 月 27 日届满；新安排应使用现行欧盟 SCC。","t":"判例法"},{"n":221,"q":"A company would like to implement CCTV monitoring in its offices for safety and security purposes. Which\nof the following would be the best legal basis for the company to rely upon?","o":"A. Public interest.\nB. Individual consent.\nC. Legitimate interest.\n\nD. Exercise of public authority.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。企业为办公场所安全目的部署 CCTV 监控，通常被认为是保护企业财产及人员安全的合法\n利益，属于第 6(1)(f)条“合法利益”的典型应用场景（须经必要性与比例性平衡测试）。A（公共利益，通\n常适用于公权力机构而非普通企业）、B（个人同意，在雇佣关系权力不对等下并非合适或稳健的依\n据）、D（行使公权力，同样不适用于私营企业）均不如合法利益贴切。知识点：第 6(1)(f)条合法利益作\n为企业安防监控（CCTV）的典型合法依据。","t":"GDPR"},{"n":222,"q":"The EDPB's Guidelines 8/2020 on the Targeting of Social Media Users stipulates that in order to rely on\nlegitimate interest as a legal basis to process personal data, three tests must be passed. Which of the\nfollowing is NOT one of the three tests?","o":"A. Purpose test.\nB. Necessity test.\nC. Balancing test.\nD. Adequacy test.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。EDPB《8/2020 号指南》关于合法利益作为社交媒体用户定向投放合法依据的三重测试为：\n目的测试（确认存在合法利益，A）、必要性测试（处理是否为实现该利益所必需，B）、平衡测试（该\n利益是否超越数据主体的权利自由，C），并不包含所谓的“适当性测试”（adequacy test，该术语更多用\n于跨境传输的“充分性认定”概念，与合法利益三重测试无关，属于混淆概念的干扰项）。知识点：EDPB\n指南 8/2020 关于合法利益的三重测试（目的、必要性、平衡）。","t":"监管机构"},{"n":223,"q":"The GDPR's list of processor obligations regarding cloud computing includes all of the following EXCEPT?","o":"A. Controllers must be given notice of any subprocessors and have a right of objection.\nB. Individuals authorized to process the personal data are subject to an obligation of confidentiality.\nC. Any personal data related to data subjects must be securely maintained for a maximum of ten years.\nD. Processors must implement technical and organizational measures to ensure a level of security\nappropriate to the risk.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 28 条关于云计算处理者义务的清单包括：次级处理者的告知与异议权（A）、处理人员\n保密义务（B）、适当技术组织安全措施（D）等，但 GDPR 并未设定统一的“最长十年”数据留存期限—\n—留存期限应依据具体处理目的、适用法律及存储限制原则个案确定，而非法律统一规定的固定期限。\n知识点：第 28 条云处理者义务清单，及 GDPR 并不设定统一法定留存期限（留存期限须依处理目的个案\n判断）。","t":"GDPR"},{"n":224,"q":"The origin of privacy as a fundamental human right can be found in which document?","o":"A. Universal Declaration of Human Rights 1948.\nB. European Convention of Human Rights 1953.\nC. OECD Guidelines on the Protection of Privacy 1980.\nD. Charter of Fundamental Rights of the European Union 2000.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。1948 年《世界人权宣言》第 12 条首次在国际人权文件中明确将“隐私”确立为一项基本人权\n（任何人的私生活、家庭、住宅或通信不得任意干涉），早于欧洲人权公约（B，1953 年生效）、OECD\n隐私准则（C，1980 年）及欧盟基本权利宪章（D，2000 年）。知识点：世界人权宣言第 12 条作为隐私\n权确立为基本人权的国际法源头。","t":"Convention 108/108+"},{"n":225,"q":"What is the primary purpose of Convention 108+, which amends the Convention for the Protection of\nIndividuals with regard to Automatic Processing of Personal Data?","o":"A. To issue updated guidelines for data transfers from the EU to third-country signatories to the\nConvention.\nB. To modify the process for third countries to obtain an adequacy decision from the European\n\nCommission.\nC. To strengthen data protection in line with the European and international regulatory framework.\n\nD. To establish new data subject rights and safeguards for consumers in the EU member states.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。经 2018 年现代化修订的 108+号公约的主要目的是使该公约与包括 GDPR 在内的欧洲及国际\n最新数据保护监管框架保持同步，强化和更新其保护标准（如新增问责制、假名化、数据泄露通知等概\n念），而非专门针对跨境传输指引修订（A）、修改充分性认定获取流程（B，充分性认定属欧盟法律框\n架下的概念，非 108 公约本身的直接内容）或专门为欧盟消费者创设新权利（D，108 公约面向所有缔约\n国而非仅欧盟消费者）。知识点：108+号公约现代化修订的主要目的——与欧洲/国际数据保护监管框架\n保持一致并强化保护水平。","t":"Convention 108/108+"},{"n":226,"q":"Which of the following regulates the use of electronic communications services within the European\nUnion?","o":"A. Regulation (EU) 2015/2120 of the European Parliament and of the Council of 25 November 2015.\nB. Regulation (EU) 2017/1953 of the European Parliament and of the Council of 25 October 2017.\nC. Directive 2002/58/EC of the European Parliament and of the Council of 12 July 2002.\nD. Directive (EU) 2019/789 of the European Parliament and of the Council of 17 April 2019.","a":"C","v":"accurate","vd":"准确","e":"正 确 答 案 C 。 规 范 欧 盟 电 子 通 信 服 务 隐 私 事 项 （ 如 cookie 、 直 接 营 销 、 通 信 保 密 ） 的 核 心 法 律 是\n2002/58/EC 号指令（即 ePrivacy 指令），A（2015/2120 号条例涉及网络中立及漫游费用规则）、B（虚构\n或与本主题无关的条例编号）、D（2019/789 号指令涉及广播节目跨境传输规则）均与电子通信隐私规制\n无直接关联。知识点：2002/58/EC 号 ePrivacy 指令作为欧盟电子通信隐私规制的核心法律依据。","t":"ePrivacy指令"},{"n":227,"q":"What was the main failing of Convention 108 that led to the creation of the Data Protection Directive\n(Directive 95/46/EC)?","o":"A. It did not account for the rapid growth of the Internet.\nB. It did not include protections for sensitive personal data.\n\nC. It was implemented in a fragmented manner by a small number of states.\nD. Its penalties for violations of data protection rights were widely viewed as insufficient.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。108 号公约作为一项国际条约，其效力和保护水平的落地依赖各缔约国自行批准和转化为国\n内法，但历史上仅有少数国家真正批准并有效实施，导致欧盟内部数据保护水平参差不齐、难以形成统\n一市场，这正是促使欧盟以更具强制约束力的 95/46/EC 指令取而代之的主要原因。A（未预见互联网发\n展，非主要历史原因，指令出台时互联网尚处早期）、B（未涵盖敏感数据保护，108 号公约实际上已包\n含特殊类别数据的相关条款）、D（处罚力度不足，并非公认的核心历史原因）均不如 C 准确。知识点：\n108 号公约因缔约国实施不均衡而催生 95/46/EC 指令的历史背景。","t":"历史沿革/95-46-EC"},{"n":228,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJane starts her new role as a Data Protection Officer (DPO) at a Malta-based company that allows anyone\nto buy and sell cryptocurrencies via its online platform. The company stores and processes the personal\ndata of its customers in a dedicated data center located in Malta (EU).\n\nPeople wishing to trade cryptocurrencies are required to open an online account on the platform. They\nthen must successfully pass a Know Your Customer (KYC) due diligence procedure aimed at preventing\nmoney laundering and ensuring compliance with applicable financial regulations.\n\nThe non-European customers are also required to waive all their GDPR rights by reading a disclaimer\nwritten in bold and ticking a checkbox on a separate page in order to get their account approved on the\nplatform.\n\nAll customers must likewise accept the terms of service of the platform. The terms of service also include a\nprivacy policy section, saying, among other things, that if a customer fails the KYC process, its KYC data\n\nwill be automatically shared with the national anti-money laundering agency.\n\nThe KYC procedure requires customers to answer many questions, including whether they have any\n\ncriminal convictions, whether they use recreational drugs or have problems with alcohol, and whether they\n\nhave a terminal illness. While providing this data, customers see a conspicuous message saying that this\n\ndata is meant only to prevent fraud and account takeover, and will be never shared with private third\nparties.\nThe company regularly conducts external security testing of its online systems by independent\ncybersecurity companies from the EU. At the final stage of testing, the company provides cybersecurity\nassessors with access to its central database to review security permissions, roles and policies. Personal\ndata in the database is encrypted; however, cybersecurity assessors usually have access to the decryption\nkeys obtained while running initial security testing. The assessors must strictly follow the guidelines\nimposed by the company during the entire testing and auditing process.\n\nAll customer data, including trading activities and all internal communications with technical support, are\npermanently stored in a secured AWS S3 Glacier cloud data storage, located in Ireland, for backup and\ncompliance purposes. The data is securely transferred to the cloud and then is properly encrypted while at\nrest by using AWS-native encryption mechanisms. These mechanisms give AWS the necessary technical\nmeans to encrypt and decrypt the data when such is required by the company. There is no data\nprocessing agreement between AWS and the company.\n\nAre the cybersecurity assessors required to sign a data processing agreement with the company in order\nto comply with the GDPR?","o":"A. No, the assessors do not qualify as data processors as they only have access to encrypted data.\nB. No, the assessors do not qualify as data processors as they do not copy the data to their facilities.\nC. Yes, the assessors are considered to be joint data controllers and must sign a mutual data processing\nagreement.\nD. Yes, the assessors are data processors and their processing of personal data must be governed by a\nseparate contract or other legal act.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。网络安全评估人员作为独立主体，接受公司委托对其系统进行安全测试并获得访问加密数\n据密钥的权限，其处理行为（即便是临时性、测试性质）已构成对个人数据的处理，依第 28 条须与委托\n方签订处理者协议或其他具有同等约束力的法律文件，明确其数据处理义务和安全保障要求，而非因数\n据加密（A）或未将数据复制到自有设施（B）就当然豁免处理者身份及协议义务；将其定性为“共同控制\n者”（C）也不准确，因为评估人员是按公司指示、为公司利益进行测试，并非独立决定处理目的和方\n式。知识点：第 28 条处理者身份认定及协议要求——即便是临时性、有限访问权限的第三方服务提供\n商，只要处理个人数据即须签订处理者协议。","t":"GDPR"},{"n":229,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJane starts her new role as a Data Protection Officer (DPO) at a Malta-based company that allows anyone\nto buy and sell cryptocurrencies via its online platform. The company stores and processes the personal\ndata of its customers in a dedicated data center located in Malta (EU).\n\nPeople wishing to trade cryptocurrencies are required to open an online account on the platform. They\nthen must successfully pass a Know Your Customer (KYC) due diligence procedure aimed at preventing\nmoney laundering and ensuring compliance with applicable financial regulations.\n\nThe non-European customers are also required to waive all their GDPR rights by reading a disclaimer\nwritten in bold and ticking a checkbox on a separate page in order to get their account approved on the\nplatform.\n\nAll customers must likewise accept the terms of service of the platform. The terms of service also include a\nprivacy policy section, saying, among other things, that if a customer fails the KYC process, its KYC data\nwill be automatically shared with the national anti-money laundering agency.\n\nThe KYC procedure requires customers to answer many questions, including whether they have any\ncriminal convictions, whether they use recreational drugs or have problems with alcohol, and whether they\n\nhave a terminal illness. While providing this data, customers see a conspicuous message saying that this\n\ndata is meant only to prevent fraud and account takeover, and will be never shared with private third\nparties.\n\nThe company regularly conducts external security testing of its online systems by independent\ncybersecurity companies from the EU. At the final stage of testing, the company provides cybersecurity\n\nassessors with access to its central database to review security permissions, roles and policies. Personal\ndata in the database is encrypted; however, cybersecurity assessors usually have access to the decryption\nkeys obtained while running initial security testing. The assessors must strictly follow the guidelines\nimposed by the company during the entire testing and auditing process.\n\nAll customer data, including trading activities and all internal communications with technical support, are\npermanently stored in a secured AWS S3 Glacier cloud data storage, located in Ireland, for backup and\ncompliance purposes. The data is securely transferred to the cloud and then is properly encrypted while at\nrest by using AWS-native encryption mechanisms. These mechanisms give AWS the necessary technical\nmeans to encrypt and decrypt the data when such is required by the company. There is no data\nprocessing agreement between AWS and the company.\n\nShould Jane modify the required GDPR rights waiver for non-European residents?","o":"A. Yes, the waiver must not apply to any residents of countries with an adequacy decision from the EC.\nB. Yes, this clause must be entirely removed as all customers, regardless of residence or nationality, shall\nenjoy the same individual rights granted under GDPR.\nC. No, the non-EU residents are not protected by GDPR unless they are physically located in the EU.\nD. No, but all non-EU residents must manually sign a separate waiver to ensure its lawfulness and\nenforceability under GDPR.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 正确，因为控制者设立于马耳他，相关处理在该欧盟设立机构活动背景下进行，GDPR 适用不取决于客户国\n籍或居住地。数据主体的强制性权利不能通过勾选“放弃”。","t":"GDPR"},{"n":230,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJane starts her new role as a Data Protection Officer (DPO) at a Malta-based company that allows anyone\nto buy and sell cryptocurrencies via its online platform. The company stores and processes the personal\ndata of its customers in a dedicated data center located in Malta (EU).\n\nPeople wishing to trade cryptocurrencies are required to open an online account on the platform. They\nthen must successfully pass a Know Your Customer (KYC) due diligence procedure aimed at preventing\nmoney laundering and ensuring compliance with applicable financial regulations.\n\nThe non-European customers are also required to waive all their GDPR rights by reading a disclaimer\nwritten in bold and ticking a checkbox on a separate page in order to get their account approved on the\nplatform.\n\nAll customers must likewise accept the terms of service of the platform. The terms of service also include a\nprivacy policy section, saying, among other things, that if a customer fails the KYC process, its KYC data\nwill be automatically shared with the national anti-money laundering agency.\n\nThe KYC procedure requires customers to answer many questions, including whether they have any\ncriminal convictions, whether they use recreational drugs or have problems with alcohol, and whether they\nhave a terminal illness. While providing this data, customers see a conspicuous message saying that this\ndata is meant only to prevent fraud and account takeover, and will be never shared with private third\nparties.\n\nThe company regularly conducts external security testing of its online systems by independent\ncybersecurity companies from the EU. At the final stage of testing, the company provides cybersecurity\n\nassessors with access to its central database to review security permissions, roles and policies. Personal\n\ndata in the database is encrypted; however, cybersecurity assessors usually have access to the decryption\nkeys obtained while running initial security testing. The assessors must strictly follow the guidelines\n\nimposed by the company during the entire testing and auditing process.\n\nAll customer data, including trading activities and all internal communications with technical support, are\n\npermanently stored in a secured AWS S3 Glacier cloud data storage, located in Ireland, for backup and\ncompliance purposes. The data is securely transferred to the cloud and then is properly encrypted while at\nrest by using AWS-native encryption mechanisms. These mechanisms give AWS the necessary technical\nmeans to encrypt and decrypt the data when such is required by the company. There is no data\nprocessing agreement between AWS and the company.\n\nWhich of the following must be a component of the anti-money-laundering data-sharing practice of the\nplatform?","o":"A. The terms of service shall also enumerate all applicable anti-money laundering laws.\nB. Customers shall have an opt-out feature to restrict data sharing with law enforcement agencies after\nthe registration.\nC. The terms of service shall include the address of the anti-money laundering agency and contacts of the\ninvestigators who may access the data.\nD. Customers shall receive a clear and conspicuous notice about such data sharing before submitting\ntheir data during the registration process.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。依据反洗钱数据共享的透明度要求（并结合 GDPR 第 13/14 条告知义务），客户应在提交数\n据前即被清晰、醒目地告知其数据可能因 KYC 未通过而被共享给反洗钱机构，这是保障客户知情权、避\n免处理目的被隐瞒的关键要素。A（须在条款中列明所有适用反洗钱法律，过于宽泛不实际）、B（须提\n供退出反洗钱数据共享的选项，反洗钱义务属于法定强制要求，通常不允许客户自由选择退出）、C（须\n列明反洗钱机构地址及调查人员联系方式，非必要且不现实的具体要求）均不准确。知识点：反洗钱数\n据共享场景下的透明度告知要求（须于收集前清晰告知）。","t":"GDPR"},{"n":231,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nJane starts her new role as a Data Protection Officer (DPO) at a Malta-based company that allows anyone\nto buy and sell cryptocurrencies via its online platform. The company stores and processes the personal\ndata of its customers in a dedicated data center located in Malta (EU).\n\nPeople wishing to trade cryptocurrencies are required to open an online account on the platform. They\nthen must successfully pass a Know Your Customer (KYC) due diligence procedure aimed at preventing\nmoney laundering and ensuring compliance with applicable financial regulations.\n\nThe non-European customers are also required to waive all their GDPR rights by reading a disclaimer\nwritten in bold and ticking a checkbox on a separate page in order to get their account approved on the\nplatform.\n\nAll customers must likewise accept the terms of service of the platform. The terms of service also include a\nprivacy policy section, saying, among other things, that if a customer fails the KYC process, its KYC data\nwill be automatically shared with the national anti-money laundering agency.\n\nThe KYC procedure requires customers to answer many questions, including whether they have any\ncriminal convictions, whether they use recreational drugs or have problems with alcohol, and whether they\nhave a terminal illness. While providing this data, customers see a conspicuous message saying that this\ndata is meant only to prevent fraud and account takeover, and will be never shared with private third\nparties.\n\nThe company regularly conducts external security testing of its online systems by independent\ncybersecurity companies from the EU. At the final stage of testing, the company provides cybersecurity\nassessors with access to its central database to review security permissions, roles and policies. Personal\ndata in the database is encrypted; however, cybersecurity assessors usually have access to the decryption\nkeys obtained while running initial security testing. The assessors must strictly follow the guidelines\nimposed by the company during the entire testing and auditing process.\n\nAll customer data, including trading activities and all internal communications with technical support, are\npermanently stored in a secured AWS S3 Glacier cloud data storage, located in Ireland, for backup and\n\ncompliance purposes. The data is securely transferred to the cloud and then is properly encrypted while at\nrest by using AWS-native encryption mechanisms. These mechanisms give AWS the necessary technical\n\nmeans to encrypt and decrypt the data when such is required by the company. There is no data\n\nprocessing agreement between AWS and the company. 6\n\nWhat is potentially wrong with the backup system operated in the AWS cloud?","o":"A. The AWS servers are located in the EU but in a country different than the location of the corporate\nheadquarters.\nB. It is unlawful to process any personal data in a cloud unless the cloud is certified as GDPR-compliant\nby a competent supervisory authority.\nC. The data storage period has to be revised, and a data processing agreement with AWS must be\nsigned.\nD. AWS is a U.S. company, and no personal data of European residents may be transferred to it without\nexplicit written consent from data subjects.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。公司与 AWS 之间缺乏依第 28 条要求的书面数据处理协议，这是明显的合规缺口，须尽快\n签订该协议，同时留存期限（“永久存储”backup 数据）也应结合存储限制原则重新审视评估是否合理必\n要，而非无限期保留。A（AWS 服务器位于爱尔兰这一欧盟成员国境内，与总部所在国不同本身不构成\n问题，因为爱尔兰仍属欧盟境内，不涉及跨境传输合规问题）、B（并无“云须经监管机构认证”这一强制\n性法律要求，认证是可选的合规工具而非强制前提，第 42 条认证机制是自愿性质）、D（AWS 作为美国\n公司在欧盟境内设有数据中心并将数据存储于爱尔兰境内运营，此类情形不构成向美国境外传输个人数\n据，因此 D 的假设本身不成立）均不准确。知识点：第 28 条处理者协议缺失的合规风险及存储限制原则\n对无限期留存的适用。","t":"GDPR"},{"n":232,"q":"Sanctions for non-compliance with the EU Artificial Intelligence Act (AI Act) could result in a maximum\nfine\nof?","o":"A. The higher of up to 10 million Euro or up to 2% of the entity's total worldwide turnover for the preceding\n\nfinancial year.\nB. The higher of up to 40 million Euro or up to 8% of the entity's total worldwide turnover for the preceding\n\nfinancial year.\nC. The higher of up to 20 million Euro or up to 4% of the entity's total worldwide turnover for the preceding\nfinancial year.\nD. The higher of up to 30 million Euro or up to 6% of the entity's total worldwide turnover for the preceding\nfinancial year.","a":"无（原四项均不准确）","v":"corrected","vd":"已修正（原答案：无（原四个选项均不准确）；修订：无\n（原四项均不准确））","e":"现行《欧盟人工智能法》没有任何一个选项匹配最高档罚款。违反禁止性 AI 做法可处最高 3,500 万欧元，或对企业\n处上一财年全球年营业额 7%（原则上取较高者；中小企业适用法案规定的较低上限规则）。其他类型违规适用较低\n的罚款档次。","t":"AI Act"},{"n":233,"q":"A dynamic Internet Protocol (IP) address is considered personal data when it is combined with what?","o":"A. Other data held by the processor.\nB. Other data held by the controller.\nC. Other data held by recipients of the data.\nD. Other data held by Internet Service Providers (ISPs).","a":"D","v":"accurate","vd":"准确","e":"【经复核，本题参考答案有误，正确答案应为 D，理由见文末【答案修正】说明】原解析（针对原答案\nB）：正确答案 B。欧洲法院在 Breyer 案（2016）中确立，动态 IP 地址是否构成个人数据取决于控制者\n（如网站运营商）是否拥有合法途径（如可要求 ISP 提供）获取能将该 IP 地址与特定用户关联的补充信\n息；本题强调的是与“控制者”所持有的其他数据结合的可能性，而非处理者（A）、数据接收方（C）或\nISP 自身持有的数据（D，ISP 当然掌握对应信息，但本题问的是使得控制者一方能够识别个人的判断标\n准）。知识点：Breyer 案确立的动态 IP 地址构成个人数据的判断标准——控制者是否有合理途径结合额\n外信息识别个人。 【答案修正】原答案标注为 B，经核查欧洲法院 Breyer 案（C-582/14，2016 年 10 月\n19 日判决）原文，正确答案应为 D。该案确立的规则是：动态 IP 地址对于网站运营商（控制者）而言是\n否构成个人数据，取决于该控制者是否拥有合法途径，借助互联网服务提供商（ISP，即案件中的第三\n方）所掌握的补充信息来识别用户——该补充信息是由 ISP（第三方）持有，而非由控制者自身持有。因\n此正确表述应为“与 ISP 持有的其他数据结合”（选项 D），而非“与控制者持有的其他数据结合”（选项\nB，原答案）。这一区分正是 Breyer 案确立“相对识别标准”（relative criterion）的核心——即便识别所需\n的补充信息掌握在第三方手中，只要控制者有合法、现实的途径获取该信息，该数据对控制者而言仍构\n成个人数据。","t":"判例法"},{"n":234,"q":"Which of the following type of \"natural person\" is NOT exempt from the material scope of the GDPR.\nInsofar as the processing of personal data is concerned?","o":"A. A natural person in the course of a large-scale but purely personal or household activity.\n\nB. A natural person processing data for a small-scale, purely personal or household activity. 6\nC. A natural person in the course of processing purely personal or household data on behalf of a spouse\nwho is beyond the age of majority.\nD. A natural person in the course of an activity conducted purely for a personally-owned sole\nproprietorship.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 2(2)(c)条“家庭活动豁免”仅适用于自然人纯粹为个人或家庭事务从事的处理活动（无论规\n模大小，A、B 均可能落入该豁免，只要活动本质仍属纯个人/家庭性质；C 代表配偶之间纯粹私人事务的\n处理同样属于该豁免范畴），但若自然人是以个体经营者（sole proprietorship，即从事商业经营活动）的\n身份处理数据，即便是个人独资经营，也已超出“纯粹个人或家庭事务”范畴，属于商业活动，不享受家庭\n活动豁免，须完全遵守 GDPR。知识点：第 2(2)(c)条家庭活动豁免的范围界定——商业性质活动（即便\n是个体经营）不适用该豁免。","t":"GDPR"},{"n":235,"q":"MagicClean is a web-based service located in the United States that matches home cleaning services to\ncustomers. It offers its services exclusively in the United States. It uses a processor located in France to\noptimize its data.\n\nIs MagicClean subject to the GDPR?","o":"A. Yes, because MagicClean is processing data in the EU.\nB. Yes, because MagicClean's data processing agreement with the French processor is an establishment\nin the EU.\nC. No, because MagicClean is located in the United States only.\nD. No, because MagicClean is not offering services to EU data subjects.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。MagicClean 仅面向美国境内客户提供服务，并未向欧盟数据主体提供商品或服务，也未监\n测欧盟境内个人的行为，即便使用了位于法国的处理者协助优化数据（处理活动的执行地点本身不足以\n触发 GDPR，需结合是否构成“设立机构活动背景下的处理”或目标指向欧盟数据主体判断），因此不落入\nGDPR 域外适用范围。A、B 均错误地将“处理活动发生地在欧盟”或“与欧盟处理者签订协议”等同于触发\nGDPR 适用的充分条件，忽略了核心判断标准应是是否面向欧盟数据主体提供服务或监测其行为。知识\n点：第 3 条域外适用性判断——使用欧盟处理者本身不足以触发 GDPR，须结合是否面向欧盟数据主体提\n供服务或监测行为。","t":"GDPR"},{"n":236,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nFinancially, it has been a very good year at ARRA Hotels: Their 21 hotels, located in Greece (5), Italy (15)\nand Spain (1), have registered their most profitable results ever. To celebrate this achievement, ARRA\nHotels' Human Resources office, based in ARRA's main Italian establishment, has organized a team event\nfor its 420 employees and their families at its hotel in Spain.\n\nUpon arrival at the hotel, each employee and family member is given an electronic wristband at the\nreception desk. The wristband serves a number of functions:\n\nAllows access to the \"party zone\" of the hotel, and emits a buzz if the user approaches any\nunauthorized areas\nAllows up to three free drinks for each person of legal age, and emits a buzz once this limit has been\nreached\nGrants a unique ID number for participating in the games and contests that have been planned.\n\nAlong with the wristband, each guest receives a QR code that leads to the online privacy notice describing\nthe use of the wristband. The page also contains an unchecked consent checkbox. In the case of\nemployee family members under the age of 16, consent must be given by a parent.\n\nAmong the various activities planned for the event, ARRA Hotels' HR office has autonomously set up a\n\nphotocall area, separate from the main event venue, where employees can come and have their pictures\n\ntaken in traditional carnival costume. The photos will be posted on ARRA Hotels' main website for general\nmarketing purposes.\n\nOn the night of the event, an employee from one of ARRA's Greek hotels is displeased with the results of\nthe photos in which he appears. He intends to file a complaint with the relevant supervisory authority in\nregard to the following:\n The lack of any privacy notice in the separate photocall area\n The unlawful cross-border processing of his personal data\n The unacceptable aesthetic outcome of his photos\n\nWhich of the following is NOT necessarily considered a factor in identifying whether the processing could\nbe considered a \"cross-border processing\"?","o":"A. The total number of the data subjects interested.\nB. The potential harm for the data subjects affected.\nC. The limitation of rights of the data subjects concerned.\nD. The exposure of the information of the data subjects involved.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。判断处理活动是否构成“跨境处理”（第 4(23)条）的关键要素包括：处理是否发生在控制者\n于多个成员国的多个机构活动背景下、或处理是否实质影响多个成员国的数据主体（结合潜在损害 B、\n权利限制 C、信息暴露风险 D 等因素综合评估“实质影响”），但受影响数据主体的“总人数”本身并非判断\n是否构成跨境处理的直接法定考量因素——即便涉及人数不多，只要满足前述实质性影响多个成员国的\n标准，仍可构成跨境处理；反之人数众多但影响局限于单一成员国也未必构成跨境处理。知识点：第\n4(23)条“跨境处理”的认定标准——聚焦于多机构处理背景或对多成员国数据主体的实质影响，而非受影\n响人数本身。","t":"GDPR"},{"n":237,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nFinancially, it has been a very good year at ARRA Hotels: Their 21 hotels, located in Greece (5), Italy (15)\n\nand Spain (1), have registered their most profitable results ever. To celebrate this achievement, ARRA\nHotels' Human Resources office, based in ARRA's main Italian establishment, has organized a team event\nfor its 420 employees and their families at its hotel in Spain.\n\nUpon arrival at the hotel, each employee and family member is given an electronic wristband at the\nreception desk. The wristband serves a number of functions:\n\nAllows access to the \"party zone\" of the hotel, and emits a buzz if the user approaches any\nunauthorized areas\nAllows up to three free drinks for each person of legal age, and emits a buzz once this limit has been\nreached\nGrants a unique ID number for participating in the games and contests that have been planned.\n\nAlong with the wristband, each guest receives a QR code that leads to the online privacy notice describing\nthe use of the wristband. The page also contains an unchecked consent checkbox. In the case of\nemployee family members under the age of 16, consent must be given by a parent.\n\nAmong the various activities planned for the event, ARRA Hotels' HR office has autonomously set up a\nphotocall area, separate from the main event venue, where employees can come and have their pictures\ntaken in traditional carnival costume. The photos will be posted on ARRA Hotels' main website for general\nmarketing purposes.\n\nOn the night of the event, an employee from one of ARRA's Greek hotels is displeased with the results of\nthe photos in which he appears. He intends to file a complaint with the relevant supervisory authority in\nregard to the following:\n\nThe lack of any privacy notice in the separate photocall area\nThe unlawful cross-border processing of his personal data\nThe unacceptable aesthetic outcome of his photos\n\nWhich of the following principles has likely been violated in the processing of the photocall photos\n\ncontaining personal data?","o":"A. Adequacy.\n\nB. Lawfulness.\nC. Transparency.\nD. Data minimization.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。ARRA 酒店人力资源部门自行设置的拍照区域并未提供任何隐私声明，员工在毫不知情的情\n况下被拍照并计划将照片用于公司营销宣传，这明显违反透明度原则（第 5(1)(a)、13 条）——未告知处\n理目的、用途及相关权利。知识点：第 5(1)(a)及 13 条透明度原则在企业活动摄影场景中的适用。","t":"GDPR"},{"n":238,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nFinancially, it has been a very good year at ARRA Hotels: Their 21 hotels, located in Greece (5), Italy (15)\nand Spain (1), have registered their most profitable results ever. To celebrate this achievement, ARRA\nHotels' Human Resources office, based in ARRA's main Italian establishment, has organized a team event\nfor its 420 employees and their families at its hotel in Spain.\n\nUpon arrival at the hotel, each employee and family member is given an electronic wristband at the\nreception desk. The wristband serves a number of functions:\n\nAllows access to the \"party zone\" of the hotel, and emits a buzz if the user approaches any\nunauthorized areas\nAllows up to three free drinks for each person of legal age, and emits a buzz once this limit has been\nreached\nGrants a unique ID number for participating in the games and contests that have been planned.\n\nAlong with the wristband, each guest receives a QR code that leads to the online privacy notice describing\nthe use of the wristband. The page also contains an unchecked consent checkbox. In the case of\nemployee family members under the age of 16, consent must be given by a parent.\n\nAmong the various activities planned for the event, ARRA Hotels' HR office has autonomously set up a\nphotocall area, separate from the main event venue, where employees can come and have their pictures\ntaken in traditional carnival costume. The photos will be posted on ARRA Hotels' main website for general\nmarketing purposes.\n\nOn the night of the event, an employee from one of ARRA's Greek hotels is displeased with the results of\nthe photos in which he appears. He intends to file a complaint with the relevant supervisory authority in\nregard to the following:\n\nThe lack of any privacy notice in the separate photocall area\nThe unlawful cross-border processing of his personal data\nThe unacceptable aesthetic outcome of his photos\n\nWhy would consent NOT be considered an adequate legal basis for accessing the party zone?","o":"A. The consent is not completely unambiguous.\nB. The consent is not sufficiently informed.\n\nC. The consent is not freely given.\nD. The consent is not in writing.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。手环用于进入“派对区”这一功能与员工是否参加庆典活动本身存在实际关联，且勾选同意框\n位于活动现场、通过员工与雇主之间固有的权力不对等及社交压力情境下获取，员工很难真正自由地拒\n绝而不产生不利后果（如被排除在团建活动之外的社交压力），这使得该同意的“自由性”存疑，不构成有\n效同意的法律基础。A、B、D 虽然也可能存在问题，但本题聚焦的核心缺陷在于雇佣关系及活动情境下\n同意“自由给予”这一要素的欠缺。知识点：第 4(11)、7 条有效同意的“自由性”要求及雇佣/团建活动场景\n下同意自愿性的固有质疑。","t":"GDPR"},{"n":239,"q":"SCENARIO\nPlease use the following to answer the next question:\n\nFinancially, it has been a very good year at ARRA Hotels: Their 21 hotels, located in Greece (5), Italy (15)\nand Spain (1), have registered their most profitable results ever. To celebrate this achievement, ARRA\nHotels' Human Resources office, based in ARRA's main Italian establishment, has organized a team event\nfor its 420 employees and their families at its hotel in Spain.\n\nUpon arrival at the hotel, each employee and family member is given an electronic wristband at the\nreception desk. The wristband serves a number of functions:\n\nAllows access to the \"party zone\" of the hotel, and emits a buzz if the user approaches any\nunauthorized areas\nAllows up to three free drinks for each person of legal age, and emits a buzz once this limit has been\nreached\nGrants a unique ID number for participating in the games and contests that have been planned.\n\nAlong with the wristband, each guest receives a QR code that leads to the online privacy notice describing\nthe use of the wristband. The page also contains an unchecked consent checkbox. In the case of\nemployee family members under the age of 16, consent must be given by a parent.\n\nAmong the various activities planned for the event, ARRA Hotels' HR office has autonomously set up a\nphotocall area, separate from the main event venue, where employees can come and have their pictures\ntaken in traditional carnival costume. The photos will be posted on ARRA Hotels' main website for general\nmarketing purposes.\n\nOn the night of the event, an employee from one of ARRA's Greek hotels is displeased with the results of\nthe photos in which he appears. He intends to file a complaint with the relevant supervisory authority in\nregard to the following:\n\nThe lack of any privacy notice in the separate photocall area\nThe unlawful cross-border processing of his personal data\nThe unacceptable aesthetic outcome of his photos\n\nAssuming that there is a cross-border processing of personal data, which of the following criteria would\nNOT be useful to the lead supervisory authority responsible for the Greek employee's complaint when\ntrying to determine the location of the controller's main establishment?","o":"A. Where the controller is registered as a company.\nB. Where the processor is registered as a company.\nC. Where decisions about the processing activities are made.\nD. Where the director with responsibility for processing activities is located.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。判断控制者“主要设立地”的核心考量因素是控制者（而非处理者）在欧盟的注册地（A）、\n实际作出处理决策的地点（C）、负责处理事务的高管所在地（D）等，均围绕控制者自身展开；处理者\n的注册地点与确定控制者的主要设立地（进而确定主导监管机构）并无直接关联，因为主导监管机构制\n度是围绕控制者的设立地展开设计的（若处理者单独构成控制者身份则另当别论）。知识点：第 4(16)条\n主要设立地认定标准——聚焦于控制者（而非处理者）的注册地、决策地及责任人所在地。","t":"监管机构"},{"n":240,"q":"Which kind of privacy notice, originally advocated by the Article 29 Working Party, is commonly\nrecommended for AI-based technologies because of the way it provides processing information at specific\npoints of data collection?","o":"A. Privacy dashboard notice.\n\nB. Visualization notice.\nC. Just-in-time notice.\n\nD. Layered notice.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 29 条工作组倡导的“即时提示”（just-in-time notice）告知方式，即在用户实际输入或提交\n特定类型数据的当下、在具体情境节点弹出简明相关的处理信息提示，这种方式尤其适合 AI 驱动的技术\n场景（如动态个性化处理、实时数据收集节点较多），能在恰当时机提供针对性信息，优于笼统的隐私\n仪表盘（A）、可视化通知（B）或分层通知（D，分层通知更适合传统网站/App 整体隐私政策的呈现，\n而非 AI 技术中具体数据收集节点的即时提示）。知识点：第 29 条工作组倡导的“即时提示”告知方式及其\n在 AI 技术场景下的适用优势。","t":"GDPR"},{"n":241,"q":"Articles 13 and 14 of the GDPR provide details on the obligation of data controllers to inform data subjects\nwhen collecting personal data. However, both articles specify an exemption for situations in which the data\nsubject already has the information.\n\nWhich other situation would also exempt the data controller from this obligation under Article 14?","o":"A. When providing the information would go against a police order.\nB. When providing the information would involve a disproportionate effort.\n\nC. When the personal data was obtained through multiple source in the public domain.\nD. When the personal data was obtained 5 years before the entry into force of the GDPR.","a":"B","v":"accurate","vd":"准确","e":"正 确 答 案 B 。 第 14(5)(b) 条 规 定 ， 若 提 供 该 信 息 将 被 证 明 “ 不 可 能 ” 或 需 付 出 “ 不 成 比 例 的 努 力 ”\n（disproportionate effort），控制者可豁免第 14 条告知义务（尤其常见于科研、统计、档案目的处理场\n景，且须采取适当保障措施如公开发布信息等替代方式）。A（违反警方命令，非第 14 条明文列举的例\n外）、C（多方公开来源获取，本身不构成独立豁免理由）、D（GDPR 生效前 5 年获得的数据，无此类\n时间豁免规定）均不准确。知识点：第 14(5)(b)条“不成比例努力”作为告知义务的豁免情形。","t":"GDPR"},{"n":242,"q":"The transparency principle is most directly related to which of the following rights?","o":"A. Right to object.\n\nB. Right to be informed.\nC. Right to be forgotten.\nD. Right to restriction of processing.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。透明度原则的核心落地机制正是“被告知权”（Right to be Informed，体现在第 13、14 条），\n要求控制者以清晰易懂的方式主动告知数据主体处理相关信息，这是透明度原则最直接对应的具体权\n利。反对权（A）、被遗忘权（C）、限制处理权（D）虽然也与透明度原则存在间接关联（数据主体须\n先被充分告知才能有效行使这些权利），但并非该原则最直接对应的权利。知识点：透明度原则与“被告\n知权”（第 13、14 条）的直接对应关系。","t":"GDPR"},{"n":243,"q":"As a Data Protection Officer for a small bank in the European Union, you receive a data subject access\nrequest from one of your customers. The customer provides you with his name, and has used the email\naddress registered in your system.\n\nWhat would be the most appropriate way to confirm the identity of the customer?","o":"A. Request that the customer provide his bank account number.\nB. Request that the customer answer additional security questions.\nC. Request a copy of the customer's last bank account statement.\nD. Request a copy of the customer's government-issued ID document.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。要求客户回答其账户注册时预设的安全问题，是一种在不额外收集新的敏感身份证明文件\n（如政府身份证 D，超出必要范围）或过度收集金融账户细节（A、C，涉及不必要的额外敏感数据收\n集，违反数据最小化原则）的情况下，合理核实请求人身份的适度方式，符合第 12(6)条身份核实的比例\n性要求。知识点：第 12(6)条身份核实措施应遵循数据最小化及比例原则，避免过度收集额外敏感信息。","t":"GDPR"},{"n":244,"q":"In the Planet 49 case, what was the main judgement of the Court of Justice of the European Union (CJEU)\n\nregarding the issue of cookies?","o":"A. If the cookies do not track personal data, then pre-checked boxes are acceptable.\n\nB. If the ePrivacy Directive requires consent for cookies, then the GDPR's consent requirements apply.\nC. If a website's cookie notice makes clear the information gathered and the lifespan of the cookie, then\npre-checked boxes are acceptable.\nD. If a data subject continues to scroll through a website after reading a cookie banner, this activity\nconstitutes valid consent for the tracking described in the cookie banner.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。Planet49 案的核心裁判要旨是：只要 ePrivacy 指令要求就 cookie 的放置取得用户同意，该同\n意必须满足 GDPR 规定的同意有效性标准（如明确的肯定性行为、具体、知情等），即把 GDPR 的同意\n定义和标准“嫁接”适用于 ePrivacy 指令项下的 cookie 同意要求，从而统一了两套法律框架下同意的判断\n标准。A、C、D 均对判决的具体内容作出了不准确或与判决要旨相反的表述（该案恰恰否定了预勾选框\n和被动继续浏览可构成有效同意）。知识点：Planet49 案确立的 GDPR 同意标准适用于 ePrivacy 指令下\ncookie 同意的要旨。","t":"ePrivacy指令"},{"n":245,"q":"What ruling did the Planet 49 CJEU Judgment make regarding the issue of pre-ticked boxes?","o":"A. They are allowed if determined to be technically necessary.\nB. They do not amount to valid consent under any circumstances.\nC. They are allowed if recorded in the register of processing activities.\nD. They constitute valid consent if the processing is necessary for purposes of legitimate interest.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。Planet49 案明确裁定，预先勾选的同意框（pre-ticked box）在任何情况下都不能构成有效的\n同意，因为这不满足“积极的肯定性行为”这一同意有效性的核心要求（用户的沉默或未采取拒绝行动不能\n被解释为同意），A、C、D 均描述了不成立的例外情形。知识点：Planet49 案关于预勾选框绝对不构成\n有效同意的裁决。","t":"判例法"},{"n":246,"q":"According to Art. 23 GDPR, which of the following data subject rights can NOT be restricted?","o":"A. Right to restriction of processing.\nB. Right to erasure (\"Right to be forgotten\").\nC. Right to lodge a complaint with a supervisory authority.\nD. Right not to be subject to automated individual decision-making.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 23 条允许成员国通过立法在特定条件下（如国家安全、国防、公共安全、预防犯罪等重\n大公共利益目的）限制数据主体的部分权利（如限制处理权 A、被遗忘权 B、免受自动化决策约束权 D\n等），但向监管机构投诉的权利（第 77 条）作为数据主体寻求救济、确保监管监督的基本程序性权利，\n通常不在第 23 条可限制的权利范围之列（该权利本身正是确保权利限制措施合法性受到监督的重要保障\n机制）。知识点：第 23 条数据主体权利限制的范围及不可限制的投诉权。","t":"GDPR"},{"n":247,"q":"After detecting an intrusion involving the theft of unencrypted personal data, who shall the breached\ncompany notify first under GDPR requirements?","o":"A. Any parents of children whose personal data was compromised.\nB. Any affected customers whose data was compromised.\nC. A competent supervisory authority.\nD. A local law enforcement agency.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。第 33 条规定，控制者在知悉数据泄露后，若泄露很可能给数据主体权利自由带来风险，应\n“不得无故拖延”地（原则上 72 小时内）首先通知有管辖权的监管机构，这是法定的第一顺位通知对象；\n通知受影响的数据主体（B、A，且仅在“高风险”门槛下才需要，第 34 条）及通知执法机构（D，非\nGDPR 强制的首要步骤，是否报警属另一项独立的刑事程序考量）均非首先且必然采取的步骤。知识点：\n第 33 条数据泄露通知的首要对象及 72 小时时限。","t":"GDPR"},{"n":248,"q":"According to the EDPB Guidelines 01/2021 on Examples regarding Personal Data Breach Notification, if\n\nexfiltration of job application data (submitted through online application forms and stored on a webserver)\nresulted in personal information being accessible to unauthorized persons, this would be primarily\nconsidered what kind of breach?","o":"A. An integrity breach.\nB. An accuracy breach.\nC. An availability breach.\nD. A confidentiality breach.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。求职申请数据被未经授权的第三方窃取访问，本质上是未经授权的第三方获得了本不应访\n问的个人数据，属于对数据“机密性”的破坏，即“机密性泄露”（confidentiality breach），而非完整性泄露\n（数据被篡改，A）、准确性泄露（非 GDPR 泄露分类术语，B 为干扰项）或可用性泄露（数据丢失或无\n法访问，C）。知识点：EDPB 第 01/2021 号指南关于数据泄露三种类型（机密性、完整性、可用性）的\n区分——未授权访问/窃取对应机密性泄露。","t":"监管机构"},{"n":249,"q":"You are the new Data Protection Officer for your company and have to determine whether the company\nhas implemented appropriate technical and organizational measures as required by Article 32 of the\nGDPR. Which of the following would be the most important to consider when trying to determine this?","o":"A. How security measures might evolve in the future.\nB. Which security measures are endorsed by a majority of experts.\nC. How the public perceives what constitutes adequate security measures.\nD. Which kinds of security measures your company has employed in the past.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 只是四项中对“state of the art（技术发展水平）”最接近的代理指标，并非以专家多数投票决定。第 32 条还要\n求同时考虑实施成本、处理性质和范围、背景、目的，以及对个人权利自由的风险。","t":"GDPR"},{"n":250,"q":"If a company receives an anonymous email demanding ransom for the stolen personal data of its clients,\nwhat must the company do next, per GDPR requirements?","o":"A. Notify the police and file a criminal complaint about the incident.\nB. Start an investigation to understand the incident's possible scope, duration and nature.\nC. Send a notification to the competent supervisory authority describing the incident.\nD. Send an email about the incident to all clients and ask them to change their passwords.","a":"B","v":"corrected","vd":"已修正（原答案：C；修订：B）","e":"正确答案 B。匿名勒索邮件表明可能发生个人数据泄露，但控制者应立即调查，以取得“合理确定性”并了解范围、\n持续时间、数据类别和风险。只有在达到“知悉”标准且泄露可能对个人权利和自由造成风险时，才须依第 33 条在 72\n小时内通知监管机构；必要时可分阶段补充信息。","t":"GDPR"},{"n":251,"q":"If two controllers act as joint controllers pursuant to Article 26 of the GDPR, which of the following may\nNOT be validly determined by said controllers?","o":"A. The definition of a central contact point for data subjects.\nB. The rules regarding the exercising of data subjects' rights.\nC. The rules to provide information to data subjects in Articles 13 and 14.\n\nD. The non-disclosure of the essence of their arrangement to data subjects.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 26 条要求共同控制者以协议明确各自责任分工，并须将该协议的实质内容（essence of\nthe arrangement）向数据主体公开（第 26(2)条），因此共同控制者无权约定对数据主体保密该合作安排的\n实质内容，这是强制性透明度要求，不可协商排除。A（设立统一联系点）、B（行使数据主体权利的具\n体规则）、C（第 13/14 条告知义务的分工规则）均属于共同控制者协议可以且应当明确约定的事项。知\n识点：第 26 条共同控制者协议须向数据主体公开安排实质内容的强制性要求。","t":"GDPR"},{"n":252,"q":"ISO 31700 has set forth requirements relating to consumer products and services. In particular, this\ninternational standard focuses on the implementation of which of the following?","o":"A. Privacy by design.\nB. Comprehensive ethical AI software.\nC. Privacy notices for companies providing services to consumers.\n\nD. Automated systems for identifying EU data subjects' personal data.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。ISO 31700 是全球首个专门针对消费品和服务领域的“设计阶段隐私保护”（Privacy by\nDesign）国际标准，规定了产品和服务开发过程中应遵循的隐私保护工程要求，而非专门针对 AI 伦理软\n件（B）、隐私声明制作规范（C）或识别欧盟数据主体的自动化系统（D）。知识点：ISO 31700 标准及\n其在消费品/服务领域落实设计阶段隐私保护的核心定位。","t":"GDPR"},{"n":253,"q":"What is the main task of the European Data Protection Board?","o":"A. To assess adequacy of data protection in third countries.\nB. To ensure consistent application of the GDPR.\nC. To proactively prevent disputes between national supervisory authorities.\nD. To publish guidelines for data subjects on how to properly enforce their rights.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。EDPB 的核心法定任务是确保 GDPR 在欧盟各成员国范围内得到一致适用和解释（第 70 条\n列明的具体职责，包括发布指南、处理一致性机制下的争议、发布意见等），而非直接负责充分性认定\n评估（A，该职责属于欧盟委员会，EDPB 仅提供咨询意见）、主动预防各国监管机构间的争议（C，\nEDPB 是在争议已产生后通过一致性机制介入协调，而非“主动预防”）或直接面向数据主体发布维权指引\n（D，EDPB 的指南受众更广泛，包括控制者、处理者、监管机构等，并非专门面向数据主体本身）。知\n识点：EDPB 的核心法定职责——确保 GDPR 在欧盟范围内一致适用（第 70 条）。","t":"监管机构"},{"n":254,"q":"In relation to third countries and international organizations, which of the following shall, along with the\nsupervisory authorities, take appropriate steps to develop international cooperation mechanisms for the\nenforcement of data protection legislation?","o":"A. The European Parliament.\nB. The Council of the European Union.\nC. The designated Data Protection Officers.\nD. The European Commission.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 50 条规定，欧盟委员会及各监管机构应共同采取适当步骤，就第三国和国际组织之间发\n展数据保护执法国际合作机制，欧盟委员会在此扮演关键角色（负责与第三国政府和国际组织层面的协\n调），而非欧洲议会（A）、欧盟理事会（B，二者更多承担立法职能而非具体执法国际合作的推动）或\n个别企业的 DPO（C，DPO 是企业内部合规角色，无权代表国家进行国际合作）。知识点：第 50 条国际\n合作机制发展中欧盟委员会与监管机构的共同职责。","t":"监管机构"},{"n":255,"q":"The European Data Protection Board (EDPB) recommends measures to supplement transfer tools, in\norder to ensure compliance with the European Union (EU) level of personal data protection. According to\nthese recommendations, what additional actions should be taken when a transfer to a third country is\n\nbased upon an adequacy decision?","o":"A. Adopt a supplementary data transfer mechanism.\n\nB. Monitor the ongoing validity of the data transfer mechanism.\n\nC. Adopt technical, contractual or organizational supplementary measures.\n\nD. Monitor changes in the law or practice of the third country that would lower the level of protection of\npersonal data.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。EDPB 建议，即便跨境传输依托欧盟委员会已作出的充分性认定，数据出口方仍应持续关注\n该第三国的法律或实践是否发生可能降低个人数据保护水平的变化（因充分性认定本身也可能被暂停、\n修改或撤销），而非需另行采取补充传输机制（A，充分性认定本身已足以合法化传输，无需叠加其他机\n制）、监测传输机制的持续有效性（B，表述较笼统，D 更具体地指出应监测“第三国法律或实践的变化”\n这一关键要素）或采取技术合同组织性补充措施（C，补充措施主要适用于依赖 SCC 等其他传输工具的\n情形，而非已获充分性认定的传输）。知识点：EDPB 关于充分性认定传输下持续关注第三国法律环境变\n化的建议。","t":"监管机构"},{"n":256,"q":"In the wake of the Schrems II ruling, which of the following actions has been recommended by the EDPB\nfor companies transferring personal data to third countries?","o":"A. Adopting a risk-based approach and implementing supplementary measures as needed.\nB. Ensuring that all data transfers are encrypted with unbreakable encryption algorithms.\nC. Obtaining explicit consent from each EU citizen for every individual data transfer.\nD. Storing all personal data within the borders of the European Union.","a":"A","v":"accurate","vd":"准确","e":"正确答案 A。Schrems II 判决后，EDPB 建议企业采取“基于风险的方法”，对每一具体跨境传输的实际情\n况（目标国法律环境、数据敏感性等）进行个案评估，并按需实施适当的补充措施（技术、合同、组织\n性），而非要求“不可破解加密”这一不现实的技术标准（B）、逐一取得每位欧盟公民就每次传输的明确\n同意（C，同意仅是跨境传输合法机制之一且适用范围有限，并非普遍适用的解决方案）或要求所有个人\n数据必须存储在欧盟境内（D，数据本地化并非 Schrems II 判决要求的强制性一般原则）。知识点：\nSchrems II 判决后 EDPB 建议的“基于风险的方法”及补充措施机制。","t":"判例法"},{"n":257,"q":"Which failing of Privacy Shield, cited by the CJEU as a reason for its invalidation, is the Trans-Atlantic Data\nPrivacy Framework intended to address?","o":"A. Data Subject Rights.\nB. Right of Action.\n\nC. Necessity.\n\nD. Consent.","a":"B","v":"qualified","vd":"答案保留，解析已校正/限定","e":"答案 B 应理解为缺乏有效、可执行的司法救济或独立申诉机制。新框架试图通过数据保护审查法院等机制回应\nCJEU 对美国监控救济不足的批评；“right of action”只是简化表述。","t":"监管机构"},{"n":258,"q":"Pursuant to the EDPB Guidelines 8/2022, all of the following criteria must be considered when identifying a\nlead supervisory authority of a controller EXCEPT?","o":"A. Determining where the controller has its place of central administration in the EEA.\nB. Determining the supervisory authority where the place of central administration of the controller is\nlocated.\nC. Determining the supervisory authority according to what has been identified by the controller as the\nauthority to which data subjects can lodge complaints.\nD. Determining if decisions on the processing are taken in another establishment in the EEA, and if that\nestablishment has the power to implement those decisions.","a":"C","v":"accurate","vd":"准确","e":"正确答案 C。EDPB《8/2022 号指南》关于认定控制者主导监管机构的标准包括：中央管理地所在地\n（A、B）、是否存在其他欧盟设立机构实际作出并有权执行处理决策（D）等客观事实标准，但并不采\n纳控制者自行在隐私政策中“单方声明/指定”某监管机构作为数据主体投诉受理机构这一主观表述作为认\n定依据——主导监管机构的认定须基于客观事实，而非由控制者单方声明决定。知识点：EDPB 指南\n8/2022 关于主导监管机构认定的客观标准，排除控制者单方自我指定的做法。","t":"监管机构"},{"n":259,"q":"Higher fines are assessed for GDPR violations due to which of the following?","o":"A. Failure to notify a supervisory authority and data subjects of a personal data breach.\n\nB. Violations of a data controller's obligations to obtain a child's consent. 6\nC. Failure to appoint a data protection officer.\nD. Violations of a data subject's rights.","a":"D","v":"accurate","vd":"准确","e":"正确答案 D。第 83(5)条将违反数据主体基本权利（如同意规则、数据主体权利第 12-22 条、跨境传输核\n心原则、儿童同意规则等）的行为列为最高档行政罚款（最高 2000 万欧元或全球营业额 4%）的适用情\n形，这类违规直接侵害数据主体的核心利益，因此适用最严厉的处罚标准。A（未通知泄露）也属于较高\n违规但严格对应的是第 83(4)条较低档（除非同时涉及权利侵害）；B（违反儿童同意规则）本质上也是\n数据主体权利/同意规则违反的一种，与 D 存在包含关系，但 D 作为更概括、更准确的分类表述涵盖范围\n更广；C（未设 DPO）属于第 83(4)条较低档罚款范围。知识点：第 83(5)条较高档行政罚款——违反数据\n主体权利相关规定适用最严厉处罚标准。","t":"GDPR"},{"n":260,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nProStorage is a multinational cloud storage provider headquartered in the Netherlands. Its CEO, Ruth\nBrown, has developed a two-pronged strategy for growth: 1) expand ProStorage's global customer base\nand 2) increase ProStorage's sales force by efficiently onboarding effective teams. Enacting this strategy\nhas recently been complicated by Ruth's health condition, which has limited her working hours, as well as\nher ability to travel to meet potential customers. ProStorage's Human Resources department and Ruth's\nChief of Staff now work together to manage her schedule and ensure that she is able to make all her\nmedical appointments. The latter has become especially crucial after Ruth's last trip to India, where she\nsuffered a medical emergency and was hospitalized in New Delhi. Unable to reach Ruth's family, the\nhospital reached out to ProStorage and was able to connect with her Chief of Staff, who in coordination\nwith Mary, the head of HR, provided information to the doctors based on accommodation requests Ruth\nmade when she started at ProStorage.\n\nIn support of Ruth's strategic goals of hiring more sales representatives, the Human Resources team is\nfocused on improving its processes to ensure that new employees are sourced, interviewed, hired, and on\n\nboarded efficiently. To help with this, Mary identified two vendors, HRYourWay, a German based\ncompany, and InstaHR, an Australian based company. She decided to have both vendors go through\nProStorage's vendor risk review process so she can work with Ruth to make the final decision. As part of\nthe review process, Jackie, who is responsible for maintaining ProStorage's privacy program (including\nmaintaining controller BCRs and conducting vendor risk assessments), reviewed both vendors but\ncompleted a transfer impact assessment only for InstaHR. After her review of both vendors, she\ndetermined that InstaHR satisfied more of the requirements as it boasted a more established privacy\nprogram and provided third-party attestations, whereas HRYourWay was a small vendor with minimal data\nprotection operations. Thus, she recommended InstaHR.\n\nProStorage's marketing team also worked to meet the strategic goals of the company by focusing on\nindustries where it needed to grow its market share. To help with this, the team selected as a partner\nUpFinance. a US based company with deep connections to financial industry customers. During\nProStorage's diligence process, Jackie from the privacy team noted in the transfer impact assessment that\nUpFinance implements several data protection measures including end-lo-end encryption, with encryption\nkeys held by the customer. Notably, UpFinance has not received any government requests in its 7 years of\nbusiness. Still, Jackie recommended that the contract require UpFinance to notify ProStorage if it receives\na government request for personal data UpFinance processes on its behalf prior to disclosing such data.\n\nWhat transfer mechanism did ProStorage most likely rely on to transfer Ruth's medical information to the\nhospital?","o":"A. Ruth's implied consent.\nB. Protecting the vital interest of Ruth.\nC. Performance of a contract with Ruth.\nD. Protecting against legal liability from Ruth.","a":"B","v":"accurate","vd":"准确","e":"正确答案 B。医院因无法联系 Ruth 的家人、在紧急医疗情况下向公司询问并获得健康信息，公司据此向\n医 院 提 供 信 息 ， 其 合 法 处 理 依 据 应 是 第 6(1)(d) 条 “ 保 护 数 据 主 体 或 其 他 自 然 人 的 重 大 利 益 ” （ vital\ninterest），这一依据专门适用于当事人无法表达同意、且处理是挽救生命或健康所必需的紧急情况。A\n（默示同意，紧急情况下当事人往往无法表达同意，不宜依赖默示同意这一较弱且存疑的依据）、C（履\n行合同，员工的劳动合同本身通常不直接涵盖医疗紧急联络这一具体处理目的）、D（防范法律责任，属\n于合法利益范畴而非最贴切的依据）均不如“重大利益”准确对应紧急医疗场景。知识点：第 6(1)(d)条“重\n大利益”作为紧急医疗等生命健康攸关场景下的合法处理依据。","t":"GDPR"},{"n":261,"q":"SCENARIO\n\nPlease use the following to answer the next question:\n\nProStorage is a multinational cloud storage provider headquartered in the Netherlands. Its CEO, Ruth\nBrown, has developed a two-pronged strategy for growth: 1) expand ProStorage's global customer base\nand 2) increase ProStorage's sales force by efficiently onboarding effective teams. Enacting this strategy\nhas recently been complicated by Ruth's health condition, which has limited her working hours, as well as\nher ability to travel to meet potential customers. ProStorage's Human Resources department and Ruth's\nChief of Staff now work together to manage her schedule and ensure that she is able to make all her\nmedical appointments. The latter has become especially crucial after Ruth's last trip to India, where she\nsuffered a medical emergency and was hospitalized in New Delhi. Unable to reach Ruth's family, the\nhospital reached out to ProStorage and was able to connect with her Chief of Staff, who in coordination\nwith Mary, the head of HR, provided information to the doctors based on accommodation requests Ruth\nmade when she started at ProStorage.\n\nIn support of Ruth's strategic goals of hiring more sales representatives, the Human Resources team is\nfocused on improving its processes to ensure that new employees are sourced, interviewed, hired, and on\nboarded efficiently. To help with this, Mary identified two vendors, HRYourWay, a German based\ncompany, and InstaHR, an Australian based company. She decided to have both vendors go through\nProStorage's vendor risk review process so she can work with Ruth to make the final decision. As part of\nthe review process, Jackie, who is responsible for maintaining ProStorage's privacy program (including\nmaintaining controller BCRs and conducting vendor risk assessments), reviewed both vendors but\ncompleted a transfer impact assessment only for InstaHR. After her review of both vendors, she\ndetermined that InstaHR satisfied more of the requirements as it boasted a more established privacy\nprogram and provided third-party attestations, whereas HRYourWay was a small vendor with minimal data\nprotection operations. Thus, she recommended InstaHR.\n\nProStorage's marketing team also worked to meet the strategic goals of the company by focusing on\nindustries where it needed to grow its market share. To help with this, the team selected as a partner\nUpFinance. a US based company with deep connections to financial industry customers. During\nProStorage's diligence process, Jackie from the pr
